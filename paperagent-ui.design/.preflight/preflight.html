<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preflight</title>
    <style id="theme-vars">
:root {
  color-scheme: light;

  /* Brand prefix: pa (PaperAgent) */
  --pa-background: #f5f2ea;
  --pa-foreground: #1a2523;

  --pa-card: #fdfbf5;
  --pa-card-foreground: #1a2523;

  --pa-popover: #ffffff;
  --pa-popover-foreground: #1a2523;

  --pa-primary: #165d54;
  --pa-primary-foreground: #f5f2ea;

  --pa-muted: #f0ece2;
  --pa-muted-foreground: #5e6b67;

  --pa-border: #ddd8ca;
  --pa-input: #d4cfc0;
  --pa-ring: #165d54;

  --pa-destructive: #9e3a32;
  --pa-destructive-foreground: #fdfbf5;

  --pa-success: #2d7a5c;
  --pa-warning: #a66418;
  --pa-warning-foreground: #fdfbf5;
  --pa-accent-soft: #dde9e4;
  --pa-highlight: #7a4ea8;

  --pa-radius-sm: 0.375rem;
  --pa-radius-md: 0.625rem;
  --pa-radius-lg: 1rem;

  --pa-font-sans: "Inter", "Segoe UI", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --pa-font-serif: "Source Serif Pro", Georgia, "Times New Roman", serif;
  --pa-font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* Raw scale for reference */
  --pa-paper: #f5f2ea;
  --pa-paper-warm: #efeae0;
  --pa-ink: #1a2523;
  --pa-ink-soft: #2d3d39;
  --pa-line: #ddd8ca;
  --pa-line-strong: #c5bfad;
  --pa-teal-deep: #165d54;
  --pa-teal: #1f756a;
  --pa-teal-light: #4e9a8d;
  --pa-teal-mist: #dde9e4;
  --pa-amber: #a66418;
  --pa-amber-soft: #f5e9d3;
  --pa-crimson: #9e3a32;
  --pa-crimson-soft: #f5e4e1;
  --pa-sky: #28548a;
  --pa-sky-soft: #e4ecf7;
  --pa-violet: #7a4ea8;
  --pa-shadow-sm: 0 1px 2px rgb(26 37 35 / 6%);
  --pa-shadow-md: 0 6px 20px rgb(26 37 35 / 8%);
  --pa-shadow-lg: 0 18px 48px rgb(26 37 35 / 12%);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--pa-background);
    --color-foreground: var(--pa-foreground);
    --color-card: var(--pa-card);
    --color-card-foreground: var(--pa-card-foreground);
    --color-popover: var(--pa-popover);
    --color-popover-foreground: var(--pa-popover-foreground);
    --color-primary: var(--pa-primary);
    --color-primary-foreground: var(--pa-primary-foreground);
    --color-muted: var(--pa-muted);
    --color-muted-foreground: var(--pa-muted-foreground);
    --color-destructive: var(--pa-destructive);
    --color-destructive-foreground: var(--pa-destructive-foreground);
    --color-border: var(--pa-border);
    --color-input: var(--pa-input);
    --color-ring: var(--pa-ring);
    --radius-sm: var(--pa-radius-sm);
    --radius-md: var(--pa-radius-md);
    --radius-lg: var(--pa-radius-lg);
  }
  @layer base {
    body { background: var(--pa-background); color: var(--pa-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>

      .no-scrollbar::-webkit-scrollbar { display: none; }
