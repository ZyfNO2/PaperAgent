name: Retrieval final type fix

on:
  pull_request:
    branches:
      - fix/evidence-bound-module-contracts-local

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Narrow cache before use
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/paperagent/literature/service.py")
          text = path.read_text(encoding="utf-8")
          old = (
              '        use_cache = self._cache is not None and self._retrieval_mode != "live"\n'
              '        if use_cache:\n'
              '            cached = self._cache.get(key)\n'
          )
          new = (
              '        cache = self._cache\n'
              '        use_cache = cache is not None and self._retrieval_mode != "live"\n'
              '        if use_cache:\n'
              '            cached = cache.get(key)\n'
          )
          if text.count(old) != 1:
              raise SystemExit("expected one cache narrowing site")
          text = text.replace(old, new, 1)
          text = text.replace(
              '        cache = self._cache\n'
              '        if cache is None:\n'
              '            return await self._execute_live(provider, call.lane, filters, key)\n',
              '        if cache is None:\n'
              '            return await self._execute_live(provider, call.lane, filters, key)\n',
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY
      - name: Validate
        run: ruff format . && ruff check . && mypy
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/paperagent/literature/service.py
          git commit -m "fix(retrieval): narrow cache before lookup"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
