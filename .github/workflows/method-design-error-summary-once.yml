name: Method Design Error Summary Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/method-design-error-summary-once.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/claw-live-search-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run compact diagnostics
        id: diagnose
        shell: bash
        run: |
          set +e
          out="build/method-design-error-summary"
          mkdir -p "$out"
          files=(
            src/paperagent/method_design_draft.py
            src/paperagent/nodes/method_design.py
            tests/methodology/test_method_design_draft.py
          )
          ruff check "${files[@]}" --output-format=concise > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check --diff "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_evidence_binding.py \
            tests/graph/test_full_graph.py \
            tests/graph/test_hitl.py \
            tests/review/test_consolidated_regressions.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          python - "$out" "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" > "$out/summary.txt" <<'PY'
          import sys
          from pathlib import Path

          out = Path(sys.argv[1])
          statuses = dict(zip(("ruff", "format", "mypy", "pytest"), map(int, sys.argv[2:]), strict=True))
          print("statuses=" + repr(statuses))
          for name in ("ruff", "format", "mypy", "pytest"):
              lines = (out / f"{name}.log").read_text(encoding="utf-8", errors="replace").splitlines()
              meaningful = [line for line in lines if line.strip()]
              print(f"\n[{name}]")
              print("\n".join(meaningful[:35]) or "<empty>")
          PY
          cat "$out/summary.txt"
          exit 0
      - name: Publish compact diagnostics to Draft PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          pr_number=$(gh pr list \
            --head feat/claw-live-search-runtime \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [[ -z "$pr_number" ]]; then
            exit 0
          fi
          body=$(cat build/method-design-error-summary/summary.txt)
          gh pr comment "$pr_number" --body-file - <<EOF
          Method design draft compact diagnostics

          Run: $GITHUB_RUN_ID

          \`\`\`text
          $body
          \`\`\`
          EOF
