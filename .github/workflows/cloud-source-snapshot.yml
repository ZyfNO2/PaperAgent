name: Cloud Source Snapshot

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build source archive
        run: |
          tar --exclude=.git --exclude=.venv --exclude='**/__pycache__' -czf paperagent-source.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: paperagent-source-c0f3
          path: paperagent-source.tgz
          retention-days: 1
