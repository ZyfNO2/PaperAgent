name: Cloud Runtime Formatter

on:
  push:
    branches:
      - tmp/cloud-inspect-c0f3
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/cloud-inspect-c0f3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply Ruff formatting
        run: |
          ruff format \
            src/paperagent/providers/runtime.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py \
            src/paperagent/nodes/planning.py \
            src/paperagent/nodes/report.py \
            src/paperagent/method_design_draft.py \
            src/paperagent/strict_method_design.py \
            tests/providers/test_runtime.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_eval_runtime_reporting.py \
            tests/nodes/test_planning_identity_priority.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/nodes/test_report_fallback.py \
            tests/methodology/test_strict_method_design.py \
            tests/methodology/test_method_design_draft.py
      - name: Commit formatting changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/paperagent/providers/runtime.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py \
            src/paperagent/nodes/planning.py \
            src/paperagent/nodes/report.py \
            src/paperagent/method_design_draft.py \
            src/paperagent/strict_method_design.py \
            tests/providers/test_runtime.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_eval_runtime_reporting.py \
            tests/nodes/test_planning_identity_priority.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/nodes/test_report_fallback.py \
            tests/methodology/test_strict_method_design.py \
            tests/methodology/test_method_design_draft.py
          git commit -m "style(runtime): apply Ruff formatting"
          git push origin HEAD:tmp/cloud-inspect-c0f3
