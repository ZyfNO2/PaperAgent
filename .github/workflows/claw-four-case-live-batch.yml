name: CLAW Four-Case Live Batch

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".claw-four-case-trigger.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: claw-four-case-live-batch
  cancel-in-progress: true

jobs:
  batch:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      PAPERAGENT_LLM_PROVIDER: mistral
      PAPERAGENT_LLM_MODEL: mistral-small-latest
      PAPERAGENT_LLM_BASE_URL: https://api.mistral.ai/v1
      PAPERAGENT_LLM_MAX_ATTEMPTS: "2"
      PAPERAGENT_LLM_MAX_CALLS: "12"
      PAPERAGENT_LLM_TASK_TIMEOUT: "900"
      PAPERAGENT_CONTACT_EMAIL: ${{ secrets.PAPERAGENT_CONTACT_EMAIL }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Validate four-case request and offline gates
        id: validate
        shell: bash
        run: |
          set +e
          out="build/claw-four-case-live-batch"
          mkdir -p "$out"
          python - <<'PY' > "$out/request-validation.log" 2>&1
          import json
          from pathlib import Path

          marker = json.loads(Path('.claw-four-case-trigger.json').read_text(encoding='utf-8'))
          case_ids = marker.get('case_ids')
          if not isinstance(case_ids, list) or len(case_ids) != 4:
              raise SystemExit('case_ids must contain exactly four IDs')
          if len(set(case_ids)) != 4 or not all(isinstance(item, str) and item for item in case_ids):
              raise SystemExit('case_ids must be four unique non-empty strings')
          print(json.dumps(marker, ensure_ascii=False, indent=2, sort_keys=True))
          PY
          request_status=$?
          files=(
            src/paperagent/academic_methodology.py
            src/paperagent/method_design_draft.py
            src/paperagent/nodes/_shared.py
            src/paperagent/nodes/method_design.py
            src/paperagent/evidence_gap_binding.py
            src/paperagent/retrieval/verify_evidence.py
            src/paperagent/retrieval/prepare_search.py
            src/paperagent/literature/query_concepts.py
            src/paperagent/literature/query_refinement.py
            src/paperagent/literature/ranking.py
            scripts/probe_claw_case_end_to_end.py
            tests/methodology/test_method_design_draft.py
            tests/review/test_semantic_gap_binding.py
            tests/review/test_few_shot_intent_role_binding.py
            tests/review/test_multibehavior_recommendation_binding.py
          )
          ruff check "${files[@]}" > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_evidence_binding.py \
            tests/literature/test_query_concepts.py \
            tests/literature/test_multibehavior_recommendation_precision.py \
            tests/literature/test_query_refinement.py \
            tests/literature/test_source_selection_policy.py \
            tests/nodes/test_retrieval.py \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_few_shot_intent_role_binding.py \
            tests/review/test_multibehavior_recommendation_binding.py \
            tests/review/test_consolidated_regressions.py \
            tests/graph/test_full_graph.py \
            tests/graph/test_hitl.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          python - "$out/validation.json" \
            "$request_status" "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" <<'PY'
          import json
          import sys

          names = ('request', 'ruff', 'format', 'mypy', 'pytest')
          payload = {name: int(value) for name, value in zip(names, sys.argv[2:], strict=True)}
          payload['passed'] = all(value == 0 for value in payload.values())
          with open(sys.argv[1], 'w', encoding='utf-8') as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write('\n')
          PY
          if (( request_status || ruff_status || format_status || mypy_status || pytest_status )); then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Execute four cases sequentially
        if: steps.validate.outputs.passed == 'true'
        id: execute
        shell: bash
        run: |
          set +e
          out="build/claw-four-case-live-batch"
          if [[ -z "${MISTRAL_API_KEY:-}" ]]; then
            python - "$out/batch-summary.json" <<'PY'
          import json
          import sys

          payload = {
              'status': 'blocked_missing_mistral_secret',
              'passed': False,
              'cases': [],
              'web_search_enabled': False,
          }
          with open(sys.argv[1], 'w', encoding='utf-8') as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write('\n')
          PY
            exit 0
          fi
          mapfile -t case_ids < <(python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.claw-four-case-trigger.json').read_text(encoding='utf-8'))
          for case_id in payload['case_ids']:
              print(case_id)
          PY
          )
          mkdir -p "$out/cases"
          for case_id in "${case_ids[@]}"; do
            case_out="$out/cases/$case_id"
            mkdir -p "$case_out"
            python scripts/probe_claw_case_end_to_end.py \
              --case-id "$case_id" \
              --max-llm-calls 12 \
              --provider-call-budget 8 \
              --verification-call-budget 16 \
              --minimum-score 80 \
              --output-dir "$case_out" \
              > "$case_out/stdout.log" 2> "$case_out/stderr.log"
            printf '%s\n' "$?" > "$case_out/exit-code.txt"
          done
          python - "$out/batch-summary.json" "$out/cases" <<'PY'
          import json
          import os
          from pathlib import Path
          import sys

          root = Path(sys.argv[2])
          requested = json.loads(Path('.claw-four-case-trigger.json').read_text(encoding='utf-8'))
          cases = []
          for case_id in requested['case_ids']:
              summary_path = root / case_id / 'summary.json'
              if summary_path.exists():
                  summary = json.loads(summary_path.read_text(encoding='utf-8'))
              else:
                  summary = {
                      'case_id': case_id,
                      'status': 'missing_summary',
                      'passed': False,
                  }
              cases.append(summary)
          payload = {
              'batch_id': requested.get('batch_id'),
              'case_ids': requested['case_ids'],
              'cases': cases,
              'passed_count': sum(item.get('passed') is True for item in cases),
              'failed_count': sum(item.get('passed') is not True for item in cases),
              'passed': all(item.get('passed') is True for item in cases),
              'status': 'passed' if all(item.get('passed') is True for item in cases) else 'failed',
              'web_search_enabled': False,
              'workflow_run_id': int(os.environ['GITHUB_RUN_ID']),
              'workflow_head_sha': os.environ['GITHUB_SHA'],
          }
          with open(sys.argv[1], 'w', encoding='utf-8') as handle:
              json.dump(payload, handle, ensure_ascii=False, indent=2, sort_keys=True)
              handle.write('\n')
          print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
          PY
      - name: Write validation failure summary
        if: steps.validate.outputs.passed != 'true'
        run: |
          python - "build/claw-four-case-live-batch/batch-summary.json" <<'PY'
          import json
          import os
          import sys

          payload = {
              'status': 'validation_failed_before_llm',
              'passed': False,
              'cases': [],
              'web_search_enabled': False,
              'workflow_run_id': int(os.environ['GITHUB_RUN_ID']),
              'workflow_head_sha': os.environ['GITHUB_SHA'],
          }
          with open(sys.argv[1], 'w', encoding='utf-8') as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write('\n')
          PY
      - name: Upload four-case evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claw-four-case-live-${{ github.run_id }}
          path: build/claw-four-case-live-batch/
          if-no-files-found: error
          retention-days: 30
      - name: Persist compact batch result
        if: always()
        shell: bash
        run: |
          source_file="build/claw-four-case-live-batch/batch-summary.json"
          target_file="evals/claw_academic_tailoring_v1/live-probes/four-case-batch-latest.json"
          if [[ ! -f "$source_file" ]]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$GITHUB_REF_NAME"
          git checkout -B "$GITHUB_REF_NAME" "origin/$GITHUB_REF_NAME"
          mkdir -p "$(dirname "$target_file")"
          cp "$source_file" "$target_file"
          git add "$target_file"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(eval): persist four-case live result [skip ci]"
          for attempt in 1 2 3; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              exit 0
            fi
            git fetch origin "$GITHUB_REF_NAME"
            git rebase "origin/$GITHUB_REF_NAME"
          done
          exit 1
      - name: Enforce batch outcome
        if: always()
        run: |
          python - "build/claw-four-case-live-batch/batch-summary.json" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding='utf-8'))
          raise SystemExit(0 if payload.get('passed') is True else 1)
          PY
