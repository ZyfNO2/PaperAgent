name: Apply Eval Runner Reporting Patch

on:
  push:
    branches:
      - fix/semantic-tailoring-role-bound-scoring
    paths:
      - ".github/workflows/apply-eval-runner-reporting-patch.yml"
      - "scripts/apply_eval_runner_reporting_patch.py"
      - "scripts/repair_legacy_eval_snapshot.py"
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/apply-eval-runner-reporting-patch.yml"
      - "scripts/apply_eval_runner_reporting_patch.py"
      - "scripts/repair_legacy_eval_snapshot.py"

permissions:
  contents: write

concurrency:
  group: apply-eval-runner-reporting-patch
  cancel-in-progress: true

jobs:
  apply-test-and-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply deterministic runner patch
        run: python scripts/apply_eval_runner_reporting_patch.py
      - name: Apply lint fixes, format, and compile
        run: |
          ruff check --fix --unsafe-fixes --exit-zero \
            src/paperagent/eval_runtime_reporting.py \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/gen_public_dataset.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/build_eval_snapshot.py \
            scripts/validate_eval_snapshot.py \
            scripts/repair_legacy_eval_snapshot.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py \
            tests/evals/test_eval_snapshot_provenance.py \
            tests/evals/test_eval_runtime_reporting.py
          ruff format \
            src/paperagent/eval_runtime_reporting.py \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/gen_public_dataset.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/build_eval_snapshot.py \
            scripts/validate_eval_snapshot.py \
            scripts/repair_legacy_eval_snapshot.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py \
            tests/evals/test_eval_snapshot_provenance.py \
            tests/evals/test_eval_runtime_reporting.py
          python -m compileall -q \
            src/paperagent/eval_runtime_reporting.py \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/gen_public_dataset.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/build_eval_snapshot.py \
            scripts/validate_eval_snapshot.py \
            scripts/repair_legacy_eval_snapshot.py
          mkdir -p build/eval-runner-patch
          ruff check --output-format json \
            src/paperagent/eval_runtime_reporting.py \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/gen_public_dataset.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/build_eval_snapshot.py \
            scripts/validate_eval_snapshot.py \
            scripts/repair_legacy_eval_snapshot.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py \
            tests/evals/test_eval_snapshot_provenance.py \
            tests/evals/test_eval_runtime_reporting.py \
            > build/eval-runner-patch/ruff.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-runner-patch-lint
          path: build/eval-runner-patch/ruff.json
          if-no-files-found: error
          retention-days: 3
      - name: Enforce lint
        run: |
          ruff check \
            src/paperagent/eval_runtime_reporting.py \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/gen_public_dataset.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/build_eval_snapshot.py \
            scripts/validate_eval_snapshot.py \
            scripts/repair_legacy_eval_snapshot.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py \
            tests/evals/test_eval_snapshot_provenance.py \
            tests/evals/test_eval_runtime_reporting.py
      - name: Run focused regression
        run: |
          pytest -q \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py \
            tests/evals/test_eval_snapshot_provenance.py \
            tests/evals/test_eval_runtime_reporting.py
      - name: Exercise canonical public projection
        run: |
          python scripts/project_academic_tailoring_retrieval_v1.py \
            --authoring evals/academic_tailoring_retrieval_v1/dataset-authoring.json \
            --authoring-commit "$GITHUB_SHA" \
            --output /tmp/public-dataset.json \
            --report /tmp/boundary-report.json
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/public-dataset.json').read_text())
          assert len(data['public_sha256']) == 64
          assert data['generated_from']['authoring_commit']
          PY
      - name: Repair legacy snapshot truth labels
        run: python scripts/repair_legacy_eval_snapshot.py
      - name: Remove one-shot patch machinery
        run: |
          rm scripts/apply_eval_runner_reporting_patch.py
          rm scripts/repair_legacy_eval_snapshot.py
          rm .github/workflows/apply-eval-runner-reporting-patch.yml
      - name: Commit validated integration
        env:
          BRANCH: fix/semantic-tailoring-role-bound-scoring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(eval): close snapshot provenance and runtime diagnostics"
          git push origin "HEAD:$BRANCH"
