name: Review Baseline Facts Source

on:
  pull_request:
    branches: [fix/academic-tailoring-contract-convergence]

permissions:
  contents: read

jobs:
  apply-baseline-facts:
    if: ${{ github.actor != 'github-actions[bot]' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Decode and apply reviewed baseline patch
        run: |
          base64 --decode build/baseline-facts.patch.gz.b64 \
            | gzip --decompress \
            > /tmp/baseline-facts.patch
          echo '4ce66f511fe494145254813c26eff4e6d279d80c25e494aab4f1f595b5ec8ee6  /tmp/baseline-facts.patch' \
            | sha256sum --check --strict
          git apply --check /tmp/baseline-facts.patch
          git apply /tmp/baseline-facts.patch
      - name: Install project
        run: python -m pip install -e '.[dev,release]'
      - name: Static verification
        run: |
          ruff check src tests
          ruff format --check src tests
          mypy --config-file pyproject.toml
      - name: Focused regression verification
        run: |
          pytest -q \
            tests/methodology/test_evidence_binding.py \
            tests/e2e/test_graph_e2e_happy_path.py \
            tests/e2e/test_graph_e2e_method_repair.py \
            tests/graph/test_full_graph.py \
            tests/graph/test_hitl.py \
            tests/ood/test_cases.py
      - name: Commit verified baseline fact binding
        run: |
          git rm .github/workflows/review-baseline-facts-source.yml
          git rm build/baseline-facts.patch.gz.b64
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests
          git commit -m 'fix(methodology): bind baseline facts to server evidence'
          git push origin HEAD:${{ github.head_ref }}
