name: Retrieval Precision Offline Gate

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/second-batch-retrieval-offline-gate.yml"
      - "scripts/clouddev_case013_patch.py"

permissions:
  contents: write

concurrency:
  group: retrieval-precision-offline
  cancel-in-progress: true

jobs:
  verify-and-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run reversible Case 013 transaction
        run: python scripts/clouddev_case013_patch.py
