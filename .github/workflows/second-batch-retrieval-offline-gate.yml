name: Retrieval Precision Offline Gate
# Applies the already verified Case 011 source patch and commits only core artifacts.

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".case011-patch-trigger.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: case011-core-finalizer
  cancel-in-progress: false

jobs:
  finalize-core:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply verified Case 011 patch
        run: |
          python - <<'PY'
          import runpy

          namespace = runpy.run_path("scripts/clouddev_fix_few_shot_intent_roles.py")
          namespace["patch_source"]()
          namespace["write_test"]()
          namespace["restore_gate"]()
          PY
          ruff format \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_few_shot_intent_role_binding.py
      - name: Run deterministic gates
        shell: bash
        run: |
          set +e
          out="build/case011-core-finalizer"
          mkdir -p "$out"
          files=(
            src/paperagent/evidence_gap_binding.py
            tests/review/test_few_shot_intent_role_binding.py
          )
          ruff check "${files[@]}" > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check --diff "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/review/test_few_shot_intent_role_binding.py \
            tests/literature/test_third_batch_query_precision.py \
            tests/literature/test_qa_hallucination_precision.py \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_consolidated_regressions.py \
            tests/nodes/test_retrieval.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          target="evals/claw_academic_tailoring_v1/live-probes/few-shot-intent-role-gate-latest.json"
          mkdir -p "$(dirname "$target")"
          python - "$target" "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" <<'PY'
          import json
          import os
          import sys

          payload = {
              "workflow_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "workflow_head_sha": os.environ["GITHUB_SHA"],
              "ruff": int(sys.argv[2]),
              "format": int(sys.argv[3]),
              "mypy": int(sys.argv[4]),
              "pytest": int(sys.argv[5]),
          }
          payload["passed"] = all(
              payload[key] == 0 for key in ("ruff", "format", "mypy", "pytest")
          )
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          if (( ruff_status || format_status || mypy_status || pytest_status )); then
            exit 1
          fi
      - name: Commit core repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_few_shot_intent_role_binding.py \
            .github/workflows/second-batch-retrieval-offline-gate.yml \
            evals/claw_academic_tailoring_v1/live-probes/few-shot-intent-role-gate-latest.json
          git commit -m "fix(evidence): bind verified Case 011 intent role evidence"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: case011-core-finalizer-${{ github.run_id }}
          path: build/case011-core-finalizer/
          if-no-files-found: warn
          retention-days: 30
