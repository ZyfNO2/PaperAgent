name: Retrieval Precision Offline Gate
# Execute the strict Case 011 role patch, then restore this permanent gate.

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/second-batch-retrieval-offline-gate.yml"
      - "scripts/clouddev_fix_few_shot_intent_roles.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: retrieval-precision-offline
  cancel-in-progress: true

jobs:
  patch-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Harden transaction script
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/clouddev_fix_few_shot_intent_roles.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "updated, count = pattern.subn(replacement, text, count=1)",
              "updated, count = pattern.subn(lambda _: replacement, text, count=1)",
          )
          start = text.index("def commit_result() -> None:\n")
          end = text.index("\n\ndef main() -> None:\n", start)
          replacement = '''def commit_result() -> None:
              subprocess.run(
                  ["git", "config", "user.name", "github-actions[bot]"],
                  cwd=ROOT,
                  check=True,
              )
              subprocess.run(
                  [
                      "git",
                      "config",
                      "user.email",
                      "41898282+github-actions[bot]@users.noreply.github.com",
                  ],
                  cwd=ROOT,
                  check=True,
              )
              temporary_paths = (
                  ".github/workflows/fix-few-shot-intent-binding-once.yml",
                  ".github/workflows/add-few-shot-intent-binding-once.yml",
              )
              for value in temporary_paths:
                  temporary = ROOT / value
                  if temporary.exists():
                      temporary.unlink()
              subprocess.run(
                  [
                      "git",
                      "add",
                      str(SOURCE.relative_to(ROOT)),
                      str(TEST.relative_to(ROOT)),
                      str(GATE.relative_to(ROOT)),
                      str(STATUS.relative_to(ROOT)),
                  ],
                  cwd=ROOT,
                  check=True,
              )
              subprocess.run(
                  [
                      "git",
                      "rm",
                      "--ignore-unmatch",
                      "scripts/clouddev_fix_few_shot_intent_roles.py",
                      *temporary_paths,
                  ],
                  cwd=ROOT,
                  check=True,
              )
              subprocess.run(
                  [
                      "git",
                      "commit",
                      "-m",
                      "fix(evidence): bind Case 011 intent evidence and restore gate",
                  ],
                  cwd=ROOT,
                  check=True,
              )
              subprocess.run(
                  ["git", "pull", "--rebase", "origin", "feat/claw-live-search-runtime"],
                  cwd=ROOT,
                  check=True,
              )
              subprocess.run(
                  ["git", "push", "origin", "HEAD:feat/claw-live-search-runtime"],
                  cwd=ROOT,
                  check=True,
              )
          '''
          path.write_text(text[:start] + replacement + text[end:], encoding="utf-8")
          PY
      - name: Patch and verify Case 011 role evidence
        run: python scripts/clouddev_fix_few_shot_intent_roles.py
      - name: Add Case 011 regression to live preflights
        run: |
          python - <<'PY'
          from pathlib import Path

          def insert_after(path: Path, anchor: str, addition: str) -> None:
              text = path.read_text(encoding="utf-8")
              if addition.strip() in text:
                  return
              if anchor not in text:
                  raise SystemExit(f"missing anchor in {path}: {anchor!r}")
              path.write_text(text.replace(anchor, anchor + addition, 1), encoding="utf-8")

          single = Path(".github/workflows/claw-single-case-live-repair.yml")
          insert_after(
              single,
              "            tests/review/test_research_contract_priority.py\n",
              "            tests/review/test_few_shot_intent_role_binding.py\n",
          )
          insert_after(
              single,
              "            tests/review/test_research_contract_priority.py \\\n",
              "            tests/review/test_few_shot_intent_role_binding.py \\\n",
          )

          batch = Path(".github/workflows/claw-four-case-live-batch.yml")
          insert_after(
              batch,
              "            tests/review/test_semantic_gap_binding.py\n",
              "            tests/review/test_few_shot_intent_role_binding.py\n",
          )
          insert_after(
              batch,
              "            tests/review/test_semantic_gap_binding.py \\\n",
              "            tests/review/test_few_shot_intent_role_binding.py \\\n",
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/claw-single-case-live-repair.yml \
            .github/workflows/claw-four-case-live-batch.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(ci): cover Case 011 role binding in live preflights"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: few-shot-intent-roles-${{ github.run_id }}
          path: build/few-shot-intent-roles/
          if-no-files-found: warn
          retention-days: 30
