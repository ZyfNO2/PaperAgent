name: Second Batch Retrieval Offline Gate

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/second-batch-retrieval-offline-gate.yml"

permissions:
  contents: write

concurrency:
  group: second-batch-retrieval-offline
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -q -e '.[dev]'
      - name: Patch visual action mechanism cues
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/paperagent/evidence_gap_binding.py')
          text = path.read_text(encoding='utf-8')
          problem_anchor = '            "misregistration",\n'
          problem_additions = (
              problem_anchor
              + '            "computational and energy requests",\n'
              + '            "computational request",\n'
              + '            "energy request",\n'
              + '            "energy demand",\n'
              + '            "temporal order",\n'
              + '            "similar poses",\n'
              + '            "crowded scene",\n'
              + '            "complex environment",\n'
          )
          if '"computational and energy requests",' not in text:
              if problem_anchor not in text:
                  raise RuntimeError('problem cue anchor not found')
              text = text.replace(problem_anchor, problem_additions, 1)

          intervention_anchor = '            "attention",\n'
          intervention_additions = (
              intervention_anchor
              + '            "self-attention",\n'
              + '            "self-attentional",\n'
              + '            "pose representation",\n'
          )
          if '"self-attentional",' not in text:
              if intervention_anchor not in text:
                  raise RuntimeError('intervention cue anchor not found')
              text = text.replace(intervention_anchor, intervention_additions, 1)
          path.write_text(text, encoding='utf-8')
          PY
          ruff format \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_action_mechanism_binding.py
          ruff check \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_action_mechanism_binding.py
          mypy --config-file pyproject.toml
          pytest -q \
            tests/review/test_action_mechanism_binding.py \
            tests/review/test_low_light_mechanism_binding.py \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_consolidated_regressions.py \
            tests/literature/test_prepared_query_contract.py \
            tests/literature/test_second_batch_query_precision.py \
            tests/literature/test_query_concepts.py \
            tests/literature/test_query_refinement.py \
            tests/nodes/test_retrieval.py
      - name: Commit verified patch and restore permanent gate
        run: |
          git show HEAD^:.github/workflows/second-batch-retrieval-offline-gate.yml \
            > .github/workflows/second-batch-retrieval-offline-gate.yml
          if [[ -f .github/workflows/patch-action-mechanism-once.yml ]]; then
            git rm .github/workflows/patch-action-mechanism-once.yml
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_action_mechanism_binding.py \
            .github/workflows/second-batch-retrieval-offline-gate.yml
          git commit -m "fix(evidence): bind visual action efficiency mechanisms"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
