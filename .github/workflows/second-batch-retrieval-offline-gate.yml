name: Retrieval Precision Offline Gate

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/second-batch-retrieval-offline-gate.yml"
      - "scripts/clouddev_fix_verify_syntax.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: retrieval-precision-offline
  cancel-in-progress: true

jobs:
  patch-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Fix and verify runtime-query recovery
        run: python scripts/clouddev_fix_verify_syntax.py
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-syntax-${{ github.run_id }}
          path: build/verify-syntax/
          if-no-files-found: warn
          retention-days: 30
