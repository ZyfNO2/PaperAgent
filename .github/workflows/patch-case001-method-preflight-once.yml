name: Patch Case 001 Method Preflight Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/patch-case001-method-preflight-once.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Patch Case 001 preflight
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/claw-case-001-end-to-end.yml')
          text = path.read_text(encoding='utf-8')
          if '            src/paperagent/method_design_draft.py\n' not in text:
              anchor = '            src/paperagent/evidence_gap_binding.py\n'
              replacement = (
                  anchor
                  + '            src/paperagent/academic_methodology.py\n'
                  + '            src/paperagent/method_design_draft.py\n'
                  + '            src/paperagent/nodes/_shared.py\n'
                  + '            src/paperagent/nodes/method_design.py\n'
              )
              if anchor not in text:
                  raise RuntimeError('source preflight anchor missing')
              text = text.replace(anchor, replacement, 1)
          if '            tests/methodology/test_method_design_draft.py\n' not in text:
              anchor = '            tests/nodes/test_retrieval.py\n'
              if anchor not in text:
                  raise RuntimeError('file-list test anchor missing')
              text = text.replace(
                  anchor,
                  anchor + '            tests/methodology/test_method_design_draft.py\n',
                  1,
              )
          if '            tests/methodology/test_method_design_draft.py \\\n' not in text:
              anchor = '            tests/nodes/test_retrieval.py \\\n'
              if anchor not in text:
                  raise RuntimeError('pytest test anchor missing')
              text = text.replace(
                  anchor,
                  anchor + '            tests/methodology/test_method_design_draft.py \\\n',
                  1,
              )
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check
          git rm .github/workflows/patch-case001-method-preflight-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/claw-case-001-end-to-end.yml
          git commit -m "ci(eval): include method audit checks in Case 001 preflight"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
