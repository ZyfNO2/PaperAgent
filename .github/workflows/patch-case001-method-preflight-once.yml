name: Patch Case 001 Method Preflight Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/patch-case001-method-preflight-once.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Patch preflight and remove one-shot workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/claw-case-001-end-to-end.yml')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '            src/paperagent/evidence_gap_binding.py\n',
              '            src/paperagent/evidence_gap_binding.py\n'
              '            src/paperagent/method_design_draft.py\n'
              '            src/paperagent/nodes/_shared.py\n'
              '            src/paperagent/nodes/method_design.py\n',
              1,
          )
          text = text.replace(
              '            tests/nodes/test_retrieval.py\n',
              '            tests/nodes/test_retrieval.py\n'
              '            tests/methodology/test_method_design_draft.py\n',
              1,
          )
          text = text.replace(
              '            tests/nodes/test_retrieval.py \\\n',
              '            tests/nodes/test_retrieval.py \\\n'
              '            tests/methodology/test_method_design_draft.py \\\n',
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
          git rm .github/workflows/patch-case001-method-preflight-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/claw-case-001-end-to-end.yml
          git commit -m "ci(eval): include method draft checks in Case 001 preflight [skip ci]"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
