name: Bootstrap PaperAgent v0.1 implementation

on:
  pull_request:
    branches: [master]
    paths:
      - .bootstrap-v4/READY9

permissions:
  contents: write

jobs:
  verify-extract-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Reconstruct and verify implementation payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          from pathlib import Path

          root = Path('.bootstrap-v4')
          part_names = [
              'payload.part00',
              'payload.part01',
              'payload.part02',
              'payload.part03',
              'payload.part04',
              'payload.part050',
              'payload.part0510',
              'payload.part0511',
              'payload.part06',
              'payload.part07',
          ]
          payload = b''.join((root / name).read_bytes() for name in part_names)
          expected = 'a8a847b3cfbb9ff50228000f01ec7e71ce68ae6a20ede8d20dc34a3e95247728'
          actual = hashlib.sha256(payload).hexdigest()
          if actual != expected:
              raise SystemExit(f'payload sha256 mismatch: {actual}')
          Path('/tmp/paperagent-v0.1.tar.gz').write_bytes(payload)
          print(f'payload verified: {actual} ({len(payload)} bytes)')
          PY
          gzip -t /tmp/paperagent-v0.1.tar.gz
          tar -tzf /tmp/paperagent-v0.1.tar.gz >/tmp/paperagent-v0.1-files.txt
          if grep -E '(^/|(^|/)\.\.(/|$))' /tmp/paperagent-v0.1-files.txt; then
            echo 'unsafe archive path detected' >&2
            exit 1
          fi
          tar -xzf /tmp/paperagent-v0.1.tar.gz
          rm -rf .bootstrap .bootstrap-v2 .bootstrap-v3 .bootstrap-v4
          rm -f .github/workflows/v0.1-ci.yml
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy --config-file pyproject.toml
      - name: Pytest with branch coverage
        run: pytest --cov=paperagent --cov-branch --cov-report=term-missing -q
      - name: Commit implementation snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(v0.1): implement bounded test-driven PaperAgent skeleton'
      - name: Push verified snapshot branch
        run: git push origin HEAD:refs/heads/feat/v0.1-offline-skeleton
