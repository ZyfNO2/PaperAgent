name: Bootstrap PaperAgent v0.1 implementation

on:
  push:
    branches: [v0.1]
    paths:
      - .bootstrap-v2/READY
  pull_request:
    branches: [master]
    paths:
      - .bootstrap-v2/READY

permissions:
  contents: write

jobs:
  verify-extract-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract verified implementation payload
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap-v2/payload.part* | base64 --decode > /tmp/paperagent-v0.1.tar.gz
          echo 'a8a847b3cfbb9ff50228000f01ec7e71ce68ae6a20ede8d20dc34a3e95247728  /tmp/paperagent-v0.1.tar.gz' | sha256sum --check
          gzip -t /tmp/paperagent-v0.1.tar.gz
          tar -tzf /tmp/paperagent-v0.1.tar.gz >/tmp/paperagent-v0.1-files.txt
          if grep -E '(^/|(^|/)\.\.(/|$))' /tmp/paperagent-v0.1-files.txt; then
            echo 'unsafe archive path detected' >&2
            exit 1
          fi
          tar -xzf /tmp/paperagent-v0.1.tar.gz
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Run offline release gates
        shell: bash
        run: |
          set -euo pipefail
          ruff check .
          ruff format --check .
          mypy --config-file pyproject.toml
          pytest --cov=paperagent --cov-branch --cov-report=term-missing -q
      - name: Remove transport files and commit implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap .bootstrap-v2
          rm -f .github/workflows/bootstrap-v0.1.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(v0.1): implement bounded test-driven PaperAgent skeleton'
          git push origin HEAD:v0.1
