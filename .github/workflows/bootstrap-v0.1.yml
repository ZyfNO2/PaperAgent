name: Bootstrap PaperAgent v0.1 implementation

on:
  push:
    branches: [v0.1]
    paths:
      - .bootstrap/READY
  pull_request:
    branches: [master]
    paths:
      - .bootstrap/READY

permissions:
  contents: write

jobs:
  verify-extract-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v0.1 quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin v0.1
          git checkout -q -B v0.1 FETCH_HEAD
      - name: Decode and extract verified implementation payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import tarfile
          from pathlib import Path

          expected = "3a996bc1f69fe419bc478c2e486487aeb5f1ffa3d14383e75d93f2379ef15a97"
          parts = sorted(Path(".bootstrap").glob("payload.part*"))
          print(f"payload parts: {len(parts)}")
          if not parts:
              raise SystemExit("no bootstrap payload parts found")
          encoded = b"".join(part.read_bytes().strip() for part in parts)
          print(f"encoded bytes: {len(encoded)}")
          payload = base64.b64decode(encoded, validate=True)
          actual = hashlib.sha256(payload).hexdigest()
          print(f"decoded bytes: {len(payload)} sha256={actual}")
          if actual != expected:
              raise SystemExit(f"payload sha256 mismatch: expected={expected} actual={actual}")
          archive = Path("/tmp/paperagent-v0.1.tar.gz")
          archive.write_bytes(payload)
          with tarfile.open(archive, mode="r:gz") as tf:
              members = tf.getmembers()
              print(f"archive members: {len(members)}")
              for member in members:
                  path = Path(member.name)
                  if path.is_absolute() or ".." in path.parts:
                      raise SystemExit(f"unsafe archive path: {member.name}")
              tf.extractall(filter="data")
          PY
      - name: Install development dependencies
        run: python3 -m pip install --upgrade pip && python3 -m pip install -e '.[dev]'
      - name: Run offline release gates
        shell: bash
        run: |
          set -euo pipefail
          ruff check .
          ruff format --check .
          mypy --config-file pyproject.toml
          pytest --cov=paperagent --cov-branch --cov-report=term-missing -q
      - name: Remove transport files and commit implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap .bootstrap-v2 .bootstrap-v3
          rm -f .github/workflows/bootstrap-v0.1.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(v0.1): implement bounded test-driven PaperAgent skeleton'
          git push origin HEAD:v0.1
