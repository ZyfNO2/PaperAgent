name: Bootstrap PaperAgent v0.1 implementation

on:
  push:
    branches: [v0.1]
    paths:
      - .bootstrap/READY
  pull_request:
    branches: [master]
    paths:
      - .bootstrap/READY

permissions:
  contents: write

jobs:
  verify-extract-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v0.1 quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin v0.1
          git checkout -q -B v0.1 FETCH_HEAD
      - name: Decode and recover verified implementation payload
        run: python3 .bootstrap/recover.py
      - name: Install development dependencies
        run: python3 -m pip install --upgrade pip && python3 -m pip install -e '.[dev]'
      - name: Run offline release gates
        shell: bash
        run: |
          set -euo pipefail
          ruff check .
          ruff format --check .
          mypy --config-file pyproject.toml
          pytest --cov=paperagent --cov-branch --cov-report=term-missing -q
      - name: Remove transport files and commit implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap .bootstrap-v2 .bootstrap-v3
          rm -f .github/workflows/bootstrap-v0.1.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(v0.1): implement bounded test-driven PaperAgent skeleton'
          git push origin HEAD:v0.1
