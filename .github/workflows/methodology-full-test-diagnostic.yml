name: Methodology Full Test Diagnostic

on:
  pull_request:
    branches: [fix/gate-l-v3-acceptance-routing]

permissions:
  contents: read

jobs:
  diagnostic:
    if: ${{ github.head_ref == 'fix/academic-tailoring-contract-convergence' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev,release]'
      - name: Capture full pytest output
        id: tests
        continue-on-error: true
        run: |
          mkdir -p build/methodology-diagnostic
          pytest --cov=paperagent --cov-branch --cov-report=term-missing -vv \
            > build/methodology-diagnostic/full-pytest.txt 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: methodology-full-pytest
          path: build/methodology-diagnostic/full-pytest.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce tests
        if: steps.tests.outcome == 'failure'
        run: exit 1
