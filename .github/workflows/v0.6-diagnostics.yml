name: PaperAgent v0.6 Diagnostics

on:
  push:
    branches:
      - feat/v0.6-real-llm-integration
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Apply mechanical formatting
        if: github.event_name == 'push'
        shell: bash
        run: |
          ruff check --fix .
          ruff format .
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src tests
          git commit -m 'chore(v0.6): apply automated formatting'
          git push origin HEAD:feat/v0.6-real-llm-integration
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          : > v0.6-diagnostics.txt
          echo '=== Ruff lint ===' >> v0.6-diagnostics.txt
          ruff check . >> v0.6-diagnostics.txt 2>&1
          echo "exit=$?" >> v0.6-diagnostics.txt
          echo '=== Ruff format ===' >> v0.6-diagnostics.txt
          ruff format --check . >> v0.6-diagnostics.txt 2>&1
          echo "exit=$?" >> v0.6-diagnostics.txt
          echo '=== Mypy ===' >> v0.6-diagnostics.txt
          mypy --config-file pyproject.toml >> v0.6-diagnostics.txt 2>&1
          echo "exit=$?" >> v0.6-diagnostics.txt
          echo '=== Pytest ===' >> v0.6-diagnostics.txt
          pytest -q >> v0.6-diagnostics.txt 2>&1
          echo "exit=$?" >> v0.6-diagnostics.txt
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0.6-diagnostics
          path: v0.6-diagnostics.txt
          if-no-files-found: error
