name: PaperAgent v0.6 Diagnostics

on:
  push:
    branches:
      - feat/v0.6-real-llm-integration
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v0.6-real-llm-integration
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Apply mechanical formatting
        shell: bash
        run: |
          set +e
          : > v0.6-formatter.txt
          ruff check --fix . >> v0.6-formatter.txt 2>&1
          echo "ruff_check_exit=$?" >> v0.6-formatter.txt
          ruff format . >> v0.6-formatter.txt 2>&1
          echo "ruff_format_exit=$?" >> v0.6-formatter.txt
          git status --short >> v0.6-formatter.txt 2>&1
          git diff > v0.6-formatted.patch
          if git diff --quiet; then
            echo "no_changes=true" >> v0.6-formatter.txt
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src tests
          git commit -m 'chore(v0.6): apply automated formatting' >> v0.6-formatter.txt 2>&1
          echo "git_commit_exit=$?" >> v0.6-formatter.txt
          git push origin HEAD:feat/v0.6-real-llm-integration >> v0.6-formatter.txt 2>&1
          echo "git_push_exit=$?" >> v0.6-formatter.txt
          exit 0
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          : > v0.6-diagnostics.txt
          echo '=== Ruff lint ===' >> v0.6-diagnostics.txt
          ruff check . >> v0.6-diagnostics.txt 2>&1
          echo "exit=$?" >> v0.6-diagnostics.txt
          echo '=== Ruff format ===' >> v0.6-diagnostics.txt
          ruff format --check . >> v0.6-diagnostics.txt 2>&1
          echo "exit=$?" >> v0.6-diagnostics.txt
          echo '=== Mypy ===' >> v0.6-diagnostics.txt
          mypy --config-file pyproject.toml >> v0.6-diagnostics.txt 2>&1
          echo "exit=$?" >> v0.6-diagnostics.txt
          echo '=== Pytest ===' >> v0.6-diagnostics.txt
          pytest -q >> v0.6-diagnostics.txt 2>&1
          echo "exit=$?" >> v0.6-diagnostics.txt
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0.6-diagnostics
          path: |
            v0.6-diagnostics.txt
            v0.6-formatter.txt
            v0.6-formatted.patch
          if-no-files-found: error
