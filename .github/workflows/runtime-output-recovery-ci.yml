name: Runtime Output Recovery CI

on:
  push:
    branches:
      - fix/semantic-tailoring-role-bound-scoring
    paths:
      - "src/paperagent/providers/runtime.py"
      - "src/paperagent/providers/openai_llm.py"
      - "src/paperagent/providers/mistral.py"
      - "src/paperagent/eval_runtime_reporting.py"
      - "src/paperagent/nodes/_shared.py"
      - "src/paperagent/nodes/planning.py"
      - "src/paperagent/nodes/report.py"
      - "src/paperagent/method_design_draft.py"
      - "src/paperagent/strict_method_design.py"
      - "tests/providers/test_runtime.py"
      - "tests/providers/test_openai_llm_runtime_limits.py"
      - "tests/evals/test_eval_runtime_reporting.py"
      - "tests/nodes/test_synthesis_method_quality_report.py"
      - "tests/nodes/test_planning_identity_priority.py"
      - "tests/nodes/test_method_design_baseline_anchor.py"
      - "tests/nodes/test_report_fallback.py"
      - "tests/methodology/test_strict_method_design.py"
      - "tests/methodology/test_method_design_draft.py"
      - ".github/workflows/runtime-output-recovery-ci.yml"
  pull_request:
    branches:
      - master
    paths:
      - "src/paperagent/providers/runtime.py"
      - "src/paperagent/providers/openai_llm.py"
      - "src/paperagent/providers/mistral.py"
      - "src/paperagent/eval_runtime_reporting.py"
      - "src/paperagent/nodes/_shared.py"
      - "src/paperagent/nodes/planning.py"
      - "src/paperagent/nodes/report.py"
      - "src/paperagent/method_design_draft.py"
      - "src/paperagent/strict_method_design.py"
      - "tests/providers/test_runtime.py"
      - "tests/providers/test_openai_llm_runtime_limits.py"
      - "tests/evals/test_eval_runtime_reporting.py"
      - "tests/nodes/test_synthesis_method_quality_report.py"
      - "tests/nodes/test_planning_identity_priority.py"
      - "tests/nodes/test_method_design_baseline_anchor.py"
      - "tests/nodes/test_report_fallback.py"
      - "tests/methodology/test_strict_method_design.py"
      - "tests/methodology/test_method_design_draft.py"
      - ".github/workflows/runtime-output-recovery-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-runtime-output-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Format contract
        run: |
          ruff format --check \
            src/paperagent/providers/runtime.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py \
            src/paperagent/nodes/_shared.py \
            src/paperagent/nodes/planning.py \
            src/paperagent/nodes/report.py \
            src/paperagent/method_design_draft.py \
            src/paperagent/strict_method_design.py \
            tests/providers/test_runtime.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_eval_runtime_reporting.py \
            tests/nodes/test_synthesis_method_quality_report.py \
            tests/nodes/test_planning_identity_priority.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/nodes/test_report_fallback.py \
            tests/methodology/test_strict_method_design.py \
            tests/methodology/test_method_design_draft.py
      - name: Lint and compile
        run: |
          ruff check \
            src/paperagent/providers/runtime.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py \
            src/paperagent/nodes/_shared.py \
            src/paperagent/nodes/planning.py \
            src/paperagent/nodes/report.py \
            src/paperagent/method_design_draft.py \
            src/paperagent/strict_method_design.py \
            tests/providers/test_runtime.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_eval_runtime_reporting.py \
            tests/nodes/test_synthesis_method_quality_report.py \
            tests/nodes/test_planning_identity_priority.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/nodes/test_report_fallback.py \
            tests/methodology/test_strict_method_design.py \
            tests/methodology/test_method_design_draft.py
          python -m compileall -q \
            src/paperagent/providers/runtime.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py \
            src/paperagent/nodes/_shared.py \
            src/paperagent/nodes/planning.py \
            src/paperagent/nodes/report.py \
            src/paperagent/method_design_draft.py \
            src/paperagent/strict_method_design.py
      - name: Strict types
        run: |
          mypy --strict \
            src/paperagent/providers/runtime.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py \
            src/paperagent/nodes/_shared.py \
            src/paperagent/nodes/planning.py \
            src/paperagent/nodes/report.py \
            src/paperagent/method_design_draft.py \
            src/paperagent/strict_method_design.py
      - name: Focused regressions
        run: |
          pytest -q \
            tests/providers/test_runtime.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_eval_runtime_reporting.py \
            tests/nodes/test_synthesis_method_quality_report.py \
            tests/nodes/test_planning_identity_priority.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/nodes/test_report_fallback.py \
            tests/methodology/test_strict_method_design.py \
            tests/methodology/test_method_design_draft.py
