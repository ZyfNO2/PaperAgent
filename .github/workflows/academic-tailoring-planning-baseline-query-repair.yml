name: Academic Tailoring Planning Baseline Query Repair

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academic-tailoring-planning-baseline-query-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair-and-validate:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply deterministic baseline query planning
        run: python scripts/apply_planning_baseline_query_v1.py
      - name: Format and lint changed paths
        run: |
          ruff format \
            src/paperagent/nodes/planning.py \
            tests/nodes/test_intake_planning.py
          ruff check --fix \
            src/paperagent/nodes/planning.py \
            tests/nodes/test_intake_planning.py
          ruff check \
            src/paperagent/nodes/planning.py \
            tests/nodes/test_intake_planning.py
      - name: Run focused planning and retrieval tests
        run: |
          pytest -q \
            tests/nodes/test_intake_planning.py \
            tests/nodes/test_planning_nonblocking.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py
      - name: Remove one-shot patch script
        run: rm -f scripts/apply_planning_baseline_query_v1.py
      - name: Capture full final-tree regression
        shell: bash
        run: |
          mkdir -p build/planning-baseline-query-diagnostics
          set +e
          pytest -q > build/planning-baseline-query-diagnostics/pytest.log 2>&1
          pytest_status=$?
          mypy --config-file pyproject.toml > build/planning-baseline-query-diagnostics/mypy.log 2>&1
          mypy_status=$?
          ruff check src tests scripts > build/planning-baseline-query-diagnostics/ruff-check.log 2>&1
          ruff_status=$?
          ruff format --check src tests scripts > build/planning-baseline-query-diagnostics/ruff-format.log 2>&1
          format_status=$?
          printf '{"pytest":%s,"mypy":%s,"ruff":%s,"format":%s}\n' \
            "$pytest_status" "$mypy_status" "$ruff_status" "$format_status" \
            > build/planning-baseline-query-diagnostics/status.json
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-planning-baseline-query-diagnostics
          path: build/planning-baseline-query-diagnostics/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce full final-tree regression
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path("build/planning-baseline-query-diagnostics/status.json").read_text())
          print(status)
          if any(status.values()):
              raise SystemExit(status)
          PY
      - name: Commit production repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(planning): guarantee bounded baseline role queries"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
