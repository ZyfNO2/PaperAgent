name: Temporary Planning Asset Repair V2

on:
  push:
    branches: [fix/semantic-tailoring-role-bound-scoring]
    paths: [".github/workflows/tmp-planning-assets-repair-v2.yml"]
  pull_request:
    branches: [master]
    paths: [".github/workflows/tmp-planning-assets-repair-v2.yml"]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Apply corrected planning repair
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/tmp-planning-assets-repair.yml').read_text(encoding='utf-8')
          start = workflow.index('      - name: Apply planning repair\n')
          run_start = workflow.index('        run: |\n', start) + len('        run: |\n')
          end = workflow.index('      - name: Install and verify\n', run_start)
          lines = workflow[run_start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/apply-planning-repair.sh').write_text(script, encoding='utf-8')
          PY
          bash /tmp/apply-planning-repair.sh
          python - <<'PY'
          from pathlib import Path
          path = Path('src/paperagent/nodes/planning.py')
          text = path.read_text(encoding='utf-8')
          old = '''    if any(_contains_baseline_role(query.query) for query in plan.search_queries):\n        return plan\n'''
          new = '''    if any(\n        not query.gap_id.startswith("user-material-")\n        and _contains_baseline_role(query.query)\n        for query in plan.search_queries\n    ):\n        return plan\n'''
          if text.count(old) != 1:
              raise RuntimeError('baseline early-return mismatch')
          text = text.replace(old, new, 1)
          old = '''        if query.gap_id not in baseline_gap_ids:\n            continue\n'''
          new = '''        if (\n            query.gap_id.startswith("user-material-")\n            or query.gap_id not in baseline_gap_ids\n        ):\n            continue\n'''
          if text.count(old) != 1:
              raise RuntimeError('baseline rewrite boundary mismatch')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Install and verify
        run: |
          python -m pip install -q -e '.[dev]'
          ruff format src/paperagent/nodes/planning.py tests/nodes/test_planning_methodology_assets.py
          ruff check src/paperagent/nodes/planning.py tests/nodes/test_planning_methodology_assets.py
          mypy --strict src/paperagent/nodes/planning.py
          pytest -q tests/nodes/test_planning_methodology_assets.py tests/nodes/test_planning_identity_priority.py
      - name: Commit planning repair
        if: github.event_name == 'push'
        run: |
          git config user.name "paperagent-repair-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/paperagent/nodes/planning.py tests/nodes/test_planning_methodology_assets.py
          git commit -m "fix(planning): guarantee methodology evidence lanes"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
