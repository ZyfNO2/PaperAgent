name: Gate L v3 Format Artifact v3

on:
  pull_request:
    branches: [scientific-gate-l]

permissions:
  contents: read

jobs:
  format-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - name: Normalize non-auto-fixable long text
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/compare_gate_l_variants.py')
          text = path.read_text(encoding='utf-8')
          old = '''            "on a fresh confirmation holdout. Do not report same-holdout selection as final acceptance."\n'''
          new = '''            "on a fresh confirmation holdout. Do not report same-holdout selection "\n            "as final acceptance."\n'''
          if old not in text:
              raise SystemExit('expected comparison warning text not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Format and lint selected files
        run: |
          files=(
            scripts/run_gate_l_execution.py
            scripts/_create_stub_reviews.py
            scripts/_grade_deterministic.py
            scripts/gate_l_acceptance_v3.py
            scripts/assemble_gate_l_v3_summary.py
            scripts/compare_gate_l_variants.py
            scripts/run_gate_l_variant.py
            tests/evals/test_gate_l_acceptance_v3.py
          )
          ruff format "${files[@]}"
          ruff check --fix "${files[@]}"
          ruff format "${files[@]}"
      - name: Stage formatted source
        run: |
          mkdir -p formatted/scripts formatted/tests/evals
          cp scripts/run_gate_l_execution.py formatted/scripts/
          cp scripts/_create_stub_reviews.py formatted/scripts/
          cp scripts/_grade_deterministic.py formatted/scripts/
          cp scripts/gate_l_acceptance_v3.py formatted/scripts/
          cp scripts/assemble_gate_l_v3_summary.py formatted/scripts/
          cp scripts/compare_gate_l_variants.py formatted/scripts/
          cp scripts/run_gate_l_variant.py formatted/scripts/
          cp tests/evals/test_gate_l_acceptance_v3.py formatted/tests/evals/
      - uses: actions/upload-artifact@v4
        with:
          name: gate-l-v3-formatted-source-v3
          path: formatted/
          if-no-files-found: error
          retention-days: 7
