name: Apply Runtime Output Fixes

on:
  pull_request:
    branches: [master]
    paths:
      - "scripts/apply_runtime_output_fixes.py"
      - ".github/workflows/apply-runtime-output-fixes.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-payload:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 1
          show-progress: false
      - name: Capture compile and execution diagnostics
        id: diagnose
        shell: bash
        run: |
          mkdir -p build/apply-diagnostic
          set +e
          python -m py_compile scripts/apply_runtime_output_fixes.py \
            > build/apply-diagnostic/compile.txt 2>&1
          compile_status=$?
          echo "$compile_status" > build/apply-diagnostic/compile-status.txt
          if test "$compile_status" = "0"; then
            python -u scripts/apply_runtime_output_fixes.py \
              > build/apply-diagnostic/execute.txt 2>&1
            execute_status=$?
          else
            execute_status=99
            echo "execution skipped because compilation failed" \
              > build/apply-diagnostic/execute.txt
          fi
          echo "$execute_status" > build/apply-diagnostic/execute-status.txt
          python - <<'PY' > build/apply-diagnostic/file-metadata.txt
          from pathlib import Path
          import hashlib
          path = Path('scripts/apply_runtime_output_fixes.py')
          payload = path.read_bytes()
          print(f'size={len(payload)}')
          print(f'sha256={hashlib.sha256(payload).hexdigest()}')
          print(f'line_count={payload.count(bytes([10])) + 1}')
          PY
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: apply-runtime-output-diagnostic
          path: build/apply-diagnostic/
          if-no-files-found: error
          retention-days: 1
      - name: Enforce successful payload load
        run: |
          test "$(cat build/apply-diagnostic/compile-status.txt)" = "0"
          test "$(cat build/apply-diagnostic/execute-status.txt)" = "0"
