name: PaperAgent Source Snapshot

on:
  push:
    branches:
      - fix/semantic-tailoring-role-bound-scoring
    paths:
      - ".github/workflows/paperagent-source-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Capture searchable source snapshot
        run: |
          mkdir -p build/source-snapshot
          cp -R src/paperagent build/source-snapshot/
          cp -R tests build/source-snapshot/
          find src/paperagent tests -type f | sort > build/source-snapshot/file-list.txt
          grep -R -n "FINAL_OUTCOME_AND_REPORT_PRESENT\|final outcome and report are required\|METHOD_CANONICALIZATION_FAILED" src/paperagent tests > build/source-snapshot/diagnostic-grep.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: paperagent-source-snapshot
          path: build/source-snapshot/
          if-no-files-found: error
          retention-days: 1
