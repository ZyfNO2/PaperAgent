name: Academic Tailoring Comparator Identity Binding V2

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academic-tailoring-comparator-identity-v2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair-and-validate:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply comparator identity repairs
        id: apply_patch
        shell: bash
        run: |
          mkdir -p build/comparator-identity-v2
          set +e
          python scripts/fix_comparator_identity_patch_escape_v1.py
          fix_status=$?
          python scripts/apply_comparator_identity_binding_v1.py \
            > build/comparator-identity-v2/apply.log 2>&1
          binding_status=$?
          python scripts/apply_comparator_identity_policy_fixture_v1.py \
            >> build/comparator-identity-v2/apply.log 2>&1
          fixture_status=$?
          python scripts/apply_module_source_role_exclusion_v1.py \
            >> build/comparator-identity-v2/apply.log 2>&1
          module_status=$?
          status=$((fix_status || binding_status || fixture_status || module_status))
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Format and lint changed paths
        shell: bash
        run: |
          set +e
          ruff format \
            src/paperagent/method_design_draft.py \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_scientific_decision_policy.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            > build/comparator-identity-v2/format.log 2>&1
          format_status=$?
          ruff check --fix \
            src/paperagent/method_design_draft.py \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_scientific_decision_policy.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            > build/comparator-identity-v2/ruff-fix.log 2>&1
          fix_status=$?
          ruff check \
            src/paperagent/method_design_draft.py \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_scientific_decision_policy.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            > build/comparator-identity-v2/ruff-check.log 2>&1
          check_status=$?
          printf '{"apply":%s,"format":%s,"fix":%s,"check":%s}\n' \
            "${{ steps.apply_patch.outputs.status }}" \
            "$format_status" "$fix_status" "$check_status" \
            > build/comparator-identity-v2/changed-status.json
          exit 0
      - name: Enforce patch and lint
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path("build/comparator-identity-v2/changed-status.json").read_text())
          print(status)
          if any(status.values()):
              raise SystemExit(status)
          PY
      - name: Capture focused tests
        id: focused
        shell: bash
        run: |
          set +e
          pytest -q \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_scientific_decision_policy.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            > build/comparator-identity-v2/focused-pytest.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-comparator-identity-v2-diagnostics
          path: build/comparator-identity-v2/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce focused tests
        run: test "${{ steps.focused.outputs.status }}" = "0"
      - name: Remove one-shot patch scripts
        run: |
          rm -f \
            scripts/apply_comparator_identity_binding_v1.py \
            scripts/apply_comparator_identity_policy_fixture_v1.py \
            scripts/apply_module_source_role_exclusion_v1.py \
            scripts/fix_comparator_identity_patch_escape_v1.py
      - name: Capture full regression
        id: full
        shell: bash
        run: |
          set +e
          pytest -q > build/comparator-identity-v2/pytest.log 2>&1
          pytest_status=$?
          mypy --config-file pyproject.toml > build/comparator-identity-v2/mypy.log 2>&1
          mypy_status=$?
          ruff check src tests scripts > build/comparator-identity-v2/full-ruff-check.log 2>&1
          ruff_status=$?
          ruff format --check src tests scripts > build/comparator-identity-v2/full-ruff-format.log 2>&1
          format_status=$?
          printf '{"pytest":%s,"mypy":%s,"ruff":%s,"format":%s}\n' \
            "$pytest_status" "$mypy_status" "$ruff_status" "$format_status" \
            > build/comparator-identity-v2/full-status.json
          echo "status=$((pytest_status || mypy_status || ruff_status || format_status))" \
            >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-comparator-identity-v2-full-diagnostics
          path: build/comparator-identity-v2/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce full regression
        run: test "${{ steps.full.outputs.status }}" = "0"
      - name: Commit production repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(method): require independent comparator paper identity"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
