name: Apply Invocation Budget Fix

on:
  pull_request:
    branches: [master]
    paths:
      - "scripts/apply_invocation_budget_fix.py"
      - ".github/workflows/apply-invocation-budget-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-invocation-budget-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-validate-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply invocation-scoped budget repair
        run: |
          python -m py_compile scripts/apply_invocation_budget_fix.py
          python scripts/apply_invocation_budget_fix.py
      - name: Normalize changed Python files
        run: |
          ruff check --fix \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_eval_runtime_reporting.py
          ruff format \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_eval_runtime_reporting.py
      - name: Enforce lint and compilation
        run: |
          ruff check \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_eval_runtime_reporting.py
          python -m compileall -q \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py
      - name: Enforce strict types
        run: |
          mypy --strict \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/mistral.py \
            src/paperagent/eval_runtime_reporting.py
      - name: Run focused regressions
        run: |
          pytest -q \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/providers/test_runtime.py \
            tests/evals/test_eval_runtime_reporting.py
      - name: Remove one-shot applicator
        run: |
          rm -f scripts/apply_invocation_budget_fix.py
          git diff --check
          test ! -e scripts/apply_invocation_budget_fix.py
      - name: Commit validated repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(runtime): scope provider budgets per invocation"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
