name: Temporary Method Design Verify Debug

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/tmp-method-design-verify-debug.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Apply and diagnose
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/tmp-method-design-repair.yml').read_text(encoding='utf-8')
          start = text.index('      - name: Apply method design repair\n')
          run_start = text.index('        run: |\n', start) + len('        run: |\n')
          end = text.index('      - name: Format and install\n', run_start)
          lines = text[run_start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/apply-method-repair.sh').write_text(script, encoding='utf-8')
          PY
          bash /tmp/apply-method-repair.sh
          python -m pip install -q -e '.[dev]'
          ruff format src/paperagent/method_design_draft.py tests/methodology/test_method_design_draft.py tests/nodes/test_method_design_baseline_anchor.py
          set +e
          ruff check src/paperagent/method_design_draft.py tests/methodology/test_method_design_draft.py tests/nodes/test_method_design_baseline_anchor.py > /tmp/ruff.log 2>&1
          ruff_status=$?
          mypy --strict src/paperagent/method_design_draft.py > /tmp/mypy.log 2>&1
          mypy_status=$?
          pytest -q tests/methodology/test_method_design_draft.py tests/methodology/test_strict_method_design.py tests/nodes/test_method_design_baseline_anchor.py > /tmp/pytest.log 2>&1
          pytest_status=$?
          git reset --hard HEAD
          {
            echo "ruff_status=$ruff_status"
            tail -n 20 /tmp/ruff.log
            echo "mypy_status=$mypy_status"
            tail -n 30 /tmp/mypy.log
            echo "pytest_status=$pytest_status"
            tail -n 40 /tmp/pytest.log
          } > METHOD_REPAIR_DEBUG.txt
          git config user.name "paperagent-repair-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f METHOD_REPAIR_DEBUG.txt
          git commit -m "chore(debug): expose method repair diagnostics"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
