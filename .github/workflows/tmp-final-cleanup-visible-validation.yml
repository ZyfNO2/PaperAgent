name: Temporary Final Cleanup Visible Validation

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/tmp-final-cleanup-visible-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Extract finalization steps
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path(
              '.github/workflows/tmp-final-semantic-repair-cleanup.yml'
          ).read_text(encoding='utf-8')

          boundaries = (
              (
                  '      - name: Apply final workflow coverage and cleanup\n',
                  '      - name: Install project and YAML parser\n',
              ),
              (
                  '      - name: Install project and YAML parser\n',
                  '      - name: Validate workflow syntax\n',
              ),
              (
                  '      - name: Validate workflow syntax\n',
                  '      - name: Format, lint, types, and focused regressions\n',
              ),
              (
                  '      - name: Format, lint, types, and focused regressions\n',
                  '      - name: Commit finalized repair\n',
              ),
          )
          for index, (start_marker, end_marker) in enumerate(boundaries, start=1):
              start = text.index(start_marker)
              run_start = text.index('        run: |\n', start) + len('        run: |\n')
              end = text.index(end_marker, run_start)
              lines = text[run_start:end].splitlines()
              script = '\n'.join(
                  line[10:] if line.startswith('          ') else line
                  for line in lines
              ) + '\n'
              Path(f'/tmp/finalize-{index}.sh').write_text(
                  script,
                  encoding='utf-8',
              )
          PY
      - name: Apply proposed cleanup in workspace
        run: bash /tmp/finalize-1.sh
      - name: Install project and YAML parser
        run: bash /tmp/finalize-2.sh
      - name: Validate workflow syntax
        run: bash /tmp/finalize-3.sh
      - name: Run complete offline focused gate
        run: bash /tmp/finalize-4.sh
