name: Retrieval branch type fixes

on:
  pull_request:
    branches:
      - fix/evidence-bound-module-contracts-local

permissions:
  contents: write

jobs:
  apply-type-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Apply exact type fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise SystemExit(f"expected exactly one match in {path}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "src/paperagent/literature/source_policy.py",
              '    if arxiv_requested:\n        primary = "arxiv"\n',
              '    escalation: tuple[str, ...]\n'
              '    if arxiv_requested:\n        primary = "arxiv"\n',
          )
          replace_once(
              "src/paperagent/literature/service.py",
              '        if self._cache is None:\n'
              '            return await self._execute_live(provider, call.lane, filters, key)\n\n'
              '        async with self._inflight_lock:\n'
              '            cached = self._cache.get(key) if self._retrieval_mode != "live" else None\n',
              '        cache = self._cache\n'
              '        if cache is None:\n'
              '            return await self._execute_live(provider, call.lane, filters, key)\n\n'
              '        async with self._inflight_lock:\n'
              '            cached = cache.get(key) if self._retrieval_mode != "live" else None\n',
          )
          replace_once(
              "src/paperagent/providers/config.py",
              'from collections.abc import Mapping\n\nfrom pydantic import SecretStr\n',
              'from collections.abc import Mapping\n'
              'from typing import Literal, cast\n\n'
              'from pydantic import SecretStr\n',
          )
          replace_once(
              "src/paperagent/providers/config.py",
              'from paperagent.providers.runtime import LLMProviderName, ProviderRuntimeConfig\n\n\n'
              'def _env_bool',
              'from paperagent.providers.runtime import LLMProviderName, ProviderRuntimeConfig\n\n'
              'ReasoningEffort = Literal["none", "minimal", "low", "medium", "high", "xhigh"]\n'
              '_REASONING_EFFORTS = {"none", "minimal", "low", "medium", "high", "xhigh"}\n\n\n'
              'def _reasoning_effort(values: Mapping[str, str]) -> ReasoningEffort | None:\n'
              '    raw = values.get("PAPERAGENT_LLM_REASONING_EFFORT")\n'
              '    if not raw:\n'
              '        return None\n'
              '    normalized = raw.strip().casefold()\n'
              '    if normalized not in _REASONING_EFFORTS:\n'
              '        raise ValueError("PAPERAGENT_LLM_REASONING_EFFORT has an unsupported value")\n'
              '    return cast(ReasoningEffort, normalized)\n\n\n'
              'def _env_bool',
          )
          replace_once(
              "src/paperagent/providers/config.py",
              '        reasoning_effort=(\n'
              '            values["PAPERAGENT_LLM_REASONING_EFFORT"].strip().casefold()\n'
              '            if values.get("PAPERAGENT_LLM_REASONING_EFFORT")\n'
              '            else None\n'
              '        ),\n',
              '        reasoning_effort=_reasoning_effort(values),\n',
          )
          replace_once(
              "src/paperagent/nodes/method_design.py",
              '    patch["quality"] = scientific_quality\n'
              '    patch["execution"] = execution.model_copy(update={"status": "blocked"})\n',
              '    patch["quality"] = scientific_quality\n'
              '    assert execution is not None\n'
              '    patch["execution"] = execution.model_copy(update={"status": "blocked"})\n',
          )
          PY
      - name: Validate and format
        run: |
          ruff format .
          ruff check . || true
          mypy || true
      - name: Commit type fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "fix: resolve strict type-checking failures"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
