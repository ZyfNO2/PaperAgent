name: Method Design Draft Offline Gate

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/method-design-draft-offline-gate.yml"
      - "scripts/clouddev_cross_domain_patch.py"
      - ".cross-domain-method-trigger"

permissions:
  contents: write

concurrency:
  group: method-design-draft-offline
  cancel-in-progress: true

jobs:
  verify-and-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run reversible cross-domain transaction
        run: python scripts/clouddev_cross_domain_patch.py
