name: Fix Method Draft Imports Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/fix-method-draft-imports-once.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fix imports and remove one-shot workflow
        run: |
          python -m pip install -q 'ruff>=0.12,<0.13'
          ruff check src/paperagent/method_design_draft.py --select I --fix
          git rm .github/workflows/fix-method-draft-imports-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/paperagent/method_design_draft.py
          git commit -m "style(method): normalize draft imports [skip ci]"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
