name: v0.5 dual-version verification

on:
  push:
    branches:
      - feat/v0.5-pwa-shell-mvp
    paths:
      - .ci/v0.5/TRIGGER

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v0.5-pwa-shell-mvp
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify Python 3.11
        shell: bash
        run: |
          set +e
          python -m pip install --upgrade pip > /tmp/py311.log 2>&1
          python -m pip install -e '.[dev]' >> /tmp/py311.log 2>&1; install_rc=$?
          ruff check . >> /tmp/py311.log 2>&1; ruff_rc=$?
          ruff format --check . >> /tmp/py311.log 2>&1; format_rc=$?
          mypy --config-file pyproject.toml >> /tmp/py311.log 2>&1; mypy_rc=$?
          pytest -q --cov=paperagent --cov-branch --cov-report=term-missing >> /tmp/py311.log 2>&1; pytest_rc=$?
          overall=0
          for value in "$install_rc" "$ruff_rc" "$format_rc" "$mypy_rc" "$pytest_rc"; do
            if [ "$value" -ne 0 ]; then overall=1; fi
          done
          printf 'install_rc=%s\nruff_rc=%s\nformat_rc=%s\nmypy_rc=%s\npytest_rc=%s\noverall_rc=%s\n' \
            "$install_rc" "$ruff_rc" "$format_rc" "$mypy_rc" "$pytest_rc" "$overall" > /tmp/py311.status
          exit 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify Python 3.12 and publish evidence
        shell: bash
        run: |
          set +e
          python -m pip install --upgrade pip > /tmp/py312.log 2>&1
          python -m pip install -e '.[dev]' >> /tmp/py312.log 2>&1; install_rc=$?
          ruff check . >> /tmp/py312.log 2>&1; ruff_rc=$?
          ruff format --check . >> /tmp/py312.log 2>&1; format_rc=$?
          mypy --config-file pyproject.toml >> /tmp/py312.log 2>&1; mypy_rc=$?
          pytest -q --cov=paperagent --cov-branch --cov-report=term-missing >> /tmp/py312.log 2>&1; pytest_rc=$?
          overall=0
          for value in "$install_rc" "$ruff_rc" "$format_rc" "$mypy_rc" "$pytest_rc"; do
            if [ "$value" -ne 0 ]; then overall=1; fi
          done
          printf 'install_rc=%s\nruff_rc=%s\nformat_rc=%s\nmypy_rc=%s\npytest_rc=%s\noverall_rc=%s\n' \
            "$install_rc" "$ruff_rc" "$format_rc" "$mypy_rc" "$pytest_rc" "$overall" > /tmp/py312.status
          py311_overall="$(awk -F= '/overall_rc/{print $2}' /tmp/py311.status)"
          combined=0
          if [ "$py311_overall" -ne 0 ] || [ "$overall" -ne 0 ]; then combined=1; fi
          mkdir -p .ci/v0.5
          {
            echo "run_id=${GITHUB_RUN_ID}"
            echo "head_sha=${GITHUB_SHA}"
            echo "python_3_11:"
            cat /tmp/py311.status
            echo "python_3_12:"
            cat /tmp/py312.status
            echo "combined_rc=${combined}"
            echo "--- Python 3.11 tail ---"
            tail -n 130 /tmp/py311.log
            echo "--- Python 3.12 tail ---"
            tail -n 130 /tmp/py312.log
          } > .ci/v0.5/FINAL.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .ci/v0.5/FINAL.txt
          git commit -m 'chore(v0.5): publish dual-version verification evidence' || true
          git push origin HEAD:feat/v0.5-pwa-shell-mvp
          exit "$combined"
