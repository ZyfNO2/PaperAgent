name: Public Dev Decision Policy Remediation

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - scripts/apply_public_dev_decision_fix.py

permissions:
  contents: write

concurrency:
  group: public-dev-decision-policy-remediation
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: python -m pip install -q -e '.[dev]'

      - name: Apply generic decision-policy fix
        run: python scripts/apply_public_dev_decision_fix.py

      - name: Format and lint
        run: |
          ruff format src tests scripts
          ruff check --fix src tests scripts
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Static leakage audit
        run: |
          python - <<'PY'
          from paperagent.benchmark_leakage_audit import audit_benchmark_execution_boundary

          result = audit_benchmark_execution_boundary()
          print(result.model_dump_json(indent=2))
          if not result.passed:
              raise SystemExit(result.findings)
          PY

      - name: Targeted regression
        run: |
          pytest --no-cov -q \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_scientific_decision_policy.py \
            tests/evals/test_00_production_pilot.py \
            tests/evals/test_benchmark_input_boundary_v2.py \
            tests/evals/test_claw_benchmark_adapter.py

      - name: Full merge gates
        run: |
          mypy --config-file pyproject.toml
          pytest --cov=paperagent --cov-branch --cov-report=term-missing -q

      - name: Commit clean source and remove one-shot machinery
        run: |
          rm -f scripts/apply_public_dev_decision_fix.py
          rm -f .github/workflows/public-dev-decision-fix-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(method): stabilize evidence-readiness decisions"
          git push origin HEAD:feat/claw-live-search-runtime
