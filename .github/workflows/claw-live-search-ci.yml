name: CLAW Live Search Prerequisites

on:
  pull_request:
    branches:
      - feat/claw-academic-tailoring-benchmark-v1
    types: [opened, reopened, synchronize]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: claw-live-search-prerequisites-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
    steps:
      - name: Inspect secret-safe prerequisites
        id: inspect
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          probe_path=$(gh api repos/${GITHUB_REPOSITORY}/actions/runs/29709781962 --jq '.path')
          if [[ -n "${MISTRAL_API_KEY:-}" ]]; then
            mistral_present=true
          else
            mistral_present=false
          fi
          echo "probe_path=$probe_path" >> "$GITHUB_OUTPUT"
          echo "mistral_present=$mistral_present" >> "$GITHUB_OUTPUT"
      - name: Publish prerequisite result
        env:
          GH_TOKEN: ${{ github.token }}
          PROBE_PATH: ${{ steps.inspect.outputs.probe_path }}
          MISTRAL_PRESENT: ${{ steps.inspect.outputs.mistral_present }}
        shell: bash
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "CLAW prerequisites: probe_workflow=\`$PROBE_PATH\`; mistral_credential_present=\`$MISTRAL_PRESENT\`; run=\`$GITHUB_RUN_ID\`."
