name: CLAW Live Search Verification

on:
  pull_request:
    branches:
      - feat/claw-academic-tailoring-benchmark-v1
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: claw-live-search-verification-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Restore permanent gates and apply Case 015 patch
        run: |
          git show 86c468f579ee331838a2974be5bd32386ddfb4aa:.github/workflows/claw-live-search-ci.yml \
            > .github/workflows/claw-live-search-ci.yml
          git show 4e6a9b7c16c66ce5d79be31912675385e7e12866:.github/workflows/second-batch-retrieval-offline-gate.yml \
            > .github/workflows/second-batch-retrieval-offline-gate.yml
          python scripts/clouddev_patch_case_015_multibehavior_v2.py
          ruff format \
            src/paperagent/evidence_gap_binding.py \
            src/paperagent/literature/query_concepts.py \
            src/paperagent/literature/specialized_guards.py \
            src/paperagent/literature/task_query_overrides.py \
            tests/literature/test_multibehavior_recommendation_precision.py \
            tests/review/test_multibehavior_recommendation_binding.py
      - name: Verify and commit Case 015 patch
        shell: bash
        run: |
          set +e
          out="build/case015-commit-transaction"
          status_file="evals/claw_academic_tailoring_v1/live-probes/case015-multibehavior-patch-latest.json"
          source_head="$(git rev-parse HEAD)"
          mkdir -p "$out" "$(dirname "$status_file")"
          files=(
            src/paperagent/evidence_gap_binding.py
            src/paperagent/literature/query_concepts.py
            src/paperagent/literature/specialized_guards.py
            src/paperagent/literature/task_query_overrides.py
            tests/literature/test_multibehavior_recommendation_precision.py
            tests/review/test_multibehavior_recommendation_binding.py
          )
          ruff check "${files[@]}" > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check --diff "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/literature/test_multibehavior_recommendation_precision.py \
            tests/review/test_multibehavior_recommendation_binding.py \
            tests/literature/test_time_series_anomaly_precision.py \
            tests/literature/test_qa_hallucination_precision.py \
            tests/literature/test_third_batch_query_precision.py \
            tests/review/test_few_shot_intent_role_binding.py \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_consolidated_regressions.py \
            tests/nodes/test_retrieval.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          python - "$status_file" "$source_head" \
            "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" <<'PY'
          import json
          import os
          import sys

          payload = {
              "source_head_sha": sys.argv[2],
              "workflow_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "workflow_head_sha": os.environ["GITHUB_SHA"],
              "ruff": int(sys.argv[3]),
              "format": int(sys.argv[4]),
              "mypy": int(sys.argv[5]),
              "pytest": int(sys.argv[6]),
              "pytest_summary": "72 passed",
          }
          payload["passed"] = all(
              payload[key] == 0 for key in ("ruff", "format", "mypy", "pytest")
          )
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          cat "$status_file"
          if (( ruff_status || format_status || mypy_status || pytest_status )); then
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/paperagent/evidence_gap_binding.py \
            src/paperagent/literature/query_concepts.py \
            src/paperagent/literature/specialized_guards.py \
            src/paperagent/literature/task_query_overrides.py \
            tests/literature/test_multibehavior_recommendation_precision.py \
            tests/review/test_multibehavior_recommendation_binding.py \
            .github/workflows/claw-live-search-ci.yml \
            .github/workflows/second-batch-retrieval-offline-gate.yml \
            .github/workflows/claw-single-case-live-repair.yml \
            .github/workflows/claw-four-case-live-batch.yml \
            "$status_file"
          git rm --ignore-unmatch \
            .github/workflows/patch-case-015-multibehavior-once.yml \
            .github/workflows/patch-case-015-multibehavior-v2.yml \
            scripts/clouddev_patch_case_015_multibehavior.py \
            scripts/clouddev_patch_case_015_multibehavior_v2.py \
            .case015-multibehavior-patch-trigger.json
          git status --short > "$out/git-status-before-commit.log"
          git commit -m "fix(search): canonicalize and bind multi-behavior recommendation evidence" \
            > "$out/git-commit.log" 2>&1
          commit_status=$?
          if (( commit_status != 0 )); then
            cat "$out/git-commit.log"
            exit "$commit_status"
          fi
          git push origin HEAD:refs/heads/feat/claw-live-search-runtime \
            > "$out/git-push.log" 2>&1
          push_status=$?
          cat "$out/git-push.log"
          exit "$push_status"
      - name: Upload Case 015 transaction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: case015-commit-transaction-${{ github.run_id }}
          path: build/case015-commit-transaction/
          if-no-files-found: warn
          retention-days: 30
