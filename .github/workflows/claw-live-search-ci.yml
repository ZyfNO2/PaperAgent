name: CLAW Live Search Runtime

on:
  push:
    branches:
      - feat/claw-live-search-runtime

permissions:
  contents: write

concurrency:
  group: claw-live-search-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install formatter
        run: python -m pip install -q -e '.[dev]'
      - name: Format bounded search files
        shell: bash
        run: |
          files=(
            scripts/probe_claw_case_retrieval.py
            src/paperagent/literature/verification.py
            tests/evals/test_gate_l_remediation.py
            tests/literature/test_adaptive_search_edges.py
          )
          ruff format "${files[@]}"
          ruff check --fix "${files[@]}"
          if git diff --quiet -- "${files[@]}"; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "style(search): format adaptive retrieval regression files"
          git push
