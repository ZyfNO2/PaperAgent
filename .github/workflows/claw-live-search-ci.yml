name: CLAW Live Search Runtime

on:
  push:
    branches:
      - feat/claw-live-search-runtime

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: claw-live-search-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Repair adapter identifier typo
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/paperagent/literature/adapter.py')
          text = path.read_text(encoding='utf-8')
          broken = 'if ar{iv_id:'
          if broken not in text:
              raise SystemExit('broken identifier was not found')
          path.write_text(text.replace(broken, 'if arxiv_id:', 1), encoding='utf-8')
          PY
          python -m py_compile src/paperagent/literature/adapter.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/paperagent/literature/adapter.py
          git commit -m "fix(search): repair arXiv identifier branch"
          git push
