name: CLAW Live Search Prerequisites

on:
  pull_request:
    branches:
      - feat/claw-academic-tailoring-benchmark-v1
    types: [opened, reopened, synchronize]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: claw-live-search-prerequisites-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
    steps:
      - name: Inspect secret-safe prerequisites
        id: inspect
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p build/claw-prerequisites
          probe_path=unknown
          for attempt in 1 2 3; do
            candidate=$(gh api repos/${GITHUB_REPOSITORY}/actions/runs/29709781962 --jq '.path' 2>/dev/null) && {
              probe_path="$candidate"
              break
            }
            sleep $((attempt * 2))
          done
          if [[ -n "${MISTRAL_API_KEY:-}" ]]; then
            mistral_present=true
          else
            mistral_present=false
          fi
          echo "probe_path=$probe_path" >> "$GITHUB_OUTPUT"
          echo "mistral_present=$mistral_present" >> "$GITHUB_OUTPUT"
          printf '{"probe_workflow_path":"%s","mistral_api_key_present":%s}\n' \
            "$probe_path" "$mistral_present" \
            > build/claw-prerequisites/result.json
      - name: Upload prerequisite result
        uses: actions/upload-artifact@v4
        with:
          name: claw-prerequisites-${{ github.run_id }}
          path: build/claw-prerequisites/result.json
          if-no-files-found: error
          retention-days: 7
      - name: Publish prerequisite result
        env:
          GH_TOKEN: ${{ github.token }}
          PROBE_PATH: ${{ steps.inspect.outputs.probe_path }}
          MISTRAL_PRESENT: ${{ steps.inspect.outputs.mistral_present }}
        shell: bash
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo "$GITHUB_REPOSITORY" --body "CLAW prerequisites: probe_workflow=\`$PROBE_PATH\`; mistral_credential_present=\`$MISTRAL_PRESENT\`; run=\`$GITHUB_RUN_ID\`."
