name: CLAW Live Search Verification

on:
  pull_request:
    branches:
      - feat/claw-academic-tailoring-benchmark-v1
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: claw-live-search-verification-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Verify Case 017 precision and stable regressions
        shell: bash
        run: |
          set +e
          out="build/case017-precision-verification"
          mkdir -p "$out"
          files=(
            src/paperagent/literature/specialized_guards.py
            src/paperagent/literature/task_query_overrides.py
            tests/literature/test_mobilenetv3_plant_disease_precision.py
            tests/literature/test_multibehavior_recommendation_precision.py
            tests/literature/test_time_series_anomaly_precision.py
            tests/literature/test_qa_hallucination_precision.py
            tests/literature/test_third_batch_query_precision.py
          )
          ruff check "${files[@]}" --output-format=concise > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check --diff "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/literature/test_mobilenetv3_plant_disease_precision.py \
            tests/literature/test_multibehavior_recommendation_precision.py \
            tests/literature/test_time_series_anomaly_precision.py \
            tests/literature/test_qa_hallucination_precision.py \
            tests/literature/test_third_batch_query_precision.py \
            tests/literature/test_query_concepts.py \
            tests/literature/test_query_refinement.py \
            tests/review/test_few_shot_intent_role_binding.py \
            tests/review/test_multibehavior_recommendation_binding.py \
            tests/review/test_semantic_gap_binding.py \
            tests/nodes/test_retrieval.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          printf '{"head":"%s","run_id":%s,"ruff":%s,"format":%s,"mypy":%s,"pytest":%s}\n' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID" "$ruff_status" "$format_status" \
            "$mypy_status" "$pytest_status" > "$out/status.json"
          cat "$out/status.json"
          if (( ruff_status || format_status || mypy_status || pytest_status )); then
            exit 1
          fi
      - name: Upload Case 017 verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: case017-precision-${{ github.run_id }}
          path: build/case017-precision-verification/
          if-no-files-found: error
          retention-days: 30
