name: CLAW Live Search Maintenance

on:
  push:
    branches:
      - feat/claw-live-search-runtime

permissions:
  contents: write

concurrency:
  group: claw-live-search-maintenance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maintain:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Format bounded files and disable automatic live probe
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          files=(
            scripts/probe_claw_case_retrieval.py
            src/paperagent/literature/verification.py
            tests/evals/test_gate_l_remediation.py
            tests/literature/test_adaptive_search_edges.py
          )
          ruff format "${files[@]}"
          ruff check --fix "${files[@]}"
          probe_path=$(gh api repos/${GITHUB_REPOSITORY}/actions/runs/29709781962 --jq '.path')
          export PROBE_PATH="$probe_path"
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["PROBE_PATH"])
          lines = path.read_text(encoding="utf-8").splitlines(keepends=True)
          try:
              start = next(index for index, line in enumerate(lines) if line.rstrip() == "on:")
          except StopIteration as exc:
              raise SystemExit(f"top-level on block not found in {path}") from exc
          end = next(
              (
                  index
                  for index in range(start + 1, len(lines))
                  if lines[index].strip() and not lines[index].startswith((" ", "\t"))
              ),
              len(lines),
          )
          lines[start:end] = ["on:\n", "  workflow_dispatch:\n", "\n"]
          path.write_text("".join(lines), encoding="utf-8")
          print(f"disabled automatic trigger for {path}")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}" "$probe_path"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(search): format regressions and gate live probe manually"
          git push
