name: CLAW Live Search Runtime

on:
  push:
    branches:
      - feat/claw-live-search-runtime

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: claw-live-search-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply exact Ruff format to benchmark adapter
        shell: bash
        run: |
          ruff format src/paperagent/claw_benchmark_adapter.py
          if ! git diff --quiet -- src/paperagent/claw_benchmark_adapter.py; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/paperagent/claw_benchmark_adapter.py
            git commit -m "style(eval): apply Ruff format to recovery classifier"
            git push
          fi
      - name: Verify adaptive search runtime
        id: verify
        shell: bash
        run: |
          set +e
          out="build/claw-live-search-ci"
          mkdir -p "$out"
          files=(
            src/paperagent/claw_benchmark_runtime.py
            src/paperagent/cli.py
            src/paperagent/literature/adapter.py
            src/paperagent/literature/factory.py
            src/paperagent/literature/service.py
            src/paperagent/literature/source_policy.py
            src/paperagent/literature/providers/__init__.py
            src/paperagent/literature/providers/_web.py
            src/paperagent/literature/providers/base.py
            src/paperagent/literature/providers/duckduckgo.py
            src/paperagent/literature/providers/tavily.py
            scripts/run_claw_academic_runtime.py
            tests/literature/test_claw_benchmark_runtime.py
            tests/literature/test_provider_call_budget.py
            tests/literature/test_source_selection_policy.py
            tests/literature/test_web_search_providers.py
          )
          ruff check "${files[@]}" --output-format=concise > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check --diff "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/literature/test_claw_benchmark_runtime.py \
            tests/literature/test_provider_call_budget.py \
            tests/literature/test_source_selection_policy.py \
            tests/literature/test_web_search_providers.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          printf '{"head":"%s","run_id":%s,"ruff":%s,"format":%s,"mypy":%s,"pytest":%s}\n' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID" "$ruff_status" "$format_status" \
            "$mypy_status" "$pytest_status" > "$out/status.json"
          cat "$out/status.json"
          if (( ruff_status || format_status || mypy_status || pytest_status )); then
            exit 1
          fi
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claw-live-search-${{ github.run_id }}
          path: build/claw-live-search-ci/
          if-no-files-found: error
          retention-days: 30
      - name: Publish verification status to Draft PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          pr_number=$(gh pr list \
            --head "$GITHUB_REF_NAME" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [[ -z "$pr_number" ]]; then
            exit 0
          fi
          status_file="build/claw-live-search-ci/status.json"
          if [[ -f "$status_file" ]]; then
            status=$(cat "$status_file")
          else
            status='{"status":"workflow_failed_before_verification"}'
          fi
          gh pr comment "$pr_number" --body "CLAW Live Search cloud verification\n\n- Run: $GITHUB_RUN_ID\n- Head: \`$GITHUB_SHA\`\n- Status: \`$status\`"
