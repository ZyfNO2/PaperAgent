name: CLAW Live Search Maintenance

on:
  pull_request:
    branches:
      - feat/claw-academic-tailoring-benchmark-v1
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: claw-live-search-maintenance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  maintain:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Format bounded regression files
        shell: bash
        run: |
          set -euo pipefail
          files=(
            scripts/probe_claw_case_retrieval.py
            src/paperagent/literature/verification.py
            tests/evals/test_gate_l_remediation.py
            tests/literature/test_adaptive_search_edges.py
          )
          ruff format "${files[@]}"
          ruff check --fix "${files[@]}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(search): format adaptive retrieval regressions"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
