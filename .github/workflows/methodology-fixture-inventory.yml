name: Methodology Fixture Inventory

on:
  pull_request:
    branches: [fix/gate-l-v3-acceptance-routing]

permissions:
  contents: read

jobs:
  inventory:
    if: ${{ github.head_ref == 'fix/academic-tailoring-contract-convergence' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture method fixture inventory
        run: |
          mkdir -p build/methodology-inventory
          find tests/fixtures/llm/v0_1/method_design -type f -print -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \; \
            > build/methodology-inventory/fixtures.txt
          grep -RIn "method_design\|MethodProposal\|minimum_key_experiment" tests src/paperagent \
            > build/methodology-inventory/references.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: methodology-fixture-inventory
          path: build/methodology-inventory
          if-no-files-found: error
          retention-days: 7
