name: Gate L v2 Temporary Autoformat

on:
  push:
    branches: [scientific-gate-l]
    paths:
      - scripts/gate_l_v2_acceptance.py
      - scripts/run_gate_l_v2.py
      - .github/workflows/gate-l-v2-autoformat.yml

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scientific-gate-l
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install formatter
        run: python -m pip install 'ruff>=0.12,<0.13'
      - name: Format Gate L v2 scripts
        run: ruff format scripts/gate_l_v2_acceptance.py scripts/run_gate_l_v2.py
      - name: Commit formatter output
        run: |
          if git diff --quiet -- scripts/gate_l_v2_acceptance.py scripts/run_gate_l_v2.py; then
            echo 'No formatter changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/gate_l_v2_acceptance.py scripts/run_gate_l_v2.py
          git commit -m 'style(gate-l): apply Ruff formatter to v2 tooling'
          git push origin HEAD:scientific-gate-l
