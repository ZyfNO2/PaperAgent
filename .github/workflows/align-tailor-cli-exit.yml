name: Align tailor CLI exit

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/paperagent-memory-rag'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/paperagent-memory-rag
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply exact CLI test update
        run: python .github/scripts/align_tailor_cli_exit.py
      - name: Format and lint test
        run: |
          python -m pip install 'ruff>=0.12,<0.13'
          ruff format tests/projects/test_cli.py
          ruff check tests/projects/test_cli.py
      - name: Commit change
        shell: bash
        run: |
          git config user.name 'paperagent-ci'
          git config user.email 'paperagent-ci@users.noreply.github.com'
          git add tests/projects/test_cli.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'test(cli): preserve scientific blocked exit semantics'
          git push origin HEAD:refactor/paperagent-memory-rag
