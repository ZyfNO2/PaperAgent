name: CLAW Single-Case Live Repair

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".claw-single-case-trigger.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: claw-single-case-live-repair
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      PAPERAGENT_LLM_PROVIDER: mistral
      PAPERAGENT_LLM_MODEL: mistral-small-latest
      PAPERAGENT_LLM_BASE_URL: https://api.mistral.ai/v1
      PAPERAGENT_LLM_MAX_ATTEMPTS: "2"
      PAPERAGENT_LLM_MAX_CALLS: "12"
      PAPERAGENT_LLM_TASK_TIMEOUT: "900"
      PAPERAGENT_CONTACT_EMAIL: ${{ secrets.PAPERAGENT_CONTACT_EMAIL }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Validate request and offline gates
        id: validate
        shell: bash
        run: |
          set +e
          out="build/claw-single-case-live-repair"
          mkdir -p "$out"
          python - <<'PY' > "$out/request-validation.log" 2>&1
          import json
          from pathlib import Path

          marker = json.loads(Path('.claw-single-case-trigger.json').read_text(encoding='utf-8'))
          case_id = marker.get('case_id')
          if not isinstance(case_id, str) or not case_id.strip():
              raise SystemExit('case_id must be one non-empty string')
          print(json.dumps(marker, ensure_ascii=False, indent=2, sort_keys=True))
          PY
          request_status=$?
          files=(
            src/paperagent/claw_benchmark_adapter.py
            src/paperagent/nodes/planning.py
            src/paperagent/evidence_relevance.py
            src/paperagent/literature/query_concepts.py
            src/paperagent/literature/query_refinement.py
            src/paperagent/literature/ranking.py
            src/paperagent/literature/specialized_guards.py
            src/paperagent/literature/task_query_overrides.py
            src/paperagent/retrieval/prepare_search.py
            src/paperagent/retrieval/verify_evidence.py
            src/paperagent/evidence_gap_binding.py
            src/paperagent/academic_methodology.py
            src/paperagent/method_design_draft.py
            src/paperagent/nodes/_shared.py
            src/paperagent/nodes/method_design.py
            scripts/probe_claw_case_end_to_end.py
            tests/evals/test_claw_benchmark_adapter.py
            tests/nodes/test_planning_nonblocking.py
            tests/literature/test_time_series_anomaly_precision.py
            tests/literature/test_multibehavior_recommendation_precision.py
            tests/literature/test_query_concepts.py
            tests/literature/test_query_refinement.py
            tests/literature/test_qa_hallucination_precision.py
            tests/methodology/test_method_design_draft.py
            tests/review/test_semantic_gap_binding.py
            tests/review/test_few_shot_intent_role_binding.py
            tests/review/test_multibehavior_recommendation_binding.py
            tests/review/test_research_contract_priority.py
          )
          ruff check "${files[@]}" > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/evals/test_claw_benchmark_adapter.py \
            tests/nodes/test_planning_nonblocking.py \
            tests/schemas/test_plan_nonblocking_clarification.py \
            tests/literature/test_time_series_anomaly_precision.py \
            tests/literature/test_multibehavior_recommendation_precision.py \
            tests/literature/test_query_concepts.py \
            tests/literature/test_query_refinement.py \
            tests/literature/test_qa_hallucination_precision.py \
            tests/literature/test_source_selection_policy.py \
            tests/nodes/test_retrieval.py \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_evidence_binding.py \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_few_shot_intent_role_binding.py \
            tests/review/test_multibehavior_recommendation_binding.py \
            tests/review/test_consolidated_regressions.py \
            tests/review/test_research_contract_priority.py \
            tests/graph/test_full_graph.py \
            tests/graph/test_hitl.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          python - "$out/validation.json" \
            "$request_status" "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" <<'PY'
          import json
          import sys

          names = ('request', 'ruff', 'format', 'mypy', 'pytest')
          payload = {name: int(value) for name, value in zip(names, sys.argv[2:], strict=True)}
          payload['passed'] = all(value == 0 for value in payload.values())
          with open(sys.argv[1], 'w', encoding='utf-8') as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write('\n')
          PY
          if (( request_status || ruff_status || format_status || mypy_status || pytest_status )); then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Execute exactly one live case
        if: steps.validate.outputs.passed == 'true'
        shell: bash
        run: |
          set +e
          out="build/claw-single-case-live-repair"
          case_id="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path('.claw-single-case-trigger.json').read_text(encoding='utf-8'))['case_id'])
          PY
          )"
          if [[ -z "${MISTRAL_API_KEY:-}" ]]; then
            python - "$out/summary.json" "$case_id" <<'PY'
          import json
          import sys
          payload = {
              'case_id': sys.argv[2],
              'status': 'blocked_missing_mistral_secret',
              'passed': False,
              'web_search_enabled': False,
          }
          with open(sys.argv[1], 'w', encoding='utf-8') as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write('\n')
          PY
            exit 0
          fi
          python scripts/probe_claw_case_end_to_end.py \
            --case-id "$case_id" \
            --max-llm-calls 12 \
            --provider-call-budget 8 \
            --verification-call-budget 16 \
            --minimum-score 80 \
            --output-dir "$out/case" \
            > "$out/stdout.log" 2> "$out/stderr.log"
          probe_status=$?
          if [[ -f "$out/case/summary.json" ]]; then
            cp "$out/case/summary.json" "$out/summary.json"
          else
            python - "$out/summary.json" "$case_id" "$probe_status" <<'PY'
          import json
          import sys
          payload = {
              'case_id': sys.argv[2],
              'status': 'missing_probe_summary',
              'passed': False,
              'probe_exit_code': int(sys.argv[3]),
              'web_search_enabled': False,
          }
          with open(sys.argv[1], 'w', encoding='utf-8') as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write('\n')
          PY
          fi
      - name: Write validation failure summary
        if: steps.validate.outputs.passed != 'true'
        run: |
          python - "build/claw-single-case-live-repair/summary.json" <<'PY'
          import json
          import os
          import sys
          payload = {
              'status': 'validation_failed_before_llm',
              'passed': False,
              'web_search_enabled': False,
              'workflow_run_id': int(os.environ['GITHUB_RUN_ID']),
              'workflow_head_sha': os.environ['GITHUB_SHA'],
          }
          with open(sys.argv[1], 'w', encoding='utf-8') as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write('\n')
          PY
      - name: Upload repair evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claw-single-case-repair-${{ github.run_id }}
          path: build/claw-single-case-live-repair/
          if-no-files-found: error
          retention-days: 30
      - name: Persist compact repair result
        if: always()
        shell: bash
        run: |
          source_file="build/claw-single-case-live-repair/summary.json"
          target_file="evals/claw_academic_tailoring_v1/live-probes/single-case-repair-latest.json"
          if [[ ! -f "$source_file" ]]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$GITHUB_REF_NAME"
          git checkout -B "$GITHUB_REF_NAME" "origin/$GITHUB_REF_NAME"
          mkdir -p "$(dirname "$target_file")"
          cp "$source_file" "$target_file"
          git add "$target_file"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(eval): persist single-case repair result [skip ci]"
          for attempt in 1 2 3; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              exit 0
            fi
            git fetch origin "$GITHUB_REF_NAME"
            git rebase "origin/$GITHUB_REF_NAME"
          done
          exit 1
      - name: Enforce repair outcome
        if: always()
        run: |
          python - "build/claw-single-case-live-repair/summary.json" <<'PY'
          import json
          import sys
          payload = json.load(open(sys.argv[1], encoding='utf-8'))
          raise SystemExit(0 if payload.get('passed') is True else 1)
          PY
