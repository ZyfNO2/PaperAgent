name: GLM-5.2 Rate Limit Integrity Repair

on:
  push:
    branches:
      - fix/glm52-runtime-hardening-v2
    paths:
      - "scripts/apply_glm52_rate_limit_and_runtime_integrity_v1.py"
      - ".github/workflows/glm52-rate-limit-integrity-repair.yml"
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-live-test
    paths:
      - "scripts/apply_glm52_rate_limit_and_runtime_integrity_v1.py"
      - ".github/workflows/glm52-rate-limit-integrity-repair.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: glm52-rate-limit-integrity-repair-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/glm52-runtime-hardening-v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply bounded repair
        run: python scripts/apply_glm52_rate_limit_and_runtime_integrity_v1.py
      - name: Format and verify repaired paths
        run: |
          ruff format \
            src/paperagent/providers/openai_llm.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py
          ruff check \
            src/paperagent/providers/openai_llm.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py
          pytest -q \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py
          mypy --config-file pyproject.toml src/paperagent/providers
          git diff --check
      - name: Prepare verified repair bundle
        run: |
          mkdir -p build/glm52-repair
          cp --parents \
            src/paperagent/providers/openai_llm.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py \
            .github/workflows/academic-tailoring-retrieval-v1-live-test.yml \
            .github/workflows/glm52-runtime-hardening.yml \
            build/glm52-repair/
          printf '%s\n' '.github/workflows/glm52-smoke-diagnostic.yml' \
            > build/glm52-repair/delete-paths.txt
      - uses: actions/upload-artifact@v4
        with:
          name: glm52-rate-limit-integrity-repair
          path: build/glm52-repair/
          if-no-files-found: error
          retention-days: 7
