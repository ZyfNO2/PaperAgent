name: Academic Tailoring Retrieval v1 Truth Chain Diagnostics

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: academic-tailoring-retrieval-v1-truth-chain-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Capture patch result
        shell: bash
        run: |
          mkdir -p build/truth-chain-diagnostics
          set +e
          python scripts/apply_academic_tailoring_retrieval_v1_truth_chain_v5.py \
            > build/truth-chain-diagnostics/apply.log 2>&1
          echo "$?" > build/truth-chain-diagnostics/apply-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-retrieval-v1-truth-chain-diagnostics
          path: build/truth-chain-diagnostics/
          if-no-files-found: error
          retention-days: 14
      - name: Enforce patch
        run: test "$(cat build/truth-chain-diagnostics/apply-status.txt)" = "0"
