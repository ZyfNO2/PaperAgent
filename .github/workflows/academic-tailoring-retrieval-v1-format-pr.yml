name: Academic Tailoring Retrieval v1 Evidence Chain Repair

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: academic-tailoring-retrieval-v1-evidence-chain-repair-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair-head:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply evidence-chain repairs
        run: |
          python scripts/apply_academic_tailoring_retrieval_v1_evidence_chain_v3.py
          python scripts/apply_academic_tailoring_retrieval_v1_evidence_chain_v3_followup.py
          python scripts/apply_academic_tailoring_retrieval_v1_title_alias_v4.py
      - name: Format and targeted regression
        run: |
          ruff format \
            scripts/score_academic_tailoring_retrieval_v1.py \
            src/paperagent/literature/adapter.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_linked_repository_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py
          ruff check \
            scripts/score_academic_tailoring_retrieval_v1.py \
            src/paperagent/literature/adapter.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_linked_repository_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py
          pytest -q \
            tests/literature/test_linked_repository_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py \
            tests/evals/test_benchmark_leakage_audit.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py \
            tests/nodes/test_planning_nonblocking.py \
            tests/review/test_semantic_gap_binding.py
          python - <<'PY'
          from paperagent.benchmark_leakage_audit import audit_benchmark_execution_boundary
          result = audit_benchmark_execution_boundary()
          print(result.model_dump_json(indent=2))
          if not result.passed:
              raise SystemExit(result.findings)
          PY
      - name: Shadow-rescore latest strict candidate output
        run: |
          rm -rf build/strict-shadow-latest
          mkdir -p build/strict-shadow-latest
          gh run download 29798823623 \
            --repo "$GITHUB_REPOSITORY" \
            --name strict-v1-candidate-run \
            --dir build/strict-shadow-latest
          python scripts/score_academic_tailoring_retrieval_v1.py \
            --authoring evals/academic_tailoring_retrieval_v1/dataset-authoring.json \
            --states build/strict-shadow-latest/states.jsonl \
            --traces build/strict-shadow-latest/run-traces.jsonl \
            --prompts build/strict-shadow-latest/prompt-log.jsonl \
            --runtime-summary build/strict-shadow-latest/execution-summary.json \
            --output build/evidence-chain-shadow-report.json \
            --minimum-score 80
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("build/evidence-chain-shadow-report.json").read_text())
          cases = {item["case_id"]: item for item in report["cases"]}
          remote = cases["atr-v1-005-remote-oriented-small-edge"]
          assert remote["scoring_audit"]["baseline_target_match"] is False, remote
          assert "wrong_paper_identity" in remote["hard_failures"], remote
          usad = cases["atr-v1-006-industrial-usad-anomaly-transformer"]
          assert usad["scoring_audit"]["baseline_target_match"] is True, usad
          assert report["prompt_leakage_findings"] == [], report
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: academic-tailoring-retrieval-v1-evidence-chain-shadow-report
          path: build/evidence-chain-shadow-report.json
          if-no-files-found: error
          retention-days: 30
      - name: Remove one-shot controls
        run: |
          rm -f \
            scripts/apply_academic_tailoring_retrieval_v1_evidence_chain_v3.py \
            scripts/apply_academic_tailoring_retrieval_v1_evidence_chain_v3_followup.py \
            scripts/apply_academic_tailoring_retrieval_v1_title_alias_v4.py \
            .github/workflows/academic-tailoring-retrieval-v1-format-pr.yml
      - name: Full offline regression
        run: |
          pytest -q
          mypy --config-file pyproject.toml
          ruff check src tests scripts
          ruff format --check src tests scripts
      - name: Commit production evidence-chain repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(retrieval): anchor declared baselines and split linked repositories"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
