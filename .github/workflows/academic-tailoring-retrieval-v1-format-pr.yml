name: Academic Tailoring Retrieval v1 Runtime Truth Repair

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: academic-tailoring-retrieval-v1-runtime-truth-repair-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair-runtime:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply production runtime repairs
        run: |
          python scripts/repair_academic_tailoring_retrieval_v1_truth_chain_v5.py
          python scripts/apply_academic_tailoring_retrieval_v1_truth_chain_v5.py
          python scripts/fix_academic_tailoring_retrieval_v1_truth_chain_v5_generated.py
      - name: Format repaired runtime and focused tests
        run: |
          ruff format \
            src/paperagent/literature/adapter.py \
            src/paperagent/method_design_draft.py \
            scripts/score_academic_tailoring_retrieval_v1.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/literature/test_linked_repository_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py
          ruff check \
            src/paperagent/literature/adapter.py \
            src/paperagent/method_design_draft.py \
            scripts/score_academic_tailoring_retrieval_v1.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/literature/test_linked_repository_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py
      - name: Validate production retrieval and method behavior
        run: |
          pytest -q \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/literature/test_linked_repository_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/nodes/test_planning_nonblocking.py \
            tests/review/test_semantic_gap_binding.py
      - name: Validate isolation and scorer truthfulness
        run: |
          pytest -q \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py \
            tests/evals/test_benchmark_leakage_audit.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py
          python - <<'PY'
          from paperagent.benchmark_leakage_audit import audit_benchmark_execution_boundary
          result = audit_benchmark_execution_boundary()
          print(result.model_dump_json(indent=2))
          if not result.passed:
              raise SystemExit(result.findings)
          PY
      - name: Shadow-rescore previous live outputs
        run: |
          rm -rf build/truth-chain-shadow
          mkdir -p build/truth-chain-shadow
          gh run download 29800027262 \
            --repo "$GITHUB_REPOSITORY" \
            --name strict-v1-candidate-run \
            --dir build/truth-chain-shadow
          python scripts/score_academic_tailoring_retrieval_v1.py \
            --authoring evals/academic_tailoring_retrieval_v1/dataset-authoring.json \
            --states build/truth-chain-shadow/states.jsonl \
            --traces build/truth-chain-shadow/run-traces.jsonl \
            --prompts build/truth-chain-shadow/prompt-log.jsonl \
            --runtime-summary build/truth-chain-shadow/execution-summary.json \
            --output build/truth-chain-shadow-report.json \
            --minimum-score 80
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-retrieval-v1-runtime-truth-shadow
          path: build/truth-chain-shadow-report.json
          if-no-files-found: warn
          retention-days: 30
      - name: Enforce corrected historical scoring direction
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("build/truth-chain-shadow-report.json").read_text())
          cases = {item["case_id"]: item for item in report["cases"]}
          usad = cases["atr-v1-006-industrial-usad-anomaly-transformer"]
          panns = cases["atr-v1-009-audio-panns-mimii-domain"]
          assert usad["matched_assets"]["papers"][0] < 2, usad
          assert "wrong_paper_identity" in usad["hard_failures"], usad
          assert "wrong_paper_identity" in panns["hard_failures"], panns
          assert report["average_score"] < 69.4, report
          assert report["prompt_leakage_findings"] == [], report
          PY
      - name: Remove one-shot cloud controls
        run: |
          rm -f \
            scripts/apply_academic_tailoring_retrieval_v1_truth_chain_v5.py \
            scripts/repair_academic_tailoring_retrieval_v1_truth_chain_v5.py \
            scripts/fix_academic_tailoring_retrieval_v1_truth_chain_v5_generated.py \
            .github/workflows/academic-tailoring-retrieval-v1-format-pr.yml
      - name: Full offline regression
        run: |
          pytest -q
          mypy --config-file pyproject.toml
          ruff check src tests scripts
          ruff format --check src tests scripts
      - name: Commit production runtime repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(retrieval): enforce exact identities and dataset provenance"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
