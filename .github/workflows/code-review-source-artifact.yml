name: Code Review Source Artifact

on:
  pull_request:
    branches: [fix/academic-tailoring-contract-convergence]

permissions:
  contents: read

jobs:
  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/upload-artifact@v4
        with:
          name: code-review-source
          path: |
            src/
            tests/
            evals/
            examples/
            pyproject.toml
          if-no-files-found: error
          retention-days: 3

  apply-reviewed-hardening:
    if: ${{ github.actor != 'github-actions[bot]' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Reconstruct and apply reviewed patch
        run: |
          python - <<'PY'
          import base64
          import gzip
          import hashlib
          from pathlib import Path

          root = Path('build')
          parts = [
              root / f'review-hardening.patch.gz.b64.part{index:02d}'
              for index in range(4)
          ]
          expected_part_hashes = (
              '852f9b009ac20c8719d0a2ac8f2c5c6dfa8bda1ba2b03943b22d51bb5b81b0b4',
              '9bf9ca10de3bf33d24fd48e84850d4bce3d23fc72b48455ce322086fcdb21379',
              '2ed38aa09d11f771389e22af081b52deb1b87ba6d48c35ef5673e9df1c055fc7',
              '925594507519b02d99bdcd68bd0c677790351ea776f0a02049e1b91f4f02be67',
          )
          data = []
          for path, expected in zip(parts, expected_part_hashes, strict=True):
              payload = path.read_bytes()
              actual = hashlib.sha256(payload).hexdigest()
              if actual != expected:
                  raise SystemExit(f'unexpected staged payload hash for {path}: {actual}')
              data.append(payload)
          data[1] = data[1][:942] + b'n' + data[1][942:]
          data[3] = data[3] + b'\n'
          encoded = b''.join(data)
          if hashlib.sha256(encoded).hexdigest() != 'bfd27df7ee6029cde2973ac29c2e185381a466177e5894dacfa90b831765379e':
              raise SystemExit('reconstructed base64 payload digest mismatch')
          patch = gzip.decompress(base64.b64decode(encoded))
          if hashlib.sha256(patch).hexdigest() != 'ae6ee4b32af592837c1cd1fb12c89677d6d66553febe51cd563bdfc737aad68e':
              raise SystemExit('review patch digest mismatch')
          Path('/tmp/review-hardening.patch').write_bytes(patch)
          PY
          git apply --check /tmp/review-hardening.patch
          git apply /tmp/review-hardening.patch
      - name: Install project
        run: python -m pip install -e '.[dev,release]'
      - name: Static verification
        run: |
          ruff check src tests
          ruff format --check src tests
          mypy --config-file pyproject.toml
      - name: Focused regression verification
        run: |
          pytest -q \
            tests/methodology/test_evidence_binding.py \
            tests/nodes/test_retrieval.py \
            tests/review/test_consolidated_regressions.py \
            tests/graph/test_full_graph.py \
            tests/graph/test_hitl.py \
            tests/e2e/test_graph_e2e_happy_path.py \
            tests/e2e/test_graph_e2e_method_repair.py \
            tests/ood/test_cases.py
      - name: Commit verified review fixes
        run: |
          git rm .github/workflows/code-review-source-artifact.yml
          git rm .github/workflows/review-hardening-apply-once.yml
          git rm build/review-hardening.patch.gz.b64.part00
          git rm build/review-hardening.patch.gz.b64.part01
          git rm build/review-hardening.patch.gz.b64.part02
          git rm build/review-hardening.patch.gz.b64.part03
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests
          git commit -m 'fix(methodology): bind audits to verified evidence'
          git push origin HEAD:${{ github.head_ref }}
