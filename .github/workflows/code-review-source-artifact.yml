name: Code Review Source Artifact

on:
  pull_request:
    branches: [fix/academic-tailoring-contract-convergence]

permissions:
  contents: read

jobs:
  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: code-review-source
          path: |
            src/
            tests/
            evals/
            pyproject.toml
          if-no-files-found: error
          retention-days: 3
