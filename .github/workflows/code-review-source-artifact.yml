name: Code Review Source Artifact

on:
  pull_request:
    branches: [fix/academic-tailoring-contract-convergence]

permissions:
  contents: read

jobs:
  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/upload-artifact@v4
        with:
          name: code-review-source
          path: |
            src/
            tests/
            evals/
            examples/
            pyproject.toml
          if-no-files-found: error
          retention-days: 3

  apply-reviewed-hardening:
    if: ${{ github.actor != 'github-actions[bot]' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract and apply reviewed patch
        id: apply-patch
        continue-on-error: true
        run: |
          mkdir -p build
          {
            python - <<'PY'
          import base64
          import gzip
          import hashlib
          from pathlib import Path

          source = Path('.github/workflows/review-hardening-apply-once.yml').read_text(
              encoding='utf-8'
          )
          encoded = source.split("<<'B64'\n", 1)[1].split('\nB64\n', 1)[0]
          compressed = base64.b64decode(encoded)
          patch = gzip.decompress(compressed)
          Path('/tmp/review-hardening.patch').write_bytes(patch)
          print(f'encoded_length={len(encoded)}')
          print(f'compressed_length={len(compressed)}')
          print(f'patch_length={len(patch)}')
          print(f'patch_sha256={hashlib.sha256(patch).hexdigest()}')
          PY
            git status --short
            git apply --check /tmp/review-hardening.patch
            git apply /tmp/review-hardening.patch
          } > build/review-patch-apply.txt 2>&1
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-patch-apply-diagnostics
          path: build/review-patch-apply.txt
          if-no-files-found: error
          retention-days: 3
      - name: Enforce patch application
        if: steps.apply-patch.outcome == 'failure'
        run: exit 1
      - name: Install project
        run: python -m pip install -e '.[dev,release]'
      - name: Static verification
        run: |
          ruff check src tests
          ruff format --check src tests
          mypy --config-file pyproject.toml
      - name: Focused regression verification
        run: |
          pytest -q \
            tests/methodology/test_evidence_binding.py \
            tests/nodes/test_retrieval.py \
            tests/review/test_consolidated_regressions.py \
            tests/graph/test_full_graph.py \
            tests/graph/test_hitl.py \
            tests/e2e/test_graph_e2e_happy_path.py \
            tests/e2e/test_graph_e2e_method_repair.py \
            tests/ood/test_cases.py
      - name: Commit verified review fixes
        run: |
          git rm .github/workflows/code-review-source-artifact.yml
          git rm .github/workflows/review-hardening-apply-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests
          git commit -m 'fix(methodology): bind audits to verified evidence'
          git push origin HEAD:${{ github.head_ref }}
