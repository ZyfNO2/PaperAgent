name: Code Review Source Artifact

on:
  pull_request:
    branches: [fix/academic-tailoring-contract-convergence]

permissions:
  contents: read

jobs:
  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/upload-artifact@v4
        with:
          name: code-review-source
          path: |
            src/
            tests/
            evals/
            examples/
            pyproject.toml
          if-no-files-found: error
          retention-days: 3

  apply-reviewed-hardening:
    if: ${{ github.actor != 'github-actions[bot]' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Decode and apply reviewed patch
        id: apply-patch
        continue-on-error: true
        run: |
          mkdir -p build
          {
            ls -l build/review-hardening.patch.gz.b64.part*
            sha256sum build/review-hardening.patch.gz.b64.part*
            cat build/review-hardening.patch.gz.b64.part* > /tmp/review-hardening.payload
            wc -c /tmp/review-hardening.payload
            sha256sum /tmp/review-hardening.payload
            base64 --decode /tmp/review-hardening.payload > /tmp/review-hardening.patch.gz
            wc -c /tmp/review-hardening.patch.gz
            sha256sum /tmp/review-hardening.patch.gz
            gzip --decompress --stdout /tmp/review-hardening.patch.gz > /tmp/review-hardening.patch
            wc -c /tmp/review-hardening.patch
            sha256sum /tmp/review-hardening.patch
            echo 'ae6ee4b32af592837c1cd1fb12c89677d6d66553febe51cd563bdfc737aad68e  /tmp/review-hardening.patch' \
              | sha256sum --check --strict
            git apply --check /tmp/review-hardening.patch
            git apply /tmp/review-hardening.patch
          } > build/review-payload-diagnostics.txt 2>&1
      - name: Upload payload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-payload-diagnostics
          path: build/review-payload-diagnostics.txt
          if-no-files-found: error
          retention-days: 3
      - name: Enforce patch application
        if: steps.apply-patch.outcome == 'failure'
        run: exit 1
      - name: Install project
        run: python -m pip install -e '.[dev,release]'
      - name: Static verification
        run: |
          ruff check src tests
          ruff format --check src tests
          mypy --config-file pyproject.toml
      - name: Focused regression verification
        run: |
          pytest -q \
            tests/methodology/test_evidence_binding.py \
            tests/nodes/test_retrieval.py \
            tests/review/test_consolidated_regressions.py \
            tests/graph/test_full_graph.py \
            tests/graph/test_hitl.py \
            tests/e2e/test_graph_e2e_happy_path.py \
            tests/e2e/test_graph_e2e_method_repair.py \
            tests/ood/test_cases.py
      - name: Commit verified review fixes
        run: |
          git rm .github/workflows/code-review-source-artifact.yml
          git rm .github/workflows/review-hardening-apply-once.yml
          git rm build/review-hardening.patch.gz.b64.part00
          git rm build/review-hardening.patch.gz.b64.part01
          git rm build/review-hardening.patch.gz.b64.part02
          git rm build/review-hardening.patch.gz.b64.part03
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests
          git commit -m 'fix(methodology): bind audits to verified evidence'
          git push origin HEAD:${{ github.head_ref }}
