name: Review Remediation Diagnostics

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - scripts/run_review_remediation.py

permissions:
  contents: write

concurrency:
  group: review-remediation-diagnostics
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: python -m pip install -q -e '.[dev]'

      - name: Execute all offline gates and capture results
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/remediation-diagnostics

          python scripts/run_review_remediation.py > /tmp/remediation-diagnostics/apply.log 2>&1
          APPLY=$?
          if [ "$APPLY" -eq 0 ]; then
            rm -f scripts/.review-remediation-*.b64 scripts/run_review_remediation.py
            rm -f .review-remediation-trigger.json

            mapfile -t files < <(git diff --name-only --diff-filter=ACM | grep -E '\.py$' || true)
            if ((${#files[@]})); then
              ruff format "${files[@]}" > /tmp/remediation-diagnostics/format.log 2>&1
              FORMAT=$?
              ruff check --fix "${files[@]}" > /tmp/remediation-diagnostics/ruff-fix.log 2>&1
              RUFF_FIX=$?
            else
              FORMAT=0
              RUFF_FIX=0
              : > /tmp/remediation-diagnostics/format.log
              : > /tmp/remediation-diagnostics/ruff-fix.log
            fi

            python - <<'PY' > /tmp/remediation-diagnostics/audit.log 2>&1
          from paperagent.benchmark_leakage_audit import audit_benchmark_execution_boundary
          result = audit_benchmark_execution_boundary()
          print(result.model_dump_json(indent=2))
          if not result.passed:
              raise SystemExit(result.findings)
          PY
            AUDIT=$?

            pytest --no-cov -q \
              tests/evals/test_00_production_pilot.py \
              tests/evals/test_benchmark_leakage_audit.py \
              tests/evals/test_claw_benchmark_adapter.py \
              tests/methodology/test_method_design_draft.py \
              tests/review/test_semantic_gap_binding.py \
              tests/review/test_action_mechanism_binding.py \
              tests/review/test_research_contract_priority.py \
              tests/literature/test_source_selection_policy.py \
              tests/nodes/test_synthesis_method_quality_report.py \
              > /tmp/remediation-diagnostics/targeted.log 2>&1
            TARGETED=$?

            pytest --no-cov -q > /tmp/remediation-diagnostics/full.log 2>&1
            FULL=$?
            mypy --config-file pyproject.toml > /tmp/remediation-diagnostics/mypy.log 2>&1
            MYPY=$?
            ruff check src tests scripts > /tmp/remediation-diagnostics/ruff.log 2>&1
            RUFF=$?
            ruff format --check src tests scripts > /tmp/remediation-diagnostics/format-check.log 2>&1
            FORMAT_CHECK=$?
          else
            FORMAT=99; RUFF_FIX=99; AUDIT=99; TARGETED=99; FULL=99; MYPY=99; RUFF=99; FORMAT_CHECK=99
            for name in format ruff-fix audit targeted full mypy ruff format-check; do
              echo "skipped because remediation apply failed" > "/tmp/remediation-diagnostics/$name.log"
            done
          fi

          export APPLY FORMAT RUFF_FIX AUDIT TARGETED FULL MYPY RUFF FORMAT_CHECK
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path('/tmp/remediation-diagnostics')
          names = ['apply', 'format', 'ruff-fix', 'audit', 'targeted', 'full', 'mypy', 'ruff', 'format-check']
          codes = {
              'apply': int(os.environ['APPLY']),
              'format': int(os.environ['FORMAT']),
              'ruff_fix': int(os.environ['RUFF_FIX']),
              'audit': int(os.environ['AUDIT']),
              'targeted': int(os.environ['TARGETED']),
              'full': int(os.environ['FULL']),
              'mypy': int(os.environ['MYPY']),
              'ruff': int(os.environ['RUFF']),
              'format_check': int(os.environ['FORMAT_CHECK']),
          }
          tails = {}
          for name in names:
              text = (root / f'{name}.log').read_text(errors='replace')
              tails[name] = '\n'.join(text.splitlines()[-80:])
          payload = {
              'schema': 'paperagent.review-remediation-diagnostics.v1',
              'source_sha': os.environ['GITHUB_SHA'],
              'exit_codes': codes,
              'log_tails': tails,
          }
          Path('/tmp/remediation-diagnostics.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + '\n'
          )
          print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
          PY

      - name: Commit diagnostics only
        if: always()
        run: |
          git reset --hard HEAD
          cp /tmp/remediation-diagnostics.json evals/claw_academic_tailoring_v1/live-probes/review-remediation-diagnostics.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add evals/claw_academic_tailoring_v1/live-probes/review-remediation-diagnostics.json
          git commit -m "ci(eval): record remediation gate diagnostics"
          git push origin HEAD:feat/claw-live-search-runtime
