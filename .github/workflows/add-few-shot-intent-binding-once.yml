name: Add Few-Shot Intent Binding Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/add-few-shot-intent-binding-once.yml"

permissions:
  contents: write

concurrency:
  group: add-few-shot-intent-binding-once
  cancel-in-progress: true

jobs:
  patch-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply narrow few-shot intent baseline-candidate rule
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          source = Path("src/paperagent/evidence_gap_binding.py")
          marker = '''def _mechanism_role_support(text: str) -> bool:
          '''
          helper = '''def _few_shot_intent_baseline_candidate_support(text: str) -> bool:
              """Recognize evaluated few-shot intent methods as baseline-candidate evidence.

              This does not assert reproduction or baseline parity. It only permits a verified,
              task-matched method paper to seed baseline selection when its abstract reports an
              evaluated method but omits explicit metric or comparison wording.
              """

              few_shot = any(
                  cue in text
                  for cue in (
                      "few-shot",
                      "few shot",
                      "low-resource",
                      "low resource",
                      "k-shot",
                      "prototypical",
                  )
              )
              intent_task = any(
                  cue in text
                  for cue in (
                      "intent classification",
                      "intent detection",
                      "intent recognition",
                      "multi-label intent",
                      "multilabel intent",
                      "user intent",
                  )
              )
              method_structure = any(
                  cue in text
                  for cue in (
                      "we propose",
                      "we introduce",
                      "framework",
                      "network",
                      "model",
                      "approach",
                      "method",
                      "learning",
                  )
              )
              evaluation = any(
                  cue in text
                  for cue in (
                      "experiment",
                      "experimental",
                      "evaluate",
                      "evaluation",
                      "dataset",
                      "benchmark",
                      "result",
                      "performance",
                  )
              )
              return few_shot and intent_task and method_structure and evaluation


          def _mechanism_role_support(text: str) -> bool:
          '''
          replace_once(source, marker, helper)
          replace_once(
              source,
              '''    if role == "baseline":
                  return _baseline_role_support(text)
          ''',
              '''    if role == "baseline":
                  return _baseline_role_support(text) or _few_shot_intent_baseline_candidate_support(
                      text
                  )
          ''',
          )

          test_path = Path("tests/review/test_few_shot_intent_binding.py")
          test_path.write_text(
              '''from __future__ import annotations

          from datetime import UTC, datetime

          import pytest

          from paperagent.evidence_gap_binding import (
              _few_shot_intent_baseline_candidate_support,
              build_evidence_ledger,
          )
          from paperagent.schemas import (
              EvidenceBundle,
              EvidenceGap,
              EvidenceItem,
              ResearchPlan,
              ResearchRequest,
          )
          from paperagent.schemas.plan import SearchQuery


          @pytest.mark.parametrize(
              ("text", "expected"),
              [
                  (
                      "We propose a prototypical network for few-shot intent detection. "
                      "Experiments on benchmark datasets evaluate the model under low-resource settings.",
                      True,
                  ),
                  (
                      "We propose a prototypical network for few-shot image classification and "
                      "evaluate it on visual benchmark datasets.",
                      False,
                  ),
                  (
                      "A few-shot object detection network is evaluated on detection benchmarks.",
                      False,
                  ),
                  (
                      "We propose a prototypical network for few-shot intent detection.",
                      False,
                  ),
              ],
          )
          def test_few_shot_intent_baseline_candidate_guard(text: str, expected: bool) -> None:
              assert _few_shot_intent_baseline_candidate_support(text.casefold()) is expected


          def test_evaluated_few_shot_intent_method_seeds_cross_gap_binding() -> None:
              baseline = EvidenceGap(
                  gap_id="baseline_comparison",
                  description="baseline comparison and reproducible few-shot intent method candidate",
              )
              mechanism = EvidenceGap(
                  gap_id="mechanism_limitation",
                  description="mechanism and limitation evidence for adjacent intent confusion",
              )
              risk = EvidenceGap(
                  gap_id="risk_negative_evidence",
                  description="risk and negative evidence for open-set or confusing intents",
              )
              plan = ResearchPlan(
                  status="ready",
                  problem_statement="few-shot industry intent classification",
                  scope="low-resource text intent detection with adjacent classes",
                  evidence_gaps=[baseline, mechanism, risk],
                  search_queries=[
                      SearchQuery(
                          query_id="q1",
                          gap_id=baseline.gap_id,
                          query="few-shot intent classification prototypical network",
                          source_types=["paper"],
                      ),
                      SearchQuery(
                          query_id="q2",
                          gap_id=mechanism.gap_id,
                          query="few-shot intent classification contrastive learning label semantics",
                          source_types=["paper"],
                      ),
                      SearchQuery(
                          query_id="q3",
                          gap_id=risk.gap_id,
                          query="few-shot intent detection open set out-of-scope",
                          source_types=["paper"],
                      ),
                  ],
                  success_criteria=["select a task-matched baseline candidate before reproduction"],
                  risks=["open-set requirement and shots per class remain unresolved"],
              )
              item = EvidenceItem(
                  evidence_id="ev-few-shot-intent-method",
                  source_type="paper",
                  title="Semantic Transportation Prototypical Network for Few-Shot Intent Detection",
                  locator="https://example.org/few-shot-intent",
                  retrieved_at=datetime(2026, 7, 20, tzinfo=UTC),
                  verification_status="accepted",
                  supports_gap_ids=[baseline.gap_id],
                  summary=(
                      "Few-shot intent detection is challenged by confusion among semantically "
                      "adjacent intents. We propose a prototypical network with semantic "
                      "transportation learning. Experiments on benchmark datasets evaluate the "
                      "method under low-resource settings and analyze this challenge."
                  ),
                  content_hash="sha256:few-shot-intent-method",
                  provider="literature_retrieval",
                  metadata={
                      "candidate_gap_ids": baseline.gap_id,
                      "query_text": "few-shot intent classification prototypical network",
                  },
              )
              _, _, _, supports, ledger = build_evidence_ledger(
                  request=ResearchRequest(question="小样本行业文本意图识别"),
                  plan=plan,
                  evidence=EvidenceBundle(
                      items=[item],
                      accepted_ids=[item.evidence_id],
                      identity_verified_ids=[item.evidence_id],
                      coverage_by_gap={baseline.gap_id: 1},
                  ),
              )
              accepted = {
                  support.gap_id for support in supports if support.decision == "accept"
              }
              assert ledger.accepted_ids == [item.evidence_id]
              assert accepted == {
                  baseline.gap_id,
                  mechanism.gap_id,
                  risk.gap_id,
              }
          ''',
              encoding="utf-8",
          )

          gate = Path(".github/workflows/second-batch-retrieval-offline-gate.yml")
          replace_once(
              gate,
              '''      - "tests/review/test_research_contract_priority.py"
          ''',
              '''      - "tests/review/test_research_contract_priority.py"
                - "tests/review/test_few_shot_intent_binding.py"
          ''',
          )
          replace_once(
              gate,
              '''            tests/review/test_research_contract_priority.py
          ''',
              '''            tests/review/test_research_contract_priority.py
                      tests/review/test_few_shot_intent_binding.py
          ''',
          )
          replace_once(
              gate,
              '''            tests/review/test_research_contract_priority.py \\
                      tests/nodes/test_retrieval.py \\
          ''',
              '''            tests/review/test_research_contract_priority.py \\
                      tests/review/test_few_shot_intent_binding.py \\
                      tests/nodes/test_retrieval.py \\
          ''',
          )

          single = Path(".github/workflows/claw-single-case-live-repair.yml")
          replace_once(
              single,
              '''            tests/review/test_research_contract_priority.py
          ''',
              '''            tests/review/test_research_contract_priority.py
                      tests/review/test_few_shot_intent_binding.py
          ''',
          )
          replace_once(
              single,
              '''            tests/review/test_research_contract_priority.py \\
                      tests/graph/test_full_graph.py \\
          ''',
              '''            tests/review/test_research_contract_priority.py \\
                      tests/review/test_few_shot_intent_binding.py \\
                      tests/graph/test_full_graph.py \\
          ''',
          )

          batch = Path(".github/workflows/claw-four-case-live-batch.yml")
          replace_once(
              batch,
              '''            tests/review/test_semantic_gap_binding.py
          ''',
              '''            tests/review/test_semantic_gap_binding.py
                      tests/review/test_few_shot_intent_binding.py
          ''',
          )
          replace_once(
              batch,
              '''            tests/review/test_semantic_gap_binding.py \\
                      tests/review/test_consolidated_regressions.py \\
          ''',
              '''            tests/review/test_semantic_gap_binding.py \\
                      tests/review/test_few_shot_intent_binding.py \\
                      tests/review/test_consolidated_regressions.py \\
          ''',
          )
          PY
          ruff format src/paperagent/evidence_gap_binding.py tests/review/test_few_shot_intent_binding.py
      - name: Verify transaction
        run: |
          ruff check \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_few_shot_intent_binding.py
          ruff format --check --diff \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_few_shot_intent_binding.py
          mypy --config-file pyproject.toml
          pytest -q \
            tests/review/test_few_shot_intent_binding.py \
            tests/literature/test_third_batch_query_precision.py \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_consolidated_regressions.py \
            tests/nodes/test_retrieval.py
      - name: Commit verified patch and remove one-off workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_few_shot_intent_binding.py \
            .github/workflows/second-batch-retrieval-offline-gate.yml \
            .github/workflows/claw-single-case-live-repair.yml \
            .github/workflows/claw-four-case-live-batch.yml
          git rm .github/workflows/add-few-shot-intent-binding-once.yml
          git commit -m "fix(evidence): accept evaluated few-shot intent baseline candidates"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
