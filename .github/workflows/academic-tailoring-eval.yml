name: Academic Tailoring Agent Evaluation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Python ${{ matrix.python-version }} academic tailoring verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,release]'
      - name: Ruff lint
        id: ruff-lint
        continue-on-error: true
        run: |
          mkdir -p build
          ruff check . > build/academic-tailoring-ruff-lint.txt 2>&1
      - name: Ruff format
        id: ruff-format
        continue-on-error: true
        run: ruff format --check --diff . > build/academic-tailoring-ruff-format.txt 2>&1
      - name: Upload quality diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: academic-tailoring-quality-${{ matrix.python-version }}
          path: |
            build/academic-tailoring-ruff-lint.txt
            build/academic-tailoring-ruff-format.txt
          if-no-files-found: error
      - name: Enforce Ruff
        if: steps.ruff-lint.outcome == 'failure' || steps.ruff-format.outcome == 'failure'
        run: exit 1
      - name: Strict Mypy
        id: mypy
        continue-on-error: true
        run: mypy --config-file pyproject.toml > build/academic-tailoring-mypy.txt 2>&1
      - name: Upload type diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: academic-tailoring-mypy-${{ matrix.python-version }}
          path: build/academic-tailoring-mypy.txt
          if-no-files-found: error
      - name: Enforce Mypy
        if: steps.mypy.outcome == 'failure'
        run: exit 1
      - name: Tests and branch coverage
        run: pytest --cov=paperagent --cov-branch --cov-report=term-missing -q

  evaluate:
    name: Generate academic tailoring corpus evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Generate and grade corpus
        run: |
          python scripts/run_academic_tailoring_eval.py \
            --output-dir build/academic-tailoring-eval
      - name: Run propose operation through plugin CLI
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from paperagent.academic_tailoring_fixtures import load_tailoring_task_bundle
          task = load_tailoring_task_bundle(Path('evals/academic_tailoring/npc'))
          Path('build/academic-tailoring-task.json').write_text(
              json.dumps(task.model_dump(mode='json'), ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
          paperagent plugins run academic-method-tailoring \
            --operation propose \
            --input build/academic-tailoring-task.json \
            --output build/academic-tailoring-plugin-output.json
      - name: Upload Agent evaluation data
        uses: actions/upload-artifact@v4
        with:
          name: academic-tailoring-agent-evaluation
          path: build/
          if-no-files-found: error

  finalize-v3:
    name: Finalize Gate L v3 branch changes
    if: github.head_ref == 'fix/gate-l-v3-acceptance-routing' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply secure Ollama compatibility
        run: |
          python - <<'PY'
          from pathlib import Path

          runtime = Path('src/paperagent/providers/runtime.py')
          text = runtime.read_text(encoding='utf-8')
          if '    OLLAMA = "ollama"\n' not in text:
              text = text.replace(
                  '    DEEPSEEK = "deepseek"\n',
                  '    DEEPSEEK = "deepseek"\n    OLLAMA = "ollama"\n',
              )
          old = '''        parsed = urlsplit(self.base_url)
        if (
            parsed.scheme != "https"
            or not parsed.hostname
            or parsed.username is not None
            or parsed.password is not None
            or parsed.query
            or parsed.fragment
        ):
            raise ValueError(
                "base_url must be an HTTPS origin/path without credentials or query data"
            )
'''
          new = '''        parsed = urlsplit(self.base_url)
        loopback_http = (
            parsed.scheme == "http"
            and parsed.hostname in {"localhost", "127.0.0.1", "::1"}
        )
        secure_remote = parsed.scheme == "https"
        if (
            not (secure_remote or loopback_http)
            or not parsed.hostname
            or parsed.username is not None
            or parsed.password is not None
            or parsed.query
            or parsed.fragment
        ):
            raise ValueError(
                "base_url must use HTTPS, except HTTP loopback endpoints without "
                "credentials or query data"
            )
'''
          if old in text:
              text = text.replace(old, new)
          elif 'loopback_http = (' not in text:
              raise SystemExit('runtime URL validation block changed unexpectedly')
          runtime.write_text(text, encoding='utf-8')

          config = Path('src/paperagent/providers/config.py')
          text = config.read_text(encoding='utf-8')
          old = '''    default_base_url = (
        "https://api.mistral.ai/v1"
        if provider_name is LLMProviderName.MISTRAL
        else "https://api.openai.com/v1"
    )
'''
          new = '''    if provider_name is LLMProviderName.MISTRAL:
        default_base_url = "https://api.mistral.ai/v1"
    elif provider_name is LLMProviderName.OLLAMA:
        default_base_url = "http://127.0.0.1:11434/v1"
    else:
        default_base_url = "https://api.openai.com/v1"
'''
          if old in text:
              text = text.replace(old, new)
          elif 'provider_name is LLMProviderName.OLLAMA' not in text:
              raise SystemExit('provider base URL block changed unexpectedly')
          old = '''    if provider_name is LLMProviderName.MISTRAL:
        api_key = values.get("MISTRAL_API_KEY")
        credential_name = "MISTRAL_API_KEY"
    else:
        api_key = values.get("PAPERAGENT_OPENAI_API_KEY") or values.get("OPENAI_API_KEY")
        credential_name = "PAPERAGENT_OPENAI_API_KEY or OPENAI_API_KEY"
'''
          new = '''    if provider_name is LLMProviderName.MISTRAL:
        api_key = values.get("MISTRAL_API_KEY")
        credential_name = "MISTRAL_API_KEY"
    elif provider_name is LLMProviderName.OLLAMA:
        api_key = (
            values.get("PAPERAGENT_OPENAI_API_KEY")
            or values.get("OPENAI_API_KEY")
            or "ollama-local"
        )
        credential_name = "optional local Ollama API key"
    else:
        api_key = values.get("PAPERAGENT_OPENAI_API_KEY") or values.get("OPENAI_API_KEY")
        credential_name = "PAPERAGENT_OPENAI_API_KEY or OPENAI_API_KEY"
'''
          if old in text:
              text = text.replace(old, new)
          elif 'or "ollama-local"' not in text:
              raise SystemExit('provider credential block changed unexpectedly')
          config.write_text(text, encoding='utf-8')

          factory = Path('src/paperagent/providers/runtime_factory.py')
          text = factory.read_text(encoding='utf-8')
          old = '    if config.provider in {LLMProviderName.OPENAI, LLMProviderName.DEEPSEEK}:\n'
          new = '''    if config.provider in {
        LLMProviderName.OPENAI,
        LLMProviderName.DEEPSEEK,
        LLMProviderName.OLLAMA,
    }:
'''
          if old in text:
              text = text.replace(old, new)
          elif 'LLMProviderName.OLLAMA' not in text:
              raise SystemExit('runtime factory block changed unexpectedly')
          factory.write_text(text, encoding='utf-8')
          PY
      - name: Add Ollama regression tests
        run: |
          cat > tests/providers/test_ollama_compatibility.py <<'PY'
          from __future__ import annotations

          import pytest
          from pydantic import SecretStr, ValidationError

          from paperagent.providers.config import load_provider_config
          from paperagent.providers.openai_llm import OpenAILLMProvider
          from paperagent.providers.runtime import LLMProviderName, ProviderRuntimeConfig
          from paperagent.providers.runtime_factory import build_llm_provider


          def test_ollama_loopback_http_is_allowed() -> None:
              config = ProviderRuntimeConfig(
                  provider=LLMProviderName.OLLAMA,
                  model="local-model",
                  api_key=SecretStr("ollama-local"),
                  base_url="http://127.0.0.1:11434/v1",
              )
              assert config.provider is LLMProviderName.OLLAMA


          def test_remote_plain_http_remains_rejected() -> None:
              with pytest.raises(ValidationError):
                  ProviderRuntimeConfig(
                      provider=LLMProviderName.OPENAI,
                      model="remote-model",
                      api_key=SecretStr("key"),
                      base_url="http://example.com/v1",
                  )


          def test_ollama_config_uses_local_defaults_without_real_secret() -> None:
              config = load_provider_config(
                  environ={
                      "PAPERAGENT_LLM_PROVIDER": "ollama",
                      "PAPERAGENT_LLM_MODEL": "qwen-local",
                  }
              )
              assert config.base_url == "http://127.0.0.1:11434/v1"
              assert config.api_key.get_secret_value() == "ollama-local"


          def test_ollama_uses_openai_compatible_adapter() -> None:
              config = ProviderRuntimeConfig(
                  provider=LLMProviderName.OLLAMA,
                  model="local-model",
                  api_key=SecretStr("ollama-local"),
                  base_url="http://localhost:11434/v1",
              )
              assert isinstance(build_llm_provider(config), OpenAILLMProvider)
          PY
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Format Gate L and provider files
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/compare_gate_l_variants.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '            "on a fresh confirmation holdout. Do not report same-holdout selection as final acceptance."\n',
              '            "on a fresh confirmation holdout. Do not report same-holdout selection "\n'
              '            "as final acceptance."\n',
          )
          path.write_text(text, encoding='utf-8')
          PY
          files=(
            scripts/run_gate_l_execution.py
            scripts/_create_stub_reviews.py
            scripts/_grade_deterministic.py
            scripts/gate_l_acceptance_v3.py
            scripts/assemble_gate_l_v3_summary.py
            scripts/compare_gate_l_variants.py
            scripts/run_gate_l_variant.py
            tests/evals/test_gate_l_acceptance_v3.py
            src/paperagent/providers/runtime.py
            src/paperagent/providers/config.py
            src/paperagent/providers/runtime_factory.py
            tests/providers/test_ollama_compatibility.py
          )
          ruff format "${files[@]}"
          ruff check --fix "${files[@]}"
          ruff format "${files[@]}"
      - name: Targeted verification
        run: |
          mypy \
            scripts/gate_l_acceptance_v3.py \
            scripts/assemble_gate_l_v3_summary.py \
            scripts/compare_gate_l_variants.py \
            scripts/run_gate_l_variant.py \
            src/paperagent/providers \
            tests/providers/test_ollama_compatibility.py
          pytest -q \
            tests/evals/test_gate_l_acceptance_v3.py \
            tests/providers/test_ollama_compatibility.py
      - name: Commit verified changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts src/paperagent/providers tests/evals/test_gate_l_acceptance_v3.py tests/providers/test_ollama_compatibility.py
          git commit -m 'fix(gate-l): finalize v3 acceptance and Ollama compatibility'
          git push origin HEAD:${{ github.head_ref }}
