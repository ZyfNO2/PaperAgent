name: Methodology Lint Fix Once

on:
  pull_request:
    branches: [fix/gate-l-v3-acceptance-routing]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.head_ref == 'fix/academic-tailoring-contract-convergence' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Split non-auto-formatable long strings
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/paperagent/academic_methodology.py')
          text = path.read_text(encoding='utf-8').replace('from typing import Any\n\n', '')
          replacements = {
              '            "research contract includes problem, setting, metric, constraints, claim, observation, and mechanism",\n':
              '            (\n                "research contract includes problem, setting, metric, constraints, "\n                "claim, observation, and mechanism"\n            ),\n',
              '            "baseline card records source, version, license, data split, environment, seed policy, and fingerprints",\n':
              '            (\n                "baseline card records source, version, license, data split, "\n                "environment, seed policy, and fingerprints"\n            ),\n',
              '            "baseline provenance references verified evidence with a stable identifier and supported claims",\n':
              '            (\n                "baseline provenance references verified evidence with a stable "\n                "identifier and supported claims"\n            ),\n',
              '            "hypothesis states condition, limitation, mechanism, intervention, metric change, and guardrail",\n':
              '            (\n                "hypothesis states condition, limitation, mechanism, intervention, "\n                "metric change, and guardrail"\n            ),\n',
              '                f"module {module.name} has semantic, shape, ordering, switch, gradient, update, loss-scale, cost, effect, assumption, parity, and failure contracts",\n':
              '                (\n                    f"module {module.name} has semantic, shape, ordering, switch, "\n                    "gradient, update, loss-scale, cost, effect, assumption, parity, "\n                    "and failure contracts"\n                ),\n',
              '                f"module {module.name} references verified provenance with a stable identifier and supported claims",\n':
              '                (\n                    f"module {module.name} references verified provenance with a "\n                    "stable identifier and supported claims"\n                ),\n',
              '            "at least one strong comparison arm names its comparator, contrast, and verified provenance",\n':
              '            (\n                "at least one strong comparison arm names its comparator, contrast, "\n                "and verified provenance"\n            ),\n',
              '            "multi-module plans include an explicit interaction contrast instead of inferring interaction from the full arm",\n':
              '            (\n                "multi-module plans include an explicit interaction contrast instead "\n                "of inferring interaction from the full arm"\n            ),\n',
              '            "all comparison arms share data and preprocessing and define tuning, metrics, seeds, uncertainty, resources, purpose, and stopping criteria",\n':
              '            (\n                "all comparison arms share data and preprocessing and define tuning, "\n                "metrics, seeds, uncertainty, resources, purpose, and stopping criteria"\n            ),\n',
              '            "run baseline, strong comparison, full, single-module, leave-one-out, interaction, and efficiency comparisons",\n':
              '            (\n                "run baseline, strong comparison, full, single-module, leave-one-out, "\n                "interaction, and efficiency comparisons"\n            ),\n',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'methodology replacement not found: {old[:60]!r}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')

          path = Path('src/paperagent/academic_tailoring_proposal.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '        "baseline, provenance, compatibility, hypothesis, comparisons, interaction analysis, and fair experiments passed the canonical audit",\n':
              '        (\n            "baseline, provenance, compatibility, hypothesis, comparisons, "\n            "interaction analysis, and fair experiments passed the canonical audit"\n        ),\n',
              '                f"module {source.paper_id} lacks a complete training, gradient, switch, or parity contract"\n':
              '                (\n                    f"module {source.paper_id} lacks a complete training, gradient, "\n                    "switch, or parity contract"\n                )\n',
              '            "semantic, shape, ordering, switch, gradient, update, loss-scale, and failure contracts are explicit"\n':
              '            (\n                "semantic, shape, ordering, switch, gradient, update, loss-scale, "\n                "and failure contracts are explicit"\n            )\n',
              '            "novelty is stated as module composition rather than a falsifiable problem-method-insight contribution"\n':
              '            (\n                "novelty is stated as module composition rather than a falsifiable "\n                "problem-method-insight contribution"\n            )\n',
              '            purpose="reconfirm the reproduced baseline and modules-disabled parity under fixed evaluation code",\n':
              '            purpose=(\n                "reconfirm the reproduced baseline and modules-disabled parity "\n                "under fixed evaluation code"\n            ),\n',
              '        f"{item.metric} should {item.direction.value} from {item.baseline_value:g} toward {item.target_value:g}"\n':
              '        (\n            f"{item.metric} should {item.direction.value} from "\n            f"{item.baseline_value:g} toward {item.target_value:g}"\n        )\n',
              '                "the contribution is unsupported if the full arm does not outperform the frozen baseline and strong comparison, or if single-module, leave-one-out, and interaction contrasts do not support the proposed mechanism"\n':
              '                (\n                    "the contribution is unsupported if the full arm does not "\n                    "outperform the frozen baseline and strong comparison, or if "\n                    "single-module, leave-one-out, and interaction contrasts do not "\n                    "support the proposed mechanism"\n                )\n',
              '            f"{baseline_paper.title} was reproduced as {metric_summary} within {task.reproduction.acceptance_tolerance}"\n':
              '            (\n                f"{baseline_paper.title} was reproduced as {metric_summary} within "\n                f"{task.reproduction.acceptance_tolerance}"\n            )\n',
              '            f"the baseline does not explicitly address {task.mechanism_hypothesis} under {task.scientific_setting}"\n':
              '            (\n                "the baseline does not explicitly address "\n                f"{task.mechanism_hypothesis} under {task.scientific_setting}"\n            )\n',
              '            "run the fixed baseline, strong comparison, single-module, full, leave-one-out, interaction, and efficiency experiments",\n':
              '            (\n                "run the fixed baseline, strong comparison, single-module, full, "\n                "leave-one-out, interaction, and efficiency experiments"\n            ),\n',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'proposal replacement not found: {old[:60]!r}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - run: python -m pip install ruff
      - name: Format and enforce selected files
        run: |
          files=(
            src/paperagent/academic_methodology.py
            src/paperagent/academic_tailoring_proposal.py
            src/paperagent/retrieval/verify_evidence.py
            src/paperagent/schemas/evidence.py
          )
          ruff format "${files[@]}"
          ruff check "${files[@]}"
      - name: Commit lint repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/paperagent
          git commit -m 'style(methodology): satisfy canonical contract lint'
          git push origin HEAD:${{ github.head_ref }}
