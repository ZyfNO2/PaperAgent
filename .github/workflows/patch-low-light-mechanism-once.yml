name: Patch Low-Light Mechanism Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/patch-low-light-mechanism-once.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Patch, verify, and persist result
        shell: bash
        run: |
          set +e
          out="build/low-light-mechanism-patch"
          mkdir -p "$out"
          python - <<'PY' > "$out/patch.log" 2>&1
          from pathlib import Path

          path = Path('src/paperagent/evidence_gap_binding.py')
          text = path.read_text(encoding='utf-8')
          anchor = '            "redundant computation",\n'
          additions = (
              anchor
              + '            "low-light",\n'
              + '            "low light",\n'
              + '            "nighttime",\n'
              + '            "less effective",\n'
              + '            "drawback",\n'
              + '            "low-resolution",\n'
              + '            "low resolution",\n'
              + '            "noise",\n'
              + '            "degradation",\n'
              + '            "background interference",\n'
              + '            "illumination",\n'
              + '            "domain shift",\n'
              + '            "distribution shift",\n'
              + '            "missing modality",\n'
              + '            "modality absence",\n'
              + '            "misregistration",\n'
          )
          if '"background interference",' not in text:
              if anchor not in text:
                  raise RuntimeError('mechanism vocabulary anchor not found')
              text = text.replace(anchor, additions, 1)
          path.write_text(text, encoding='utf-8')
          print('patch-complete')
          PY
          patch_status=$?

          if (( patch_status == 0 )); then
            ruff check --fix \
              src/paperagent/evidence_gap_binding.py \
              src/paperagent/literature/query_concepts.py \
              src/paperagent/literature/query_refinement.py \
              tests/literature/test_second_batch_query_precision.py \
              tests/review/test_low_light_mechanism_binding.py \
              > "$out/ruff.log" 2>&1
            ruff_status=$?
            ruff format \
              src/paperagent/evidence_gap_binding.py \
              src/paperagent/literature/query_concepts.py \
              src/paperagent/literature/query_refinement.py \
              tests/literature/test_second_batch_query_precision.py \
              tests/review/test_low_light_mechanism_binding.py \
              > "$out/format.log" 2>&1
            format_status=$?
            mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
            mypy_status=$?
            pytest -q \
              tests/literature/test_second_batch_query_precision.py \
              tests/literature/test_query_concepts.py \
              tests/literature/test_query_refinement.py \
              tests/review/test_low_light_mechanism_binding.py \
              tests/review/test_semantic_gap_binding.py \
              tests/review/test_consolidated_regressions.py \
              tests/nodes/test_retrieval.py \
              > "$out/pytest.log" 2>&1
            pytest_status=$?
          else
            ruff_status=99
            format_status=99
            mypy_status=99
            pytest_status=99
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if (( patch_status == 0 && ruff_status == 0 && format_status == 0 && mypy_status == 0 && pytest_status == 0 )); then
            git rm .github/workflows/patch-low-light-mechanism-once.yml
            git add \
              src/paperagent/evidence_gap_binding.py \
              src/paperagent/literature/query_concepts.py \
              src/paperagent/literature/query_refinement.py \
              tests/literature/test_second_batch_query_precision.py \
              tests/review/test_low_light_mechanism_binding.py
            git commit -m "fix(evidence): bind domain-specific low-light mechanisms"
          else
            target="evals/claw_academic_tailoring_v1/live-probes/low-light-mechanism-patch-diagnostics.json"
            python - "$target" "$patch_status" "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" <<'PY'
          import json
          from pathlib import Path
          import sys

          out = Path('build/low-light-mechanism-patch')
          payload = {
              'patch': int(sys.argv[2]),
              'ruff': int(sys.argv[3]),
              'format': int(sys.argv[4]),
              'mypy': int(sys.argv[5]),
              'pytest': int(sys.argv[6]),
              'logs': {},
          }
          for name in ('patch', 'ruff', 'format', 'mypy', 'pytest'):
              path = out / f'{name}.log'
              if path.exists():
                  payload['logs'][name] = path.read_text(
                      encoding='utf-8', errors='replace'
                  ).splitlines()[-60:]
          destination = Path(sys.argv[1])
          destination.parent.mkdir(parents=True, exist_ok=True)
          destination.write_text(
              json.dumps(payload, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
            git add "$target"
            git commit -m "chore(evidence): persist low-light patch diagnostics [skip ci]"
          fi
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
          exit $(( patch_status || ruff_status || format_status || mypy_status || pytest_status ))
