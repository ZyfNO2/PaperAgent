name: NVIDIA GLM-5.2 Node Output Observer

on:
  push:
    branches:
      - diag/nvidia-glm52-node-shapes
    paths:
      - "scripts/probe_nvidia_node_output.py"
      - ".github/workflows/nvidia-glm52-node-output-probe.yml"
      - ".github/workflows/nvidia-glm52-node-output-observer.yml"

permissions:
  actions: read
  contents: write

concurrency:
  group: nvidia-glm52-node-output-observer
  cancel-in-progress: true

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_WORKFLOW: nvidia-glm52-node-output-probe.yml
      RESULT_ROOT: artifacts/diagnostics/nvidia_glm52_node_output/latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Locate matching probe run
        id: target
        shell: bash
        run: |
          set -euo pipefail
          run_id=""
          for _ in $(seq 1 90); do
            run_id=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow "$TARGET_WORKFLOW" \
              --branch "$GITHUB_REF_NAME" \
              --event push \
              --limit 30 \
              --json databaseId,headSha \
              --jq ".[] | select(.headSha == \"$GITHUB_SHA\") | .databaseId" \
              | head -n 1)
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 10
          done
          test -n "$run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
      - name: Wait for probe completion
        id: watch
        shell: bash
        run: |
          set +e
          gh run watch "${{ steps.target.outputs.run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --exit-status
          echo "target_exit=$?" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Collect sanitized diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ steps.target.outputs.run_id }}"
          rm -rf "$RESULT_ROOT" build/node-output-download
          mkdir -p "$RESULT_ROOT" build/node-output-download
          gh run view "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url,jobs \
            > "$RESULT_ROOT/run-manifest.json"
          set +e
          gh run download "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --dir build/node-output-download
          download_exit=$?
          set -e
          find build/node-output-download -type f -name '*.json' -print0 \
            | while IFS= read -r -d '' file; do
                cp "$file" "$RESULT_ROOT/$(basename "$file")"
              done
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["RESULT_ROOT"])
          summary = {
              "schema": "paperagent.nvidia-node-output-observer.v1",
              "observer_source_sha": os.environ["GITHUB_SHA"],
              "target_run_id": int(os.environ["TARGET_RUN_ID"]),
              "target_exit": int(os.environ["TARGET_EXIT"]),
              "files": sorted(path.name for path in root.glob("*.json")),
          }
          (root / "observer-summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True), encoding="utf-8"
          )
          PY
        env:
          TARGET_RUN_ID: ${{ steps.target.outputs.run_id }}
          TARGET_EXIT: ${{ steps.watch.outputs.target_exit }}
      - name: Commit diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$RESULT_ROOT"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "test(llm): record NVIDIA node output probe ${{ steps.target.outputs.run_id }} [skip ci]"
          git push origin "HEAD:$GITHUB_REF_NAME"
