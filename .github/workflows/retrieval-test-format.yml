name: Retrieval test format

on:
  pull_request:
    branches:
      - fix/evidence-bound-module-contracts-local

permissions:
  contents: write

jobs:
  format-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Apply safe fixes and formatting
        run: |
          ruff check --fix tests/literature/test_retrieval_resilience_coverage.py tests/literature/test_provider_adapter_coverage.py || true
          ruff format tests/literature/test_retrieval_resilience_coverage.py tests/literature/test_provider_adapter_coverage.py
          ruff check tests/literature/test_retrieval_resilience_coverage.py tests/literature/test_provider_adapter_coverage.py > ruff-test-output.txt 2>&1 || true
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/literature/test_retrieval_resilience_coverage.py tests/literature/test_provider_adapter_coverage.py
          if ! git diff --cached --quiet; then
            git commit -m "style(retrieval): format resilience coverage tests"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: retrieval-test-ruff-output
          path: ruff-test-output.txt
