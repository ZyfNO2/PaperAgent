name: Academic Tailoring Temporary Autofix

on:
  pull_request:

permissions:
  contents: write

jobs:
  autofix:
    if: github.head_ref == 'feat/academic-tailoring-evaluation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply final Ruff fixes
        run: |
          python -m pip install 'ruff>=0.12,<0.13'
          ruff check --fix --unsafe-fixes .
          ruff format .
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m 'style: finish academic tailoring Ruff fixes'
          git push origin HEAD:${{ github.head_ref }}
