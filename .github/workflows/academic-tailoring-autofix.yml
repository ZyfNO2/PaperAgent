name: Academic Tailoring Temporary Autofix

on:
  pull_request:

permissions:
  contents: write

jobs:
  autofix:
    if: github.head_ref == 'feat/academic-tailoring-evaluation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install 'ruff>=0.12,<0.13'
      - name: Apply exact long-line repair
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/paperagent/academic_tailoring.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '    story = AcademicStory(\n',
              '    metric_summary = _format_metric_summary(\n'
              '        task.reproduction.reproduced_metrics\n'
              '    )\n'
              '    story = AcademicStory(\n',
              1,
          )
          text = text.replace(
              '            f"{baseline_paper.title} was reproduced as '
              '{_format_metric_summary(task.reproduction.reproduced_metrics)} "\n',
              '            f"{baseline_paper.title} was reproduced as {metric_summary} "\n',
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply Ruff fixes and formatting
        run: |
          ruff check --fix . || true
          ruff format .
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m 'style: apply academic tailoring Ruff fixes'
          git push origin HEAD:${{ github.head_ref }}
