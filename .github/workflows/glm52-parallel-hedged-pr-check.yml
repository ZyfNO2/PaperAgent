name: GLM-5.2 Parallel Hedged PR Check

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-live-test
    paths:
      - "src/paperagent/providers/**"
      - "scripts/run_academic_tailoring_retrieval_v1_parallel.py"
      - "tests/providers/**"
      - ".github/workflows/glm52-parallel-hedged-pr-check.yml"
      - ".github/workflows/glm52-parallel-hedged-live-test.yml"

permissions:
  contents: read

concurrency:
  group: glm52-parallel-hedged-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  offline-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Test hedging, compatibility parsing, repair, and fail-fast behavior
        run: |
          pytest -q \
            tests/providers/test_hedged_llm_provider.py \
            tests/providers/test_openai_compatible_structured_output.py \
            tests/providers/test_provider_compat_config.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py
      - name: Capture format and lint reports
        shell: bash
        run: |
          mkdir -p build/glm52-parallel-hedged-pr-check
          paths=(
            src/paperagent/providers/config.py
            src/paperagent/providers/hedged.py
            src/paperagent/providers/openai_llm.py
            src/paperagent/providers/structured_output.py
            src/paperagent/providers/runtime_factory.py
            scripts/run_academic_tailoring_retrieval_v1_parallel.py
            tests/providers/test_hedged_llm_provider.py
            tests/providers/test_openai_compatible_structured_output.py
            tests/providers/test_provider_compat_config.py
          )
          set +e
          ruff format --check --diff "${paths[@]}" \
            2>&1 | tee build/glm52-parallel-hedged-pr-check/ruff-format.txt
          echo "${PIPESTATUS[0]}" > build/glm52-parallel-hedged-pr-check/ruff-format-exit-code.txt
          ruff check "${paths[@]}" \
            2>&1 | tee build/glm52-parallel-hedged-pr-check/ruff.txt
          echo "${PIPESTATUS[0]}" > build/glm52-parallel-hedged-pr-check/ruff-exit-code.txt
          exit 0
      - name: Capture type-check report
        shell: bash
        run: |
          set +e
          mypy src/paperagent/providers \
            2>&1 | tee build/glm52-parallel-hedged-pr-check/mypy.txt
          echo "${PIPESTATUS[0]}" > build/glm52-parallel-hedged-pr-check/mypy-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: glm52-parallel-hedged-pr-check-report
          path: build/glm52-parallel-hedged-pr-check/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce format, lint, and type checks
        if: always()
        run: |
          test "$(cat build/glm52-parallel-hedged-pr-check/ruff-format-exit-code.txt)" = "0"
          test "$(cat build/glm52-parallel-hedged-pr-check/ruff-exit-code.txt)" = "0"
          test "$(cat build/glm52-parallel-hedged-pr-check/mypy-exit-code.txt)" = "0"
