name: Finalize Memory RAG tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/paperagent-memory-rag'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/paperagent-memory-rag
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply exact test updates
        run: python .github/scripts/finalize_memory_rag_tests.py
      - name: Format and lint changed tests
        run: |
          python -m pip install 'ruff>=0.12,<0.13'
          ruff format tests/nodes/test_planning_nonblocking.py tests/projects/test_cli.py tests/providers/test_openai_llm_unit.py
          ruff check tests/nodes/test_planning_nonblocking.py tests/projects/test_cli.py tests/providers/test_openai_llm_unit.py
      - name: Commit changes
        shell: bash
        run: |
          git config user.name 'paperagent-ci'
          git config user.email 'paperagent-ci@users.noreply.github.com'
          git add tests/nodes/test_planning_nonblocking.py tests/projects/test_cli.py tests/providers/test_openai_llm_unit.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'test(vertical): finalize memory rag regression contracts'
          git push origin HEAD:refactor/paperagent-memory-rag
