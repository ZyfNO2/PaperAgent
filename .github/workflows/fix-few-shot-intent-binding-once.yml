name: Finalize Verified Case 011 Repair

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/fix-few-shot-intent-binding-once.yml"

permissions:
  contents: write

concurrency:
  group: isolated-case011-role-repair
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply strict Case 011 patch without self-committing
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          path = Path("scripts/clouddev_fix_few_shot_intent_roles.py")
          spec = importlib.util.spec_from_file_location("case011_repair", path)
          if spec is None or spec.loader is None:
              raise SystemExit("unable to load Case 011 repair module")
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          module.patch_source()
          module.write_test()
          module.restore_gate()
          PY
          ruff format \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_few_shot_intent_role_binding.py
      - name: Restore live preflight workflows
        run: |
          git show "8a627ff77522af766265bdbbe2dbd11c0afe79f7:.github/workflows/claw-single-case-live-repair.yml" \
            > .github/workflows/claw-single-case-live-repair.yml
          python - <<'PY'
          from pathlib import Path

          def insert_after(path: Path, anchor: str, addition: str) -> None:
              text = path.read_text(encoding="utf-8")
              if addition.strip() in text:
                  return
              if anchor not in text:
                  raise SystemExit(f"missing anchor in {path}: {anchor!r}")
              path.write_text(text.replace(anchor, anchor + addition, 1), encoding="utf-8")

          single = Path(".github/workflows/claw-single-case-live-repair.yml")
          insert_after(
              single,
              "            tests/review/test_research_contract_priority.py\n",
              "            tests/review/test_few_shot_intent_role_binding.py\n",
          )
          insert_after(
              single,
              "            tests/review/test_research_contract_priority.py \\\n",
              "            tests/review/test_few_shot_intent_role_binding.py \\\n",
          )

          batch = Path(".github/workflows/claw-four-case-live-batch.yml")
          insert_after(
              batch,
              "            tests/review/test_semantic_gap_binding.py\n",
              "            tests/review/test_few_shot_intent_role_binding.py\n",
          )
          insert_after(
              batch,
              "            tests/review/test_semantic_gap_binding.py \\\n",
              "            tests/review/test_few_shot_intent_role_binding.py \\\n",
          )
          PY
      - name: Run deterministic gates
        id: gate
        shell: bash
        run: |
          set +e
          out="build/few-shot-intent-finalize"
          mkdir -p "$out"
          files=(
            src/paperagent/evidence_gap_binding.py
            tests/review/test_few_shot_intent_role_binding.py
          )
          ruff check "${files[@]}" > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check --diff "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/review/test_few_shot_intent_role_binding.py \
            tests/literature/test_third_batch_query_precision.py \
            tests/literature/test_qa_hallucination_precision.py \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_consolidated_regressions.py \
            tests/nodes/test_retrieval.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          target="evals/claw_academic_tailoring_v1/live-probes/few-shot-intent-role-gate-latest.json"
          mkdir -p "$(dirname "$target")"
          python - "$target" "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" <<'PY'
          import json
          import os
          import sys

          payload = {
              "workflow_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "workflow_head_sha": os.environ["GITHUB_SHA"],
              "ruff": int(sys.argv[2]),
              "format": int(sys.argv[3]),
              "mypy": int(sys.argv[4]),
              "pytest": int(sys.argv[5]),
          }
          payload["passed"] = all(
              payload[key] == 0 for key in ("ruff", "format", "mypy", "pytest")
          )
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          if (( ruff_status || format_status || mypy_status || pytest_status )); then
            exit 1
          fi
      - name: Commit verified repair and clean transaction files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f \
            .case011-patch-trigger.json \
            scripts/clouddev_fix_few_shot_intent_roles.py \
            .github/workflows/fix-few-shot-intent-binding-once.yml \
            .github/workflows/add-few-shot-intent-binding-once.yml \
            evals/claw_academic_tailoring_v1/live-probes/case011-role-failure-latest.txt
          git add -A \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_few_shot_intent_role_binding.py \
            .github/workflows/second-batch-retrieval-offline-gate.yml \
            .github/workflows/claw-single-case-live-repair.yml \
            .github/workflows/claw-four-case-live-batch.yml \
            evals/claw_academic_tailoring_v1/live-probes/few-shot-intent-role-gate-latest.json \
            .case011-patch-trigger.json \
            scripts/clouddev_fix_few_shot_intent_roles.py \
            .github/workflows/fix-few-shot-intent-binding-once.yml \
            .github/workflows/add-few-shot-intent-binding-once.yml \
            evals/claw_academic_tailoring_v1/live-probes/case011-role-failure-latest.txt
          git commit -m "fix(evidence): bind verified Case 011 intent role evidence"
          for attempt in 1 2 3 4; do
            git fetch origin feat/claw-live-search-runtime
            if git rebase origin/feat/claw-live-search-runtime && \
               git push origin HEAD:feat/claw-live-search-runtime; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 2))
          done
          exit 1
      - name: Upload finalization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: few-shot-intent-finalize-${{ github.run_id }}
          path: build/few-shot-intent-finalize/
          if-no-files-found: warn
          retention-days: 30
