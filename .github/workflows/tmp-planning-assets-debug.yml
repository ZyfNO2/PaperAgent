name: Temporary Planning Asset Debug

on:
  pull_request:
    branches: [master]
    paths: [".github/workflows/tmp-planning-assets-debug.yml"]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Apply corrected patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/tmp-planning-assets-repair-v2.yml').read_text(encoding='utf-8')
          start = workflow.index('      - name: Apply corrected planning repair\n')
          run_start = workflow.index('        run: |\n', start) + len('        run: |\n')
          end = workflow.index('      - name: Install and verify\n', run_start)
          lines = workflow[run_start:end].splitlines()
          Path('/tmp/apply.sh').write_text(
              '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n',
              encoding='utf-8',
          )
          PY
          bash /tmp/apply.sh
      - name: Install
        run: python -m pip install -q -e '.[dev]'
      - name: Ruff
        run: |
          ruff format --check src/paperagent/nodes/planning.py tests/nodes/test_planning_methodology_assets.py || ruff format src/paperagent/nodes/planning.py tests/nodes/test_planning_methodology_assets.py
          ruff check src/paperagent/nodes/planning.py tests/nodes/test_planning_methodology_assets.py
      - name: Mypy
        run: mypy --strict src/paperagent/nodes/planning.py
      - name: Pytest
        run: pytest -vv tests/nodes/test_planning_methodology_assets.py tests/nodes/test_planning_identity_priority.py
