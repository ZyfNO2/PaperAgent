name: Temporary Planning Pytest Capture

on:
  pull_request:
    branches: [master]
    paths: [".github/workflows/tmp-planning-pytest-capture.yml"]

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Capture pytest output
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/tmp-planning-assets-repair-v2.yml').read_text(encoding='utf-8')
          start = workflow.index('      - name: Apply corrected planning repair\n')
          run_start = workflow.index('        run: |\n', start) + len('        run: |\n')
          end = workflow.index('      - name: Install and verify\n', run_start)
          lines = workflow[run_start:end].splitlines()
          Path('/tmp/apply.sh').write_text(
              '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n',
              encoding='utf-8',
          )
          PY
          bash /tmp/apply.sh
          python -m pip install -q -e '.[dev]'
          ruff format src/paperagent/nodes/planning.py tests/nodes/test_planning_methodology_assets.py
          set +e
          pytest -vv tests/nodes/test_planning_methodology_assets.py tests/nodes/test_planning_identity_priority.py > /tmp/pytest.log 2>&1
          status=$?
          git reset --hard HEAD
          {
            echo "pytest_status=$status"
            tail -n 100 /tmp/pytest.log
          } > PLANNING_PYTEST_DEBUG.txt
          git config user.name "paperagent-repair-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f PLANNING_PYTEST_DEBUG.txt
          git commit -m "chore(debug): capture planning pytest failure"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
