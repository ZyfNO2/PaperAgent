name: Gate L v2 Temporary Test Fixture Fix

on:
  push:
    branches: [scientific-gate-l]
    paths:
      - tests/evals/test_gate_l_v2_acceptance.py
      - .github/workflows/gate-l-v2-test-fixture-fix.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scientific-gate-l
          fetch-depth: 0
      - name: Remove case ID from blinded-review test title fixture
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/evals/test_gate_l_v2_acceptance.py')
          text = path.read_text(encoding='utf-8')
          old = '"title": f"Case {case_id}",'
          new = '"title": f"Independent {category} evaluation case",'
          if old not in text:
              raise SystemExit('expected fixture line not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit fixture correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/evals/test_gate_l_v2_acceptance.py
          git commit -m 'test(gate-l): keep blinded fixture free of case IDs'
          git push origin HEAD:scientific-gate-l
