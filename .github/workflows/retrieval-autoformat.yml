name: Retrieval branch autoformat

on:
  push:
    branches:
      - feat/retrieval-resilience-infrastructure

permissions:
  contents: write

jobs:
  apply-ruff:
    if: ${{ !contains(github.event.head_commit.message, 'style: apply ruff formatting') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/retrieval-resilience-infrastructure
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Apply safe Ruff fixes
        run: ruff check --fix .
      - name: Apply Ruff formatting
        run: ruff format .
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: apply ruff formatting"
          git push origin HEAD:feat/retrieval-resilience-infrastructure
