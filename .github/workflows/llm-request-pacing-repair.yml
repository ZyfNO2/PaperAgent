name: LLM Request Pacing Repair

on:
  push:
    branches:
      - fix/glm52-runtime-hardening-v2
    paths:
      - "scripts/apply_llm_request_pacing_v1.py"
      - ".github/workflows/llm-request-pacing-repair.yml"
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-live-test
    paths:
      - "scripts/apply_llm_request_pacing_v1.py"
      - ".github/workflows/llm-request-pacing-repair.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: llm-request-pacing-repair-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/glm52-runtime-hardening-v2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply pacing patch
        run: python scripts/apply_llm_request_pacing_v1.py
      - name: Format and verify pacing changes
        run: |
          ruff format \
            src/paperagent/providers/runtime.py \
            src/paperagent/providers/config.py \
            src/paperagent/providers/runtime_factory.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/request_rate_limit.py \
            tests/providers/test_openai_llm_runtime_limits.py
          ruff check \
            src/paperagent/providers/runtime.py \
            src/paperagent/providers/config.py \
            src/paperagent/providers/runtime_factory.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/request_rate_limit.py \
            tests/providers/test_openai_llm_runtime_limits.py
          pytest -q tests/providers/test_openai_llm_runtime_limits.py
          mypy --config-file pyproject.toml src/paperagent/providers
          git diff --check
      - name: Commit verified pacing changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/paperagent/providers/runtime.py \
            src/paperagent/providers/config.py \
            src/paperagent/providers/runtime_factory.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/request_rate_limit.py \
            tests/providers/test_openai_llm_runtime_limits.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(llm): pace NVIDIA requests at forty per minute"
          git push origin HEAD:fix/glm52-runtime-hardening-v2
