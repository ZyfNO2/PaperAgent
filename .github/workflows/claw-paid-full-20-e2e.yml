name: CLAW Review Remediation Runner

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".review-remediation-trigger.json"

permissions:
  contents: write

concurrency:
  group: claw-review-remediation
  cancel-in-progress: false

jobs:
  remediate-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      PAPERAGENT_CONTACT_EMAIL_SECRET: ${{ secrets.PAPERAGENT_CONTACT_EMAIL }}
      PAPERAGENT_CONTACT_EMAIL: ${{ secrets.PAPERAGENT_CONTACT_EMAIL || 'Z1015558261@outlook.com' }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
      PAPERAGENT_LLM_PROVIDER: mistral
      PAPERAGENT_LLM_MODEL: mistral-small-latest
      PAPERAGENT_MISTRAL_MODEL: mistral-small-latest
      PAPERAGENT_LLM_BASE_URL: https://api.mistral.ai/v1
      PAPERAGENT_LLM_PRICE_TABLE: config/llm-prices/mistral-small-latest.json
      PAPERAGENT_LLM_MAX_COST_USD: "1.00"
      PAPERAGENT_LLM_MAX_ATTEMPTS: "2"
      PAPERAGENT_LLM_MAX_CALLS: "12"
      PAPERAGENT_LLM_MAX_INPUT_TOKENS_PER_TASK: "32000"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_CALL: "4096"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_TASK: "16384"
      PAPERAGENT_LLM_TASK_TIMEOUT: "900"
      PAPERAGENT_ENABLE_WEB_SEARCH: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: python -m pip install -q -e '.[dev]'

      - name: Apply review remediation
        run: |
          python scripts/run_review_remediation.py
          rm -f scripts/.review-remediation-*.b64 scripts/run_review_remediation.py

      - name: Format changed Python files
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only --diff-filter=ACM | grep -E '\.py$' || true)
          if ((${#files[@]})); then
            ruff format "${files[@]}"
            ruff check --fix "${files[@]}"
          fi

      - name: Static leakage audit
        run: |
          python - <<'PY'
          from paperagent.benchmark_leakage_audit import audit_benchmark_execution_boundary
          result = audit_benchmark_execution_boundary()
          print(result.model_dump_json(indent=2))
          if not result.passed:
              raise SystemExit(result.findings)
          PY

      - name: Targeted regression
        run: |
          pytest -q \
            tests/evals/test_benchmark_leakage_audit.py \
            tests/evals/test_claw_benchmark_adapter.py \
            tests/methodology/test_method_design_draft.py \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_action_mechanism_binding.py \
            tests/review/test_research_contract_priority.py \
            tests/literature/test_source_selection_policy.py \
            tests/nodes/test_synthesis_method_quality_report.py

      - name: Full offline regression
        run: pytest -q

      - name: Type check and final lint
        run: |
          mypy --config-file pyproject.toml
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Real Mistral smoke
        id: mistral
        if: env.MISTRAL_API_KEY != ''
        env:
          PAPERAGENT_RUN_REAL_LLM: "1"
        run: pytest -q tests/real_provider/test_mistral_smoke.py

      - name: Real literature smoke
        id: literature
        if: steps.mistral.outcome == 'success'
        env:
          PAPERAGENT_RUN_REAL_PROVIDER: "1"
        run: pytest -q tests/real_provider/test_literature_smoke.py

      - name: Contaminated development benchmark regression
        id: development_benchmark
        if: steps.mistral.outcome == 'success' && steps.literature.outcome == 'success'
        continue-on-error: true
        run: |
          python scripts/run_claw_academic_runtime.py \
            --search-mode literature \
            --max-cases 20 \
            --max-llm-calls 12 \
            --provider-call-budget 200 \
            --minimum-score 80 \
            --llm-provider mistral \
            --llm-model mistral-small-latest \
            --llm-price-table "$PAPERAGENT_LLM_PRICE_TABLE" \
            --output-dir build/review-remediation-development-20

      - name: Record verification handoff
        if: always()
        env:
          MISTRAL_OUTCOME: ${{ steps.mistral.outcome }}
          LITERATURE_OUTCOME: ${{ steps.literature.outcome }}
          DEVELOPMENT_OUTCOME: ${{ steps.development_benchmark.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path('build/review-remediation-development-20/execution-summary.json')
          summary = json.loads(summary_path.read_text()) if summary_path.exists() else None
          payload = {
              'schema': 'paperagent.review-remediation-handoff.v1',
              'source_sha': os.environ['GITHUB_SHA'],
              'original_20_status': 'development benchmark / contaminated evaluation set',
              'offline_regression': 'success',
              'mistral_smoke': os.environ.get('MISTRAL_OUTCOME'),
              'literature_smoke': os.environ.get('LITERATURE_OUTCOME'),
              'development_benchmark_step': os.environ.get('DEVELOPMENT_OUTCOME'),
              'development_benchmark_summary': summary,
              'private_holdout': 'pending: seal before first run and replace after any result-informed change',
          }
          target = Path('evals/claw_academic_tailoring_v1/live-probes/review-remediation-latest.json')
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + '\n')
          print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
          PY

      - name: Restore workflow, clean bootstrap, and commit
        if: success()
        run: |
          git show 931ac1eb6604880ca4b3cb7991b4a7f35baa41e4:.github/workflows/claw-paid-full-20-e2e.yml > .github/workflows/claw-paid-full-20-e2e.yml
          rm -f .github/workflows/review-remediation-once.yml
          rm -f .review-remediation-trigger.json
          rm -f scripts/.review-remediation-*.b64 scripts/run_review_remediation.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(eval): remove benchmark-conditioned production logic"
          git push origin HEAD:feat/claw-live-search-runtime
