name: Patch Evidence Import Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/patch-evidence-import-once.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/claw-live-search-runtime
      - name: Route verification through semantic gap binding
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/paperagent/retrieval/verify_evidence.py")
          text = path.read_text(encoding="utf-8")
          old = "from paperagent.evidence_relevance import apply_ledger_to_bundle, build_evidence_ledger"
          new = "from paperagent.evidence_gap_binding import apply_ledger_to_bundle, build_evidence_ledger"
          if old not in text:
              raise SystemExit("expected import was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/paperagent/retrieval/verify_evidence.py
          git commit -m "fix(evidence): enable strict semantic gap binding"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
