name: Trace Replay Cloud

on:
  pull_request:
    paths:
      - "src/paperagent/trace_replay.py"
      - "scripts/run_trace_mutation_eval.py"
      - "evals/cloud_trace/**"
      - "tests/trace_mutation/**"
      - "docs/review/TRACE_REPLAY_MUTATION_HANDOFF.md"
      - ".github/workflows/trace-replay-cloud.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  trace-contract:
    name: Python ${{ matrix.python-version }} trace replay contract
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run static checks
        shell: bash
        run: |
          set +e
          mkdir -p build/trace-replay-cloud
          files=(
            src/paperagent/trace_replay.py
            scripts/run_trace_mutation_eval.py
            tests/trace_mutation/test_trace_mutation_corpus.py
          )
          ruff check "${files[@]}" > build/trace-replay-cloud/ruff.log 2>&1
          ruff_status=$?
          ruff format --check "${files[@]}" > build/trace-replay-cloud/format.log 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > build/trace-replay-cloud/mypy.log 2>&1
          mypy_status=$?
          printf '{"ruff":%s,"format":%s,"mypy":%s}\n' \
            "$ruff_status" "$format_status" "$mypy_status" \
            > build/trace-replay-cloud/static-status.json
          cat build/trace-replay-cloud/static-status.json
          cat build/trace-replay-cloud/ruff.log
          cat build/trace-replay-cloud/format.log
          cat build/trace-replay-cloud/mypy.log
          if (( ruff_status || format_status || mypy_status )); then
            exit 1
          fi
      - name: Run trace mutation tests
        run: |
          mkdir -p build/trace-replay-cloud
          pytest -q tests/trace_mutation/test_trace_mutation_corpus.py \
            --cov=paperagent.trace_replay \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            | tee build/trace-replay-cloud/targeted-pytest.log
      - name: Grade deterministic mutation corpus
        run: |
          python scripts/run_trace_mutation_eval.py \
            --source-commit "${GITHUB_SHA}" \
            --output build/trace-replay-cloud/mutation-report.json \
            | tee build/trace-replay-cloud/mutation-eval.log
      - name: Upload replay evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-replay-${{ matrix.python-version }}-${{ github.run_id }}
          path: build/trace-replay-cloud/
          if-no-files-found: error
          retention-days: 30

  full-regression:
    name: Python 3.12 full offline regression
    needs: trace-contract
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run full test and branch coverage gate
        run: |
          mkdir -p build/trace-replay-cloud
          pytest -q \
            --cov=paperagent \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            | tee build/trace-replay-cloud/full-pytest.log
      - name: Upload full regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-replay-full-${{ github.run_id }}
          path: build/trace-replay-cloud/
          if-no-files-found: error
          retention-days: 30
