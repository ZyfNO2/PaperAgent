name: Add Search Audit Diagnostics Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/add-search-audit-diagnostics-once.yml"

permissions:
  contents: write

concurrency:
  group: add-search-audit-diagnostics-once
  cancel-in-progress: true

jobs:
  patch-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Patch audit diagnostics
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/probe_claw_case_end_to_end.py")
          text = path.read_text(encoding="utf-8")
          old = '''def _search_diagnostics(state: dict[str, Any], adapter: object) -> list[dict[str, object]]:
              retrieval = state.get("retrieval")
              if not isinstance(retrieval, dict):
                  return []
              completed = retrieval.get("completed_query_ids")
              if not isinstance(completed, list):
                  return []
              reader = getattr(adapter, "last_query_diagnostics", None)
              if not callable(reader):
                  return []
              return [
                  value
                  for query_id in completed
                  if isinstance(query_id, str) and isinstance((value := reader(query_id)), dict)
              ]
          '''
          new = '''def _candidate_query_audit(
              state: dict[str, Any],
          ) -> tuple[dict[str, str], dict[str, int]]:
              retrieval = state.get("retrieval")
              if not isinstance(retrieval, dict):
                  return {}, {}
              raw_candidates = retrieval.get("raw_candidates")
              if not isinstance(raw_candidates, list):
                  return {}, {}
              queries: dict[str, str] = {}
              counts: dict[str, int] = {}
              for candidate in raw_candidates:
                  if not isinstance(candidate, dict):
                      continue
                  query_id = candidate.get("query_id")
                  if not isinstance(query_id, str):
                      continue
                  counts[query_id] = counts.get(query_id, 0) + 1
                  metadata = candidate.get("metadata")
                  if not isinstance(metadata, dict):
                      continue
                  query_text = metadata.get("query_text")
                  if isinstance(query_text, str) and query_text.strip():
                      queries.setdefault(query_id, query_text.strip())
              return queries, counts


          def _provider_result_audit(result: object) -> dict[str, object]:
              return {
                  "provider": getattr(result, "provider", None),
                  "status": getattr(result, "status", None),
                  "cache_status": getattr(result, "cache_status", None),
                  "error_code": getattr(result, "error_code", None),
                  "retry_count": getattr(result, "retry_count", 0),
              }


          def _search_diagnostics(state: dict[str, Any], adapter: object) -> list[dict[str, object]]:
              retrieval = state.get("retrieval")
              if not isinstance(retrieval, dict):
                  return []
              completed = retrieval.get("completed_query_ids")
              if not isinstance(completed, list):
                  return []
              reader = getattr(adapter, "last_query_diagnostics", None)
              if not callable(reader):
                  return []
              provider_reader = getattr(adapter, "last_provider_results", None)
              executed_queries, candidate_counts = _candidate_query_audit(state)
              output: list[dict[str, object]] = []
              for query_id in completed:
                  if not isinstance(query_id, str):
                      continue
                  value = reader(query_id)
                  if not isinstance(value, dict):
                      continue
                  provider_results = provider_reader(query_id) if callable(provider_reader) else []
                  audits = [_provider_result_audit(result) for result in provider_results]
                  uncached = sum(
                      audit["cache_status"] in {"miss", "bypass"}
                      and audit["error_code"] != "PROVIDER_CALL_BUDGET_EXHAUSTED"
                      for audit in audits
                  )
                  diagnostic = dict(value)
                  diagnostic.update(
                      {
                          "executed_query": executed_queries.get(query_id),
                          "returned_candidate_count": candidate_counts.get(query_id, 0),
                          "uncached_provider_call_count": uncached,
                          "cache_hit_count": sum(
                              audit["cache_status"] == "hit" for audit in audits
                          ),
                          "coalesced_provider_call_count": sum(
                              audit["cache_status"] == "coalesced" for audit in audits
                          ),
                          "budget_exhausted_call_count": sum(
                              audit["error_code"] == "PROVIDER_CALL_BUDGET_EXHAUSTED"
                              for audit in audits
                          ),
                          "provider_results": audits,
                      }
                  )
                  output.append(diagnostic)
              return output
          '''
          if old not in text:
              raise SystemExit("expected _search_diagnostics block was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          ruff format scripts/probe_claw_case_end_to_end.py
      - name: Verify patch
        run: |
          ruff check scripts/probe_claw_case_end_to_end.py
          ruff format --check --diff scripts/probe_claw_case_end_to_end.py
          mypy --config-file pyproject.toml
          pytest -q \
            tests/literature/test_qa_hallucination_precision.py \
            tests/literature/test_provider_call_budget.py \
            tests/nodes/test_retrieval.py
          python - <<'PY'
          from scripts.probe_claw_case_end_to_end import _search_diagnostics

          class Result:
              provider = "openalex"
              status = "success"
              cache_status = "hit"
              error_code = None
              retry_count = 0

          class Adapter:
              def last_query_diagnostics(self, query_id: str) -> dict[str, object]:
                  return {"query_id": query_id, "attempted_providers": ["openalex"]}

              def last_provider_results(self, query_id: str) -> list[Result]:
                  assert query_id == "q1"
                  return [Result()]

          state = {
              "retrieval": {
                  "completed_query_ids": ["q1"],
                  "raw_candidates": [
                      {
                          "query_id": "q1",
                          "metadata": {"query_text": "exact executed query"},
                      }
                  ],
              }
          }
          diagnostics = _search_diagnostics(state, Adapter())
          assert diagnostics[0]["executed_query"] == "exact executed query"
          assert diagnostics[0]["cache_hit_count"] == 1
          assert diagnostics[0]["uncached_provider_call_count"] == 0
          PY
      - name: Commit patch and remove one-off workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/probe_claw_case_end_to_end.py
          git rm .github/workflows/add-search-audit-diagnostics-once.yml
          git commit -m "feat(eval): expose executed-query and provider-cache audit data"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
