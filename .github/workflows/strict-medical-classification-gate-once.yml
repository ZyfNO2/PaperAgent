name: Strict Medical Classification Gate Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/strict-medical-classification-gate-once.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -q -e '.[dev]'
      - name: Run strict classification checks
        shell: bash
        run: |
          set +e
          out="build/strict-medical-classification"
          mkdir -p "$out"
          files=(
            src/paperagent/literature/query_concepts.py
            src/paperagent/literature/query_refinement.py
            src/paperagent/retrieval/prepare_search.py
            tests/literature/test_second_batch_query_precision.py
            tests/literature/test_query_concepts.py
            tests/literature/test_query_refinement.py
          )
          ruff check "${files[@]}" --output-format=concise > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check --diff "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/literature/test_second_batch_query_precision.py \
            tests/literature/test_query_concepts.py \
            tests/literature/test_query_refinement.py \
            tests/literature/test_prepared_query_contract.py \
            tests/nodes/test_retrieval.py \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_consolidated_regressions.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          target="evals/claw_academic_tailoring_v1/live-probes/strict-medical-classification-gate-latest.json"
          python - "$target" "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" <<'PY'
          import json
          import os
          from pathlib import Path
          import sys

          out = Path("build/strict-medical-classification")
          payload = {
              "workflow_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "workflow_head_sha": os.environ["GITHUB_SHA"],
              "ruff": int(sys.argv[2]),
              "format": int(sys.argv[3]),
              "mypy": int(sys.argv[4]),
              "pytest": int(sys.argv[5]),
              "logs": {},
          }
          payload["passed"] = all(
              payload[key] == 0 for key in ("ruff", "format", "mypy", "pytest")
          )
          if not payload["passed"]:
              for name in ("ruff", "format", "mypy", "pytest"):
                  path = out / f"{name}.log"
                  if path.exists():
                      payload["logs"][name] = path.read_text(
                          encoding="utf-8", errors="replace"
                      ).splitlines()[-80:]
          destination = Path(sys.argv[1])
          destination.parent.mkdir(parents=True, exist_ok=True)
          destination.write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/strict-medical-classification-gate-once.yml
          git add "$target"
          git commit -m "chore(search): persist strict classification gate [skip ci]"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
          if (( ruff_status || format_status || mypy_status || pytest_status )); then
            exit 1
          fi
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-medical-classification-${{ github.run_id }}
          path: build/strict-medical-classification/
          if-no-files-found: error
          retention-days: 30
