name: PaperAgent v0.6 Live LLM Smoke

on:
  workflow_dispatch:
    inputs:
      model:
        description: Mistral model identifier
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: paperagent-v0.6-live-llm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-mistral-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Run opt-in live Mistral smoke
        env:
          PAPERAGENT_RUN_REAL_LLM: "1"
          PAPERAGENT_MISTRAL_MODEL: ${{ inputs.model }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: pytest -q -m 'real_provider and network' tests/real_provider/test_mistral_smoke.py
