name: Academic Tailoring Baseline Qualification Repair

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academic-tailoring-baseline-qualification-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair-and-validate:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply baseline candidate qualification
        run: python scripts/apply_baseline_candidate_qualification_v1.py
      - name: Format and lint changed paths
        run: |
          ruff format \
            src/paperagent/literature/adapter.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/methodology/test_method_design_draft.py
          ruff check --fix \
            src/paperagent/literature/adapter.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/methodology/test_method_design_draft.py
          ruff check \
            src/paperagent/literature/adapter.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/methodology/test_method_design_draft.py
      - name: Run focused baseline and method tests
        run: |
          pytest -q \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/methodology/test_method_design_draft.py \
            tests/review/test_semantic_gap_binding.py
      - name: Remove one-shot patch script
        run: rm -f scripts/apply_baseline_candidate_qualification_v1.py
      - name: Capture full final-tree regression
        shell: bash
        run: |
          mkdir -p build/baseline-qualification-diagnostics
          set +e
          pytest -q > build/baseline-qualification-diagnostics/pytest.log 2>&1
          pytest_status=$?
          mypy --config-file pyproject.toml > build/baseline-qualification-diagnostics/mypy.log 2>&1
          mypy_status=$?
          ruff check src tests scripts > build/baseline-qualification-diagnostics/ruff-check.log 2>&1
          ruff_status=$?
          ruff format --check src tests scripts > build/baseline-qualification-diagnostics/ruff-format.log 2>&1
          format_status=$?
          printf '{"pytest":%s,"mypy":%s,"ruff":%s,"format":%s}\n' \
            "$pytest_status" "$mypy_status" "$ruff_status" "$format_status" \
            > build/baseline-qualification-diagnostics/status.json
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-baseline-qualification-diagnostics
          path: build/baseline-qualification-diagnostics/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce full final-tree regression
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path("build/baseline-qualification-diagnostics/status.json").read_text())
          print(status)
          if any(status.values()):
              raise SystemExit(status)
          PY
      - name: Commit production repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(method): require evidence-bound baseline candidates"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
