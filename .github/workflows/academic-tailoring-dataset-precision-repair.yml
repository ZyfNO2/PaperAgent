name: Academic Tailoring Dataset Precision Repair

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academic-tailoring-dataset-precision-repair-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair-and-validate:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply dataset precision repair
        run: python scripts/apply_dataset_entity_precision_v2.py
      - name: Format and lint changed paths
        run: |
          ruff format \
            src/paperagent/literature/adapter.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py
          ruff check --fix \
            src/paperagent/literature/adapter.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py
          ruff check \
            src/paperagent/literature/adapter.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py
      - name: Run focused production tests
        run: |
          pytest -q \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/literature/test_arxiv_title_query.py \
            tests/literature/test_linked_repository_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/methodology/test_method_design_draft.py \
            tests/review/test_semantic_gap_binding.py
      - name: Remove one-shot controls
        run: |
          rm -f \
            scripts/apply_dataset_entity_precision_v2.py \
            .github/workflows/academic-tailoring-dataset-precision-repair.yml
      - name: Run full final-tree regression
        run: |
          pytest -q
          mypy --config-file pyproject.toml
          ruff check src tests scripts
          ruff format --check src tests scripts
      - name: Commit production repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(retrieval): validate dataset entities and relation anchors"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
