name: Gate L Full Test Diagnostic

on:
  pull_request:
    branches: [scientific-gate-l]

permissions:
  contents: read

jobs:
  pytest-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev,release]'
      - name: Run full suite and capture output
        id: tests
        continue-on-error: true
        run: |
          mkdir -p build
          pytest --cov=paperagent --cov-branch --cov-report=term-missing -vv \
            > build/full-pytest.txt 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-l-full-pytest-diagnostic
          path: build/full-pytest.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce tests
        if: steps.tests.outcome == 'failure'
        run: exit 1
