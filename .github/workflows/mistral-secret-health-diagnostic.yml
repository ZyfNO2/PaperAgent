name: Mistral Secret Health Diagnostic

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mistral-secret-health-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      MISTRAL_BASE_URL: https://api.mistral.ai/v1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run redacted credential checks
        shell: bash
        run: |
          mkdir -p build/mistral-health
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          key = os.environ.get("MISTRAL_API_KEY", "")
          base = os.environ.get("MISTRAL_BASE_URL", "https://api.mistral.ai/v1").rstrip("/")

          def request(method: str, endpoint: str, payload: dict | None = None) -> tuple[int | None, object]:
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              headers = {
                  "Accept": "application/json",
                  "Authorization": f"Bearer {key}",
              }
              if data is not None:
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(base + endpoint, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      raw = response.read().decode("utf-8", errors="replace")
                      return response.status, json.loads(raw) if raw else {}
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  try:
                      body: object = json.loads(raw) if raw else {}
                  except json.JSONDecodeError:
                      body = {"raw_prefix": raw[:200]}
                  return exc.code, body
              except Exception as exc:
                  return None, {"exception_type": type(exc).__name__, "message": str(exc)[:200]}

          def sanitize(value: object) -> dict[str, object]:
              if not isinstance(value, dict):
                  return {"payload_type": type(value).__name__}
              output: dict[str, object] = {}
              for key_name in ("object", "type", "code", "message", "detail", "request_id"):
                  field = value.get(key_name)
                  if isinstance(field, (str, int, float, bool)) or field is None:
                      if key_name in value:
                          output[key_name] = field
              error = value.get("error")
              if isinstance(error, dict):
                  output["error"] = {
                      key_name: field
                      for key_name in ("type", "code", "message", "detail")
                      if isinstance((field := error.get(key_name)), (str, int, float, bool))
                      or field is None
                  }
              data = value.get("data")
              if isinstance(data, list):
                  output["data_count"] = len(data)
              choices = value.get("choices")
              if isinstance(choices, list):
                  output["choices_count"] = len(choices)
              if not output:
                  output["keys"] = sorted(str(item) for item in value.keys())[:20]
              return output

          report: dict[str, object] = {
              "secret_present": bool(key),
              "secret_length": len(key),
          }
          models_status, models_body = request("GET", "/models")
          report["models"] = {
              "status": models_status,
              "response": sanitize(models_body),
          }
          if models_status is not None and 200 <= models_status < 300:
              chat_status, chat_body = request(
                  "POST",
                  "/chat/completions",
                  {
                      "model": "mistral-small-latest",
                      "messages": [{"role": "user", "content": "Reply with OK."}],
                      "max_tokens": 4,
                      "temperature": 0,
                  },
              )
              report["chat_completion"] = {
                  "status": chat_status,
                  "response": sanitize(chat_body),
              }
          Path("build/mistral-health/report.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          print(json.dumps(report, ensure_ascii=False))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mistral-secret-health-diagnostic
          path: build/mistral-health/report.json
          if-no-files-found: error
          retention-days: 3
