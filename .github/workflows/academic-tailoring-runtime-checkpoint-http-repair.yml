name: Academic Tailoring Runtime Checkpoint HTTP Repair

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academic-tailoring-runtime-checkpoint-http-${{ github.sha }}
  cancel-in-progress: false

jobs:
  repair-and-validate:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Adapt repair patch to current httpx provider
        run: python scripts/fix_runtime_checkpoint_http_patch_v1.py
      - name: Apply runtime checkpoint and HTTP error repair
        id: apply_patch
        shell: bash
        run: |
          mkdir -p build/runtime-checkpoint-http
          set +e
          python scripts/apply_runtime_checkpoint_http_errors_v1.py \
            > build/runtime-checkpoint-http/apply.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Enforce patch application
        run: test "${{ steps.apply_patch.outputs.status }}" = "0"
      - name: Format and lint changed paths
        run: |
          ruff format \
            scripts/run_academic_tailoring_retrieval_v1.py \
            src/paperagent/providers/openai_llm.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py \
            tests/providers/test_openai_llm_http_errors.py
          ruff check --fix \
            scripts/run_academic_tailoring_retrieval_v1.py \
            src/paperagent/providers/openai_llm.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py \
            tests/providers/test_openai_llm_http_errors.py
          ruff check \
            scripts/run_academic_tailoring_retrieval_v1.py \
            src/paperagent/providers/openai_llm.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py \
            tests/providers/test_openai_llm_http_errors.py
      - name: Run focused runtime and provider tests
        run: |
          pytest -q \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py \
            tests/providers/test_openai_llm_http_errors.py \
            tests/scripts/test_check_llm_provider_health.py
      - name: Remove one-shot patch scripts
        run: |
          rm -f \
            scripts/apply_runtime_checkpoint_http_errors_v1.py \
            scripts/fix_runtime_checkpoint_http_patch_v1.py
      - name: Capture full final-tree regression
        id: full
        shell: bash
        run: |
          set +e
          pytest -q > build/runtime-checkpoint-http/pytest.log 2>&1
          pytest_status=$?
          mypy --config-file pyproject.toml > build/runtime-checkpoint-http/mypy.log 2>&1
          mypy_status=$?
          ruff check src tests scripts > build/runtime-checkpoint-http/ruff-check.log 2>&1
          ruff_status=$?
          ruff format --check src tests scripts > build/runtime-checkpoint-http/ruff-format.log 2>&1
          format_status=$?
          printf '{"pytest":%s,"mypy":%s,"ruff":%s,"format":%s}\n' \
            "$pytest_status" "$mypy_status" "$ruff_status" "$format_status" \
            > build/runtime-checkpoint-http/full-status.json
          echo "status=$((pytest_status || mypy_status || ruff_status || format_status))" \
            >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-runtime-checkpoint-http-diagnostics
          path: build/runtime-checkpoint-http/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce full final-tree regression
        run: test "${{ steps.full.outputs.status }}" = "0"
      - name: Rebase and commit production repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            scripts/run_academic_tailoring_retrieval_v1.py \
            src/paperagent/providers/openai_llm.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py \
            tests/providers/test_openai_llm_http_errors.py \
            scripts/apply_runtime_checkpoint_http_errors_v1.py \
            scripts/fix_runtime_checkpoint_http_patch_v1.py
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(runtime): checkpoint cases and classify provider HTTP errors"
          git fetch origin "${GITHUB_HEAD_REF}"
          git rebase "origin/${GITHUB_HEAD_REF}"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
