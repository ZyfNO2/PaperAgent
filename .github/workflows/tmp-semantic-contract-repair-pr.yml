name: Temporary Semantic Contract Repair PR

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/tmp-semantic-contract-repair-pr.yml"
  push:
    branches:
      - fix/semantic-tailoring-role-bound-scoring
    paths:
      - ".github/workflows/tmp-semantic-contract-repair-pr.yml"

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Reuse staged production repair
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/tmp-semantic-contract-repair.yml').read_text(encoding='utf-8')
          marker = '      - name: Apply production repair and regressions\n'
          start = text.index(marker)
          run_start = text.index('        run: |\n', start) + len('        run: |\n')
          end = text.index('      - name: Format repaired files\n', run_start)
          lines = text[run_start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/apply-semantic-repair.sh').write_text(script, encoding='utf-8')
          PY
          bash /tmp/apply-semantic-repair.sh
      - name: Format repaired files
        run: |
          ruff format \
            src/paperagent/method_design_draft.py \
            src/paperagent/claw_benchmark_adapter.py \
            src/paperagent/nodes/evidence_synthesis.py \
            src/paperagent/nodes/planning.py \
            tests/methodology/test_method_design_draft.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/evals/test_runtime_semantic_contract_repair.py
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Lint and type check
        run: |
          ruff check \
            src/paperagent/method_design_draft.py \
            src/paperagent/claw_benchmark_adapter.py \
            src/paperagent/nodes/evidence_synthesis.py \
            src/paperagent/nodes/planning.py \
            tests/methodology/test_method_design_draft.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/evals/test_runtime_semantic_contract_repair.py
          mypy --strict \
            src/paperagent/method_design_draft.py \
            src/paperagent/claw_benchmark_adapter.py \
            src/paperagent/nodes/evidence_synthesis.py \
            src/paperagent/nodes/planning.py
      - name: Focused regressions
        run: |
          pytest -q \
            tests/evals/test_runtime_semantic_contract_repair.py \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_strict_method_design.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/nodes/test_planning_identity_priority.py \
            tests/nodes/test_synthesis_method_quality_report.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py
      - name: Commit repaired production code
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "paperagent-repair-bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            src/paperagent/method_design_draft.py \
            src/paperagent/claw_benchmark_adapter.py \
            src/paperagent/nodes/evidence_synthesis.py \
            src/paperagent/nodes/planning.py \
            tests/methodology/test_method_design_draft.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/evals/test_runtime_semantic_contract_repair.py
          git commit -m "fix(method): verify independent module contracts"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
