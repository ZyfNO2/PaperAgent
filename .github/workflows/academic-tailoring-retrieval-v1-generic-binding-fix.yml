name: Academic Tailoring Retrieval v1 Generic Binding Fix

on:
  push:
    branches:
      - eval/academic-tailoring-retrieval-v1-live-test
    paths:
      - "evals/academic_tailoring_retrieval_v1/generic-binding-fix-trigger.json"

permissions:
  contents: write

concurrency:
  group: academic-tailoring-retrieval-v1-generic-binding-fix
  cancel-in-progress: false

jobs:
  patch-test-and-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply corpus-independent evidence binding repair
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/paperagent/evidence_gap_binding.py")
          source = source_path.read_text(encoding="utf-8")
          marker = """_RESULT_CUES = (\n    \"reports\",\n    \"reported\",\n    \"achieves\",\n    \"achieved\",\n    \"measured\",\n    \"result\",\n    \"outperform\",\n    \"improvement\",\n    \"degradation\",\n    \"报告\",\n    \"达到\",\n    \"结果\",\n    \"提升\",\n    \"下降\",\n)\n"""
          replacement = marker + """_COMPARATIVE_EXPERIMENT_CUES = (\n    \"experimental results\",\n    \"experiments demonstrate\",\n    \"experiments show\",\n    \"extensive experiments\",\n    \"evaluation demonstrates\",\n    \"outperforms\",\n    \"outperformed\",\n    \"superiority\",\n    \"competitive performance\",\n    \"实验结果\",\n    \"实验证明\",\n    \"大量实验\",\n    \"优于\",\n    \"具有竞争力\",\n)\n"""
          if "_COMPARATIVE_EXPERIMENT_CUES" not in source:
              if marker not in source:
                  raise SystemExit("result cue insertion marker not found")
              source = source.replace(marker, replacement, 1)

          old = """def _baseline_role_support(item: EvidenceItem, text: str) -> bool:\n    concrete_method = _has_concrete_method_identity(item)\n    evaluation_setting = any(cue in text for cue in _EVALUATION_CUES)\n    measured_result = bool(_METRIC_PATTERN.search(text)) and (\n        bool(_NUMBER_PATTERN.search(text)) or any(cue in text for cue in _RESULT_CUES)\n    )\n    return concrete_method and evaluation_setting and measured_result\n"""
          new = """def _baseline_role_support(item: EvidenceItem, text: str) -> bool:\n    concrete_method = _has_concrete_method_identity(item)\n    evaluation_setting = any(cue in text for cue in _EVALUATION_CUES)\n    explicit_metric_result = bool(_METRIC_PATTERN.search(text)) and (\n        bool(_NUMBER_PATTERN.search(text)) or any(cue in text for cue in _RESULT_CUES)\n    )\n    comparative_experiment = evaluation_setting and any(\n        cue in text for cue in _COMPARATIVE_EXPERIMENT_CUES\n    )\n    return concrete_method and evaluation_setting and (\n        explicit_metric_result or comparative_experiment\n    )\n"""
          if old in source:
              source = source.replace(old, new, 1)
          elif new not in source:
              raise SystemExit("baseline role support block not found")
          source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/review/test_semantic_gap_binding.py")
          tests = test_path.read_text(encoding="utf-8")
          addition = r'''


def _cold_start_plan() -> ResearchPlan:
    gap = EvidenceGap(
        gap_id="cold_start_baseline",
        description="寻找冷启动序列推荐的具体基线、公开数据集、实验设置和对比证据。",
    )
    return ResearchPlan(
        status="ready",
        problem_statement="带内容信息的冷启动序列推荐",
        scope="新物品与短历史用户的序列推荐",
        evidence_gaps=[gap],
        search_queries=[
            SearchQuery(
                query_id="q_cold_start",
                gap_id=gap.gap_id,
                query=(
                    "cold-start sequential recommendation content features "
                    "public dataset baseline comparison"
                ),
                source_types=["paper"],
            )
        ],
        success_criteria=["找到有公开实验设置的具体方法"],
        risks=["摘要可能不包含具体数值"],
    )


def test_comparative_experiment_without_numeric_metric_supports_baseline_role() -> None:
    plan = _cold_start_plan()
    gap_id = plan.evidence_gaps[0].gap_id
    _, _, _, support, ledger = build_evidence_ledger(
        request=ResearchRequest(question="带内容信息的冷启动序列推荐"),
        plan=plan,
        evidence=_bundle(
            title="Recformer: Text Representations for Sequential Recommendation",
            summary=(
                "We introduce a content-aware sequential recommendation architecture. "
                "Extensive experiments on six public datasets demonstrate superiority "
                "for cold-start sequential recommendation with item content features."
            ),
            candidate_gap_id=gap_id,
        ),
    )

    assert ledger.accepted_ids == ["ev-paper"]
    binding = next(item for item in support if item.gap_id == gap_id)
    assert binding.decision == "accept"
    assert binding.checklist_results["role_evidence_present"] is True


def test_generic_survey_without_method_identity_remains_rejected() -> None:
    plan = _cold_start_plan()
    gap_id = plan.evidence_gaps[0].gap_id
    _, _, _, support, ledger = build_evidence_ledger(
        request=ResearchRequest(question="带内容信息的冷启动序列推荐"),
        plan=plan,
        evidence=_bundle(
            title="A Survey on Sequential Recommendation",
            summary=(
                "This survey reviews cold-start sequential recommendation, public datasets, "
                "content features, and common experimental comparisons."
            ),
            candidate_gap_id=gap_id,
        ),
    )

    assert ledger.accepted_ids == []
    binding = next(item for item in support if item.gap_id == gap_id)
    assert binding.decision == "reject"
    assert binding.checklist_results["role_evidence_present"] is False
'''
          if "test_comparative_experiment_without_numeric_metric_supports_baseline_role" not in tests:
              tests += addition
          test_path.write_text(tests, encoding="utf-8")
          PY
      - name: Format and run targeted regression
        run: |
          ruff format src/paperagent/evidence_gap_binding.py tests/review/test_semantic_gap_binding.py
          ruff check src/paperagent/evidence_gap_binding.py tests/review/test_semantic_gap_binding.py
          pytest -q \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_action_mechanism_binding.py \
            tests/review/test_research_contract_priority.py \
            tests/evals/test_benchmark_leakage_audit.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py
          python - <<'PY'
          from paperagent.benchmark_leakage_audit import audit_benchmark_execution_boundary
          result = audit_benchmark_execution_boundary()
          print(result.model_dump_json(indent=2))
          if not result.passed:
              raise SystemExit(result.findings)
          PY
      - name: Commit generic repair
        run: |
          rm -f \
            .github/workflows/academic-tailoring-retrieval-v1-generic-binding-fix.yml \
            evals/academic_tailoring_retrieval_v1/generic-binding-fix-trigger.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "fix(evidence): accept qualitative comparative experiment abstracts"
          git push origin HEAD:eval/academic-tailoring-retrieval-v1-live-test
