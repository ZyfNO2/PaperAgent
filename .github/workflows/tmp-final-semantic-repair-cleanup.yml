name: Temporary Final Semantic Repair Cleanup

on:
  push:
    branches:
      - fix/semantic-tailoring-role-bound-scoring
    paths:
      - ".github/workflows/tmp-final-semantic-repair-cleanup.yml"

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Apply final workflow coverage and cleanup
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          recovery = Path('.github/workflows/academic-tailoring-runtime-recovery.yml')
          text = recovery.read_text(encoding='utf-8')
          malformed = '''      PAPERAGENT_LLM_MAX_CALLS: "100"\n       PAPERAGENT_LLM_MAX_REQUESTS_PER_MINUTE: "40"\n       # Budget is enforced per logical graph invocation.\n       # Graph re-entry receives a new call_index and an independent task budget.\n       PAPERAGENT_LLM_MAX_INPUT_TOKENS_PER_TASK: "32000"\n'''
          corrected = '''      PAPERAGENT_LLM_MAX_CALLS: "100"\n      PAPERAGENT_LLM_MAX_REQUESTS_PER_MINUTE: "40"\n      # Budget is enforced per logical graph invocation.\n      # Graph re-entry receives a new call_index and an independent task budget.\n      PAPERAGENT_LLM_MAX_INPUT_TOKENS_PER_TASK: "32000"\n'''
          if text.count(malformed) != 1:
              raise RuntimeError('runtime recovery budget block mismatch')
          text = text.replace(malformed, corrected, 1)
          job_marker = '''  recover-failed-cases:\n    runs-on: ubuntu-24.04\n'''
          job_replacement = '''  recover-failed-cases:\n    # Real-provider recovery is intentionally manual to prevent PR updates from spending API quota.\n    if: github.event_name == 'workflow_dispatch'\n    runs-on: ubuntu-24.04\n'''
          if text.count(job_marker) != 1:
              raise RuntimeError('runtime recovery job marker mismatch')
          text = text.replace(job_marker, job_replacement, 1)
          recovery.write_text(text, encoding='utf-8')

          runtime_ci = Path('.github/workflows/runtime-output-recovery-ci.yml')
          runtime_ci.write_text('''name: Runtime Output Recovery CI

