name: Academic Eval Opencode Smoke

on:
  push:
    branches:
      - fix/academic-eval-diagnostics-baseline-binding
    paths:
      - ".github/workflows/academic-eval-opencode-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: academic-eval-opencode-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      PAPERAGENT_OPENAI_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      PAPERAGENT_CONTACT_EMAIL: ${{ secrets.PAPERAGENT_CONTACT_EMAIL || 'Z1015558261@outlook.com' }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      PAPERAGENT_LLM_PROVIDER: deepseek
      PAPERAGENT_LLM_BASE_URL: https://opencode.ai/zen/v1
      PAPERAGENT_LLM_REASONING_EFFORT: ""
      PAPERAGENT_LLM_NATIVE_JSON_SCHEMA: "0"
      PAPERAGENT_LLM_ALLOW_SCHEMA_REPAIR: "1"
      PAPERAGENT_LLM_CONNECT_TIMEOUT: "15"
      PAPERAGENT_LLM_READ_TIMEOUT: "600"
      PAPERAGENT_LLM_TOTAL_TIMEOUT: "660"
      PAPERAGENT_LLM_TASK_TIMEOUT: "3600"
      PAPERAGENT_LLM_MAX_ATTEMPTS: "3"
      PAPERAGENT_LLM_MAX_REQUESTS_PER_MINUTE: "20"
      PAPERAGENT_LLM_MAX_INPUT_TOKENS_PER_TASK: "524288"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_CALL: "32768"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_TASK: "524288"
      PAPERAGENT_LLM_MAX_CALLS: "60"
      PAPERAGENT_RUN_REAL_LLM: "1"
      PAPERAGENT_RUN_REAL_PROVIDER: "1"
      PAPERAGENT_ENABLE_WEB_SEARCH: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Announce smoke run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh pr comment 41 --repo "$GITHUB_REPOSITORY" --body \
            "Expanded Opencode smoke started for commit \`$short_sha\`: [open run]($run_url). Cases: \`005 remote\`, \`006 USAD\`, \`008 protein\`."

      - name: Require credential and install
        run: |
          test -n "$OPENCODE_API_KEY"
          python -m pip install -q -e '.[dev]'
          python -m py_compile \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/score_academic_tailoring_retrieval_v1.py \
            scripts/score_academic_tailoring_retrieval_subset.py

      - name: Probe Mimo and Laguna
        id: probes
        shell: bash
        run: |
          set +e
          mkdir -p build/opencode-smoke/health
          python scripts/check_llm_provider_health.py \
            --provider openai \
            --model mimo-v2.5-free \
            --base-url https://opencode.ai/zen/v1 \
            --api-key-env OPENCODE_API_KEY \
            --probe-mode chat \
            --timeout-seconds 180 \
            --max-attempts 3 \
            --retry-delay-seconds 10 \
            --output build/opencode-smoke/health/mimo.json
          mimo_status=$?
          python scripts/check_llm_provider_health.py \
            --provider openai \
            --model laguna-s-2.1-free \
            --base-url https://opencode.ai/zen/v1 \
            --api-key-env OPENCODE_API_KEY \
            --probe-mode chat \
            --timeout-seconds 180 \
            --max-attempts 2 \
            --retry-delay-seconds 10 \
            --output build/opencode-smoke/health/laguna.json
          laguna_status=$?
          echo "mimo_status=$mimo_status" >> "$GITHUB_OUTPUT"
          echo "laguna_status=$laguna_status" >> "$GITHUB_OUTPUT"
          test "$mimo_status" = "0" || test "$laguna_status" = "0"

      - name: Create Gold-free public input
        run: |
          python scripts/project_academic_tailoring_retrieval_v1.py \
            --authoring evals/academic_tailoring_retrieval_v1/dataset-authoring.json \
            --output build/opencode-smoke/public-dataset.json \
            --report build/opencode-smoke/boundary-report.json

      - name: Build isolated candidate workspace
        run: |
          rm -rf candidate-smoke
          mkdir -p candidate-smoke/scripts candidate-smoke/input
          cp -R src candidate-smoke/src
          cp -R config candidate-smoke/config
          cp pyproject.toml README.md candidate-smoke/
          cp scripts/run_academic_tailoring_retrieval_v1.py candidate-smoke/scripts/
          cp build/opencode-smoke/public-dataset.json candidate-smoke/input/
          test ! -e candidate-smoke/evals/academic_tailoring_retrieval_v1/dataset-authoring.json
          ! find candidate-smoke -name dataset-authoring.json -print -quit | grep -q .
          (cd candidate-smoke && python -m pip install -q -e '.[dev]')

      - name: Run Mimo smoke
        id: mimo
        if: steps.probes.outputs.mimo_status == '0'
        working-directory: candidate-smoke
        shell: bash
        run: |
          set +e
          mkdir -p build/opencode-smoke/mimo
          python scripts/run_academic_tailoring_retrieval_v1.py \
            --dataset input/public-dataset.json \
            --output-dir build/opencode-smoke/mimo \
            --case-id atr-v1-005-remote-oriented-small-edge \
            --case-id atr-v1-006-industrial-usad-anomaly-transformer \
            --case-id atr-v1-008-bio-protein-function-lowlabel \
            --max-cases 3 \
            --max-llm-calls 20 \
            --max-retrieval-rounds 4 \
            --max-queries-per-round 10 \
            --max-method-repairs 3 \
            --max-evidence-items 120 \
            --provider-call-budget 240 \
            --enable-web-search \
            --llm-provider deepseek \
            --llm-model mimo-v2.5-free \
            --llm-base-url https://opencode.ai/zen/v1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "$status" > build/opencode-smoke/mimo/runtime-exit-code.txt
          exit 0

      - name: Run Laguna fallback smoke
        id: laguna
        if: >-
          always() &&
          steps.probes.outputs.laguna_status == '0' &&
          (steps.probes.outputs.mimo_status != '0' || steps.mimo.outputs.status != '0')
        working-directory: candidate-smoke
        shell: bash
        run: |
          set +e
          mkdir -p build/opencode-smoke/laguna
          python scripts/run_academic_tailoring_retrieval_v1.py \
            --dataset input/public-dataset.json \
            --output-dir build/opencode-smoke/laguna \
            --case-id atr-v1-005-remote-oriented-small-edge \
            --case-id atr-v1-006-industrial-usad-anomaly-transformer \
            --case-id atr-v1-008-bio-protein-function-lowlabel \
            --max-cases 3 \
            --max-llm-calls 20 \
            --max-retrieval-rounds 4 \
            --max-queries-per-round 10 \
            --max-method-repairs 3 \
            --max-evidence-items 120 \
            --provider-call-budget 240 \
            --enable-web-search \
            --llm-provider deepseek \
            --llm-model laguna-s-2.1-free \
            --llm-base-url https://opencode.ai/zen/v1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "$status" > build/opencode-smoke/laguna/runtime-exit-code.txt
          exit 0

      - name: Select completed smoke
        id: selected
        shell: bash
        run: |
          mimo_status="${{ steps.mimo.outputs.status }}"
          laguna_status="${{ steps.laguna.outputs.status }}"
          if [ "$mimo_status" = "0" ]; then
            model="mimo-v2.5-free"
            run_dir="candidate-smoke/build/opencode-smoke/mimo"
          elif [ "$laguna_status" = "0" ]; then
            model="laguna-s-2.1-free"
            run_dir="candidate-smoke/build/opencode-smoke/laguna"
          else
            echo "Neither model completed the smoke run" >&2
            exit 1
          fi
          echo "model=$model" >> "$GITHUB_OUTPUT"
          echo "run_dir=$run_dir" >> "$GITHUB_OUTPUT"
          printf '{"selected_model":"%s","mimo_runtime_status":"%s","laguna_runtime_status":"%s"}\n' \
            "$model" "$mimo_status" "$laguna_status" \
            > build/opencode-smoke/model-selection.json

      - name: Score targeted smoke outside candidate boundary
        run: |
          python scripts/score_academic_tailoring_retrieval_subset.py \
            --authoring evals/academic_tailoring_retrieval_v1/dataset-authoring.json \
            --states "${{ steps.selected.outputs.run_dir }}/states.jsonl" \
            --traces "${{ steps.selected.outputs.run_dir }}/run-traces.jsonl" \
            --prompts "${{ steps.selected.outputs.run_dir }}/prompt-log.jsonl" \
            --runtime-summary "${{ steps.selected.outputs.run_dir }}/execution-summary.json" \
            --case-id atr-v1-005-remote-oriented-small-edge \
            --case-id atr-v1-006-industrial-usad-anomaly-transformer \
            --case-id atr-v1-008-bio-protein-function-lowlabel \
            --output build/opencode-smoke/diagnostic-report.json \
            --minimum-score 80

      - name: Build smoke summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("build/opencode-smoke/diagnostic-report.json").read_text())
          selection = json.loads(Path("build/opencode-smoke/model-selection.json").read_text())
          lines = [
              "## Expanded Opencode smoke",
              "",
              f"- Selected model: `{selection['selected_model']}`",
              f"- Passed: **{report['passed']}/{report['total']}**",
              f"- Average score: **{report['average_score']}**",
              f"- Hard-failure cases: **{report['hard_failure_case_count']}**",
              "",
              "| Case | Score | Status | Retrieval stage | Accepted evidence | Baseline status | Hard failures |",
              "|---|---:|---|---|---:|---|---|",
          ]
          for case in report["cases"]:
              audit = case.get("scoring_audit", {})
              pipeline = audit.get("retrieval_pipeline", {})
              failures = ", ".join(case.get("hard_failures", [])) or "none"
              lines.append(
                  "| {case} | {score} | {status} | {stage} | {accepted} | {baseline} | {failures} |".format(
                      case=case["case_id"],
                      score=case["score"],
                      status=case["status"],
                      stage=pipeline.get("failure_stage") or "none",
                      accepted=pipeline.get("accepted_verified_count", 0),
                      baseline=audit.get("baseline_identity_status") or "none",
                      failures=failures,
                  )
              )
          summary = "\n".join(lines) + "\n"
          Path("build/opencode-smoke/summary.md").write_text(summary)
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a") as handle:
              handle.write(summary)
          PY

      - name: Comment smoke result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:7}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ -f build/opencode-smoke/summary.md ]; then
            {
              echo "Expanded Opencode smoke completed for commit \`$short_sha\`: [open run]($run_url)"
              echo
              cat build/opencode-smoke/summary.md
            } > /tmp/opencode-smoke-comment.md
          else
            cat > /tmp/opencode-smoke-comment.md <<EOF
          Expanded Opencode smoke did not reach scoring for commit \`$short_sha\`: [open run]($run_url).

          Job status: \`${{ job.status }}\`.
          EOF
          fi
          gh pr comment 41 --repo "$GITHUB_REPOSITORY" --body-file /tmp/opencode-smoke-comment.md

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-eval-opencode-smoke
          path: |
            build/opencode-smoke/
            candidate-smoke/build/opencode-smoke/
          if-no-files-found: warn
          retention-days: 30
