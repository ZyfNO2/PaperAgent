name: Evidence Gap Binding Rerun Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/evidence-gap-binding-rerun-once.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/claw-live-search-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run checks and persist status
        shell: bash
        run: |
          set +e
          out="build/evidence-gap-binding-rerun"
          mkdir -p "$out"
          files=(
            src/paperagent/evidence_gap_binding.py
            src/paperagent/retrieval/verify_evidence.py
            tests/review/test_semantic_gap_binding.py
            tests/schemas/test_plan_nonblocking_clarification.py
            tests/unit/test_schemas.py
          )
          ruff check "${files[@]}" --output-format=concise > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check --diff "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/review/test_semantic_gap_binding.py \
            tests/literature/test_query_concepts.py \
            tests/review/test_consolidated_regressions.py \
            tests/schemas/test_plan_nonblocking_clarification.py \
            tests/unit/test_schemas.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          target="evals/claw_academic_tailoring_v1/live-probes/evidence-gap-binding-rerun-latest.json"
          mkdir -p "$(dirname "$target")"
          python - "$target" "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" <<'PY'
          import json
          import os
          import sys

          payload = {
              "workflow_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "workflow_head_sha": os.environ["GITHUB_SHA"],
              "ruff": int(sys.argv[2]),
              "format": int(sys.argv[3]),
              "mypy": int(sys.argv[4]),
              "pytest": int(sys.argv[5]),
          }
          payload["passed"] = all(payload[key] == 0 for key in ("ruff", "format", "mypy", "pytest"))
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$target"
          git commit -m "chore(evidence): persist binding rerun [skip ci]"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
          if (( ruff_status || format_status || mypy_status || pytest_status )); then
            exit 1
          fi
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-gap-binding-rerun-${{ github.run_id }}
          path: build/evidence-gap-binding-rerun/
          if-no-files-found: error
          retention-days: 30
