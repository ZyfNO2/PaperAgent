name: v0.4 one-shot format

on:
  push:
    branches: [feat/v0.4-review-export-mvp]
    paths: [.ci/v0.4/FORMAT]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v0.4-review-export-mvp
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patch and format
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          review = Path('src/paperagent/api/review.py')
          text = review.read_text()
          text = text.replace(
              '''        padded = cursor + "=" * (-len(cursor) % 4)\n        return base64.urlsafe_b64decode(padded.encode("ascii")).decode("utf-8")\n''',
              '''        padded = cursor + "=" * (-len(cursor) % 4)\n        decoded = base64.b64decode(padded.encode("ascii"), altchars=b"-_", validate=True).decode("utf-8")\n        if not decoded or _encode_cursor(decoded) != cursor.rstrip("="):\n            raise ValueError("non-canonical cursor")\n        return decoded\n''',
          )
          review.write_text(text)

          foundation = Path('tests/unit/test_foundation.py')
          text = foundation.read_text()
          text = text.replace(
              'def test_package__import__exposes_v0_3_and_frozen_prior_contract_versions() -> None:',
              'def test_package__import__exposes_v0_4_and_frozen_prior_contract_versions() -> None:',
          )
          text = text.replace('assert paperagent.__version__ == "0.3.0"', 'assert paperagent.__version__ == "0.4.0"')
          text = text.replace(
              'assert paperagent.TASK_API_CONTRACT_VERSION == "v0.3"',
              'assert paperagent.TASK_API_CONTRACT_VERSION == "v0.3"\n    assert paperagent.REVIEW_EXPORT_CONTRACT_VERSION == "v0.4"',
          )
          foundation.write_text(text)
          PY
          python -m pip install 'ruff==0.12.12'
          ruff check --fix .
          ruff format .
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style(v0.4): apply review fixes and Ruff formatting' || true
          git push origin HEAD:feat/v0.4-review-export-mvp
