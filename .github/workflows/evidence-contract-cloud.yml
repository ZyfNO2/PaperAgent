name: Evidence Contract Cloud

on:
  pull_request:
    branches: [master]
    paths:
      - "pyproject.toml"
      - "src/paperagent/evidence_relevance.py"
      - "src/paperagent/outcome.py"
      - "src/paperagent/graph.py"
      - "src/paperagent/retrieval/verify_evidence.py"
      - "src/paperagent/nodes/quality_gate.py"
      - "src/paperagent/nodes/report.py"
      - "src/paperagent/nodes/persist.py"
      - "src/paperagent/schemas/evidence.py"
      - "src/paperagent/schemas/relevance.py"
      - "src/paperagent/schemas/outcome.py"
      - "src/paperagent/schemas/__init__.py"
      - "src/paperagent/state.py"
      - "tests/nodes/test_evidence_ledger_outcome_trace.py"
      - "tests/e2e/test_evidence_pollution_flow.py"
      - "tests/e2e/test_evidence_quality_gate_flow.py"
      - "tests/e2e/test_graph_e2e_bounded_failure.py"
      - "tests/e2e/test_graph_e2e_malformed.py"
      - "tests/e2e/test_graph_e2e_timeout.py"
      - "tests/graph/test_hitl.py"
      - "tests/integration/test_bounded_failures.py"
      - "tests/ood/test_cases.py"
      - "docs/review/EVIDENCE_TRACE_REPAIR_HANDOFF.md"
      - ".github/workflows/evidence-contract-cloud.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cloud-fast:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project quietly
        run: python -m pip install -q -e '.[dev]'
      - name: Run evidence contract checks
        id: checks
        shell: bash
        run: |
          set +e
          mkdir -p build/evidence-contract-cloud/source
          files=(
            src/paperagent/evidence_relevance.py
            src/paperagent/outcome.py
            src/paperagent/graph.py
            src/paperagent/retrieval/verify_evidence.py
            src/paperagent/nodes/quality_gate.py
            src/paperagent/nodes/report.py
            src/paperagent/nodes/persist.py
            src/paperagent/schemas/evidence.py
            src/paperagent/schemas/relevance.py
            src/paperagent/schemas/outcome.py
            src/paperagent/schemas/__init__.py
            src/paperagent/state.py
            tests/nodes/test_evidence_ledger_outcome_trace.py
            tests/e2e/test_evidence_pollution_flow.py
            tests/e2e/test_evidence_quality_gate_flow.py
            tests/e2e/test_graph_e2e_bounded_failure.py
            tests/e2e/test_graph_e2e_malformed.py
            tests/e2e/test_graph_e2e_timeout.py
            tests/graph/test_hitl.py
            tests/integration/test_bounded_failures.py
            tests/ood/test_cases.py
          )
          cp --parents "${files[@]}" build/evidence-contract-cloud/source/
          ruff check "${files[@]}" --output-format=concise \
            > build/evidence-contract-cloud/ruff.log 2>&1
          ruff_status=$?
          ruff format --check "${files[@]}" \
            > build/evidence-contract-cloud/format.log 2>&1
          format_status=$?
          mypy --config-file pyproject.toml \
            > build/evidence-contract-cloud/mypy.log 2>&1
          mypy_status=$?
          pytest -q \
            tests/nodes/test_evidence_ledger_outcome_trace.py \
            tests/nodes/test_retrieval.py \
            tests/e2e/test_evidence_pollution_flow.py \
            tests/e2e/test_evidence_quality_gate_flow.py \
            > build/evidence-contract-cloud/pytest.log 2>&1
          pytest_status=$?
          pytest -q > build/evidence-contract-cloud/full-pytest.log 2>&1
          full_pytest_status=$?
          formatted_files=()
          for file in "${files[@]}"; do
            formatted_files+=("build/evidence-contract-cloud/source/$file")
          done
          ruff check --fix "${formatted_files[@]}" \
            > build/evidence-contract-cloud/autofix.log 2>&1
          ruff format "${formatted_files[@]}" \
            >> build/evidence-contract-cloud/autofix.log 2>&1
          printf '{"ruff":%s,"format":%s,"mypy":%s,"pytest":%s,"full_pytest":%s}\n' \
            "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" \
            "$full_pytest_status" \
            > build/evidence-contract-cloud/status.json
          cat build/evidence-contract-cloud/status.json
          if (( ruff_status || format_status || mypy_status || pytest_status || full_pytest_status )); then
            exit 1
          fi
      - name: Upload evidence contract logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-contract-cloud-${{ github.run_id }}
          path: build/evidence-contract-cloud/
          if-no-files-found: error
          retention-days: 30
