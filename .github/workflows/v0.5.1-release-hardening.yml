name: PaperAgent v0.5.1 Release Hardening

on:
  push:
    branches:
      - master
      - chore/master-ci-gates
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-verification:
    name: Python ${{ matrix.python-version }} offline verification
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev,release]'
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy
        run: mypy --config-file pyproject.toml
      - name: Offline tests and branch coverage
        run: >-
          pytest -q
          --cov=paperagent
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml
      - name: Build wheel
        run: python -m build --wheel
      - name: Upload coverage and wheel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-python-${{ matrix.python-version }}
          path: |
            coverage.xml
            dist/*.whl
          if-no-files-found: ignore

  installed-wheel-smoke:
    name: Installed wheel and CLI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and install wheel
        run: |
          python -m pip install 'build>=1.2,<2'
          python -m build --wheel
          python -m venv /tmp/paperagent-release
          /tmp/paperagent-release/bin/pip install dist/*.whl
      - name: Exercise installed CLI and web assets
        shell: bash
        run: |
          set -euo pipefail
          /tmp/paperagent-release/bin/paperagent --help
          /tmp/paperagent-release/bin/paperagent serve \
            --port 8765 \
            --database /tmp/paperagent-wheel.db \
            --demo-delay 0 \
            --log-level warning &
          server_pid=$!
          trap 'kill ${server_pid} 2>/dev/null || true' EXIT
          python - <<'PY'
          import json
          import time
          import urllib.request

          for _ in range(100):
              try:
                  with urllib.request.urlopen('http://127.0.0.1:8765/readyz', timeout=1) as response:
                      payload = json.load(response)
                      assert response.status == 200
                      assert payload['status'] == 'ready'
                  with urllib.request.urlopen('http://127.0.0.1:8765/app', timeout=1) as response:
                      assert response.status == 200
                      assert b'PaperAgent' in response.read()
                  break
              except OSError:
                  time.sleep(0.1)
          else:
              raise SystemExit('installed wheel server did not become ready')
          PY

  chromium-e2e:
    name: Chromium vertical smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install browser test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,browser]'
          python -m playwright install --with-deps chromium
      - name: Run submit-progress-review-export smoke
        run: pytest -q -m browser tests/browser/test_pwa_smoke.py

  live-provider-smoke:
    name: Live OpenAlex arXiv Crossref DataCite smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install .
      - name: Run live provider smoke
        env:
          PAPERAGENT_CONTACT_EMAIL: ${{ secrets.PAPERAGENT_CONTACT_EMAIL }}
        run: paperagent provider-smoke --timeout 20

  docker-smoke:
    name: Docker image readiness smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t paperagent:release .
      - name: Run container and verify readiness
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -d --name paperagent-release -p 8766:8000 paperagent:release
          trap 'docker rm -f paperagent-release 2>/dev/null || true' EXIT
          python - <<'PY'
          import json
          import time
          import urllib.request

          for _ in range(120):
              try:
                  with urllib.request.urlopen('http://127.0.0.1:8766/readyz', timeout=1) as response:
                      payload = json.load(response)
                      assert response.status == 200
                      assert payload['status'] == 'ready'
                  break
              except OSError:
                  time.sleep(0.25)
          else:
              raise SystemExit('container did not become ready')
          PY
