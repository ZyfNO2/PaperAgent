name: Format Evidence Binding Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/format-evidence-binding-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/claw-live-search-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply Ruff formatting
        shell: bash
        run: |
          python -m pip install -q ruff==0.12.3
          ruff check --fix \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_semantic_gap_binding.py
          ruff format \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_semantic_gap_binding.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/paperagent/evidence_gap_binding.py \
            tests/review/test_semantic_gap_binding.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(evidence): format semantic gap binding"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
