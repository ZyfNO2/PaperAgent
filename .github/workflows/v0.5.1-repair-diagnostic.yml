name: v0.5.1 repair and provider diagnostic

on:
  push:
    branches:
      - chore/v0.5.1-release-hardening
    paths:
      - .ci/v0.5.1/FORMAT

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/v0.5.1-release-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Format and capture diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e '.[dev]'
          ruff check --fix .
          ruff format .
          set +e
          mypy --config-file pyproject.toml > /tmp/mypy.txt 2>&1
          mypy_rc=$?
          paperagent provider-smoke --timeout 20 > /tmp/provider.json 2>&1
          provider_rc=$?
          set -e
          mkdir -p .ci/v0.5.1
          {
            echo "mypy_rc=${mypy_rc}"
            cat /tmp/mypy.txt
          } > .ci/v0.5.1/MYPY_LATEST.txt
          {
            echo "provider_rc=${provider_rc}"
            cat /tmp/provider.json
          } > .ci/v0.5.1/PROVIDER_LATEST.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(v0.5.1): publish static and provider diagnostics' || true
          git push origin HEAD:chore/v0.5.1-release-hardening
