name: Patch Cross Gap Reuse Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/patch-cross-gap-reuse-once.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/claw-live-search-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply guarded two-pass binding patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/paperagent/evidence_gap_binding.py")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  '''    query_texts: Iterable[str] = (),
          ) -> GapSupportAssessment:
          ''',
                  '''    query_texts: Iterable[str] = (),
              allow_cross_gap_reuse: bool = False,
          ) -> GapSupportAssessment:
          ''',
              ),
              (
                  '''    origin_match = gap.gap_id in _candidate_gap_ids(item)
              direct_relevance = relevance.evidence_scope == "direct"
          ''',
                  '''    origin_match = gap.gap_id in _candidate_gap_ids(item)
              cross_gap_reuse = allow_cross_gap_reuse and not origin_match
              provenance_qualified = origin_match or cross_gap_reuse
              direct_relevance = relevance.evidence_scope == "direct"
          ''',
              ),
              (
                  '''            origin_match,
                      direct_relevance,
          ''',
                  '''            provenance_qualified,
                      direct_relevance,
          ''',
              ),
              (
                  '''        "query_provenance_match": origin_match,
                  "direct_relevance": direct_relevance,
          ''',
                  '''        "query_provenance_match": origin_match,
                  "cross_gap_reuse": cross_gap_reuse,
                  "provenance_qualified": provenance_qualified,
                  "direct_relevance": direct_relevance,
          ''',
              ),
              (
                  '''                ("query provenance", origin_match),
                          ("direct relevance", direct_relevance),
          ''',
                  '''                (
                              "query provenance or qualified cross-gap reuse",
                              provenance_qualified,
                          ),
                          ("direct relevance", direct_relevance),
          ''',
              ),
              (
                  '''    span = relevance.supporting_spans[0]
              support_type: GapSupportType = "direct_support"
              return GapSupportAssessment(
                  evidence_id=item.evidence_id,
                  gap_id=gap.gap_id,
                  support_type=support_type,
                  supported_claim=gap.description,
                  supporting_span_hash=hash_payload(span),
                  checklist_results=checklist,
                  limitations=[
                      "bound through verified query provenance, direct relevance, query concepts, and "
                      "role-specific evidence cues"
                  ],
                  confidence=0.82,
                  decision="accept",
              )
          ''',
                  '''    span = relevance.supporting_spans[0]
              support_type: GapSupportType = "direct_support"
              binding_basis = (
                  "reused across gaps after an existing accepted binding, direct relevance, "
                  "query concepts, and role-specific evidence cues"
                  if cross_gap_reuse
                  else "bound through verified query provenance, direct relevance, query concepts, "
                  "and role-specific evidence cues"
              )
              return GapSupportAssessment(
                  evidence_id=item.evidence_id,
                  gap_id=gap.gap_id,
                  support_type=support_type,
                  supported_claim=gap.description,
                  supporting_span_hash=hash_payload(span),
                  checklist_results=checklist,
                  limitations=[binding_basis],
                  confidence=0.72 if cross_gap_reuse else 0.82,
                  decision="accept",
              )
          ''',
              ),
              (
                  '''        supports = [
                      assess_gap_support(
                          item,
                          gap,
                          item_relevance,
                          query_texts=queries_by_gap.get(gap.gap_id, []),
                      )
                      for gap in plan.evidence_gaps
                  ]
                  gap_results.extend(supports)
          ''',
                  '''        first_pass = [
                      assess_gap_support(
                          item,
                          gap,
                          item_relevance,
                          query_texts=queries_by_gap.get(gap.gap_id, []),
                      )
                      for gap in plan.evidence_gaps
                  ]
                  has_bound_support = any(
                      support.decision == "accept" for support in first_pass
                  )
                  if has_bound_support:
                      supports = [
                          support
                          if support.decision == "accept"
                          else assess_gap_support(
                              item,
                              gap,
                              item_relevance,
                              query_texts=queries_by_gap.get(gap.gap_id, []),
                              allow_cross_gap_reuse=True,
                          )
                          for gap, support in zip(
                              plan.evidence_gaps,
                              first_pass,
                              strict=True,
                          )
                      ]
                  else:
                      supports = first_pass
                  gap_results.extend(supports)
          ''',
              ),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"expected patch fragment missing:\n{old}")
              text = text.replace(old, new, 1)

          text = text.replace(
              "The fallback never treats query provenance as sufficient by itself. It requires direct\n"
              "    relevance, a supporting span, query-specific concept coverage, query-term overlap, and\n"
              "    evidence structure appropriate for the declared gap role.\n",
              "The fallback never treats provenance or prior acceptance as sufficient by itself. It\n"
              "    requires direct relevance, a supporting span, query-specific concept coverage,\n"
              "    query-term overlap, and evidence structure appropriate for the declared gap role.\n",
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY
          python -m pip install -q ruff==0.12.3
          ruff check --fix src/paperagent/evidence_gap_binding.py
          ruff format src/paperagent/evidence_gap_binding.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/paperagent/evidence_gap_binding.py
          git commit -m "fix(evidence): allow guarded cross-gap reuse"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
