name: Cloud Trace Call Index Repair

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write
  actions: read

jobs:
  repair-formal-branch:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Restore validated source and test artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf /tmp/trace-call-index-patch
          gh run download 29972051253 \
            --repo ZyfNO2/PaperAgent \
            --name trace-call-index-patch \
            --dir /tmp/trace-call-index-patch
          cp /tmp/trace-call-index-patch/src/paperagent/nodes/_shared.py \
            src/paperagent/nodes/_shared.py
          cp /tmp/trace-call-index-patch/tests/nodes/test_synthesis_method_quality_report.py \
            tests/nodes/test_synthesis_method_quality_report.py
          git checkout 09fb5f5ec023ff119857393401cd736a2d60533c -- \
            .github/workflows/runtime-output-recovery-ci.yml \
            .github/workflows/academic-tailoring-runtime-recovery.yml
      - name: Rebuild workflow coverage
        run: |
          python - <<'PY'
          from pathlib import Path

          runtime = Path('.github/workflows/runtime-output-recovery-ci.yml')
          runtime_text = runtime.read_text(encoding='utf-8')
          runtime_text = runtime_text.replace(
              '      - "src/paperagent/nodes/planning.py"',
              '      - "src/paperagent/nodes/_shared.py"\n      - "src/paperagent/nodes/planning.py"',
          )
          runtime_text = runtime_text.replace(
              '      - "tests/nodes/test_planning_identity_priority.py"',
              '      - "tests/nodes/test_synthesis_method_quality_report.py"\n      - "tests/nodes/test_planning_identity_priority.py"',
          )
          runtime_text = runtime_text.replace(
              '            src/paperagent/nodes/planning.py \\',
              '            src/paperagent/nodes/_shared.py \\\n            src/paperagent/nodes/planning.py \\',
          )
          runtime_text = runtime_text.replace(
              '            tests/nodes/test_planning_identity_priority.py \\',
              '            tests/nodes/test_synthesis_method_quality_report.py \\\n            tests/nodes/test_planning_identity_priority.py \\',
          )
          runtime.write_text(runtime_text, encoding='utf-8')

          recovery = Path('.github/workflows/academic-tailoring-runtime-recovery.yml')
          recovery_text = recovery.read_text(encoding='utf-8')
          recovery_text = recovery_text.replace(
              '      - "src/paperagent/nodes/planning.py"',
              '      - "src/paperagent/nodes/_shared.py"\n      - "src/paperagent/nodes/planning.py"',
              1,
          )
          recovery_text = recovery_text.replace(
              '      PAPERAGENT_LLM_MAX_INPUT_TOKENS_PER_TASK: "32000"',
              '      # Budget is per logical graph invocation; graph re-entry receives a new call index.\n'
              '      PAPERAGENT_LLM_MAX_INPUT_TOKENS_PER_TASK: "32000"',
              1,
          )
          recovery_text = recovery_text.replace(
              '            src/paperagent/nodes/planning.py \\',
              '            src/paperagent/nodes/_shared.py \\\n            src/paperagent/nodes/planning.py \\',
              1,
          )
          recovery_text = recovery_text.replace(
              '            tests/providers/test_runtime.py \\',
              '            tests/providers/test_runtime.py \\\n            tests/nodes/test_synthesis_method_quality_report.py \\',
              1,
          )
          recovery.write_text(recovery_text, encoding='utf-8')
          PY
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Verify repaired patch
        run: |
          git diff --check
          ruff format --check \
            src/paperagent/nodes/_shared.py \
            tests/nodes/test_synthesis_method_quality_report.py
          ruff check \
            src/paperagent/nodes/_shared.py \
            tests/nodes/test_synthesis_method_quality_report.py
          python -m compileall -q src/paperagent
          mypy --strict src/paperagent/nodes/_shared.py
          pytest -q \
            tests/nodes/test_synthesis_method_quality_report.py \
            tests/nodes/test_evidence_synthesis_contract.py \
            tests/providers/test_runtime.py \
            tests/providers/test_openai_llm_runtime_limits.py
      - name: Commit and push repaired formal patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/paperagent/nodes/_shared.py \
            tests/nodes/test_synthesis_method_quality_report.py \
            .github/workflows/runtime-output-recovery-ci.yml \
            .github/workflows/academic-tailoring-runtime-recovery.yml
          git commit -m "fix(runtime): restore validated graph invocation indexing"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
