name: GLM-5.2 Runtime Autofix

on:
  push:
    branches:
      - fix/glm52-runtime-hardening-v2
    paths:
      - "src/paperagent/providers/**"
      - "scripts/run_academic_tailoring_retrieval_v1.py"
      - "tests/providers/test_openai_llm_runtime_limits.py"
      - "tests/evals/test_academic_tailoring_runtime_checkpoint.py"
      - ".github/workflows/glm52-runtime-autofix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: glm52-runtime-autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/glm52-runtime-hardening-v2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply canonical formatting
        run: |
          ruff format \
            src/paperagent/providers/config.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/runtime_factory.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py
          ruff check --fix \
            src/paperagent/providers/config.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/runtime_factory.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py
          git diff --check
      - name: Commit formatter output
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/paperagent/providers/config.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/runtime_factory.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py
          git commit -m "style(llm): format runtime hardening"
          git push origin HEAD:fix/glm52-runtime-hardening-v2
