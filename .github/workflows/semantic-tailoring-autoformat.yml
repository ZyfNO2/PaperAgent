name: Semantic Tailoring Autoformat

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/semantic-tailoring-autoformat.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: semantic-tailoring-autoformat
  cancel-in-progress: false

jobs:
  format-fix-test:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply diagnosed source and test fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def transition(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if new in text:
                  print(f"already applied: {path}")
                  return
              if old not in text:
                  raise RuntimeError(f"{path}: neither old nor new form found")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")
              print(f"patched: {path}")

          scorer_path = Path("scripts/score_academic_tailoring_retrieval_v2.py")
          scorer = scorer_path.read_text(encoding="utf-8")
          scorer = scorer.replace("import re\n", "", 1)
          if "task_specific_experiment_count = sum(" not in scorer:
              pattern = re.compile(
                  r"    if trace\.experiments and all\(\s*"
                  r"_protocol_specific\(item\) for item in trace\.experiments\s*"
                  r"\):\n        experiment_score \+= 2\n"
              )
              replacement = (
                  "    task_specific_experiment_count = sum(\n"
                  "        _protocol_specific(item) for item in trace.experiments\n"
                  "    )\n"
                  "    if (\n"
                  "        trace.experiments\n"
                  "        and task_specific_experiment_count == len(trace.experiments)\n"
                  "    ):\n"
                  "        experiment_score += 2\n"
              )
              scorer, count = pattern.subn(replacement, scorer, count=1)
              if count != 1:
                  raise RuntimeError("scorer: experiment protocol block not found")
          if "or task_specific_experiment_count != len(trace.experiments)" not in scorer:
              anchor = "        or experiment_score < 7\n    ):\n"
              replacement = (
                  "        or experiment_score < 7\n"
                  "        or not trace.experiments\n"
                  "        or task_specific_experiment_count != len(trace.experiments)\n"
                  "    ):\n"
              )
              if anchor not in scorer:
                  raise RuntimeError("scorer: GO gate anchor not found")
              scorer = scorer.replace(anchor, replacement, 1)
          audit_pattern = re.compile(
              r'            "task_specific_experiment_count": sum\(\n'
              r"                _protocol_specific\(item\) for item in trace\.experiments\n"
              r"            \),\n"
          )
          scorer = audit_pattern.sub(
              '            "task_specific_experiment_count": task_specific_experiment_count,\n',
              scorer,
              count=1,
          )
          scorer_path.write_text(scorer, encoding="utf-8")

          strict_path = Path("src/paperagent/strict_method_design.py")
          strict = strict_path.read_text(encoding="utf-8")
          if "and declared_baseline.evidence_id == declared_module.evidence_id" not in strict:
              pattern = re.compile(
                  r"    if declared_baseline is not None and declared_module is not None:\n"
                  r"        if declared_baseline\.evidence_id == declared_module\.evidence_id:\n"
                  r"            raise ValueError\(\n?"
                  r'\s*"baseline and declared module source must be independent evidence items"\n?'
                  r"\s*\)\n"
              )
              replacement = (
                  "    if (\n"
                  "        declared_baseline is not None\n"
                  "        and declared_module is not None\n"
                  "        and declared_baseline.evidence_id == declared_module.evidence_id\n"
                  "    ):\n"
                  "        raise ValueError(\n"
                  "            \"baseline and declared module source must be independent evidence items\"\n"
                  "        )\n"
              )
              strict, count = pattern.subn(replacement, strict, count=1)
              if count != 1:
                  raise RuntimeError("strict canonicalizer: nested identity guard not found")
          strict_path.write_text(strict, encoding="utf-8")

          load_path = Path("scripts/test_provider_router_load.py")
          load_text = load_path.read_text(encoding="utf-8").replace(
              "  # noqa: ANN201 - compatibility property", "", 1
          )
          load_path.write_text(load_text, encoding="utf-8")

          load_test_path = Path("tests/scripts/test_provider_router_load.py")
          load_test_text = load_test_path.read_text(encoding="utf-8").replace(
              "  # noqa: ANN201, ANN003", "", 1
          )
          load_test_path.write_text(load_test_text, encoding="utf-8")

          transition(
              "tests/evals/test_academic_tailoring_retrieval_v2_scorer.py",
              '    assert result["dimensions"]["experiment_and_ablation_design"] < 7\n',
              '    assert result["scoring_audit"]["task_specific_experiment_count"] == 0\n',
          )
          PY
      - name: Apply repository formatter
        run: |
          ruff format \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            scripts/score_academic_tailoring_retrieval_v2.py \
            scripts/test_provider_router_load.py \
            tests/methodology/test_strict_method_design.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/scripts/test_provider_router_load.py
      - name: Lint diagnosed files
        run: |
          ruff check \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            scripts/score_academic_tailoring_retrieval_v2.py \
            scripts/test_provider_router_load.py \
            tests/methodology/test_strict_method_design.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/scripts/test_provider_router_load.py
      - name: Run focused regression
        run: |
          python -m pytest -q \
            tests/methodology/test_strict_method_design.py \
            tests/methodology/test_method_design_draft.py \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/providers/test_routing_llm_provider.py \
            tests/scripts/test_provider_router_load.py
      - name: Commit diagnosed fixes and formatting
        run: |
          git config user.name "paperagent-cloud-dev"
          git config user.email "paperagent-cloud-dev@users.noreply.github.com"
          git add \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            scripts/score_academic_tailoring_retrieval_v2.py \
            scripts/test_provider_router_load.py \
            tests/methodology/test_strict_method_design.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/scripts/test_provider_router_load.py
          if git diff --cached --quiet; then
            echo "No diagnosed changes required."
            exit 0
          fi
          git commit -m "fix(eval): close semantic gate diagnostics"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
