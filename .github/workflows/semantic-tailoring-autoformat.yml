name: Semantic Tailoring Autoformat

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/semantic-tailoring-autoformat.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: semantic-tailoring-autoformat
  cancel-in-progress: false

jobs:
  format-fix-test:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply diagnosed source and test fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one match, found {count}")
              file.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "scripts/score_academic_tailoring_retrieval_v2.py",
              "import importlib.util\nimport re\nfrom pathlib import Path\n",
              "import importlib.util\nfrom pathlib import Path\n",
          )
          replace_once(
              "src/paperagent/strict_method_design.py",
              '''    if declared_baseline is not None and declared_module is not None:\n        if declared_baseline.evidence_id == declared_module.evidence_id:\n            raise ValueError("baseline and declared module source must be independent evidence items")\n''',
              '''    if (\n        declared_baseline is not None\n        and declared_module is not None\n        and declared_baseline.evidence_id == declared_module.evidence_id\n    ):\n        raise ValueError("baseline and declared module source must be independent evidence items")\n''',
          )
          replace_once(
              "scripts/test_provider_router_load.py",
              "    def last_usage(self):  # noqa: ANN201 - compatibility property\n",
              "    def last_usage(self):\n",
          )
          replace_once(
              "tests/scripts/test_provider_router_load.py",
              "    async def generate_structured(self, **kwargs):  # noqa: ANN201, ANN003\n",
              "    async def generate_structured(self, **kwargs):\n",
          )
          replace_once(
              "scripts/score_academic_tailoring_retrieval_v2.py",
              '''    if trace.experiments and all(_protocol_specific(item) for item in trace.experiments):\n        experiment_score += 2\n    experiment_score = min(10, experiment_score)\n''',
              '''    task_specific_experiment_count = sum(\n        _protocol_specific(item) for item in trace.experiments\n    )\n    if (\n        trace.experiments\n        and task_specific_experiment_count == len(trace.experiments)\n    ):\n        experiment_score += 2\n    experiment_score = min(10, experiment_score)\n''',
          )
          replace_once(
              "scripts/score_academic_tailoring_retrieval_v2.py",
              '''        or dimensions.get("repository_truth_and_relation", 0) < 3\n        or experiment_score < 7\n    ):\n''',
              '''        or dimensions.get("repository_truth_and_relation", 0) < 3\n        or experiment_score < 7\n        or not trace.experiments\n        or task_specific_experiment_count != len(trace.experiments)\n    ):\n''',
          )
          replace_once(
              "scripts/score_academic_tailoring_retrieval_v2.py",
              '''            "task_specific_experiment_count": sum(\n                _protocol_specific(item) for item in trace.experiments\n            ),\n''',
              '''            "task_specific_experiment_count": task_specific_experiment_count,\n''',
          )
          replace_once(
              "tests/evals/test_academic_tailoring_retrieval_v2_scorer.py",
              '''    assert result["dimensions"]["experiment_and_ablation_design"] < 7\n''',
              '''    assert result["scoring_audit"]["task_specific_experiment_count"] == 0\n''',
          )
          PY
      - name: Apply repository formatter
        run: |
          ruff format \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            scripts/score_academic_tailoring_retrieval_v2.py \
            scripts/test_provider_router_load.py \
            tests/methodology/test_strict_method_design.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/scripts/test_provider_router_load.py
      - name: Lint diagnosed files
        run: |
          ruff check \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            scripts/score_academic_tailoring_retrieval_v2.py \
            scripts/test_provider_router_load.py \
            tests/methodology/test_strict_method_design.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/scripts/test_provider_router_load.py
      - name: Run focused regression
        run: |
          python -m pytest -q \
            tests/methodology/test_strict_method_design.py \
            tests/methodology/test_method_design_draft.py \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/providers/test_routing_llm_provider.py \
            tests/scripts/test_provider_router_load.py
      - name: Commit diagnosed fixes and formatting
        run: |
          git config user.name "paperagent-cloud-dev"
          git config user.email "paperagent-cloud-dev@users.noreply.github.com"
          git add \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            scripts/score_academic_tailoring_retrieval_v2.py \
            scripts/test_provider_router_load.py \
            tests/methodology/test_strict_method_design.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/scripts/test_provider_router_load.py
          if git diff --cached --quiet; then
            echo "No diagnosed changes required."
            exit 0
          fi
          git commit -m "fix(eval): close semantic gate diagnostics"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
