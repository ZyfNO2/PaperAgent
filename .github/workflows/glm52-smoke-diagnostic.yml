name: GLM-5.2 Structured Smoke Diagnostic

on:
  push:
    branches:
      - fix/glm52-runtime-hardening-v2
    paths:
      - ".github/workflows/glm52-smoke-diagnostic.yml"
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-live-test
    paths:
      - ".github/workflows/glm52-smoke-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      PAPERAGENT_OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      PAPERAGENT_LLM_PROVIDER: openai
      PAPERAGENT_LLM_MODEL: z-ai/glm-5.2
      PAPERAGENT_LLM_BASE_URL: https://integrate.api.nvidia.com/v1
      PAPERAGENT_LLM_CONNECT_TIMEOUT: "15"
      PAPERAGENT_LLM_READ_TIMEOUT: "120"
      PAPERAGENT_LLM_TOTAL_TIMEOUT: "150"
      PAPERAGENT_LLM_MAX_ATTEMPTS: "2"
      PAPERAGENT_LLM_MAX_CALLS: "4"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_CALL: "512"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_TASK: "2048"
      PAPERAGENT_LLM_NATIVE_JSON_SCHEMA: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Require NVIDIA credential
        run: test -n "$NVIDIA_API_KEY"
      - name: Execute diagnostic structured call
        shell: bash
        run: |
          mkdir -p build/glm52-diagnostic
          set +e
          python - <<'PY' > build/glm52-diagnostic/smoke.log 2>&1
          import asyncio
          import json
          from typing import Literal

          from pydantic import BaseModel

          from paperagent.providers.config import load_provider_config
          from paperagent.providers.runtime_factory import build_llm_provider
          from paperagent.schemas import Message


          class SmokeReply(BaseModel):
              status: Literal["ok"]


          async def main() -> None:
              provider = build_llm_provider(load_provider_config())
              result = await provider.generate_structured(
                  task="glm52-structured-diagnostic",
                  scenario="ci",
                  call_index=1,
                  fixture_version="v1",
                  schema=SmokeReply,
                  messages=[
                      Message(
                          role="user",
                          content='Return exactly one JSON object: {"status":"ok"}',
                      )
                  ],
              )
              print(json.dumps({"status": result.status, "model": provider.model_name}))


          asyncio.run(main())
          PY
          status=$?
          printf '%s\n' "$status" > build/glm52-diagnostic/exit-code.txt
          cat build/glm52-diagnostic/smoke.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: glm52-structured-smoke-diagnostic
          path: build/glm52-diagnostic/
          if-no-files-found: error
          retention-days: 7
