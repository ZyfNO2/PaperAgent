name: Cloud Provider Attribution Format

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/format-provider-attribution
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply repository formatter
        run: ruff format src/paperagent/providers/runtime.py tests/providers/test_runtime.py
      - name: Commit exact formatter output
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/paperagent/providers/runtime.py tests/providers/test_runtime.py
          git commit -m "style(runtime): apply exact provider attribution format"
          git push origin HEAD:tmp/format-provider-attribution
