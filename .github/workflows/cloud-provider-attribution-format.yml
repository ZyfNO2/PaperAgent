name: Cloud Provider Attribution Diagnostics

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/format-provider-attribution
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Capture diagnostics
        shell: bash
        run: |
          mkdir -p build/provider-attribution-diagnostics
          set +e
          ruff format --check src/paperagent/providers/runtime.py tests/providers/test_runtime.py > build/provider-attribution-diagnostics/format.txt 2>&1
          echo "$?" > build/provider-attribution-diagnostics/format-exit-code.txt
          mypy --strict src/paperagent/providers/runtime.py > build/provider-attribution-diagnostics/mypy.txt 2>&1
          echo "$?" > build/provider-attribution-diagnostics/mypy-exit-code.txt
          pytest -q tests/providers/test_runtime.py > build/provider-attribution-diagnostics/pytest.txt 2>&1
          echo "$?" > build/provider-attribution-diagnostics/pytest-exit-code.txt
          cat build/provider-attribution-diagnostics/format.txt
          cat build/provider-attribution-diagnostics/mypy.txt
          cat build/provider-attribution-diagnostics/pytest.txt
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provider-attribution-diagnostics
          path: build/provider-attribution-diagnostics/
          retention-days: 1
