name: Method Design Draft Diagnostics Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/method-design-draft-diagnostics-once.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/claw-live-search-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Capture compact diagnostics
        shell: bash
        run: |
          set +e
          out="build/method-design-diagnostics"
          mkdir -p "$out"
          files=(
            src/paperagent/method_design_draft.py
            src/paperagent/nodes/method_design.py
            tests/methodology/test_method_design_draft.py
          )
          ruff check "${files[@]}" --output-format=concise > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check --diff "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_evidence_binding.py \
            tests/graph/test_full_graph.py \
            tests/graph/test_hitl.py \
            tests/review/test_consolidated_regressions.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          target="evals/claw_academic_tailoring_v1/live-probes/method-design-draft-diagnostics-latest.json"
          mkdir -p "$(dirname "$target")"
          python - "$target" "$out" "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          target = Path(sys.argv[1])
          out = Path(sys.argv[2])
          names = ("ruff", "format", "mypy", "pytest")
          statuses = dict(zip(names, map(int, sys.argv[3:]), strict=True))
          payload = {
              "workflow_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "workflow_head_sha": os.environ["GITHUB_SHA"],
              "statuses": statuses,
              "diagnostics": {},
          }
          for name in names:
              lines = (out / f"{name}.log").read_text(encoding="utf-8", errors="replace").splitlines()
              payload["diagnostics"][name] = lines[:160]
          with target.open("w", encoding="utf-8") as handle:
              json.dump(payload, handle, ensure_ascii=False, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$target"
          git commit -m "chore(method): persist draft diagnostics [skip ci]"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
