name: PR28 Focused Diagnostic

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/pr28-focused-diagnostic.yml"

permissions:
  contents: read

jobs:
  focused-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Capture focused test output
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p build/pr28-focused
          pytest -vv \
            tests/evals/test_gold_case_readiness.py \
            tests/evals/test_rag_evaluation.py \
            tests/evals/test_rag_evaluation_hardening.py \
            tests/test_interview_readiness.py \
            > build/pr28-focused/pytest.log 2>&1
          printf '%s\n' "$?" > build/pr28-focused/exit-code.txt
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pr28-focused-${{ github.run_id }}
          path: build/pr28-focused
          retention-days: 3
          if-no-files-found: error
