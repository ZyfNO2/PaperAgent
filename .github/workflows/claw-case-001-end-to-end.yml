name: CLAW Case 001 End-to-End

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".case001-e2e-trigger"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: claw-case-001-end-to-end
  cancel-in-progress: true

jobs:
  case-001:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      PAPERAGENT_LLM_PROVIDER: mistral
      PAPERAGENT_LLM_MODEL: mistral-small-latest
      PAPERAGENT_LLM_BASE_URL: https://api.mistral.ai/v1
      PAPERAGENT_LLM_MAX_ATTEMPTS: "2"
      PAPERAGENT_LLM_MAX_CALLS: "12"
      PAPERAGENT_LLM_TASK_TIMEOUT: "900"
      PAPERAGENT_CONTACT_EMAIL: ${{ secrets.PAPERAGENT_CONTACT_EMAIL }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Validate Case 001 changes before using LLM quota
        id: validate
        shell: bash
        run: |
          set +e
          out="build/claw-case-001-e2e"
          mkdir -p "$out"
          files=(
            src/paperagent/schemas/plan.py
            src/paperagent/evidence_gap_binding.py
            src/paperagent/retrieval/verify_evidence.py
            src/paperagent/retrieval/prepare_search.py
            src/paperagent/literature/query_concepts.py
            src/paperagent/literature/query_refinement.py
            src/paperagent/literature/ranking.py
            scripts/probe_claw_case_retrieval.py
            scripts/probe_claw_case_end_to_end.py
            tests/literature/test_query_concepts.py
            tests/literature/test_query_refinement.py
            tests/nodes/test_retrieval.py
            tests/review/test_semantic_gap_binding.py
            tests/schemas/test_plan_nonblocking_clarification.py
            tests/unit/test_schemas.py
          )
          ruff check "${files[@]}" > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/literature/test_query_concepts.py \
            tests/literature/test_query_refinement.py \
            tests/literature/test_source_selection_policy.py \
            tests/nodes/test_retrieval.py \
            tests/review/test_semantic_gap_binding.py \
            tests/review/test_consolidated_regressions.py \
            tests/schemas/test_plan_nonblocking_clarification.py \
            tests/unit/test_schemas.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          python - \
            "$out/validation.json" \
            "$ruff_status" \
            "$format_status" \
            "$mypy_status" \
            "$pytest_status" <<'PY'
          import json
          import sys

          payload = {
              "ruff": int(sys.argv[2]),
              "format": int(sys.argv[3]),
              "mypy": int(sys.argv[4]),
              "pytest": int(sys.argv[5]),
          }
          payload["passed"] = all(value == 0 for value in payload.values())
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2, sort_keys=True)
              handle.write("\n")
          print(json.dumps(payload, sort_keys=True))
          PY
          if (( ruff_status || format_status || mypy_status || pytest_status )); then
            python - \
              "$out/summary.json" \
              "$ruff_status" \
              "$format_status" \
              "$mypy_status" \
              "$pytest_status" <<'PY'
          import json
          import sys

          payload = {
              "case_id": "at-001-uav-small-object-lightweight",
              "status": "validation_failed_before_llm",
              "passed": False,
              "validation": {
                  "ruff": int(sys.argv[2]),
                  "format": int(sys.argv[3]),
                  "mypy": int(sys.argv[4]),
                  "pytest": int(sys.argv[5]),
              },
              "web_search_enabled": False,
          }
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, ensure_ascii=False, indent=2, sort_keys=True)
              handle.write("\n")
          PY
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Execute Case 001
        if: steps.validate.outputs.passed == 'true'
        id: execute
        shell: bash
        run: |
          set +e
          out="build/claw-case-001-e2e"
          if [[ -z "${MISTRAL_API_KEY:-}" ]]; then
            python - "$out/summary.json" <<'PY'
          import json
          import sys

          payload = {
              "case_id": "at-001-uav-small-object-lightweight",
              "status": "blocked_missing_mistral_secret",
              "passed": False,
              "message": "Repository secret MISTRAL_API_KEY is not configured.",
              "web_search_enabled": False,
          }
          with open(sys.argv[1], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, ensure_ascii=False, indent=2, sort_keys=True)
              handle.write("\n")
          print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
          PY
            exit 78
          fi
          python scripts/probe_claw_case_end_to_end.py \
            --case-id at-001-uav-small-object-lightweight \
            --max-llm-calls 12 \
            --provider-call-budget 8 \
            --verification-call-budget 16 \
            --minimum-score 80 \
            --output-dir "$out" \
            > "$out/stdout.log" 2> "$out/stderr.log"
          status=$?
          printf '%s\n' "$status" > "$out/exit-code.txt"
          cat "$out/stdout.log"
          if [[ -s "$out/stderr.log" ]]; then
            cat "$out/stderr.log" >&2
          fi
          exit "$status"
      - name: Upload Case 001 end-to-end evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claw-case-001-e2e-${{ github.run_id }}
          path: build/claw-case-001-e2e/
          if-no-files-found: error
          retention-days: 30
      - name: Persist compact Case 001 result temporarily
        if: always()
        shell: bash
        run: |
          source_file="build/claw-case-001-e2e/summary.json"
          target_file="evals/claw_academic_tailoring_v1/live-probes/case-001-end-to-end-latest.json"
          prepared_file="/tmp/case-001-end-to-end-latest.json"
          if [[ ! -f "$source_file" ]]; then
            exit 0
          fi
          python - "$source_file" "$prepared_file" <<'PY'
          import json
          import os
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          payload["workflow_run_id"] = int(os.environ["GITHUB_RUN_ID"])
          payload["workflow_head_sha"] = os.environ["GITHUB_SHA"]
          with open(sys.argv[2], "w", encoding="utf-8") as handle:
              json.dump(payload, handle, ensure_ascii=False, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$GITHUB_REF_NAME"
          git checkout -B "$GITHUB_REF_NAME" "origin/$GITHUB_REF_NAME"
          mkdir -p "$(dirname "$target_file")"
          cp "$prepared_file" "$target_file"
          git add "$target_file"
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(eval): persist Case 001 end-to-end result [skip ci]"
          for attempt in 1 2 3; do
            if git push origin "HEAD:$GITHUB_REF_NAME"; then
              exit 0
            fi
            git fetch origin "$GITHUB_REF_NAME"
            git rebase "origin/$GITHUB_REF_NAME"
          done
          exit 1
      - name: Publish Case 001 end-to-end status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          pr_number=$(gh pr list \
            --head "$GITHUB_REF_NAME" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [[ -z "$pr_number" ]]; then
            exit 0
          fi
          summary_file="build/claw-case-001-e2e/summary.json"
          if [[ -f "$summary_file" ]]; then
            summary=$(python - "$summary_file" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          validation = payload.get("validation", {})
          print(
              "status={status}; passed={passed}; score={score}; decision_match={match}; "
              "hard_failures={hard}; validation={validation}".format(
                  status=payload.get("status"),
                  passed=payload.get("passed"),
                  score=payload.get("score"),
                  match=payload.get("decision_matches"),
                  hard=len(payload.get("hard_failures", [])),
                  validation=validation,
              )
          )
          PY
          )
          else
            summary="result file was not produced"
          fi
          gh pr comment "$pr_number" --body "Case 001 end-to-end probe\n\n- Run: $GITHUB_RUN_ID\n- Head: \`$GITHUB_SHA\`\n- $summary\n- Artifact: \`claw-case-001-e2e-$GITHUB_RUN_ID\`"
      - name: Enforce Case 001 outcome
        if: always()
        shell: bash
        run: |
          python - "build/claw-case-001-e2e/summary.json" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          raise SystemExit(0 if payload.get("passed") is True else 1)
          PY
