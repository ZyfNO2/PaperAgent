name: Academic Eval Fix Observer

on:
  push:
    branches:
      - fix/academic-eval-diagnostics-baseline-binding
    paths:
      - ".github/workflows/academic-eval-fix-observer.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

concurrency:
  group: academic-eval-fix-observer
  cancel-in-progress: true

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/academic-eval-diagnostics-baseline-binding
          fetch-depth: 0

      - name: Inspect latest artifact-driven run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          run_json="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow academic-eval-artifact-driven-fixes.yml \
            --branch fix/academic-eval-diagnostics-baseline-binding \
            --limit 1 \
            --json databaseId,status,conclusion,url,headSha)"
          echo "$run_json" > /tmp/run.json
          run_id="$(python -c 'import json; rows=json.load(open("/tmp/run.json")); print(rows[0]["databaseId"] if rows else "")')"
          if [ -z "$run_id" ]; then
            echo '{"error":"no artifact-driven workflow run found"}' > /tmp/run-detail.json
            : > /tmp/failed.log
          else
            for _ in $(seq 1 90); do
              status="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json status --jq .status)"
              if [ "$status" = "completed" ]; then
                break
              fi
              sleep 10
            done
            gh run view "$run_id" --repo "$GITHUB_REPOSITORY" \
              --json databaseId,status,conclusion,url,headSha,jobs > /tmp/run-detail.json
            set +e
            gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/failed.log 2>&1
            set -e
          fi

      - name: Persist observer output
        shell: bash
        run: |
          mkdir -p cloud-status
          cp /tmp/run.json cloud-status/artifact-driven-run-list.json
          cp /tmp/run-detail.json cloud-status/artifact-driven-run.json
          tail -n 160 /tmp/failed.log > cloud-status/artifact-driven-failed.log
          git config user.name "paperagent-cloud-observer"
          git config user.email "actions@users.noreply.github.com"
          git add cloud-status/
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(ci): record artifact-driven fix status"
          git pull --rebase origin fix/academic-eval-diagnostics-baseline-binding
          git push origin HEAD:fix/academic-eval-diagnostics-baseline-binding

      - name: Comment observer result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          run_url="$(python -c 'import json; d=json.load(open("/tmp/run-detail.json")); print(d.get("url", ""))')"
          conclusion="$(python -c 'import json; d=json.load(open("/tmp/run-detail.json")); print(d.get("conclusion", d.get("error", "unknown")))')"
          gh pr comment 41 --repo "$GITHUB_REPOSITORY" --body \
            "Artifact-driven v3 observer persisted status \`$conclusion\` to \`cloud-status/\`. ${run_url:+Run: $run_url}"
