name: Apply evidence-bound module fix

on:
  pull_request:
    branches:
      - automation/evidence-bound-module-runner

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/evidence-bound-module-contracts
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decode exact source patch
        run: |
          mkdir -p build/evidence-bound-module-fix
          python - <<'PY'
          import base64
          import zlib
          from pathlib import Path

          payload = Path('scripts/evidence_bound_module_patch.b64').read_text().strip()
          Path('/tmp/apply_fix.py').write_bytes(zlib.decompress(base64.b64decode(payload)))
          PY

      - name: Apply exact source patches
        id: apply_patch
        continue-on-error: true
        run: |
          set -o pipefail
          python /tmp/apply_fix.py 2>&1 | tee build/evidence-bound-module-fix/patch.log

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-bound-module-patch-log
          path: build/evidence-bound-module-fix/patch.log
          if-no-files-found: warn

      - name: Stop after patch failure
        if: steps.apply_patch.outcome == 'failure'
        run: exit 1

      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'

      - name: Format and lint
        run: |
          ruff format src/paperagent tests scripts/score_academic_tailoring_retrieval_v1.py
          ruff check src/paperagent tests scripts/score_academic_tailoring_retrieval_v1.py

      - name: Run targeted offline tests
        id: targeted_tests
        continue-on-error: true
        run: |
          set -o pipefail
          pytest -q \
            tests/methodology/test_method_design_draft.py \
            tests/evals/test_adapter_module_contract.py \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py \
            tests/evals/test_claw_benchmark_adapter.py \
            2>&1 | tee build/evidence-bound-module-fix/targeted-tests.log

      - name: Upload targeted test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-bound-module-targeted-tests
          path: build/evidence-bound-module-fix/targeted-tests.log
          if-no-files-found: warn

      - name: Stop after targeted test failure
        if: steps.targeted_tests.outcome == 'failure'
        run: exit 1

      - name: Run offline regression
        id: offline_regression
        continue-on-error: true
        run: pytest -q -m 'not real_provider and not network and not browser and not llm'

      - name: Record regression outcome
        run: echo "offline_regression=${{ steps.offline_regression.outcome }}"

      - name: Commit implementation
        run: |
          rm -f scripts/evidence_bound_module_patch.b64
          rm -f scripts/evidence_bound_module_patch.part*
          rm -f .github/evidence-bound-module-trigger.txt
          rm -f .github/workflows/apply-evidence-bound-module-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(method): bind module contracts to independent evidence'
          git push origin HEAD:fix/evidence-bound-module-contracts
