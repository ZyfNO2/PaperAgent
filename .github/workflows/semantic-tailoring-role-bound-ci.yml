name: Semantic Tailoring Role-Bound CI

on:
  push:
    branches:
      - fix/semantic-tailoring-role-bound-scoring
    paths:
      - "src/paperagent/strict_method_design.py"
      - "src/paperagent/nodes/method_design.py"
      - "scripts/score_academic_tailoring_retrieval_v2.py"
      - "scripts/test_provider_router_load.py"
      - "config/provider-router-load.example.json"
      - "tests/methodology/test_strict_method_design.py"
      - "tests/evals/test_academic_tailoring_retrieval_v2_scorer.py"
      - "tests/scripts/test_provider_router_load.py"
      - ".github/workflows/semantic-tailoring-role-bound-ci.yml"
  pull_request:
    branches:
      - master
    paths:
      - "src/paperagent/strict_method_design.py"
      - "src/paperagent/nodes/method_design.py"
      - "scripts/score_academic_tailoring_retrieval_v2.py"
      - "scripts/test_provider_router_load.py"
      - "config/provider-router-load.example.json"
      - "tests/methodology/test_strict_method_design.py"
      - "tests/evals/test_academic_tailoring_retrieval_v2_scorer.py"
      - "tests/scripts/test_provider_router_load.py"
      - ".github/workflows/semantic-tailoring-role-bound-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline-semantic-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply repository formatting in validation workspace
        run: |
          ruff format \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            scripts/score_academic_tailoring_retrieval_v2.py \
            scripts/test_provider_router_load.py \
            tests/methodology/test_strict_method_design.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/scripts/test_provider_router_load.py
      - name: Compile changed runtime modules
        run: |
          python -m compileall -q \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            scripts/score_academic_tailoring_retrieval_v2.py \
            scripts/test_provider_router_load.py
      - name: Capture lint and type diagnostics
        shell: bash
        run: |
          mkdir -p build/semantic-tailoring-ci
          set +e
          ruff check --output-format json \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            scripts/score_academic_tailoring_retrieval_v2.py \
            scripts/test_provider_router_load.py \
            tests/methodology/test_strict_method_design.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/scripts/test_provider_router_load.py \
            > build/semantic-tailoring-ci/ruff.json
          echo "$?" > build/semantic-tailoring-ci/ruff-exit-code.txt
          mypy --strict \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            > build/semantic-tailoring-ci/mypy.txt 2>&1
          echo "$?" > build/semantic-tailoring-ci/mypy-exit-code.txt
          exit 0
      - name: Capture focused semantic and router tests
        shell: bash
        run: |
          set +e
          python -m pytest -q \
            tests/methodology/test_strict_method_design.py \
            tests/methodology/test_method_design_draft.py \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/providers/test_routing_llm_provider.py \
            tests/scripts/test_provider_router_load.py \
            2>&1 | tee build/semantic-tailoring-ci/pytest.txt
          echo "${PIPESTATUS[0]}" > build/semantic-tailoring-ci/pytest-exit-code.txt
          exit 0
      - name: Upload validated formatted source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-tailoring-formatted-source
          path: |
            src/paperagent/strict_method_design.py
            src/paperagent/nodes/method_design.py
            scripts/score_academic_tailoring_retrieval_v2.py
            scripts/test_provider_router_load.py
            tests/methodology/test_strict_method_design.py
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py
            tests/scripts/test_provider_router_load.py
          if-no-files-found: error
          retention-days: 3
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-tailoring-validation-diagnostics
          path: build/semantic-tailoring-ci/
          if-no-files-found: error
          retention-days: 3
      - name: Enforce lint, types, tests, and committed formatting
        run: |
          test "$(cat build/semantic-tailoring-ci/ruff-exit-code.txt)" = "0"
          test "$(cat build/semantic-tailoring-ci/mypy-exit-code.txt)" = "0"
          test "$(cat build/semantic-tailoring-ci/pytest-exit-code.txt)" = "0"
          git diff --exit-code -- \
            src/paperagent/strict_method_design.py \
            src/paperagent/nodes/method_design.py \
            scripts/score_academic_tailoring_retrieval_v2.py \
            scripts/test_provider_router_load.py \
            tests/methodology/test_strict_method_design.py \
            tests/evals/test_academic_tailoring_retrieval_v2_scorer.py \
            tests/scripts/test_provider_router_load.py
