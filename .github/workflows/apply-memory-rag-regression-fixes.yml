name: Apply Memory RAG regression fixes

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/paperagent-memory-rag'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/paperagent-memory-rag
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply exact regression updates
        run: python .github/scripts/apply_memory_rag_regression_fixes.py
      - name: Format and validate changed test
        run: |
          python -m pip install 'ruff>=0.12,<0.13'
          ruff format tests/providers/test_openai_llm_unit.py
          ruff check tests/providers/test_openai_llm_unit.py
      - name: Commit changes
        shell: bash
        run: |
          git config user.name 'paperagent-ci'
          git config user.email 'paperagent-ci@users.noreply.github.com'
          git add tests/providers/test_openai_llm_unit.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'test(provider): align bounded retry and error contracts'
          git push origin HEAD:refactor/paperagent-memory-rag
