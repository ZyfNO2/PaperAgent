name: Re8.2 Gate Contract Regression

on:
  push:
    branches:
      - "dev/re8.2-*"
      - "fix/re8.2-*"
    paths:
      - "pyproject.toml"
      - "scripts/ci/compare_pytest_junit.py"
      - "apps/api/app/services/agents/graph/state.py"
      - "apps/api/app/services/agents/graph/nodes/__init__.py"
      - "apps/api/app/services/agents/graph/nodes/reflection_gate_reuse.py"
      - "apps/api/app/services/agents/graph/nodes/tailor_gate_entry.py"
      - "apps/api/app/services/agents/graph/nodes/final_recommendation_re82.py"
      - "apps/api/tests/fixtures/seed_repair_cases.json"
      - "apps/api/tests/test_re81_seed_repair_fixture_contract.py"
      - "apps/api/tests/test_re82_*.py"
      - "apps/web-react/**"
      - ".github/workflows/re82-wp1.yml"
  pull_request:
    paths:
      - "pyproject.toml"
      - "scripts/ci/compare_pytest_junit.py"
      - "apps/api/app/services/agents/graph/state.py"
      - "apps/api/app/services/agents/graph/nodes/__init__.py"
      - "apps/api/app/services/agents/graph/nodes/reflection_gate_reuse.py"
      - "apps/api/app/services/agents/graph/nodes/tailor_gate_entry.py"
      - "apps/api/app/services/agents/graph/nodes/final_recommendation_re82.py"
      - "apps/api/app/services/agents/graph/nodes/reflection_gates.py"
      - "apps/api/tests/fixtures/seed_repair_cases.json"
      - "apps/api/tests/test_re81_seed_repair_fixture_contract.py"
      - "apps/api/tests/test_re82_*.py"
      - "apps/api/tests/test_re8_reflection_gates.py"
      - "apps/web-react/**"
      - ".github/workflows/re82-wp1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,pdf]"

      - name: Compile changed Python modules
        run: >-
          python -m py_compile
          scripts/ci/compare_pytest_junit.py
          apps/api/app/services/agents/graph/state.py
          apps/api/app/services/agents/graph/nodes/__init__.py
          apps/api/app/services/agents/graph/nodes/reflection_gate_reuse.py
          apps/api/app/services/agents/graph/nodes/tailor_gate_entry.py
          apps/api/app/services/agents/graph/nodes/final_recommendation_re82.py
          apps/api/tests/test_re81_seed_repair_fixture_contract.py
          apps/api/tests/test_re82_gate_reuse.py
          apps/api/tests/test_re82_tailor_gate_entry.py
          apps/api/tests/test_re82_fingerprint_canonicalization.py
          apps/api/tests/test_re82_gate_registry_integration.py
          apps/api/tests/test_re82_final_package_gate_audit.py
          apps/api/tests/test_re82_postmerge_code_review.py

      - name: Lint changed Python files
        run: >-
          ruff check
          scripts/ci/compare_pytest_junit.py
          apps/api/app/services/agents/graph/state.py
          apps/api/app/services/agents/graph/nodes/__init__.py
          apps/api/app/services/agents/graph/nodes/reflection_gate_reuse.py
          apps/api/app/services/agents/graph/nodes/tailor_gate_entry.py
          apps/api/app/services/agents/graph/nodes/final_recommendation_re82.py
          apps/api/tests/test_re81_seed_repair_fixture_contract.py
          apps/api/tests/test_re82_gate_reuse.py
          apps/api/tests/test_re82_tailor_gate_entry.py
          apps/api/tests/test_re82_fingerprint_canonicalization.py
          apps/api/tests/test_re82_gate_registry_integration.py
          apps/api/tests/test_re82_final_package_gate_audit.py
          apps/api/tests/test_re82_postmerge_code_review.py

      - name: Create test result directory
        run: mkdir -p test-results

      - name: Run focused Re8.2 Gate tests
        run: >-
          pytest -q apps/api/tests/test_re82_*.py
          --junitxml=test-results/re82-gate.xml

      - name: Run isolated Re8 regression
        run: >-
          pytest -q apps/api/tests -k "re8"
          --junitxml=test-results/re8-isolated.xml

      - name: Run full API suite on PR head (audit)
        continue-on-error: true
        run: >-
          pytest -q apps/api/tests
          --junitxml=test-results/api-head.xml

      - name: Prepare master worktree
        run: git worktree add /tmp/paperagent-master origin/master

      - name: Run full API suite on master baseline (audit)
        continue-on-error: true
        run: >-
          cd /tmp/paperagent-master &&
          pytest -q apps/api/tests
          --junitxml="$GITHUB_WORKSPACE/test-results/api-master.xml"

      - name: Block head-only API regressions
        run: >-
          python scripts/ci/compare_pytest_junit.py
          test-results/api-master.xml
          test-results/api-head.xml

      - name: Upload JUnit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: re82-gate-test-results
          path: test-results/*.xml
          if-no-files-found: error
          retention-days: 14

  frontend-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web-react
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-react/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check and build frontend
        run: npm run build
