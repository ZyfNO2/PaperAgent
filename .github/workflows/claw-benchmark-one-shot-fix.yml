name: PaperClaw Benchmark One-shot Fix

on:
  pull_request:
    branches:
      - fix/evidence-ledger-final-outcome-trace-exact
    paths:
      - "src/paperagent/claw_academic_benchmark.py"
      - "scripts/run_claw_academic_benchmark.py"
      - "tests/evals/test_claw_academic_benchmark.py"
      - ".github/workflows/claw-benchmark-one-shot-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event.pull_request.head.ref == 'feat/claw-academic-tailoring-benchmark-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/claw-academic-tailoring-benchmark-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install formatter
        run: python -m pip install -q 'ruff>=0.12,<0.13'
      - name: Apply deterministic contract fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          module = Path('src/paperagent/claw_academic_benchmark.py')
          text = module.read_text(encoding='utf-8')
          replacements = {
              '    schema: Literal["paperagent.external-dataset-source.v1"]\n': (
                  '    schema_name: Literal["paperagent.external-dataset-source.v1"] = Field(\n'
                  '        default="paperagent.external-dataset-source.v1", alias="schema"\n'
                  '    )\n'
              ),
              '    schema: Literal["paperclaw.academic-tailoring.trace-profile.v1"]\n': (
                  '    schema_name: Literal["paperclaw.academic-tailoring.trace-profile.v1"] = Field(\n'
                  '        default="paperclaw.academic-tailoring.trace-profile.v1", alias="schema"\n'
                  '    )\n'
              ),
              '    schema: Literal["paperclaw.academic-tailoring.case.v1"]\n': (
                  '    schema_name: Literal["paperclaw.academic-tailoring.case.v1"] = Field(\n'
                  '        default="paperclaw.academic-tailoring.case.v1", alias="schema"\n'
                  '    )\n'
              ),
              '    schema: Literal["paperagent.claw-academic-run.v1"] = RUN_TRACE_SCHEMA\n': (
                  '    schema_name: Literal["paperagent.claw-academic-run.v1"] = Field(\n'
                  '        default="paperagent.claw-academic-run.v1", alias="schema"\n'
                  '    )\n'
              ),
              '    schema: Literal["paperagent.claw-academic-report.v1"] = REPORT_SCHEMA\n': (
                  '    schema_name: Literal["paperagent.claw-academic-report.v1"] = Field(\n'
                  '        default="paperagent.claw-academic-report.v1", alias="schema"\n'
                  '    )\n'
              ),
              '    source_repository: Literal["ZyfNO2/PaperClaw"] = SOURCE_REPOSITORY\n': (
                  '    source_repository: Literal["ZyfNO2/PaperClaw"] = "ZyfNO2/PaperClaw"\n'
              ),
              '    source_commit: Literal[\n'
              '        "60a577a3d8d6701a8d212604572e846cc8a41e2f"\n'
              '    ] = SOURCE_COMMIT\n': (
                  '    source_commit: Literal[\n'
                  '        "60a577a3d8d6701a8d212604572e846cc8a41e2f"\n'
                  '    ] = "60a577a3d8d6701a8d212604572e846cc8a41e2f"\n'
              ),
              '        payload = (root / filename).read_bytes()\n        actual_blob = _git_blob_sha(payload)\n': (
                  '        file_payload = (root / filename).read_bytes()\n'
                  '        actual_blob = _git_blob_sha(file_payload)\n'
              ),
              '    payload = {\n        "source": source.model_dump(mode="json"),\n        "profile": profile.model_dump(mode="json"),\n        "cases": [item.model_dump(mode="json") for item in cases],\n    }\n': (
                  '    dataset_payload = {\n'
                  '        "source": source.model_dump(mode="json", by_alias=True),\n'
                  '        "profile": profile.model_dump(mode="json", by_alias=True),\n'
                  '        "cases": [\n'
                  '            item.model_dump(mode="json", by_alias=True) for item in cases\n'
                  '        ],\n'
                  '    }\n'
              ),
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing expected source fragment: {old!r}')
              text = text.replace(old, new)
          text = text.replace(
              'self.source.model_dump(mode="json")',
              'self.source.model_dump(mode="json", by_alias=True)',
          )
          text = text.replace(
              'self.profile.model_dump(mode="json")',
              'self.profile.model_dump(mode="json", by_alias=True)',
          )
          text = text.replace(
              'item.model_dump(mode="json") for item in self.cases',
              'item.model_dump(mode="json", by_alias=True) for item in self.cases',
          )
          text = text.replace(
              'self.model_dump(mode="json", exclude={"report_digest"})',
              'self.model_dump(mode="json", by_alias=True, exclude={"report_digest"})',
          )
          text = text.replace(
              'dataset_digest=_sha256(payload),',
              'dataset_digest=_sha256(dataset_payload),',
              1,
          )
          module.write_text(text, encoding='utf-8')

          script = Path('scripts/run_claw_academic_benchmark.py')
          text = script.read_text(encoding='utf-8').replace(
              'report.model_dump(mode="json")',
              'report.model_dump(mode="json", by_alias=True)',
          )
          script.write_text(text, encoding='utf-8')

          test = Path('tests/evals/test_claw_academic_benchmark.py')
          text = test.read_text(encoding='utf-8')
          text = text.replace(
              'trace.model_dump(mode="json")',
              'trace.model_dump(mode="json", by_alias=True)',
          )
          text = text.replace(
              'report.model_dump(mode="json")',
              'report.model_dump(mode="json", by_alias=True)',
          )
          text = text.replace(
              'item.model_dump_json() for item in traces',
              'item.model_dump_json(by_alias=True) for item in traces',
          )
          text = text.replace(
              'report.model_dump_json()',
              'report.model_dump_json(by_alias=True)',
          )
          test.write_text(text, encoding='utf-8')
          PY
          files=(
            src/paperagent/claw_academic_benchmark.py
            scripts/run_claw_academic_benchmark.py
            tests/evals/test_claw_academic_benchmark.py
          )
          ruff check --fix "${files[@]}" || true
          ruff format "${files[@]}"
          ruff check "${files[@]}"
      - name: Commit fixed sources
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            src/paperagent/claw_academic_benchmark.py \
            scripts/run_claw_academic_benchmark.py \
            tests/evals/test_claw_academic_benchmark.py
          git diff --cached --quiet && exit 0
          git commit -m "fix(eval): normalize benchmark contracts and typing"
          git push origin HEAD:feat/claw-academic-tailoring-benchmark-v1
