name: Patch License Audit Policy Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/patch-license-audit-policy-once.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Patch, verify, and persist result
        shell: bash
        run: |
          set +e
          out="build/license-audit-patch"
          mkdir -p "$out"
          python - <<'PY' > "$out/patch.log" 2>&1
          from pathlib import Path
          import re
          from textwrap import dedent

          source_path = Path("src/paperagent/academic_methodology.py")
          source = source_path.read_text(encoding="utf-8")
          anchor = dedent("""\
          def _license_is_acceptable(value: str | None) -> bool:
              normalized = _normalized_license(value)
              if normalized is None:
                  return False
              return normalized not in {
                  "unknown",
                  "missing",
                  "unverified",
                  "incompatible",
                  "proprietary-no-reuse",
              }
          """)
          helper = dedent("""\


          _UNRESOLVED_LICENSES = frozenset({"unknown", "missing", "unverified"})
          _EXPLICITLY_INCOMPATIBLE_LICENSES = frozenset(
              {"incompatible", "proprietary-no-reuse"}
          )


          def _license_failure_severity(
              declared_license: str | None,
              evidence_license: str | None,
          ) -> AuditSeverity:
              declared = _normalized_license(declared_license)
              evidence = _normalized_license(evidence_license)
              if (
                  declared in _EXPLICITLY_INCOMPATIBLE_LICENSES
                  or evidence in _EXPLICITLY_INCOMPATIBLE_LICENSES
              ):
                  return AuditSeverity.CRITICAL
              concrete_declared = declared is not None and declared not in _UNRESOLVED_LICENSES
              concrete_evidence = evidence is not None and evidence not in _UNRESOLVED_LICENSES
              if concrete_declared and concrete_evidence and declared != evidence:
                  return AuditSeverity.CRITICAL
              return AuditSeverity.ERROR
          """)
          if "def _license_failure_severity(" not in source:
              if anchor not in source:
                  raise RuntimeError("license helper anchor not found")
              source = source.replace(anchor, anchor + helper, 1)

          baseline_pattern = re.compile(
              r'(\s+"baseline-license",\n\s+baseline_license_bound,\n)'
              r'\s+AuditSeverity\.CRITICAL,'
          )
          source, baseline_count = baseline_pattern.subn(
              r'\1            _license_failure_severity(\n'
              r'                baseline.license,\n'
              r'                baseline_evidence.license if baseline_evidence is not None else None,\n'
              r'            ),',
              source,
              count=1,
          )
          if baseline_count != 1 and "baseline.license,\n                baseline_evidence.license" not in source:
              raise RuntimeError("baseline license severity not patched")

          module_pattern = re.compile(
              r'(\s+f"module-license:\{module\.name\}",\n\s+module_license_bound,\n)'
              r'\s+AuditSeverity\.CRITICAL,'
          )
          source, module_count = module_pattern.subn(
              r'\1                _license_failure_severity(\n'
              r'                    module.license,\n'
              r'                    module_evidence.license if module_evidence is not None else None,\n'
              r'                ),',
              source,
              count=1,
          )
          if module_count != 1 and "module.license,\n                    module_evidence.license" not in source:
              raise RuntimeError("module license severity not patched")
          source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/methodology/test_method_design_draft.py")
          tests = test_path.read_text(encoding="utf-8")
          marker = "def test_missing_license_requires_revision_without_forcing_no_go()"
          if marker not in tests:
              tests += dedent("""\


          def _audit_with_bound_license(license_value: str | None):
              proposal = _bound_proposal(_state(), _draft())
              plan = proposal.methodology_plan
              evidence = tuple(
                  item.model_copy(update={"license": license_value}) for item in plan.evidence
              )
              baseline = plan.baseline.model_copy(update={"license": license_value})
              modules = tuple(
                  item.model_copy(update={"license": license_value}) for item in plan.modules
              )
              return audit_method_plan(
                  plan.model_copy(
                      update={"evidence": evidence, "baseline": baseline, "modules": modules}
                  )
              )


          def test_missing_license_requires_revision_without_forcing_no_go() -> None:
              audit = _audit_with_bound_license(None)
              failed = {item.check_id: item for item in audit.checks if not item.passed}

              assert audit.verdict is AuditVerdict.REVISE
              assert failed["baseline-license"].severity.value == "error"
              assert failed["module-license:shallow_feature_fusion"].severity.value == "error"


          def test_explicitly_incompatible_license_remains_no_go() -> None:
              audit = _audit_with_bound_license("proprietary-no-reuse")
              failed = {item.check_id: item for item in audit.checks if not item.passed}

              assert audit.verdict is AuditVerdict.NO_GO
              assert failed["baseline-license"].severity.value == "critical"
              assert failed["module-license:shallow_feature_fusion"].severity.value == "critical"
          """)
              test_path.write_text(tests, encoding="utf-8")
          print("patch-complete")
          PY
          patch_status=$?

          if (( patch_status == 0 )); then
            ruff check --fix \
              src/paperagent/academic_methodology.py \
              tests/methodology/test_method_design_draft.py \
              > "$out/ruff.log" 2>&1
            ruff_status=$?
            ruff format \
              src/paperagent/academic_methodology.py \
              tests/methodology/test_method_design_draft.py \
              > "$out/format.log" 2>&1
            format_status=$?
            mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
            mypy_status=$?
            pytest -q \
              tests/methodology/test_method_design_draft.py \
              tests/methodology/test_evidence_binding.py \
              tests/graph/test_full_graph.py \
              tests/graph/test_hitl.py \
              tests/review/test_consolidated_regressions.py \
              > "$out/pytest.log" 2>&1
            pytest_status=$?
          else
            ruff_status=99
            format_status=99
            mypy_status=99
            pytest_status=99
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if (( patch_status == 0 && ruff_status == 0 && format_status == 0 && mypy_status == 0 && pytest_status == 0 )); then
            git rm .github/workflows/patch-license-audit-policy-once.yml
            git add src/paperagent/academic_methodology.py tests/methodology/test_method_design_draft.py
            git commit -m "fix(audit): distinguish unknown from incompatible licenses"
          else
            target="evals/claw_academic_tailoring_v1/live-probes/license-audit-patch-diagnostics.json"
            python - "$target" "$patch_status" "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" <<'PY'
          import json
          from pathlib import Path
          import sys

          out = Path("build/license-audit-patch")
          payload = {
              "patch": int(sys.argv[2]),
              "ruff": int(sys.argv[3]),
              "format": int(sys.argv[4]),
              "mypy": int(sys.argv[5]),
              "pytest": int(sys.argv[6]),
              "logs": {},
          }
          for name in ("patch", "ruff", "format", "mypy", "pytest"):
              path = out / f"{name}.log"
              if path.exists():
                  payload["logs"][name] = path.read_text(encoding="utf-8", errors="replace").splitlines()[-40:]
          destination = Path(sys.argv[1])
          destination.parent.mkdir(parents=True, exist_ok=True)
          destination.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
            git add "$target"
            git commit -m "chore(audit): persist license patch diagnostics [skip ci]"
          fi
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
          exit $(( patch_status || ruff_status || format_status || mypy_status || pytest_status ))
