name: Patch License Audit Policy Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/patch-license-audit-policy-once.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Patch policy and regression tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/paperagent/academic_methodology.py")
          source = source_path.read_text(encoding="utf-8")
          anchor = '''def _license_is_acceptable(value: str | None) -> bool:
              normalized = _normalized_license(value)
              if normalized is None:
                  return False
              return normalized not in {
                  "unknown",
                  "missing",
                  "unverified",
                  "incompatible",
                  "proprietary-no-reuse",
              }
          '''.replace("          ", "")
          addition = anchor + '''

          _UNRESOLVED_LICENSES = frozenset({"unknown", "missing", "unverified"})
          _EXPLICITLY_INCOMPATIBLE_LICENSES = frozenset(
              {"incompatible", "proprietary-no-reuse"}
          )


          def _license_failure_severity(
              declared_license: str | None,
              evidence_license: str | None,
          ) -> AuditSeverity:
              declared = _normalized_license(declared_license)
              evidence = _normalized_license(evidence_license)
              if (
                  declared in _EXPLICITLY_INCOMPATIBLE_LICENSES
                  or evidence in _EXPLICITLY_INCOMPATIBLE_LICENSES
              ):
                  return AuditSeverity.CRITICAL
              concrete_declared = declared is not None and declared not in _UNRESOLVED_LICENSES
              concrete_evidence = evidence is not None and evidence not in _UNRESOLVED_LICENSES
              if concrete_declared and concrete_evidence and declared != evidence:
                  return AuditSeverity.CRITICAL
              return AuditSeverity.ERROR
          '''.replace("          ", "")
          if "def _license_failure_severity(" not in source:
              if anchor not in source:
                  raise SystemExit("license helper anchor not found")
              source = source.replace(anchor, addition, 1)

          baseline_old = '''    baseline_license_bound = (
              baseline_evidence is not None
              and _license_is_acceptable(baseline.license)
              and _license_is_acceptable(baseline_evidence.license)
              and _normalized_license(baseline.license) == _normalized_license(baseline_evidence.license)
          )
          checks.append(
              _check(
                  "baseline-license",
                  baseline_license_bound,
                  AuditSeverity.CRITICAL,
          '''.replace("          ", "")
          baseline_new = '''    baseline_evidence_license = (
              baseline_evidence.license if baseline_evidence is not None else None
          )
          baseline_license_bound = (
              baseline_evidence is not None
              and _license_is_acceptable(baseline.license)
              and _license_is_acceptable(baseline_evidence_license)
              and _normalized_license(baseline.license)
              == _normalized_license(baseline_evidence_license)
          )
          checks.append(
              _check(
                  "baseline-license",
                  baseline_license_bound,
                  _license_failure_severity(baseline.license, baseline_evidence_license),
          '''.replace("          ", "")
          if baseline_old in source:
              source = source.replace(baseline_old, baseline_new, 1)
          elif "_license_failure_severity(baseline.license" not in source:
              raise SystemExit("baseline license block not found")

          module_old = '''        module_license_bound = (
                  module_evidence is not None
                  and _license_is_acceptable(module.license)
                  and _license_is_acceptable(module_evidence.license)
                  and _normalized_license(module.license) == _normalized_license(module_evidence.license)
              )
              checks.append(
                  _check(
                      f"module-license:{module.name}",
                      module_license_bound,
                      AuditSeverity.CRITICAL,
          '''.replace("          ", "")
          module_new = '''        module_evidence_license = (
                  module_evidence.license if module_evidence is not None else None
              )
              module_license_bound = (
                  module_evidence is not None
                  and _license_is_acceptable(module.license)
                  and _license_is_acceptable(module_evidence_license)
                  and _normalized_license(module.license)
                  == _normalized_license(module_evidence_license)
              )
              checks.append(
                  _check(
                      f"module-license:{module.name}",
                      module_license_bound,
                      _license_failure_severity(module.license, module_evidence_license),
          '''.replace("          ", "")
          if module_old in source:
              source = source.replace(module_old, module_new, 1)
          elif "_license_failure_severity(module.license" not in source:
              raise SystemExit("module license block not found")
          source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/methodology/test_method_design_draft.py")
          tests = test_path.read_text(encoding="utf-8")
          marker = "def test_missing_license_requires_revision_without_forcing_no_go()"
          if marker not in tests:
              tests += '''


def _audit_with_bound_license(license_value: str | None):
              proposal = _bound_proposal(_state(), _draft())
              plan = proposal.methodology_plan
              evidence = tuple(
                  item.model_copy(update={"license": license_value}) for item in plan.evidence
              )
              baseline = plan.baseline.model_copy(update={"license": license_value})
              modules = tuple(
                  item.model_copy(update={"license": license_value}) for item in plan.modules
              )
              return audit_method_plan(
                  plan.model_copy(
                      update={"evidence": evidence, "baseline": baseline, "modules": modules}
                  )
              )


          def test_missing_license_requires_revision_without_forcing_no_go() -> None:
              audit = _audit_with_bound_license(None)
              failed = {item.check_id: item for item in audit.checks if not item.passed}

              assert audit.verdict is AuditVerdict.REVISE
              assert failed["baseline-license"].severity.value == "error"
              assert failed["module-license:shallow_feature_fusion"].severity.value == "error"


          def test_explicitly_incompatible_license_remains_no_go() -> None:
              audit = _audit_with_bound_license("proprietary-no-reuse")
              failed = {item.check_id: item for item in audit.checks if not item.passed}

              assert audit.verdict is AuditVerdict.NO_GO
              assert failed["baseline-license"].severity.value == "critical"
              assert failed["module-license:shallow_feature_fusion"].severity.value == "critical"
          '''.replace("          ", "")
              test_path.write_text(tests, encoding="utf-8")

          case_path = Path(".github/workflows/claw-case-001-end-to-end.yml")
          case = case_path.read_text(encoding="utf-8")
          if "src/paperagent/method_design_draft.py" not in case:
              case = case.replace(
                  "            src/paperagent/evidence_gap_binding.py\n",
                  "            src/paperagent/evidence_gap_binding.py\n"
                  "            src/paperagent/academic_methodology.py\n"
                  "            src/paperagent/method_design_draft.py\n"
                  "            src/paperagent/nodes/_shared.py\n"
                  "            src/paperagent/nodes/method_design.py\n",
                  1,
              )
          if "            tests/methodology/test_method_design_draft.py\n" not in case:
              case = case.replace(
                  "            tests/nodes/test_retrieval.py\n",
                  "            tests/nodes/test_retrieval.py\n"
                  "            tests/methodology/test_method_design_draft.py\n",
                  1,
              )
          if "            tests/methodology/test_method_design_draft.py \\\n" not in case:
              case = case.replace(
                  "            tests/nodes/test_retrieval.py \\\n",
                  "            tests/nodes/test_retrieval.py \\\n"
                  "            tests/methodology/test_method_design_draft.py \\\n",
                  1,
              )
          case_path.write_text(case, encoding="utf-8")

          gate_path = Path(".github/workflows/method-design-draft-offline-gate.yml")
          gate = gate_path.read_text(encoding="utf-8")
          if '      - "src/paperagent/academic_methodology.py"\n' not in gate:
              gate = gate.replace(
                  '      - "src/paperagent/method_design_draft.py"\n',
                  '      - "src/paperagent/academic_methodology.py"\n'
                  '      - "src/paperagent/method_design_draft.py"\n',
                  1,
              )
          if "            src/paperagent/academic_methodology.py\n" not in gate:
              gate = gate.replace(
                  "          files=(\n",
                  "          files=(\n            src/paperagent/academic_methodology.py\n",
                  1,
              )
          gate_path.write_text(gate, encoding="utf-8")
          PY
          ruff check src/paperagent/academic_methodology.py tests/methodology/test_method_design_draft.py
          ruff format --check src/paperagent/academic_methodology.py tests/methodology/test_method_design_draft.py
          mypy --config-file pyproject.toml
          pytest -q \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_evidence_binding.py \
            tests/graph/test_full_graph.py \
            tests/graph/test_hitl.py \
            tests/review/test_consolidated_regressions.py
      - name: Commit verified policy patch
        run: |
          git rm .github/workflows/patch-license-audit-policy-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/paperagent/academic_methodology.py \
            tests/methodology/test_method_design_draft.py \
            .github/workflows/claw-case-001-end-to-end.yml \
            .github/workflows/method-design-draft-offline-gate.yml
          git commit -m "fix(audit): distinguish unknown from incompatible licenses"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
