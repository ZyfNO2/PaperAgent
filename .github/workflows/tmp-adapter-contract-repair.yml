name: Temporary Adapter Contract Repair

on:
  push:
    branches: [fix/semantic-tailoring-role-bound-scoring]
    paths: [".github/workflows/tmp-adapter-contract-repair.yml"]
  pull_request:
    branches: [master]
    paths: [".github/workflows/tmp-adapter-contract-repair.yml"]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Apply adapter repair
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/paperagent/claw_benchmark_adapter.py")
          text = path.read_text(encoding="utf-8")

          marker = "_SUPPLIED_REF = re.compile(\n"
          helper = '''_GENERIC_MODULE_CONTRACT_CUES = (\n    "unresolved",\n    "unknown",\n    "selected insertion point",\n    "task-specific representation",\n    "inherit baseline",\n    "match the source evidence",\n)\n\n\ndef _specific_module_contract_text(value: str | None) -> bool:\n    if value is None or not value.strip():\n        return False\n    folded = value.casefold()\n    return not any(cue in folded for cue in _GENERIC_MODULE_CONTRACT_CUES)\n\n\ndef _module_compatibility_by_evidence(state: PaperAgentState) -> dict[str, bool]:\n    """Independently validate evidence-bound module contracts."""\n\n    method = state.get("method")\n    evidence = state.get("evidence")\n    if method is None or evidence is None:\n        return {}\n    plan = method.methodology_plan\n    baseline_id = plan.baseline.source_evidence_id\n    accepted_ids = set(evidence.accepted_ids)\n    output: dict[str, bool] = {}\n    for module in plan.modules:\n        evidence_id = module.evidence_id\n        if evidence_id is None:\n            continue\n        contract_values = (\n            module.input_semantics,\n            module.output_semantics,\n            module.input_shape,\n            module.output_shape,\n            module.gradient_expectation,\n            module.parameter_update_scope,\n            module.loss_scale,\n            module.failure_mode,\n            module.implementation_switch,\n        )\n        output[evidence_id] = bool(\n            evidence_id in accepted_ids\n            and evidence_id != baseline_id\n            and module.original_role\n            and module.proposed_role\n            and module.loss_terms\n            and all(_specific_module_contract_text(value) for value in contract_values)\n        )\n    return output\n\n\n'''
          if text.count(marker) != 1:
              raise RuntimeError("supplied-ref marker mismatch")
          text = text.replace(marker, helper + marker, 1)

          old = '''    method_roles = _method_evidence_roles(state)\n    full_text_ids = set(context.full_text_evidence_ids)\n'''
          new = '''    method_roles = _method_evidence_roles(state)\n    module_compatibility = _module_compatibility_by_evidence(state)\n    full_text_ids = set(context.full_text_evidence_ids)\n'''
          if text.count(old) != 1:
              raise RuntimeError("method-role marker mismatch")
          text = text.replace(old, new, 1)

          old = "                role_compatible=None,\n"
          new = '''                role_compatible=(\n                    module_compatibility.get(item.evidence_id)\n                    if role == "parallel_method"\n                    else None\n                ),\n'''
          if text.count(old) != 1:
              raise RuntimeError("role-compatible marker mismatch")
          text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")

          test = Path("tests/evals/test_adapter_module_contract.py")
          test.write_text('''from __future__ import annotations\n\nfrom datetime import UTC, datetime\nfrom types import SimpleNamespace\nfrom typing import cast\n\nfrom paperagent.claw_benchmark_adapter import _module_compatibility_by_evidence\nfrom paperagent.schemas import EvidenceBundle, EvidenceItem\nfrom paperagent.state import PaperAgentState\n\n\ndef _item(evidence_id: str) -> EvidenceItem:\n    return EvidenceItem(\n        evidence_id=evidence_id,\n        source_type="paper",\n        title=evidence_id,\n        locator=f"https://example.test/{evidence_id}",\n        retrieved_at=datetime(2026, 7, 23, tzinfo=UTC),\n        verification_status="accepted",\n        supports_gap_ids=["g1"],\n        summary="verified evidence",\n        content_hash=f"sha256:{evidence_id}",\n    )\n\n\ndef test_module_contract_is_verified_only_for_independent_specific_evidence() -> None:\n    module = SimpleNamespace(\n        evidence_id="ev-module",\n        original_role="low-rank query and value adaptation",\n        proposed_role="parameter-efficient attention adaptation",\n        input_semantics="token hidden states entering query and value projections",\n        output_semantics="adapted projections preserving token order",\n        input_shape="batch x sequence_length x hidden_size",\n        output_shape="batch x sequence_length x hidden_size",\n        gradient_expectation="gradients update low-rank matrices and classifier only",\n        parameter_update_scope="freeze encoder; train low-rank matrices and classifier",\n        loss_scale="unit-weight classification objective",\n        failure_mode="rank bottleneck can underfit rare intents",\n        implementation_switch="enable_lora_qv",\n        loss_terms=("classification objective",),\n    )\n    state = cast(\n        PaperAgentState,\n        {\n            "method": SimpleNamespace(\n                methodology_plan=SimpleNamespace(\n                    baseline=SimpleNamespace(source_evidence_id="ev-baseline"),\n                    modules=(module,),\n                )\n            ),\n            "evidence": EvidenceBundle(\n                items=[_item("ev-baseline"), _item("ev-module")],\n                accepted_ids=["ev-baseline", "ev-module"],\n                identity_verified_ids=["ev-baseline", "ev-module"],\n                coverage_by_gap={"g1": 2},\n            ),\n        },\n    )\n    assert _module_compatibility_by_evidence(state) == {"ev-module": True}\n\n\ndef test_baseline_reuse_is_never_module_compatible() -> None:\n    module = SimpleNamespace(\n        evidence_id="ev-baseline",\n        original_role="baseline method",\n        proposed_role="module",\n        input_semantics="batch features",\n        output_semantics="batch features",\n        input_shape="batch x hidden",\n        output_shape="batch x hidden",\n        gradient_expectation="gradients update module",\n        parameter_update_scope="train module",\n        loss_scale="unit loss",\n        failure_mode="underfit",\n        implementation_switch="enable_module",\n        loss_terms=("task loss",),\n    )\n    state = cast(\n        PaperAgentState,\n        {\n            "method": SimpleNamespace(\n                methodology_plan=SimpleNamespace(\n                    baseline=SimpleNamespace(source_evidence_id="ev-baseline"),\n                    modules=(module,),\n                )\n            ),\n            "evidence": EvidenceBundle(\n                items=[_item("ev-baseline")],\n                accepted_ids=["ev-baseline"],\n                identity_verified_ids=["ev-baseline"],\n                coverage_by_gap={"g1": 1},\n            ),\n        },\n    )\n    assert _module_compatibility_by_evidence(state) == {"ev-baseline": False}\n''', encoding="utf-8")
          PY
      - name: Install and verify
        run: |
          python -m pip install -q -e '.[dev]'
          ruff format src/paperagent/claw_benchmark_adapter.py tests/evals/test_adapter_module_contract.py
          ruff check src/paperagent/claw_benchmark_adapter.py tests/evals/test_adapter_module_contract.py
          mypy --strict src/paperagent/claw_benchmark_adapter.py
          pytest -q tests/evals/test_adapter_module_contract.py tests/evals/test_academic_tailoring_retrieval_v2_scorer.py
      - name: Commit adapter repair
        if: github.event_name == 'push'
        run: |
          git config user.name "paperagent-repair-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/paperagent/claw_benchmark_adapter.py tests/evals/test_adapter_module_contract.py
          git commit -m "fix(eval): verify independent module compatibility"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
