name: Gate L v3 Autoformat Once

on:
  push:
    branches: [fix/gate-l-v3-acceptance-routing]
    paths:
      - .github/workflows/gate-l-v3-autoformat-once.yml

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/gate-l-v3-acceptance-routing
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - name: Format Gate L files
        run: |
          ruff check --fix \
            scripts/run_gate_l_execution.py \
            scripts/_create_stub_reviews.py \
            scripts/_grade_deterministic.py \
            scripts/gate_l_acceptance_v3.py \
            scripts/assemble_gate_l_v3_summary.py \
            scripts/compare_gate_l_variants.py \
            scripts/run_gate_l_variant.py \
            tests/evals/test_gate_l_acceptance_v3.py
          ruff format \
            scripts/run_gate_l_execution.py \
            scripts/_create_stub_reviews.py \
            scripts/_grade_deterministic.py \
            scripts/gate_l_acceptance_v3.py \
            scripts/assemble_gate_l_v3_summary.py \
            scripts/compare_gate_l_variants.py \
            scripts/run_gate_l_variant.py \
            tests/evals/test_gate_l_acceptance_v3.py
          pytest -q tests/evals/test_gate_l_acceptance_v3.py
      - name: Commit formatting
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts tests/evals/test_gate_l_acceptance_v3.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'style(gate-l): format v3 acceptance tooling'
          git push origin HEAD:fix/gate-l-v3-acceptance-routing
