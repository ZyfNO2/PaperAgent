name: Format Probe Diagnostics Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/format-probe-diagnostics-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -q -e '.[dev]'
      - name: Format and verify
        run: |
          ruff format scripts/probe_claw_case_end_to_end.py
          ruff check scripts/probe_claw_case_end_to_end.py
          mypy --config-file pyproject.toml
      - name: Commit formatted diagnostics
        run: |
          git rm .github/workflows/format-probe-diagnostics-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/probe_claw_case_end_to_end.py
          git commit -m "style(eval): format evidence diagnostics"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
