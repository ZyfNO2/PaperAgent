name: Methodology Mypy Fix Once

on:
  pull_request:
    branches: [fix/gate-l-v3-acceptance-routing]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.head_ref == 'fix/academic-tailoring-contract-convergence' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Add typed experiment arguments
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/paperagent/academic_tailoring_proposal.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'from enum import StrEnum\n',
              'from enum import StrEnum\nfrom typing import TypedDict\n',
          )
          marker = '''def _common_experiment(task: TailoringTask) -> dict[str, object]:\n'''
          replacement = '''class _CommonExperimentArgs(TypedDict):\n    dataset: str\n    split: str\n    preprocessing: str\n    tuning_budget: str\n    metrics: tuple[str, ...]\n    seeds: tuple[int, ...]\n    uncertainty_reporting: str\n    resource_measures: tuple[str, ...]\n    stopping_criteria: str\n\n\ndef _common_experiment(task: TailoringTask) -> _CommonExperimentArgs:\n'''
          if marker not in text:
              raise SystemExit('common experiment helper marker not found')
          path.write_text(text.replace(marker, replacement), encoding='utf-8')
          PY
      - run: python -m pip install -e '.[dev]'
      - name: Verify type repair
        run: |
          ruff format src/paperagent/academic_tailoring_proposal.py
          ruff check src/paperagent/academic_tailoring_proposal.py
          mypy --config-file pyproject.toml src/paperagent/academic_tailoring_proposal.py
      - name: Commit type repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/paperagent/academic_tailoring_proposal.py
          git commit -m 'fix(methodology): type shared experiment arguments'
          git push origin HEAD:${{ github.head_ref }}
