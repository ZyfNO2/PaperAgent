name: Gate L Ollama Compatibility Patch

on:
  push:
    branches: [fix/gate-l-v3-acceptance-routing]
    paths:
      - .github/workflows/gate-l-ollama-patch-once.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/gate-l-v3-acceptance-routing
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply provider compatibility changes
        run: |
          python - <<'PY'
          from pathlib import Path

          runtime = Path('src/paperagent/providers/runtime.py')
          text = runtime.read_text(encoding='utf-8')
          text = text.replace(
              '    DEEPSEEK = "deepseek"\n',
              '    DEEPSEEK = "deepseek"\n    OLLAMA = "ollama"\n',
          )
          old = '''        parsed = urlsplit(self.base_url)\n        if (\n            parsed.scheme != "https"\n            or not parsed.hostname\n            or parsed.username is not None\n            or parsed.password is not None\n            or parsed.query\n            or parsed.fragment\n        ):\n            raise ValueError(\n                "base_url must be an HTTPS origin/path without credentials or query data"\n            )\n'''
          new = '''        parsed = urlsplit(self.base_url)\n        loopback_http = (\n            parsed.scheme == "http"\n            and parsed.hostname in {"localhost", "127.0.0.1", "::1"}\n        )\n        secure_remote = parsed.scheme == "https"\n        if (\n            not (secure_remote or loopback_http)\n            or not parsed.hostname\n            or parsed.username is not None\n            or parsed.password is not None\n            or parsed.query\n            or parsed.fragment\n        ):\n            raise ValueError(\n                "base_url must use HTTPS, except HTTP loopback endpoints without "\n                "credentials or query data"\n            )\n'''
          if old not in text:
              raise SystemExit('runtime validation block changed unexpectedly')
          runtime.write_text(text.replace(old, new), encoding='utf-8')

          config = Path('src/paperagent/providers/config.py')
          text = config.read_text(encoding='utf-8')
          old = '''    default_base_url = (\n        "https://api.mistral.ai/v1"\n        if provider_name is LLMProviderName.MISTRAL\n        else "https://api.openai.com/v1"\n    )\n'''
          new = '''    if provider_name is LLMProviderName.MISTRAL:\n        default_base_url = "https://api.mistral.ai/v1"\n    elif provider_name is LLMProviderName.OLLAMA:\n        default_base_url = "http://127.0.0.1:11434/v1"\n    else:\n        default_base_url = "https://api.openai.com/v1"\n'''
          if old not in text:
              raise SystemExit('provider base URL block changed unexpectedly')
          text = text.replace(old, new)
          old = '''    if provider_name is LLMProviderName.MISTRAL:\n        api_key = values.get("MISTRAL_API_KEY")\n        credential_name = "MISTRAL_API_KEY"\n    else:\n        api_key = values.get("PAPERAGENT_OPENAI_API_KEY") or values.get("OPENAI_API_KEY")\n        credential_name = "PAPERAGENT_OPENAI_API_KEY or OPENAI_API_KEY"\n'''
          new = '''    if provider_name is LLMProviderName.MISTRAL:\n        api_key = values.get("MISTRAL_API_KEY")\n        credential_name = "MISTRAL_API_KEY"\n    elif provider_name is LLMProviderName.OLLAMA:\n        api_key = (\n            values.get("PAPERAGENT_OPENAI_API_KEY")\n            or values.get("OPENAI_API_KEY")\n            or "ollama-local"\n        )\n        credential_name = "optional local Ollama API key"\n    else:\n        api_key = values.get("PAPERAGENT_OPENAI_API_KEY") or values.get("OPENAI_API_KEY")\n        credential_name = "PAPERAGENT_OPENAI_API_KEY or OPENAI_API_KEY"\n'''
          if old not in text:
              raise SystemExit('provider credential block changed unexpectedly')
          config.write_text(text.replace(old, new), encoding='utf-8')

          factory = Path('src/paperagent/providers/runtime_factory.py')
          text = factory.read_text(encoding='utf-8')
          old = '    if config.provider in {LLMProviderName.OPENAI, LLMProviderName.DEEPSEEK}:\n'
          new = '''    if config.provider in {\n        LLMProviderName.OPENAI,\n        LLMProviderName.DEEPSEEK,\n        LLMProviderName.OLLAMA,\n    }:\n'''
          if old not in text:
              raise SystemExit('runtime factory block changed unexpectedly')
          factory.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Add regression tests
        run: |
          cat > tests/providers/test_ollama_compatibility.py <<'PY'
          from __future__ import annotations

          import pytest
          from pydantic import SecretStr, ValidationError

          from paperagent.providers.config import load_provider_config
          from paperagent.providers.openai_llm import OpenAILLMProvider
          from paperagent.providers.runtime import LLMProviderName, ProviderRuntimeConfig
          from paperagent.providers.runtime_factory import build_llm_provider


          def test_ollama_loopback_http_is_allowed() -> None:
              config = ProviderRuntimeConfig(
                  provider=LLMProviderName.OLLAMA,
                  model="local-model",
                  api_key=SecretStr("ollama-local"),
                  base_url="http://127.0.0.1:11434/v1",
              )
              assert config.provider is LLMProviderName.OLLAMA


          def test_remote_plain_http_remains_rejected() -> None:
              with pytest.raises(ValidationError):
                  ProviderRuntimeConfig(
                      provider=LLMProviderName.OPENAI,
                      model="remote-model",
                      api_key=SecretStr("key"),
                      base_url="http://example.com/v1",
                  )


          def test_ollama_config_uses_local_defaults_without_real_secret() -> None:
              config = load_provider_config(
                  environ={
                      "PAPERAGENT_LLM_PROVIDER": "ollama",
                      "PAPERAGENT_LLM_MODEL": "qwen-local",
                  }
              )
              assert config.base_url == "http://127.0.0.1:11434/v1"
              assert config.api_key.get_secret_value() == "ollama-local"


          def test_ollama_uses_openai_compatible_adapter() -> None:
              config = ProviderRuntimeConfig(
                  provider=LLMProviderName.OLLAMA,
                  model="local-model",
                  api_key=SecretStr("ollama-local"),
                  base_url="http://localhost:11434/v1",
              )
              assert isinstance(build_llm_provider(config), OpenAILLMProvider)
          PY
      - run: python -m pip install -e '.[dev]'
      - name: Format and test patch
        run: |
          ruff check --fix src/paperagent/providers tests/providers/test_ollama_compatibility.py
          ruff format src/paperagent/providers tests/providers/test_ollama_compatibility.py
          mypy src/paperagent/providers tests/providers/test_ollama_compatibility.py
          pytest -q tests/providers/test_ollama_compatibility.py
      - name: Commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/paperagent/providers tests/providers/test_ollama_compatibility.py
          git commit -m 'feat(providers): support secure loopback Ollama endpoints'
          git push origin HEAD:fix/gate-l-v3-acceptance-routing
