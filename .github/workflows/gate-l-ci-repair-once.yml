name: Gate L CI Repair Once

on:
  push:
    branches: [fix/gate-l-v3-acceptance-routing]
    paths:
      - .github/workflows/gate-l-ci-repair-once.yml

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/gate-l-v3-acceptance-routing
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Repair inherited Gate L files
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/run_gate_l_execution.py')
          text = path.read_text(encoding='utf-8')
          old_cost = '''    estimated_cost_usd = round(\n        min(\n            sum(\n                r["data"].get("usage", {}).get("estimated_cost_usd", 0.0) or 0.0 for r in llm_events\n            ),\n            budget["max_cost_usd"],\n        ),\n        4,\n    )\n'''
          new_cost = '''    estimated_cost_usd = round(\n        sum(\n            r["data"].get("usage", {}).get("estimated_cost_usd", 0.0) or 0.0\n            for r in llm_events\n        ),\n        4,\n    )\n'''
          if old_cost not in text:
              raise SystemExit('cost block changed unexpectedly')
          text = text.replace(old_cost, new_cost)
          conflict = '''<<<<<<< Updated upstream\n    calls_within = calls_count <= budget["max_calls"]\n    tokens_within = (total_input_tokens + total_output_tokens) <= budget["max_total_tokens"]\n    time_within = wall_seconds <= budget["max_wall_seconds"]\n    cost_within = estimated_cost_usd <= budget["max_cost_usd"]\n=======\n    # Budget compliance: use case budgets but with realistic caps\n    effective_max_calls = max(budget["max_calls"], 12)\n    effective_max_tokens = max(budget["max_total_tokens"], 60000)\n    effective_max_time = max(budget["max_wall_seconds"], 600)\n    effective_max_cost = max(budget["max_cost_usd"], 5.0)\n    calls_within = calls_count <= effective_max_calls\n    tokens_within = (total_input_tokens + total_output_tokens) <= effective_max_tokens\n    time_within = wall_seconds <= effective_max_time\n    cost_within = estimated_cost_usd <= effective_max_cost\n>>>>>>> Stashed changes\n'''
          resolved = '''    calls_within = calls_count <= budget["max_calls"]\n    tokens_within = (total_input_tokens + total_output_tokens) <= budget["max_total_tokens"]\n    time_within = wall_seconds <= budget["max_wall_seconds"]\n    cost_within = estimated_cost_usd <= budget["max_cost_usd"]\n'''
          if conflict not in text:
              raise SystemExit('merge conflict block changed unexpectedly')
          path.write_text(text.replace(conflict, resolved), encoding='utf-8')

          Path('scripts/_create_stub_reviews.py').write_text(\n              '"""Deprecated synthetic review helper; not valid for formal acceptance."""\\n\\n'\n              'raise SystemExit("Synthetic reviewer generation is disabled. Use independent human reviews.")\\n',\n              encoding='utf-8',\n          )
          Path('scripts/_grade_deterministic.py').write_text(\n              '"""Deprecated temporary v2 summary helper."""\\n\\n'\n              'raise SystemExit("Use scripts/assemble_gate_l_v3_summary.py for v3 evidence.")\\n',\n              encoding='utf-8',\n          )
          PY
      - run: python -m pip install -e '.[dev]'
      - name: Format and verify changed files
        run: |
          ruff check --fix \
            scripts/run_gate_l_execution.py \
            scripts/_create_stub_reviews.py \
            scripts/_grade_deterministic.py \
            scripts/gate_l_acceptance_v3.py \
            scripts/assemble_gate_l_v3_summary.py \
            scripts/compare_gate_l_variants.py \
            scripts/run_gate_l_variant.py \
            tests/evals/test_gate_l_acceptance_v3.py
          ruff format \
            scripts/run_gate_l_execution.py \
            scripts/_create_stub_reviews.py \
            scripts/_grade_deterministic.py \
            scripts/gate_l_acceptance_v3.py \
            scripts/assemble_gate_l_v3_summary.py \
            scripts/compare_gate_l_variants.py \
            scripts/run_gate_l_variant.py \
            tests/evals/test_gate_l_acceptance_v3.py
          pytest -q tests/evals/test_gate_l_acceptance_v3.py
      - name: Commit repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts tests/evals/test_gate_l_acceptance_v3.py
          git commit -m 'fix(gate-l): enforce exact budgets and harden v3 acceptance'
          git push origin HEAD:fix/gate-l-v3-acceptance-routing
