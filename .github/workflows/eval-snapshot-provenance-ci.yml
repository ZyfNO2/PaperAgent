name: Eval Snapshot Provenance CI

on:
  push:
    branches:
      - fix/semantic-tailoring-role-bound-scoring
    paths:
      - "src/paperagent/eval_runtime_reporting.py"
      - "scripts/project_academic_tailoring_retrieval_v1.py"
      - "scripts/gen_public_dataset.py"
      - "scripts/run_academic_tailoring_retrieval_v1.py"
      - "scripts/build_eval_snapshot.py"
      - "scripts/validate_eval_snapshot.py"
      - "tests/evals/test_eval_snapshot_provenance.py"
      - "tests/evals/test_eval_runtime_reporting.py"
      - "tests/evals/test_academic_tailoring_retrieval_v1_boundary.py"
      - "docs/evaluation/EVAL_SNAPSHOT_PROVENANCE_HANDOFF.md"
      - ".github/workflows/eval-snapshot-provenance-ci.yml"
  pull_request:
    branches:
      - master
    paths:
      - "src/paperagent/eval_runtime_reporting.py"
      - "scripts/project_academic_tailoring_retrieval_v1.py"
      - "scripts/gen_public_dataset.py"
      - "scripts/run_academic_tailoring_retrieval_v1.py"
      - "scripts/build_eval_snapshot.py"
      - "scripts/validate_eval_snapshot.py"
      - "tests/evals/test_eval_snapshot_provenance.py"
      - "tests/evals/test_eval_runtime_reporting.py"
      - "tests/evals/test_academic_tailoring_retrieval_v1_boundary.py"
      - "docs/evaluation/EVAL_SNAPSHOT_PROVENANCE_HANDOFF.md"
      - ".github/workflows/eval-snapshot-provenance-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provenance-and-runtime-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Format check
        run: |
          ruff format --check \
            src/paperagent/eval_runtime_reporting.py \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/gen_public_dataset.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/build_eval_snapshot.py \
            scripts/validate_eval_snapshot.py \
            tests/evals/test_eval_snapshot_provenance.py \
            tests/evals/test_eval_runtime_reporting.py
      - name: Lint
        run: |
          ruff check \
            src/paperagent/eval_runtime_reporting.py \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/gen_public_dataset.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/build_eval_snapshot.py \
            scripts/validate_eval_snapshot.py \
            tests/evals/test_eval_snapshot_provenance.py \
            tests/evals/test_eval_runtime_reporting.py
      - name: Compile
        run: |
          python -m compileall -q \
            src/paperagent/eval_runtime_reporting.py \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/gen_public_dataset.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/build_eval_snapshot.py \
            scripts/validate_eval_snapshot.py
      - name: Focused regression
        run: |
          pytest -q \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py \
            tests/evals/test_eval_snapshot_provenance.py \
            tests/evals/test_eval_runtime_reporting.py
      - name: Canonical projection smoke
        run: |
          python scripts/project_academic_tailoring_retrieval_v1.py \
            --authoring evals/academic_tailoring_retrieval_v1/dataset-authoring.json \
            --authoring-commit "$GITHUB_SHA" \
            --output /tmp/public-dataset.json \
            --report /tmp/boundary-report.json
          python -m json.tool /tmp/public-dataset.json >/dev/null
          python -m json.tool /tmp/boundary-report.json >/dev/null
