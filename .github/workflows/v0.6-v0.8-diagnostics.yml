name: PaperAgent v0.6-v0.8 Diagnostics

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev,release]'
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          ruff check . > ruff-check.txt 2>&1
          echo $? > ruff-check.exit
          ruff format --check . > ruff-format.txt 2>&1
          echo $? > ruff-format.exit
          mypy --config-file pyproject.toml > mypy.txt 2>&1
          echo $? > mypy.exit
          pytest --cov=paperagent --cov-branch --cov-report=term-missing -q > pytest.txt 2>&1
          echo $? > pytest.exit
          cat ruff-check.exit ruff-format.exit mypy.exit pytest.exit
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: v0.6-v0.8-diagnostics
          path: |
            ruff-check.txt
            ruff-check.exit
            ruff-format.txt
            ruff-format.exit
            mypy.txt
            mypy.exit
            pytest.txt
            pytest.exit
          if-no-files-found: error
