name: PR28 Format Diagnostic

on:
  pull_request:
    branches: [master]
    paths:
      - "src/paperagent/gold_case.py"
      - "src/paperagent/rag_evaluation.py"
      - "tests/evals/test_gold_case_readiness.py"
      - "tests/evals/test_rag_evaluation.py"
      - ".github/workflows/pr28-format-diagnostic.yml"

permissions:
  contents: write

concurrency:
  group: pr28-format-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gold-case-rag-interview-readiness
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install 'ruff>=0.12,<0.13'
      - name: Format scoped files
        shell: bash
        run: |
          files=(
            src/paperagent/gold_case.py
            src/paperagent/rag_evaluation.py
            tests/evals/test_gold_case_readiness.py
            tests/evals/test_rag_evaluation.py
          )
          ruff format "${files[@]}"
          if git diff --quiet -- "${files[@]}"; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          git commit -m "style(eval): apply Ruff formatting"
          git push origin HEAD:feat/gold-case-rag-interview-readiness