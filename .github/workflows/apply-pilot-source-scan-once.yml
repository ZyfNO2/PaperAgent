name: Apply Pilot Source Scan Once

on:
  push:
    branches:
      - eval/academic-holdout-v2-clean
    paths:
      - "scripts/apply_pilot_source_scan.py"
      - ".github/workflows/apply-pilot-source-scan-once.yml"

permissions:
  contents: write

concurrency:
  group: apply-pilot-source-scan-clean-v2
  cancel-in-progress: true

jobs:
  apply-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: eval/academic-holdout-v2-clean
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply scan invariant
        run: |
          python scripts/apply_pilot_source_scan.py
          rm scripts/apply_pilot_source_scan.py
          rm .github/workflows/apply-pilot-source-scan-once.yml
      - name: Run clean benchmark tests
        run: python -m unittest discover -s tests -v
      - name: Validate public development cases
        run: python scripts/validate_cases.py data/public-dev-v2.jsonl
      - name: Commit clean scan invariant
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(eval): verify pilot recommendation provenance"
          git pull --rebase origin eval/academic-holdout-v2-clean
          git push origin HEAD:eval/academic-holdout-v2-clean
