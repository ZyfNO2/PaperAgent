name: Patch Case 001 Preflight Lines Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/patch-case001-preflight-lines-once.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Insert validated method checks
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/claw-case-001-end-to-end.yml')
          lines = path.read_text(encoding='utf-8').splitlines()

          def insert_after(anchor: str, additions: list[str]) -> None:
              if all(item in lines for item in additions):
                  return
              try:
                  index = lines.index(anchor)
              except ValueError as exc:
                  raise RuntimeError(f'missing anchor: {anchor!r}') from exc
              lines[index + 1:index + 1] = additions

          insert_after(
              '            src/paperagent/evidence_gap_binding.py',
              [
                  '            src/paperagent/academic_methodology.py',
                  '            src/paperagent/method_design_draft.py',
                  '            src/paperagent/nodes/_shared.py',
                  '            src/paperagent/nodes/method_design.py',
              ],
          )
          insert_after(
              '            tests/nodes/test_retrieval.py',
              ['            tests/methodology/test_method_design_draft.py'],
          )
          insert_after(
              '            tests/nodes/test_retrieval.py \\',
              ['            tests/methodology/test_method_design_draft.py \\'],
          )
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          git diff --check
          git rm .github/workflows/patch-case001-preflight-lines-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/claw-case-001-end-to-end.yml
          git commit -m "ci(eval): include method audit checks in Case 001 preflight"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
