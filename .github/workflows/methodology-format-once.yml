name: Methodology Format Once

on:
  pull_request:
    branches: [fix/gate-l-v3-acceptance-routing]

permissions:
  contents: write

jobs:
  format:
    if: ${{ github.head_ref == 'fix/academic-tailoring-contract-convergence' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - name: Format methodology files
        run: |
          files=(
            src/paperagent/academic_methodology.py
            src/paperagent/academic_tailoring.py
            src/paperagent/academic_tailoring_proposal.py
            src/paperagent/plugins/academic_method.py
          )
          ruff format "${files[@]}"
          ruff check --fix "${files[@]}"
          ruff format "${files[@]}"
      - name: Commit formatting
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/paperagent
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'style(methodology): format canonical tailoring contracts'
          git push origin HEAD:${{ github.head_ref }}
