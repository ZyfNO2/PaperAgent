name: Academic Tailoring Runtime Recovery

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: academic-tailoring-runtime-recovery-${{ github.ref }}
  cancel-in-progress: true

jobs:
  recover-failed-cases:
    if: ${{ github.head_ref != 'tmp/cloud-format-c0f3' }}
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Provider recovery is disabled on the temporary inspection branch."
