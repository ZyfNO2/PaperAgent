name: Academic Tailoring Runtime Recovery

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/academic-tailoring-runtime-recovery.yml"
      - "scripts/run_academic_tailoring_retrieval_v1.py"
      - "src/paperagent/eval_runtime_reporting.py"
      - "src/paperagent/providers/runtime.py"
      - "src/paperagent/nodes/planning.py"
      - "src/paperagent/nodes/report.py"
      - "src/paperagent/method_design_draft.py"
      - "src/paperagent/strict_method_design.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: academic-tailoring-runtime-recovery-${{ github.ref }}
  cancel-in-progress: true

jobs:
  recover-failed-cases:
    # Real-provider recovery is manual to prevent PR updates from spending API quota.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 300
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      PAPERAGENT_OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      PAPERAGENT_CONTACT_EMAIL: ${{ secrets.PAPERAGENT_CONTACT_EMAIL || 'Z1015558261@outlook.com' }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      PAPERAGENT_LLM_PROVIDER: openai
      PAPERAGENT_LLM_MODEL: z-ai/glm-5.2
      PAPERAGENT_LLM_BASE_URL: https://integrate.api.nvidia.com/v1
      PAPERAGENT_LLM_CONNECT_TIMEOUT: "15"
      PAPERAGENT_LLM_READ_TIMEOUT: "300"
      PAPERAGENT_LLM_TOTAL_TIMEOUT: "360"
      PAPERAGENT_LLM_MAX_ATTEMPTS: "4"
      PAPERAGENT_LLM_MAX_CALLS: "100"
      PAPERAGENT_LLM_MAX_REQUESTS_PER_MINUTE: "40"
      # Budget is enforced per logical graph invocation.
      # Graph re-entry receives a new call_index and an independent task budget.
      PAPERAGENT_LLM_MAX_INPUT_TOKENS_PER_TASK: "32000"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_CALL: "4096"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_TASK: "16384"
      PAPERAGENT_LLM_TASK_TIMEOUT: "900"
      PAPERAGENT_RUN_REAL_LLM: "1"
      PAPERAGENT_RUN_REAL_PROVIDER: "1"
      PAPERAGENT_ENABLE_WEB_SEARCH: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Require real NVIDIA credential
        run: test -n "$NVIDIA_API_KEY"
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run offline provenance and runtime gates
        run: |
          ruff check \
            src/paperagent/eval_runtime_reporting.py \
            src/paperagent/providers/runtime.py \
            src/paperagent/nodes/planning.py \
            src/paperagent/nodes/report.py \
            src/paperagent/method_design_draft.py \
            src/paperagent/strict_method_design.py \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/score_academic_tailoring_retrieval_v2.py
          pytest -q \
            tests/providers/test_runtime.py \
            tests/nodes/test_planning_identity_priority.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/nodes/test_report_fallback.py \
            tests/methodology/test_strict_method_design.py \
            tests/methodology/test_method_design_draft.py \
            tests/evals/test_eval_runtime_reporting.py \
            tests/evals/test_eval_snapshot_provenance.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py
      - name: Generate provenance-bound public dataset
        run: |
          mkdir -p build/runtime-recovery
          python scripts/project_academic_tailoring_retrieval_v1.py \
            --authoring evals/academic_tailoring_retrieval_v1/dataset-authoring.json \
            --authoring-commit "$GITHUB_SHA" \
            --output build/runtime-recovery/public-dataset.json \
            --report build/runtime-recovery/boundary-report.json
      - name: Build isolated candidate workspace
        run: |
          rm -rf candidate-workspace
          mkdir -p candidate-workspace/scripts candidate-workspace/input
          cp -R src candidate-workspace/src
          cp -R config candidate-workspace/config
          cp pyproject.toml README.md candidate-workspace/
          cp scripts/run_academic_tailoring_retrieval_v1.py candidate-workspace/scripts/
          cp build/runtime-recovery/public-dataset.json candidate-workspace/input/
          test ! -e candidate-workspace/evals/academic_tailoring_retrieval_v1/dataset-authoring.json
          ! find candidate-workspace -name dataset-authoring.json -print -quit | grep -q .
      - name: Install isolated candidate
        working-directory: candidate-workspace
        run: python -m pip install -q -e '.[dev]'
      - name: Execute cases 003, 005, 006, 007, and 010 with real provider
        id: runtime
        working-directory: candidate-workspace
        shell: bash
        run: |
          set +e
          mkdir -p "$GITHUB_WORKSPACE/build/runtime-recovery"
          python scripts/run_academic_tailoring_retrieval_v1.py \
            --dataset input/public-dataset.json \
            --output-dir build/runtime-recovery/candidate \
            --case-id atr-v1-003-nlp-bert-lora-clinc \
            --case-id atr-v1-005-remote-oriented-small-edge \
            --case-id atr-v1-006-industrial-usad-anomaly-transformer \
            --case-id atr-v1-007-graph-graphsage-gat-ppi \
            --case-id atr-v1-010-rec-coldstart-sequential \
            --max-cases 5 \
            --max-llm-calls 20 \
            --provider-call-budget 300 \
            --enable-web-search \
            --source-commit "$GITHUB_SHA" \
            --llm-provider openai \
            --llm-model z-ai/glm-5.2 \
            --llm-base-url https://integrate.api.nvidia.com/v1 \
            > "$GITHUB_WORKSPACE/build/runtime-recovery/runtime-command.log" 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "$status" > "$GITHUB_WORKSPACE/build/runtime-recovery/runtime-exit-code.txt"
          cat "$GITHUB_WORKSPACE/build/runtime-recovery/runtime-command.log"
          exit 0
      - name: Build selected authoring set and score diagnostics
        if: always()
        shell: bash
        run: |
          mkdir -p build/runtime-recovery
          python - <<'PY'
          import json
          from pathlib import Path

          selected = {
              'atr-v1-003-nlp-bert-lora-clinc',
              'atr-v1-005-remote-oriented-small-edge',
              'atr-v1-006-industrial-usad-anomaly-transformer',
              'atr-v1-007-graph-graphsage-gat-ppi',
              'atr-v1-010-rec-coldstart-sequential',
          }
          source = Path('evals/academic_tailoring_retrieval_v1/dataset-authoring.json')
          data = json.loads(source.read_text(encoding='utf-8'))
          data['cases'] = [case for case in data['cases'] if case['case_id'] in selected]
          Path('build/runtime-recovery/selected-authoring.json').write_text(
              json.dumps(data, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
          if test -f candidate-workspace/build/runtime-recovery/candidate/states.jsonl; then
            set +e
            python scripts/score_academic_tailoring_retrieval_v2.py \
              --authoring build/runtime-recovery/selected-authoring.json \
              --states candidate-workspace/build/runtime-recovery/candidate/states.jsonl \
              --traces candidate-workspace/build/runtime-recovery/candidate/run-traces.jsonl \
              --prompts candidate-workspace/build/runtime-recovery/candidate/prompt-log.jsonl \
              --runtime-summary candidate-workspace/build/runtime-recovery/candidate/execution-summary.json \
              --output build/runtime-recovery/diagnostic-report.json \
              --minimum-score 80
            echo "$?" > build/runtime-recovery/scorer-exit-code.txt
            set -e
          else
            echo "candidate outputs missing" > build/runtime-recovery/scorer-not-run.txt
          fi
          if test -d candidate-workspace/build/runtime-recovery/candidate; then
            cp -R candidate-workspace/build/runtime-recovery/candidate build/runtime-recovery/candidate
          else
            mkdir -p build/runtime-recovery/candidate
          fi
      - name: Build normalized LLM output audit
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          states_path = Path('build/runtime-recovery/candidate/states.jsonl')
          output = {'schema': 'paperagent.real-llm-output-audit.v1', 'cases': []}
          if states_path.is_file():
              for line in states_path.read_text(encoding='utf-8').splitlines():
                  record = json.loads(line)
                  state = record.get('state') or {}
                  method = state.get('method') or {}
                  plan = method.get('methodology_plan') or {}
                  baseline = plan.get('baseline') or method.get('baseline') or {}
                  modules = plan.get('modules') or method.get('modules') or []
                  output['cases'].append({
                      'case_id': record.get('case_id'),
                      'execution_status': (state.get('execution') or {}).get('status'),
                      'scientific_verdict': (state.get('final_outcome') or {}).get('scientific_verdict'),
                      'report_status': (state.get('report') or {}).get('status'),
                      'baseline_name': baseline.get('name'),
                      'baseline_evidence_id': baseline.get('source_evidence_id'),
                      'module_names': [item.get('name') or item.get('module_id') for item in modules],
                      'module_evidence_ids': [item.get('evidence_id') for item in modules],
                      'trace_audit_passed': (state.get('trace_audit') or {}).get('passed'),
                      'last_error_code': ((state.get('execution') or {}).get('last_error') or {}).get('code'),
                  })
          Path('build/runtime-recovery/llm-output-audit.json').write_text(
              json.dumps(output, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
      - name: Write recovery summary
        if: always()
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          print('## Academic Tailoring Runtime Recovery')
          summary_path = Path('build/runtime-recovery/candidate/execution-summary.json')
          if not summary_path.is_file():
              print('- Candidate summary: missing')
              raise SystemExit(0)
          summary = json.loads(summary_path.read_text(encoding='utf-8'))
          print(f"- Run status: `{summary.get('run_status')}`")
          print(f"- Attempted: `{len(summary.get('attempted_case_ids', []))}`")
          print(f"- Completed: `{summary.get('completed')}`")
          print(f"- Runtime errors: `{summary.get('runtime_errors')}`")
          print(f"- Source SHA: `{summary.get('source_sha')}`")
          for error in summary.get('errors', []):
              print(
                  '- Error: '
                  f"`{error.get('case_id')}` / `{error.get('stage')}` / "
                  f"`{error.get('error_code')}` / `{error.get('error_category')}`"
              )
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-runtime-recovery
          path: build/runtime-recovery/
          if-no-files-found: error
          retention-days: 14
      - name: Enforce real-runtime and score acceptance
        if: always()
        shell: bash
        run: |
          test -f build/runtime-recovery/runtime-exit-code.txt
          test "$(cat build/runtime-recovery/runtime-exit-code.txt)" = "0"
          test -f build/runtime-recovery/candidate/execution-summary.json
          test -f build/runtime-recovery/diagnostic-report.json
          test -f build/runtime-recovery/scorer-exit-code.txt
          test "$(cat build/runtime-recovery/scorer-exit-code.txt)" = "0"
