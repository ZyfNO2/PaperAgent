name: Academic Tailoring Runtime Recovery

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover-failed-cases:
    if: ${{ github.head_ref != 'tmp/format-provider-attribution' }}
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Provider recovery is disabled on the temporary format branch."
