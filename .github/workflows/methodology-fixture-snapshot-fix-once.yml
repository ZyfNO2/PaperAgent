name: Methodology Fixture Snapshot Fix Once

on:
  pull_request:
    branches: [fix/gate-l-v3-acceptance-routing]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.head_ref == 'fix/academic-tailoring-contract-convergence' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev,release]'
      - name: Make first repair fixture safely revisable
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              'tests/fixtures/llm/v0_1/method_design/'
              'gate_repair_method__call_0.json'
          )
          payload = json.loads(path.read_text(encoding='utf-8'))
          baseline = payload['methodology_plan']['baseline']
          baseline.update(
              {
                  'version_or_commit': 'fixture-baseline-v1',
                  'license': 'MIT',
                  'dataset': 'fixture-method-dataset-v1',
                  'split': 'fixture-frozen-split-v1',
                  'environment': 'Python fixture runtime',
                  'seed_policy': 'seeds 1, 2, 3',
                  'reproduced': True,
                  'reproduced_metric': 'primary_metric=0.50',
                  'compute_fit': True,
                  'baseline_parity_verified': False,
                  'dataset_fingerprint': 'sha256:fixture-dataset',
                  'environment_fingerprint': 'sha256:fixture-environment',
              }
          )
          payload['methodology_plan']['modules'][0]['license'] = 'MIT'
          path.write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
      - name: Regenerate deterministic academic-tailoring snapshots
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          from paperagent.academic_tailoring import compose_tailored_research_proposal
          from paperagent.academic_tailoring_evaluation import (
              evaluate_corpus,
              load_case_specs,
          )
          from paperagent.academic_tailoring_fixtures import load_tailoring_task_bundle

          root = Path.cwd()
          fixture_root = root / 'evals' / 'academic_tailoring' / 'npc'
          cases_path = root / 'evals' / 'academic_tailoring' / 'cases.json'
          snapshot_root = root / 'evals' / 'academic_tailoring' / 'snapshots'
          snapshot_root.mkdir(parents=True, exist_ok=True)

          task = load_tailoring_task_bundle(fixture_root)
          proposal = compose_tailored_research_proposal(task)
          value = proposal.model_dump(mode='json')
          main_snapshot = {
              'academic_story': value['academic_story'],
              'baseline': {
                  'method_name': value['baseline']['method_name'],
                  'paper_id': value['baseline']['paper_id'],
                  'reproduced': value['baseline']['reproduced'],
                  'reproduced_metrics': value['baseline']['reproduced_metrics'],
              },
              'blockers': value['blockers'],
              'decision': value['decision'],
              'expected_results': value['expected_results'],
              'experiment_arm_types': [
                  item['arm_type'] for item in value['experiment_matrix']
              ],
              'idea_id': value['idea_id'],
              'innovation': value['innovation_points'][0],
              'modules': [
                  {
                      key: item[key]
                      for key in (
                          'compatibility_status',
                          'failure_mode',
                          'insertion_point',
                          'method_used',
                          'predicted_effect',
                          'proposed_role',
                          'source_paper_id',
                      )
                  }
                  for item in value['modules']
              ],
              'references': [
                  {
                      key: item[key]
                      for key in (
                          'borrowed_component',
                          'method_used',
                          'paper_id',
                          'title',
                          'use_in_proposal',
                      )
                  }
                  for item in value['references']
              ],
              'risks': value['risks'],
              'strongest_reason': value['strongest_reason'],
          }
          (snapshot_root / 'main-case-expected.json').write_text(
              json.dumps(main_snapshot, ensure_ascii=False, indent=2, sort_keys=True)
              + '\n',
              encoding='utf-8',
          )

          specs = load_case_specs(cases_path)
          report, _, _ = evaluate_corpus(task, specs)
          report_snapshot = {
              'cases': [
                  {
                      'case_id': grade.case_id,
                      'category': grade.category,
                      'expected_decision': grade.expected_decision.value,
                      'observed_decision': grade.observed_decision.value,
                      'passed': grade.passed,
                      'score': grade.score,
                  }
                  for grade in report.grades
              ],
              'corpus_digest': report.corpus_digest,
              'failed': report.failed,
              'passed': report.passed,
              'total': report.total,
          }
          (snapshot_root / 'report-summary.json').write_text(
              json.dumps(report_snapshot, ensure_ascii=False, indent=2, sort_keys=True)
              + '\n',
              encoding='utf-8',
          )
          PY
      - name: Verify focused repair and snapshot tests
        run: |
          pytest -q \
            tests/graph/test_full_graph.py::test_graph__method_repair__runs_exactly_one_repair \
            tests/e2e/test_graph_e2e_method_repair.py \
            tests/evals/test_academic_tailoring_evaluation.py::test_main_case_output_matches_committed_snapshot \
            tests/evals/test_academic_tailoring_evaluation.py::test_report_summary_matches_committed_snapshot \
            tests/contracts/test_prompt_files.py \
            tests/plugins/test_academic_method.py
      - name: Remove temporary diagnostic workflows
        run: |
          git rm -f \
            .github/workflows/methodology-full-test-diagnostic.yml \
            .github/workflows/methodology-fixture-snapshot-fix-once.yml
      - name: Commit verified migration fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests evals .github/workflows
          git commit -m 'test(methodology): repair bounded loop and refresh canonical snapshots'
          git push origin HEAD:${{ github.head_ref }}
