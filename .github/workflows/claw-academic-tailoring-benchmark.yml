name: PaperClaw Academic Tailoring Benchmark

on:
  pull_request:
    branches:
      - master
      - fix/evidence-ledger-final-outcome-trace-exact
    paths:
      - "evals/claw_academic_tailoring_v1/**"
      - "src/paperagent/claw_academic_benchmark.py"
      - "src/paperagent/claw_benchmark_adapter.py"
      - "scripts/run_claw_academic_benchmark.py"
      - "scripts/normalize_claw_benchmark_states.py"
      - "tests/evals/test_claw_academic_benchmark.py"
      - "tests/evals/test_claw_benchmark_adapter.py"
      - ".github/workflows/claw-academic-tailoring-benchmark.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run benchmark checks and preserve diagnostics
        shell: bash
        run: |
          set +e
          out="build/claw-benchmark-${{ matrix.python-version }}"
          mkdir -p "$out/formatted"
          files=(
            src/paperagent/claw_academic_benchmark.py
            src/paperagent/claw_benchmark_adapter.py
            scripts/run_claw_academic_benchmark.py
            scripts/normalize_claw_benchmark_states.py
            tests/evals/test_claw_academic_benchmark.py
            tests/evals/test_claw_benchmark_adapter.py
          )
          ruff check "${files[@]}" --output-format=concise > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/evals/test_claw_academic_benchmark.py \
            tests/evals/test_claw_benchmark_adapter.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          python scripts/run_claw_academic_benchmark.py \
            --output "$out/report.json" \
            --require-pass > "$out/self-check.log" 2>&1
          self_check_status=$?
          for file in "${files[@]}"; do
            mkdir -p "$out/formatted/$(dirname "$file")"
            cp "$file" "$out/formatted/$file"
          done
          formatted_files=()
          for file in "${files[@]}"; do
            formatted_files+=("$out/formatted/$file")
          done
          ruff check --fix "${formatted_files[@]}" > "$out/autofix.log" 2>&1
          ruff format "${formatted_files[@]}" >> "$out/autofix.log" 2>&1
          printf '{"ruff":%s,"format":%s,"mypy":%s,"pytest":%s,"self_check":%s}\n' \
            "$ruff_status" "$format_status" "$mypy_status" "$pytest_status" \
            "$self_check_status" > "$out/status.json"
          cat "$out/status.json"
          if (( ruff_status || format_status || mypy_status || pytest_status || self_check_status )); then
            exit 1
          fi
      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claw-academic-tailoring-${{ matrix.python-version }}-${{ github.run_id }}
          path: |
            build/claw-benchmark-${{ matrix.python-version }}/
            evals/claw_academic_tailoring_v1/source.json
          if-no-files-found: error
          retention-days: 30
