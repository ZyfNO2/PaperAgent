name: P0 Format Diagnostic

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - feat/v0.6-v0.8-mvp-plugins

permissions:
  contents: read

jobs:
  format-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Produce canonical Ruff formatting
        run: |
          python -m pip install --quiet 'ruff==0.12.12'
          ruff format tests/plugins/test_academic_method_p0.py
          cp tests/plugins/test_academic_method_p0.py formatted-test_academic_method_p0.py
          ruff format --check . > ruff-format-diagnostic.txt 2>&1
      - name: Upload canonical file and diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-format-diagnostic
          path: |
            formatted-test_academic_method_p0.py
            ruff-format-diagnostic.txt
          if-no-files-found: error
