name: P0 Format Diagnostic

on:
  push:
    branches:
      - feat/v0.6-v0.8-mvp-plugins

permissions:
  contents: read

jobs:
  format-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Report files requiring Ruff formatting
        run: |
          python -m pip install --quiet 'ruff==0.12.12'
          ruff format --check .
