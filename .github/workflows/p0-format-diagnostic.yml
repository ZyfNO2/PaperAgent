name: P0 Test Diagnostic

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - feat/v0.6-v0.8-mvp-plugins

permissions:
  contents: read

jobs:
  test-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Capture offline test failures
        id: tests
        continue-on-error: true
        run: pytest -q --maxfail=20 > p0-test-diagnostic.txt 2>&1
      - name: Upload test diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p0-test-diagnostic
          path: p0-test-diagnostic.txt
          if-no-files-found: error
      - name: Enforce test result
        if: steps.tests.outcome == 'failure'
        run: exit 1
