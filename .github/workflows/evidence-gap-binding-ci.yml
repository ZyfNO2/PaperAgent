name: Evidence Gap Binding Offline Gate

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/evidence-gap-binding-ci.yml"
      - "src/paperagent/evidence_gap_binding.py"
      - "src/paperagent/retrieval/verify_evidence.py"
      - "tests/review/test_semantic_gap_binding.py"
      - "tests/schemas/test_plan_nonblocking_clarification.py"
      - "tests/unit/test_schemas.py"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: evidence-gap-binding-offline
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run offline evidence checks
        shell: bash
        run: |
          set +e
          out="build/evidence-gap-binding"
          mkdir -p "$out"
          files=(
            src/paperagent/evidence_gap_binding.py
            src/paperagent/retrieval/verify_evidence.py
            tests/review/test_semantic_gap_binding.py
            tests/schemas/test_plan_nonblocking_clarification.py
            tests/unit/test_schemas.py
          )
          ruff check "${files[@]}" --output-format=concise > "$out/ruff.log" 2>&1
          ruff_status=$?
          ruff format --check --diff "${files[@]}" > "$out/format.log" 2>&1
          format_status=$?
          mypy --config-file pyproject.toml > "$out/mypy.log" 2>&1
          mypy_status=$?
          pytest -q \
            tests/review/test_semantic_gap_binding.py \
            tests/literature/test_query_concepts.py \
            tests/review/test_consolidated_regressions.py \
            tests/schemas/test_plan_nonblocking_clarification.py \
            tests/unit/test_schemas.py \
            > "$out/pytest.log" 2>&1
          pytest_status=$?
          printf '{"head":"%s","run_id":%s,"ruff":%s,"format":%s,"mypy":%s,"pytest":%s}\n' \
            "$GITHUB_SHA" "$GITHUB_RUN_ID" "$ruff_status" "$format_status" \
            "$mypy_status" "$pytest_status" > "$out/status.json"
          cat "$out/status.json"
          if (( ruff_status || format_status || mypy_status || pytest_status )); then
            exit 1
          fi
      - name: Upload offline evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-gap-binding-${{ github.run_id }}
          path: build/evidence-gap-binding/
          if-no-files-found: error
          retention-days: 30
      - name: Publish status to Draft PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          pr_number=$(gh pr list \
            --head "$GITHUB_REF_NAME" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [[ -z "$pr_number" ]]; then
            exit 0
          fi
          status_file="build/evidence-gap-binding/status.json"
          if [[ -f "$status_file" ]]; then
            status=$(cat "$status_file")
          else
            status='{"status":"failed_before_checks"}'
          fi
          gh pr comment "$pr_number" --body "Evidence gap binding offline gate\n\n- Run: $GITHUB_RUN_ID\n- Status: \`$status\`"
