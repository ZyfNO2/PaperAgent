name: Gate L Consistency Fix Once

on:
  pull_request:
    branches: [scientific-gate-l]

permissions:
  contents: write

jobs:
  repair:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Resolve prompt conflict and refresh diagnostic digest
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          prompt_path = Path('src/paperagent/prompts/v0_1/planning.md')
          text = prompt_path.read_text(encoding='utf-8')
          start_marker = '<' * 7 + ' Updated upstream\n'
          middle_marker = '=' * 7 + '\n'
          end_marker = '>' * 7 + ' Stashed changes\n'
          start = text.index(start_marker)
          middle = text.index(middle_marker, start)
          end = text.index(end_marker, middle)
          upstream = text[start + len(start_marker):middle].strip()
          stashed = text[middle + len(middle_marker):end].strip()
          _, retained_policy = stashed.split('\n\n', 1)
          resolved = (
              text[:start]
              + upstream
              + '\n\n'
              + retained_policy
              + '\n'
              + text[end + len(end_marker):]
          )
          prompt_path.write_text(resolved, encoding='utf-8')

          case_path = Path('evals/v0_6/holdout_cases.v1.jsonl')
          manifest_path = Path('evals/v0_6/holdout_manifest.json')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          manifest['content_digest'] = hashlib.sha256(case_path.read_bytes()).hexdigest()
          manifest['note'] = (
              'Holdout v1 is retained only as a diagnostic snapshot. Its current exact-byte '
              'digest is recorded for repository integrity, but prompt/rule changes invalidate '
              'it for final Gate L acceptance.'
          )
          manifest_path.write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
      - run: python -m pip install -e '.[dev]'
      - name: Verify consistency tests
        run: |
          ruff format src/paperagent/prompts/v0_1/planning.md evals/v0_6/holdout_manifest.json || true
          pytest -q \
            tests/contracts/test_prompt_registry.py \
            tests/evals/test_holdout_manifest.py
      - name: Commit verified repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/paperagent/prompts/v0_1/planning.md evals/v0_6/holdout_manifest.json
          git commit -m 'fix(gate-l): resolve prompt conflict and refresh v1 diagnostic digest'
          git push origin HEAD:${{ github.head_ref }}
