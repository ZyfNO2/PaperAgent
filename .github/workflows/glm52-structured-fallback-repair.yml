name: GLM-5.2 Structured Fallback Repair

on:
  push:
    branches:
      - fix/glm52-runtime-hardening-v2
    paths:
      - ".github/workflows/glm52-structured-fallback-repair.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: glm52-structured-fallback-repair-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/glm52-runtime-hardening-v2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply structured-response fallback repair
        run: |
          python - <<'PY'
          from pathlib import Path

          provider_path = Path("src/paperagent/providers/openai_llm.py")
          provider = provider_path.read_text(encoding="utf-8")
          retry_marker = '_RETRY_BACKOFF_SECONDS: tuple[float, ...] = (0.5, 1.0, 2.0)\n'
          fallback_constant = (
              '_NATIVE_SCHEMA_FALLBACK_CODES = frozenset(\n'
              '    {\n'
              '        "LLM_RESPONSE_FORMAT_UNSUPPORTED",\n'
              '        "LLM_RESPONSE_JSON_INVALID",\n'
              '        "LLM_RESPONSE_SCHEMA_INVALID",\n'
              '    }\n'
              ')\n'
          )
          if "_NATIVE_SCHEMA_FALLBACK_CODES" not in provider:
              if retry_marker not in provider:
                  raise SystemExit("retry marker not found")
              provider = provider.replace(
                  retry_marker,
                  retry_marker + "\n" + fallback_constant,
                  1,
              )
          old_catch = (
              '            except ProviderError as exc:\n'
              '                if exc.code != "LLM_RESPONSE_FORMAT_UNSUPPORTED":\n'
              '                    raise\n'
          )
          new_catch = (
              '            except ProviderError as exc:\n'
              '                if exc.code not in _NATIVE_SCHEMA_FALLBACK_CODES:\n'
              '                    raise\n'
          )
          if old_catch in provider:
              provider = provider.replace(old_catch, new_catch, 1)
          elif new_catch not in provider:
              raise SystemExit("native fallback catch not found")
          provider_path.write_text(provider, encoding="utf-8")

          test_path = Path("tests/providers/test_openai_llm_runtime_limits.py")
          tests = test_path.read_text(encoding="utf-8")
          test_name = "test_native_invalid_json_falls_back_to_schema_prompt"
          if test_name not in tests:
              tests += '''

          def test_native_invalid_json_falls_back_to_schema_prompt(
              monkeypatch: pytest.MonkeyPatch,
          ) -> None:
              captured: dict[str, Any] = {}
              responses = iter(
                  [
                      _response(
                          200,
                          {"choices": [{"message": {"content": "not-json"}}]},
                      ),
                      _response(
                          200,
                          {"choices": [{"message": {"content": '{"status":"ok"}'}}]},
                      ),
                  ]
              )
              _install_fake_client(monkeypatch, responses, captured)
              provider = OpenAILLMProvider(
                  api_key="test-key",
                  model="z-ai/glm-5.2",
                  base_url="https://example.test/v1",
                  max_retries=0,
                  max_output_tokens=512,
              )

              reply = _generate(provider)

              assert reply.status == "ok"
              assert len(captured["requests"]) == 2
              assert "response_format" in captured["requests"][0]["json"]
              fallback = captured["requests"][1]["json"]
              assert "response_format" not in fallback
              assert fallback["max_tokens"] == 512
              assert "--- JSON SCHEMA" in fallback["messages"][-1]["content"]
          '''
              test_path.write_text(tests, encoding="utf-8")

          workflow_path = Path(".github/workflows/glm52-runtime-hardening.yml")
          workflow = workflow_path.read_text(encoding="utf-8")
          workflow = workflow.replace(
              'PAPERAGENT_LLM_MAX_ATTEMPTS: "1"',
              'PAPERAGENT_LLM_MAX_ATTEMPTS: "2"',
          )
          workflow = workflow.replace(
              'PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_CALL: "64"',
              'PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_CALL: "512"',
          )
          workflow = workflow.replace(
              'PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_TASK: "128"',
              'PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_TASK: "1024"',
          )
          workflow_path.write_text(workflow, encoding="utf-8")
          PY
      - name: Format, lint, and test repaired runtime
        run: |
          ruff format \
            src/paperagent/providers/openai_llm.py \
            tests/providers/test_openai_llm_runtime_limits.py
          ruff check \
            src/paperagent/providers/openai_llm.py \
            tests/providers/test_openai_llm_runtime_limits.py
          pytest -q \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py
          mypy --config-file pyproject.toml src/paperagent/providers
      - name: Commit production repair and remove this workflow
        run: |
          rm -f .github/workflows/glm52-structured-fallback-repair.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(llm): recover from invalid structured responses"
          git push origin HEAD:fix/glm52-runtime-hardening-v2
