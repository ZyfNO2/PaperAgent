name: Gate L v2 Formal Scientific Execution

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: Frozen v2 manifest path committed in the repository
        required: true
        default: evals/v0_6/holdout_manifest.v2.json
        type: string
      confirmation:
        description: Type RUN_FROZEN_V2 to authorize the configured-provider 16-case run
        required: true
        type: string

permissions:
  contents: read

jobs:
  formal-gate-l-v2:
    if: inputs.confirmation == 'RUN_FROZEN_V2'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Verify configured provider/model identity
        run: |
          test -n "${PAPERAGENT_LLM_PROVIDER:-}" || (echo 'PAPERAGENT_LLM_PROVIDER is required' && exit 2)
          test -n "${PAPERAGENT_LLM_MODEL:-}" || (echo 'PAPERAGENT_LLM_MODEL is required' && exit 2)
          test -n "${PAPERAGENT_LLM_BASE_URL:-}" || (echo 'PAPERAGENT_LLM_BASE_URL is required' && exit 2)
          test -n "${PAPERAGENT_PRICE_TABLE:-}" || (echo 'PAPERAGENT_PRICE_TABLE is required' && exit 2)
        env:
          PAPERAGENT_LLM_PROVIDER: ${{ vars.PAPERAGENT_LLM_PROVIDER }}
          PAPERAGENT_LLM_MODEL: ${{ vars.PAPERAGENT_LLM_MODEL }}
          PAPERAGENT_LLM_BASE_URL: ${{ vars.PAPERAGENT_LLM_BASE_URL }}
          PAPERAGENT_PRICE_TABLE: ${{ vars.PAPERAGENT_PRICE_TABLE }}

      - name: Verify frozen v2 manifest before provider use
        run: |
          python scripts/gate_l_v2_acceptance.py verify \
            --manifest "${{ inputs.manifest }}"

      - name: Execute exact frozen v2 corpus
        env:
          PAPERAGENT_LLM_PROVIDER: ${{ vars.PAPERAGENT_LLM_PROVIDER }}
          PAPERAGENT_LLM_MODEL: ${{ vars.PAPERAGENT_LLM_MODEL }}
          PAPERAGENT_LLM_BASE_URL: ${{ vars.PAPERAGENT_LLM_BASE_URL }}
          PAPERAGENT_LLM_API_KEY: ${{ secrets.PAPERAGENT_LLM_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.PAPERAGENT_LLM_API_KEY }}
          PAPERAGENT_PRICE_TABLE: ${{ vars.PAPERAGENT_PRICE_TABLE }}
        run: |
          python scripts/run_gate_l_v2.py \
            --manifest "${{ inputs.manifest }}" \
            --price-table "${PAPERAGENT_PRICE_TABLE}" \
            --output-dir build/gate-l-v2-evidence

      - name: Upload immutable Gate L v2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-l-v2-formal-evidence-${{ github.sha }}
          path: build/gate-l-v2-evidence/
          if-no-files-found: error
          retention-days: 90
