name: Gate L v2 Formal Scientific Execution

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: Frozen v2 manifest path committed in the repository
        required: true
        default: evals/v0_6/holdout_manifest.v2.json
        type: string
      model:
        description: Real Mistral model used for the frozen execution
        required: true
        default: mistral-small-latest
        type: string
      confirmation:
        description: Type RUN_FROZEN_V2 to authorize the paid 16-case real-provider run
        required: true
        type: string

permissions:
  contents: read

jobs:
  formal-gate-l-v2:
    if: inputs.confirmation == 'RUN_FROZEN_V2'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      PAPERAGENT_LLM_PROVIDER: mistral
      PAPERAGENT_LLM_MODEL: ${{ inputs.model }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Verify frozen v2 manifest before provider use
        run: |
          python scripts/gate_l_v2_acceptance.py verify \
            --manifest "${{ inputs.manifest }}"

      - name: Execute exact frozen v2 corpus
        run: |
          python scripts/run_gate_l_v2.py \
            --manifest "${{ inputs.manifest }}" \
            --output-dir build/gate-l-v2-evidence

      - name: Upload immutable Gate L v2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-l-v2-formal-evidence-${{ github.sha }}
          path: build/gate-l-v2-evidence/
          if-no-files-found: error
          retention-days: 90
