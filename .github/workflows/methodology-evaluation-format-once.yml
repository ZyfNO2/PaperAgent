name: Methodology Evaluation Format Once

on:
  pull_request:
    branches: [fix/gate-l-v3-acceptance-routing]

permissions:
  contents: write

jobs:
  format:
    if: ${{ github.head_ref == 'fix/academic-tailoring-contract-convergence' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install ruff
      - run: |
          ruff format src/paperagent/academic_tailoring_evaluation.py
          ruff check src/paperagent/academic_tailoring_evaluation.py
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/paperagent/academic_tailoring_evaluation.py
          git commit -m 'style(methodology): format canonical evaluation grader'
          git push origin HEAD:${{ github.head_ref }}
