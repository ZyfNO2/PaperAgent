name: CLAW Real Provider and Clean v2 Acceptance

on:
  workflow_dispatch:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".claw-real-provider-smoke-trigger.json"

permissions:
  contents: write

concurrency:
  group: claw-real-provider-and-clean-v2
  cancel-in-progress: true

env:
  PRODUCTION_SHA: c10c5dc14ca004fa0e3c567eba273dd5bd7e078c
  MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
  PAPERAGENT_CONTACT_EMAIL: ${{ secrets.PAPERAGENT_CONTACT_EMAIL || 'Z1015558261@outlook.com' }}
  SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
  PAPERAGENT_LLM_PROVIDER: mistral
  PAPERAGENT_LLM_MODEL: mistral-small-latest
  PAPERAGENT_MISTRAL_MODEL: mistral-small-latest
  PAPERAGENT_LLM_BASE_URL: https://api.mistral.ai/v1
  PAPERAGENT_LLM_MAX_ATTEMPTS: "2"
  PAPERAGENT_LLM_MAX_CALLS: "12"
  PAPERAGENT_LLM_MAX_INPUT_TOKENS_PER_TASK: "32000"
  PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_CALL: "4096"
  PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_TASK: "16384"
  PAPERAGENT_LLM_TASK_TIMEOUT: "900"
  PAPERAGENT_ENABLE_WEB_SEARCH: "0"

jobs:
  acceptance:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout orchestration branch
        uses: actions/checkout@v4
        with:
          path: orchestration
          fetch-depth: 0

      - name: Checkout clean benchmark branch
        uses: actions/checkout@v4
        with:
          ref: eval/academic-holdout-v2-clean
          path: benchmark
          fetch-depth: 0

      - name: Checkout frozen production commit
        uses: actions/checkout@v4
        with:
          ref: c10c5dc14ca004fa0e3c567eba273dd5bd7e078c
          path: production
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: production/pyproject.toml

      - name: Resolve benchmark SHA
        id: benchmark
        run: echo "sha=$(git -C benchmark rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install frozen production package
        id: install
        continue-on-error: true
        run: python -m pip install -q -e './production[dev]'

      - name: Static leakage audit
        id: leakage
        if: steps.install.outcome == 'success'
        continue-on-error: true
        working-directory: production
        run: |
          python - <<'PY'
          from paperagent.benchmark_leakage_audit import audit_benchmark_execution_boundary

          result = audit_benchmark_execution_boundary()
          print(result.model_dump_json(indent=2))
          if not result.passed:
              raise SystemExit(result.findings)
          PY

      - name: Require Mistral secret
        id: secret
        continue-on-error: true
        run: test -n "$MISTRAL_API_KEY"

      - name: Real Mistral smoke
        id: mistral
        if: steps.install.outcome == 'success' && steps.secret.outcome == 'success'
        continue-on-error: true
        working-directory: production
        env:
          PAPERAGENT_RUN_REAL_LLM: "1"
        run: pytest --no-cov -q tests/real_provider/test_mistral_smoke.py

      - name: Real literature smoke
        id: literature
        if: steps.install.outcome == 'success'
        continue-on-error: true
        working-directory: production
        env:
          PAPERAGENT_RUN_REAL_PROVIDER: "1"
        run: pytest --no-cov -q tests/real_provider/test_literature_smoke.py

      - name: Validate benchmark authoring set
        id: validation
        continue-on-error: true
        working-directory: benchmark
        run: |
          mkdir -p build/public-dev-v2
          set -o pipefail
          {
            python scripts/validate_cases.py data/public-dev-v2.jsonl
            python -m unittest discover -s tests -v
          } 2>&1 | tee build/public-dev-v2/validation.log

      - name: External production leakage scan
        id: production_scan
        if: steps.validation.outcome == 'success'
        continue-on-error: true
        working-directory: benchmark
        run: |
          python scripts/scan_production.py ../production \
            --output build/public-dev-v2/production-scan.json

      - name: Freeze scorer runners protocol and thresholds
        id: freeze
        if: steps.production_scan.outcome == 'success'
        continue-on-error: true
        working-directory: benchmark
        env:
          BENCHMARK_SHA: ${{ steps.benchmark.outputs.sha }}
        run: |
          python scripts/freeze_evaluation.py \
            --repository-root . \
            --production-source-sha "$PRODUCTION_SHA" \
            --benchmark-source-sha "$BENCHMARK_SHA" \
            --production-scan build/public-dev-v2/production-scan.json \
            --output build/public-dev-v2/freeze-manifest.json

      - name: Run 12-case public development set
        id: public_dev
        if: >-
          steps.install.outcome == 'success' &&
          steps.leakage.outcome == 'success' &&
          steps.secret.outcome == 'success' &&
          steps.validation.outcome == 'success' &&
          steps.production_scan.outcome == 'success' &&
          steps.freeze.outcome == 'success'
        continue-on-error: true
        working-directory: benchmark
        env:
          PAPERAGENT_PRODUCTION_SHA: c10c5dc14ca004fa0e3c567eba273dd5bd7e078c
          PAPERAGENT_LLM_MAX_COST_USD: "1.00"
        run: |
          set -o pipefail
          python scripts/run_public_dev.py \
            --cases data/public-dev-v2.jsonl \
            --output-dir build/public-dev-v2 \
            --max-cases 12 \
            --max-llm-calls 12 \
            --provider-call-budget 120 \
            --llm-provider mistral \
            --llm-model mistral-small-latest \
            --llm-price-table ../production/config/llm-prices/mistral-small-latest.json \
            --require-thresholds \
            2>&1 | tee build/public-dev-v2/public-run.log

      - name: Write fail-auditable handoff
        id: handoff
        if: always()
        working-directory: benchmark
        env:
          BENCHMARK_SHA: ${{ steps.benchmark.outputs.sha }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          LEAKAGE_OUTCOME: ${{ steps.leakage.outcome }}
          SECRET_OUTCOME: ${{ steps.secret.outcome }}
          MISTRAL_OUTCOME: ${{ steps.mistral.outcome }}
          LITERATURE_OUTCOME: ${{ steps.literature.outcome }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
          PRODUCTION_SCAN_OUTCOME: ${{ steps.production_scan.outcome }}
          FREEZE_OUTCOME: ${{ steps.freeze.outcome }}
          PUBLIC_DEV_OUTCOME: ${{ steps.public_dev.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          output = Path("build/public-dev-v2")
          output.mkdir(parents=True, exist_ok=True)

          def load_json(name):
              path = output / name
              return json.loads(path.read_text()) if path.exists() else None

          def tail(name, lines=160):
              path = output / name
              if not path.exists():
                  return None
              return "\n".join(path.read_text(errors="replace").splitlines()[-lines:])

          outcomes = {
              "install": os.environ.get("INSTALL_OUTCOME"),
              "static_leakage_audit": os.environ.get("LEAKAGE_OUTCOME"),
              "mistral_secret": os.environ.get("SECRET_OUTCOME"),
              "mistral_smoke": os.environ.get("MISTRAL_OUTCOME"),
              "literature_smoke": os.environ.get("LITERATURE_OUTCOME"),
              "validation": os.environ.get("VALIDATION_OUTCOME"),
              "production_scan": os.environ.get("PRODUCTION_SCAN_OUTCOME"),
              "freeze": os.environ.get("FREEZE_OUTCOME"),
              "public_dev_run": os.environ.get("PUBLIC_DEV_OUTCOME"),
          }
          payload = {
              "schema": "paperagent.academic-holdout.public-dev-handoff.v4",
              "benchmark_source_sha": os.environ.get("BENCHMARK_SHA"),
              "production_source_sha": os.environ["PRODUCTION_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "split": "development",
              "result_interpretation": "public development set; not independent generalization evidence",
              "outcomes": outcomes,
              "production_scan": load_json("production-scan.json"),
              "freeze_manifest": load_json("freeze-manifest.json"),
              "summary": load_json("execution-summary.json"),
              "validation_log_tail": tail("validation.log"),
              "public_run_log_tail": tail("public-run.log"),
              "passed": all(value == "success" for value in outcomes.values()),
          }
          serialized = json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + "\n"
          (output / "handoff.json").write_text(serialized)
          Path("/tmp/public-dev-v2-latest.json").write_text(serialized)
          print(serialized)
          PY

      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-provider-clean-v2-${{ github.run_id }}
          path: benchmark/build/public-dev-v2
          if-no-files-found: warn
          retention-days: 90

      - name: Write handoff to clean branch
        if: always() && steps.handoff.outcome == 'success'
        working-directory: benchmark
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin eval/academic-holdout-v2-clean
          mkdir -p results
          cp /tmp/public-dev-v2-latest.json results/public-dev-v2-latest.json
          git add results/public-dev-v2-latest.json
          if ! git diff --cached --quiet; then
            git commit -m "test(eval): record fail-auditable c10c5dc1 public run"
            git push origin HEAD:eval/academic-holdout-v2-clean
          fi

      - name: Enforce acceptance
        if: always()
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          LEAKAGE_OUTCOME: ${{ steps.leakage.outcome }}
          SECRET_OUTCOME: ${{ steps.secret.outcome }}
          MISTRAL_OUTCOME: ${{ steps.mistral.outcome }}
          LITERATURE_OUTCOME: ${{ steps.literature.outcome }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
          PRODUCTION_SCAN_OUTCOME: ${{ steps.production_scan.outcome }}
          FREEZE_OUTCOME: ${{ steps.freeze.outcome }}
          PUBLIC_DEV_OUTCOME: ${{ steps.public_dev.outcome }}
          HANDOFF_OUTCOME: ${{ steps.handoff.outcome }}
        run: |
          for value in \
            "$INSTALL_OUTCOME" "$LEAKAGE_OUTCOME" "$SECRET_OUTCOME" \
            "$MISTRAL_OUTCOME" "$LITERATURE_OUTCOME" "$VALIDATION_OUTCOME" \
            "$PRODUCTION_SCAN_OUTCOME" "$FREEZE_OUTCOME" \
            "$PUBLIC_DEV_OUTCOME" "$HANDOFF_OUTCOME"; do
            test "$value" = success || exit 1
          done
