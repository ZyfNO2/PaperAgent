name: v0.3 one-shot format

on:
  push:
    branches:
      - feat/v0.3-durable-task-api-mvp
    paths:
      - .ci/v0.3/FORMAT

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/v0.3-durable-task-api-mvp
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply repository formatter
        run: |
          python -m pip install 'ruff==0.12.12'
          ruff check --fix .
          ruff format .
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style(v0.3): apply Ruff formatting' || true
          git push origin HEAD:feat/v0.3-durable-task-api-mvp
