name: Temporary Planning Asset Repair V5

on:
  push:
    branches: [fix/semantic-tailoring-role-bound-scoring]
    paths: [".github/workflows/tmp-planning-assets-repair-v5.yml"]
  pull_request:
    branches: [master]
    paths: [".github/workflows/tmp-planning-assets-repair-v5.yml"]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Apply final planning repair
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/tmp-planning-assets-repair-v2.yml').read_text(encoding='utf-8')
          start = workflow.index('      - name: Apply corrected planning repair\n')
          run_start = workflow.index('        run: |\n', start) + len('        run: |\n')
          end = workflow.index('      - name: Install and verify\n', run_start)
          lines = workflow[run_start:end].splitlines()
          Path('/tmp/apply.sh').write_text(
              '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n',
              encoding='utf-8',
          )
          PY
          bash /tmp/apply.sh
          python - <<'PY'
          from pathlib import Path
          path = Path('src/paperagent/nodes/planning.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace('    "benchmark",\n', '', 1)
          text = text.replace('    "基准",\n', '', 1)
          marker = '''def _plan_queries_contain(plan: ResearchPlan, hints: tuple[str, ...]) -> bool:\n    return any(\n        any(hint in f"{query.gap_id} {query.query}".casefold() for hint in hints)\n        for query in plan.search_queries\n    )\n\n\n'''
          addition = '''def _plan_queries_contain(plan: ResearchPlan, hints: tuple[str, ...]) -> bool:\n    return any(\n        any(hint in f"{query.gap_id} {query.query}".casefold() for hint in hints)\n        for query in plan.search_queries\n    )\n\n\ndef _has_dataset_lane(plan: ResearchPlan) -> bool:\n    return any(\n        "dataset" in query.source_types\n        or any(\n            hint in f"{query.gap_id} {query.query}".casefold()\n            for hint in _DATASET_QUERY_HINTS\n        )\n        for query in plan.search_queries\n    )\n\n\n'''
          if text.count(marker) != 1:
              raise RuntimeError('plan query detector marker mismatch')
          text = text.replace(marker, addition, 1)
          old = '    if not _plan_queries_contain(current, _DATASET_QUERY_HINTS):\n'
          new = '    if not _has_dataset_lane(current):\n'
          if text.count(old) != 1:
              raise RuntimeError('dataset lane condition mismatch')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Install and verify
        run: |
          python -m pip install -q -e '.[dev]'
          ruff format src/paperagent/nodes/planning.py tests/nodes/test_planning_methodology_assets.py
          ruff check src/paperagent/nodes/planning.py tests/nodes/test_planning_methodology_assets.py
          mypy --strict src/paperagent/nodes/planning.py
          pytest -q tests/nodes/test_planning_methodology_assets.py tests/nodes/test_planning_identity_priority.py
      - name: Commit planning repair
        if: github.event_name == 'push'
        run: |
          git config user.name "paperagent-repair-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/paperagent/nodes/planning.py tests/nodes/test_planning_methodology_assets.py
          git commit -m "fix(planning): guarantee methodology evidence lanes"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
