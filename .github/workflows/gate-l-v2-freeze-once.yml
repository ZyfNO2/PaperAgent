name: Gate L v2 Freeze Once

on:
  push:
    branches: [scientific-gate-l]
    paths:
      - .github/workflows/gate-l-v2-freeze-once.yml

permissions:
  contents: write

jobs:
  freeze:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scientific-gate-l
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Verify validated candidate digest
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          expected = 'f2c493790f773d9f916b7749d1047a51be9728d41d032a7d2c2d9de12a67cc8d'
          actual = hashlib.sha256(Path('evals/v0_6/holdout_cases.v2.jsonl').read_bytes()).hexdigest()
          print(actual)
          if actual != expected:
              raise SystemExit(f'candidate digest changed: {actual}')
          PY
      - name: Freeze exact v2 candidate
        run: |
          python scripts/gate_l_v2_acceptance.py freeze \
            --cases evals/v0_6/holdout_cases.v2.jsonl \
            --manifest-out evals/v0_6/holdout_manifest.v2.json \
            --attestation evals/v0_6/gate_l_v2_author_attestation.json
      - name: Verify frozen manifest
        run: python scripts/gate_l_v2_acceptance.py verify --manifest evals/v0_6/holdout_manifest.v2.json
      - name: Commit frozen manifest
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add evals/v0_6/holdout_manifest.v2.json
          git commit -m 'test(gate-l): freeze validated v2 holdout corpus'
          git push origin HEAD:scientific-gate-l
