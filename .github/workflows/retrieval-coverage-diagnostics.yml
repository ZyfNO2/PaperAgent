name: Retrieval coverage diagnostics

on:
  pull_request:
    branches:
      - fix/evidence-bound-module-contracts-local

jobs:
  capture-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Capture exact CI pytest output
        run: |
          set +e
          pytest -q --cov=paperagent --cov-branch --cov-report=term-missing --cov-report=xml > coverage-diagnostics.txt 2>&1
          status=$?
          echo "$status" > coverage-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: retrieval-coverage-diagnostics
          path: |
            coverage-diagnostics.txt
            coverage-status.txt
            coverage.xml
