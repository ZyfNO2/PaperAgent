name: Gate L Format Graph Test Once

on:
  pull_request:
    branches: [scientific-gate-l]

permissions:
  contents: write

jobs:
  format:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install ruff
      - run: ruff format tests/graph/test_full_graph.py
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/graph/test_full_graph.py
          git commit -m 'style(graph): format synthesis failure fixture'
          git push origin HEAD:${{ github.head_ref }}
