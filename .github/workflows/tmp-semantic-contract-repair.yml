name: Temporary Semantic Contract Repair

on:
  push:
    branches:
      - fix/semantic-tailoring-role-bound-scoring
    paths:
      - ".github/workflows/tmp-semantic-contract-repair.yml"

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Apply production repair and regressions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one replacement, found {count}")
              write(path, text.replace(old, new, 1))

          def replace_block(path: str, start: str, end: str, new: str) -> None:
              text = read(path)
              start_index = text.index(start)
              end_index = text.index(end, start_index)
              write(path, text[:start_index] + new + text[end_index:])

          method_path = "src/paperagent/method_design_draft.py"
          replace_once(
              method_path,
              '''    input_semantics: str = Field(min_length=5)\n    output_semantics: str = Field(min_length=5)\n    predicted_effect: str = Field(min_length=5)\n''',
              '''    input_semantics: str = Field(\n        min_length=5,\n        description="Concrete semantic meaning of the tensor or structured value consumed by the module.",\n    )\n    output_semantics: str = Field(\n        min_length=5,\n        description="Concrete semantic meaning of the value emitted to the downstream baseline stage.",\n    )\n    input_shape: str = Field(\n        min_length=5,\n        description="Concrete symbolic rank and axes, for example batch x sequence x hidden_size.",\n    )\n    output_shape: str = Field(\n        min_length=5,\n        description="Concrete symbolic rank and axes after the module, including any changed axis.",\n    )\n    optimization_interaction: str = Field(\n        min_length=10,\n        description=(\n            "State the trainable parameters, frozen parameters, objective terms, gradient path, "\n            "and any loss weighting used by this module."\n        ),\n    )\n    predicted_effect: str = Field(min_length=5)\n''',
          )

          replace_block(
              method_path,
              "def _select_inferred_baseline_evidence(\n",
              "def _matches_declared_repository_lookup(\n",
              '''def _author_linked_repository_parent_ids(\n    candidates: tuple[EvidenceItem, ...],\n) -> set[str]:\n    return {\n        parent_id\n        for item in candidates\n        if item.source_type == "repository"\n        and item.metadata.get("relation") == "author_linked_from_verified_paper"\n        for parent_id in (item.metadata.get("parent_paper_id"),)\n        if parent_id\n    }\n\n\ndef _select_inferred_baseline_evidence(\n    candidates: tuple[EvidenceItem, ...],\n) -> EvidenceItem | None:\n    papers = tuple(\n        item\n        for item in candidates\n        if item.source_type == "paper"\n        and item.metadata.get("baseline_candidate") == "inferred"\n        and item.metadata.get("relation") in {"baseline_role_query", "parallel_via_dataset"}\n        and _metadata_float(item, "relevance_score", default=0.0)\n        >= _MIN_DATASET_PARALLEL_BASELINE_RELEVANCE\n    )\n    if not papers:\n        return None\n    repository_parent_ids = _author_linked_repository_parent_ids(candidates)\n    repository_backed = tuple(\n        item\n        for item in papers\n        if item.evidence_id.removeprefix("ev-") in repository_parent_ids\n    )\n    # Prefer an executable, author-linked baseline whenever retrieval found one.\n    # Retain the evidence-only fallback for discovery runs, where the method remains\n    # explicitly unreproduced and cannot receive strict acceptance.\n    eligible = repository_backed or papers\n    return max(eligible, key=_baseline_evidence_rank)\n\n\n''',
          )

          replace_block(
              method_path,
              "def _select_repository_backed_direct_baseline(\n",
              "def _select_baseline_evidence(\n",
              '''def _select_repository_backed_direct_baseline(\n    candidates: tuple[EvidenceItem, ...],\n    *,\n    declared_titles: tuple[str, ...] = (),\n) -> EvidenceItem | None:\n    """Select a verified task paper with an accepted author-linked repository.\n\n    For a declared baseline miss, the fallback must originate from that exact-title lookup; an\n    arbitrary repository-backed task paper may not replace a user-declared identity. Identity\n    and baseline-role retrieval lanes are accepted in addition to direct queries because the\n    literature runtime annotates exact-title results by their originating role.\n    """\n\n    repository_parent_ids = _author_linked_repository_parent_ids(candidates)\n    papers = tuple(\n        item\n        for item in candidates\n        if item.source_type == "paper"\n        and item.metadata.get("relation")\n        in {"direct_query", "declared_identity", "baseline_role_query"}\n        and item.evidence_id.removeprefix("ev-") in repository_parent_ids\n        and not _is_review_evidence(item.title, item.summary)\n        and _matches_declared_repository_lookup(item, declared_titles)\n    )\n    if not papers:\n        return None\n    return max(papers, key=_baseline_evidence_rank)\n\n\n''',
          )

          replace_block(
              method_path,
              "def _select_module_evidence(\n",
              "def _question_declares_dataset(\n",
              '''def _select_module_evidence(\n    candidates: tuple[EvidenceItem, ...],\n    *,\n    baseline: EvidenceItem | None,\n) -> EvidenceItem | None:\n    baseline_id = baseline.evidence_id if baseline is not None else None\n    papers = tuple(\n        item\n        for item in candidates\n        if item.source_type == "paper"\n        and item.evidence_id != baseline_id\n        and item.metadata.get("comparator_candidate") != "inferred"\n        and item.metadata.get("relation") != "comparator_role_query"\n    )\n    if not papers:\n        return None\n    return max(\n        papers,\n        key=lambda item: _module_evidence_rank(\n            item,\n            baseline_evidence_id=baseline_id,\n        ),\n    )\n\n\n''',
          )

          replace_once(
              method_path,
              '''        split="freeze the official or documented train/validation/test split before the pilot",\n        preprocessing=(\n            "match input construction, preprocessing, normalization, post-processing, "\n            "and inference precision across arms"\n        ),\n        tuning_budget=(\n            "match epochs or steps, optimizer search space, input budget, early stopping, "\n            "and total compute"\n        ),\n''',
              '''        split=(\n            f"Pre-register one immutable train/validation/test manifest for {dataset}, "\n            "including sample identifiers, timestamps where applicable, and content hashes."\n        ),\n        preprocessing=(\n            f"Serialize one deterministic preprocessing manifest for {dataset}; record transform "\n            "versions, ordering, normalization constants, and inference precision for every arm."\n        ),\n        tuning_budget=(\n            "Evaluate at most 12 predeclared configurations per arm, select on validation data "\n            "only, and retrain each selected configuration with seeds 1, 2, and 3."\n        ),\n''',
          )

          replace_once(
              method_path,
              '''    if module_primary is None:\n        raise ValueError("method canonicalization requires accepted paper evidence")\n''',
              '''    if module_primary is None:\n        raise ValueError(\n            "method canonicalization requires independent accepted module paper evidence "\n            "distinct from the baseline"\n        )\n''',
          )

          replace_once(
              method_path,
              '''        input_semantics=draft.input_semantics,\n        output_semantics=draft.output_semantics,\n        input_shape=(\n            "task-specific representation at the selected insertion point; exact dimensions "\n            "are resolved after the baseline is frozen"\n        ),\n        output_shape="representation contract required by the downstream baseline stage",\n        normalization="inherit and freeze the baseline normalization contract",\n''',
              '''        input_semantics=draft.input_semantics,\n        output_semantics=draft.output_semantics,\n        input_shape=draft.input_shape,\n        output_shape=draft.output_shape,\n        normalization=(\n            "Use the numeric normalization declared by the module source and record all "\n            "constants in the integration manifest."\n        ),\n''',
          )

          replace_once(
              method_path,
              '''        loss_terms=("inherit baseline task losses and weights for the first pilot",),\n        gradient_expectation=(\n            "verify non-zero finite gradients in the module and connected baseline path"\n        ),\n        parameter_update_scope=(\n            "train the candidate module and matched baseline parameters under the same budget"\n        ),\n        loss_scale=(\n            "keep baseline loss scaling unchanged unless a documented pilot failure requires repair"\n        ),\n''',
              '''        loss_terms=(f"Objective interaction: {draft.optimization_interaction}",),\n        gradient_expectation=f"Gradient contract: {draft.optimization_interaction}",\n        parameter_update_scope=f"Parameter update contract: {draft.optimization_interaction}",\n        loss_scale=f"Loss weighting contract: {draft.optimization_interaction}",\n''',
          )

          adapter_path = "src/paperagent/claw_benchmark_adapter.py"
          replace_once(
              adapter_path,
              "_SUPPLIED_REF = re.compile(\n",
              '''_GENERIC_MODULE_CONTRACT_CUES = (\n    "unresolved",\n    "unknown",\n    "selected insertion point",\n    "task-specific representation",\n    "inherit baseline",\n    "match the source evidence",\n)\n\n\ndef _specific_module_contract_text(value: str | None) -> bool:\n    if value is None or not value.strip():\n        return False\n    folded = value.casefold()\n    return not any(cue in folded for cue in _GENERIC_MODULE_CONTRACT_CUES)\n\n\ndef _module_compatibility_by_evidence(state: PaperAgentState) -> dict[str, bool]:\n    """Validate a module contract independently from the LLM response schema.\n\n    The check is Gold-independent and fail-closed: evidence must be accepted, distinct\n    from the baseline, role-attributed, and accompanied by concrete interface and\n    optimization contracts before a review can assert role compatibility.\n    """\n\n    method = state.get("method")\n    evidence = state.get("evidence")\n    if method is None or evidence is None:\n        return {}\n    plan = method.methodology_plan\n    baseline_id = plan.baseline.source_evidence_id\n    accepted_ids = set(evidence.accepted_ids)\n    output: dict[str, bool] = {}\n    for module in plan.modules:\n        evidence_id = module.evidence_id\n        if evidence_id is None:\n            continue\n        contract_values = (\n            module.input_semantics,\n            module.output_semantics,\n            module.input_shape,\n            module.output_shape,\n            module.gradient_expectation,\n            module.parameter_update_scope,\n            module.loss_scale,\n            module.failure_mode,\n            module.implementation_switch,\n        )\n        output[evidence_id] = bool(\n            evidence_id in accepted_ids\n            and evidence_id != baseline_id\n            and module.original_role\n            and module.proposed_role\n            and module.loss_terms\n            and all(_specific_module_contract_text(value) for value in contract_values)\n        )\n    return output\n\n\n_SUPPLIED_REF = re.compile(\n''',
          )
          replace_once(
              adapter_path,
              '''    method_roles = _method_evidence_roles(state)\n    full_text_ids = set(context.full_text_evidence_ids)\n''',
              '''    method_roles = _method_evidence_roles(state)\n    module_compatibility = _module_compatibility_by_evidence(state)\n    full_text_ids = set(context.full_text_evidence_ids)\n''',
          )
          replace_once(
              adapter_path,
              '''                role_compatible=None,\n''',
              '''                role_compatible=(\n                    module_compatibility.get(item.evidence_id)\n                    if role == "parallel_method"\n                    else None\n                ),\n''',
          )

          synthesis_path = "src/paperagent/nodes/evidence_synthesis.py"
          replace_once(
              synthesis_path,
              "from paperagent.schemas import EvidenceSynthesis\n",
              "from paperagent.schemas import EvidenceItem, EvidenceSynthesis\n",
          )
          replace_once(
              synthesis_path,
              "async def evidence_synthesis_node(state: PaperAgentState, config: RunnableConfig) -> StatePatch:\n",
              '''_SYNTHESIS_SUMMARY_LIMIT = 800\n_SYNTHESIS_METADATA_KEYS = (\n    "relation",\n    "role_binding",\n    "baseline_candidate",\n    "comparator_candidate",\n    "repository_ref",\n    "query_text",\n)\n\n\ndef _compact_evidence_payload(item: EvidenceItem) -> dict[str, object]:\n    metadata = {\n        key: value[:500]\n        for key in _SYNTHESIS_METADATA_KEYS\n        if (value := item.metadata.get(key)) is not None and value.strip()\n    }\n    return {\n        "evidence_id": item.evidence_id,\n        "source_type": item.source_type,\n        "title": item.title,\n        "stable_identifier": item.stable_identifier,\n        "supports_gap_ids": list(item.supports_gap_ids),\n        "summary": item.summary[:_SYNTHESIS_SUMMARY_LIMIT],\n        "metadata": metadata,\n    }\n\n\nasync def evidence_synthesis_node(state: PaperAgentState, config: RunnableConfig) -> StatePatch:\n''',
          )
          replace_once(
              synthesis_path,
              '''            "accepted_evidence": [\n                item.model_dump(mode="json") for item in evidence.accepted_items()\n            ],\n''',
              '''            "accepted_evidence": [\n                _compact_evidence_payload(item) for item in evidence.accepted_items()\n            ],\n''',
          )

          planning_path = "src/paperagent/nodes/planning.py"
          replace_block(
              planning_path,
              "def _ensure_baseline_role_query(\n",
              "def _query_contains_material_title(\n",
              '''def _ensure_baseline_role_query(\n    plan: ResearchPlan,\n    *,\n    query_budget: int,\n) -> ResearchPlan:\n    """Guarantee an explicit baseline retrieval role without displacing identity queries."""\n\n    if plan.status == "blocked" or not plan.search_queries:\n        return plan\n    if any(_contains_baseline_role(query.query) for query in plan.search_queries):\n        return plan\n\n    baseline_gap_ids = {\n        gap.gap_id\n        for gap in plan.evidence_gaps\n        if _contains_baseline_role(f"{gap.gap_id} {gap.description}")\n    }\n    for index, query in enumerate(plan.search_queries):\n        if query.gap_id not in baseline_gap_ids:\n            continue\n        rewritten = query.model_copy(\n            update={\n                "query": f"{query.query} reproducible baseline comparator official implementation",\n            }\n        )\n        queries = list(plan.search_queries)\n        queries[index] = _runtime_source_types(rewritten)\n        return plan.model_copy(update={"search_queries": queries})\n\n    existing_gap_ids = {gap.gap_id for gap in plan.evidence_gaps}\n    existing_query_ids = {query.query_id for query in plan.search_queries}\n    gap_id = _unique_identifier("development-baseline", existing_gap_ids)\n    query_id = _unique_identifier("q-development-baseline", existing_query_ids)\n    gap = EvidenceGap(\n        gap_id=gap_id,\n        description=(\n            "Identify an established task-matched development baseline with reproducible "\n            "evaluation evidence and an author-linked implementation."\n        ),\n        required=True,\n        minimum_accepted_items=1,\n    )\n    context = " ".join((plan.problem_statement, plan.scope)).strip()\n    query = SearchQuery(\n        query_id=query_id,\n        gap_id=gap_id,\n        query=(\n            f"{context} established reproducible baseline benchmark official implementation"\n        ),\n        source_types=["paper", "repository", "web"],\n    )\n    merged = plan.model_copy(\n        update={\n            "evidence_gaps": [*plan.evidence_gaps, gap],\n            "search_queries": [*plan.search_queries, query],\n        }\n    )\n    return _normalize_plan_to_query_budget(merged, query_budget=query_budget)\n\n\n''',
          )
          replace_once(
              planning_path,
              "async def planning_node(state: PaperAgentState, config: RunnableConfig) -> StatePatch:\n",
              '''_PARALLEL_QUERY_HINTS = (\n    "parallel",\n    "module",\n    "mechanism",\n    "adapter",\n    "intervention",\n    "fusion",\n    "attention",\n    "augmentation",\n    "并行",\n    "模块",\n    "机制",\n)\n_DATASET_QUERY_HINTS = (\n    "dataset",\n    "benchmark",\n    "corpus",\n    "evaluation protocol",\n    "split",\n    "数据集",\n    "基准",\n    "评测协议",\n)\n\n\ndef _plan_queries_contain(plan: ResearchPlan, hints: tuple[str, ...]) -> bool:\n    return any(\n        any(hint in f"{query.gap_id} {query.query}".casefold() for hint in hints)\n        for query in plan.search_queries\n    )\n\n\ndef _ensure_methodology_asset_queries(\n    plan: ResearchPlan,\n    request: ResearchRequest,\n    *,\n    query_budget: int,\n) -> ResearchPlan:\n    """Add Gold-independent evidence lanes required by method canonicalization."""\n\n    if plan.status == "blocked" or not plan.search_queries:\n        return plan\n    gaps = list(plan.evidence_gaps)\n    queries = list(plan.search_queries)\n    existing_gap_ids = {gap.gap_id for gap in gaps}\n    existing_query_ids = {query.query_id for query in queries}\n    context = " ".join((request.question, plan.problem_statement, plan.scope)).strip()\n\n    if not _plan_queries_contain(plan, _PARALLEL_QUERY_HINTS):\n        gap_id = _unique_identifier("independent-parallel-method", existing_gap_ids)\n        query_id = _unique_identifier("q-independent-parallel-method", existing_query_ids)\n        gaps.append(\n            EvidenceGap(\n                gap_id=gap_id,\n                description=(\n                    "Find an independently attributable parallel method or mechanism with a "\n                    "concrete interface, objective, failure mode, and implementation source."\n                ),\n                required=True,\n                minimum_accepted_items=1,\n            )\n        )\n        queries.append(\n            SearchQuery(\n                query_id=query_id,\n                gap_id=gap_id,\n                query=(\n                    f"{context} independent parallel method mechanism interface objective "\n                    "official implementation"\n                ),\n                source_types=["paper", "repository", "web"],\n            )\n        )\n\n    current = plan.model_copy(update={"evidence_gaps": gaps, "search_queries": queries})\n    if not _plan_queries_contain(current, _DATASET_QUERY_HINTS):\n        gap_id = _unique_identifier("dataset-evaluation-protocol", existing_gap_ids)\n        query_id = _unique_identifier("q-dataset-evaluation-protocol", existing_query_ids)\n        gaps.append(\n            EvidenceGap(\n                gap_id=gap_id,\n                description=(\n                    "Verify a task-matched dataset or evaluation protocol, including split, "\n                    "preprocessing, metrics, and leakage constraints."\n                ),\n                required=False,\n                minimum_accepted_items=1,\n            )\n        )\n        queries.append(\n            SearchQuery(\n                query_id=query_id,\n                gap_id=gap_id,\n                query=(\n                    f"{context} dataset benchmark evaluation protocol split preprocessing metrics"\n                ),\n                source_types=["dataset", "paper", "web"],\n            )\n        )\n\n    merged = plan.model_copy(update={"evidence_gaps": gaps, "search_queries": queries})\n    return _normalize_plan_to_query_budget(merged, query_budget=query_budget)\n\n\nasync def planning_node(state: PaperAgentState, config: RunnableConfig) -> StatePatch:\n''',
          )
          replace_once(
              planning_path,
              '''        with_baseline_query = _ensure_baseline_role_query(\n            with_materials,\n            query_budget=query_budget,\n        )\n        bounded = _normalize_plan_to_query_budget(\n            with_baseline_query,\n            query_budget=query_budget,\n        )\n''',
              '''        with_baseline_query = _ensure_baseline_role_query(\n            with_materials,\n            query_budget=query_budget,\n        )\n        with_methodology_assets = _ensure_methodology_asset_queries(\n            with_baseline_query,\n            request,\n            query_budget=query_budget,\n        )\n        bounded = _normalize_plan_to_query_budget(\n            with_methodology_assets,\n            query_budget=query_budget,\n        )\n''',
          )

          test_draft_path = "tests/methodology/test_method_design_draft.py"
          replace_once(
              test_draft_path,
              '''        "input_semantics": "a shallow detector feature map containing fine spatial cues",\n        "output_semantics": "a shape-compatible enhanced feature map for the baseline head",\n        "predicted_effect": "improve small-object recall and AP_small",\n''',
              '''        "input_semantics": "a shallow detector feature map containing fine spatial cues",\n        "output_semantics": "a shape-compatible enhanced feature map for the baseline head",\n        "input_shape": "batch x channels x height x width at the shallow feature level",\n        "output_shape": "batch x channels x height x width with unchanged spatial axes",\n        "optimization_interaction": (\n            "train the fusion projection and detector head; keep the backbone frozen; "\n            "backpropagate the detection objective through both paths with unit loss weight"\n        ),\n        "predicted_effect": "improve small-object recall and AP_small",\n''',
          )

          anchor_test_path = "tests/nodes/test_method_design_baseline_anchor.py"
          replace_once(
              anchor_test_path,
              '''def test_comparator_candidate_is_not_selected_as_module_source() -> None:\n    baseline = _item(\n        "baseline-module-source",\n        "A Task-Matched Baseline and Mechanism Paper",\n        metadata={\n            "baseline_candidate": "inferred",\n            "relation": "parallel_via_dataset",\n            "rank_score": "0.70",\n            "license": "CC BY 4.0",\n        },\n    )\n    comparator = _item(\n        "comparator-not-module",\n        "A Strong Independent Comparator",\n        metadata={\n            "comparator_candidate": "inferred",\n            "relation": "comparator_role_query",\n            "rank_score": "0.99",\n        },\n    )\n    selected = _select_module_evidence((baseline, comparator), baseline=baseline)\n    assert selected is not None\n    assert selected.evidence_id == baseline.evidence_id\n''',
              '''def test_baseline_evidence_is_not_reused_as_module_source() -> None:\n    baseline = _item(\n        "baseline-module-source",\n        "A Task-Matched Baseline and Mechanism Paper",\n        metadata={\n            "baseline_candidate": "inferred",\n            "relation": "parallel_via_dataset",\n            "rank_score": "0.70",\n            "license": "CC BY 4.0",\n        },\n    )\n    comparator = _item(\n        "comparator-not-module",\n        "A Strong Independent Comparator",\n        metadata={\n            "comparator_candidate": "inferred",\n            "relation": "comparator_role_query",\n            "rank_score": "0.99",\n        },\n    )\n    selected = _select_module_evidence((baseline, comparator), baseline=baseline)\n    assert selected is None\n''',
          )

          regression_path = Path("tests/evals/test_runtime_semantic_contract_repair.py")
          regression_path.write_text(
              '''from __future__ import annotations\n\nfrom datetime import UTC, datetime\nfrom types import SimpleNamespace\nfrom typing import cast\n\nfrom paperagent.claw_benchmark_adapter import _module_compatibility_by_evidence\nfrom paperagent.method_design_draft import (\n    _select_inferred_baseline_evidence,\n    _select_repository_backed_direct_baseline,\n)\nfrom paperagent.nodes.evidence_synthesis import _compact_evidence_payload\nfrom paperagent.nodes.planning import (\n    _ensure_baseline_role_query,\n    _ensure_methodology_asset_queries,\n)\nfrom paperagent.schemas import EvidenceBundle, EvidenceGap, EvidenceItem, ResearchPlan, ResearchRequest, SearchQuery\nfrom paperagent.state import PaperAgentState\n\n\ndef _item(\n    evidence_id: str,\n    title: str,\n    *,\n    source_type: str = "paper",\n    metadata: dict[str, str] | None = None,\n    summary: str = "A verified method with a concrete evaluation and implementation contract.",\n) -> EvidenceItem:\n    return EvidenceItem(\n        evidence_id=evidence_id,\n        source_type=source_type,  # type: ignore[arg-type]\n        title=title,\n        locator=f"https://example.test/{evidence_id}",\n        retrieved_at=datetime(2026, 7, 23, tzinfo=UTC),\n        verification_status="accepted",\n        supports_gap_ids=["g1"],\n        summary=summary,\n        content_hash=f"sha256:{evidence_id}",\n        metadata=metadata or {},\n    )\n\n\ndef test_inferred_baseline_prefers_author_linked_repository() -> None:\n    higher_rank_unbacked = _item(\n        "ev-paper-unbacked",\n        "Recent Unbacked Baseline",\n        metadata={\n            "baseline_candidate": "inferred",\n            "relation": "baseline_role_query",\n            "rank_score": "0.99",\n            "relevance_score": "0.90",\n        },\n    )\n    backed = _item(\n        "ev-paper-backed",\n        "Established Reproducible Baseline",\n        metadata={\n            "baseline_candidate": "inferred",\n            "relation": "baseline_role_query",\n            "rank_score": "0.70",\n            "relevance_score": "0.80",\n        },\n    )\n    repository = _item(\n        "ev-repository-backed",\n        "authors/baseline",\n        source_type="repository",\n        metadata={\n            "relation": "author_linked_from_verified_paper",\n            "parent_paper_id": "paper-backed",\n        },\n    )\n\n    selected = _select_inferred_baseline_evidence(\n        (higher_rank_unbacked, backed, repository)\n    )\n\n    assert selected is not None\n    assert selected.evidence_id == "ev-paper-backed"\n\n\ndef test_declared_fallback_accepts_exact_identity_lane_with_author_repository() -> None:\n    paper = _item(\n        "ev-paper-usad",\n        "UnSupervised Anomaly Detection on Multivariate Time Series",\n        metadata={\n            "relation": "declared_identity",\n            "query_text": (\n                '"USAD: UnSupervised Anomaly Detection on Multivariate Time Series"'\n            ),\n        },\n    )\n    repository = _item(\n        "ev-repository-usad",\n        "manigalati/usad",\n        source_type="repository",\n        metadata={\n            "relation": "author_linked_from_verified_paper",\n            "parent_paper_id": "paper-usad",\n        },\n    )\n\n    selected = _select_repository_backed_direct_baseline(\n        (paper, repository),\n        declared_titles=(\n            "USAD: UnSupervised Anomaly Detection on Multivariate Time Series",\n        ),\n    )\n\n    assert selected is not None\n    assert selected.evidence_id == "ev-paper-usad"\n\n\ndef test_compact_synthesis_payload_bounds_untrusted_text() -> None:\n    item = _item(\n        "ev-paper-long",\n        "Long Evidence",\n        metadata={\n            "relation": "direct_query",\n            "query_text": "q" * 900,\n            "irrelevant_large_field": "z" * 5000,\n        },\n        summary="s" * 5000,\n    )\n\n    payload = _compact_evidence_payload(item)\n\n    assert len(cast(str, payload["summary"])) == 800\n    metadata = cast(dict[str, str], payload["metadata"])\n    assert len(metadata["query_text"]) == 500\n    assert "irrelevant_large_field" not in metadata\n\n\ndef test_server_owned_module_contract_marks_only_independent_specific_module() -> None:\n    module = SimpleNamespace(\n        evidence_id="ev-module",\n        original_role="low-rank query/value adaptation",\n        proposed_role="parameter-efficient attention adaptation",\n        input_semantics="token hidden states entering query and value projections",\n        output_semantics="adapted query and value projections preserving token order",\n        input_shape="batch x sequence_length x hidden_size",\n        output_shape="batch x sequence_length x hidden_size",\n        gradient_expectation="gradients update low-rank matrices and classifier only",\n        parameter_update_scope="freeze encoder weights; train low-rank matrices and classifier",\n        loss_scale="unit-weight intent classification objective",\n        failure_mode="rank bottleneck can underfit rare intents",\n        implementation_switch="enable_lora_qv",\n        loss_terms=("cross-entropy intent objective",),\n    )\n    state = cast(\n        PaperAgentState,\n        {\n            "method": SimpleNamespace(\n                methodology_plan=SimpleNamespace(\n                    baseline=SimpleNamespace(source_evidence_id="ev-baseline"),\n                    modules=(module,),\n                )\n            ),\n            "evidence": EvidenceBundle(\n                items=[\n                    _item("ev-baseline", "Baseline"),\n                    _item("ev-module", "Module"),\n                ],\n                accepted_ids=["ev-baseline", "ev-module"],\n                identity_verified_ids=["ev-baseline", "ev-module"],\n                coverage_by_gap={"g1": 2},\n            ),\n        },\n    )\n\n    assert _module_compatibility_by_evidence(state) == {"ev-module": True}\n\n\ndef test_planner_adds_baseline_module_and_dataset_evidence_lanes() -> None:\n    plan = ResearchPlan(\n        status="ready",\n        problem_statement="reduce inference cost while preserving task accuracy",\n        scope="bounded reproducible pilot",\n        evidence_gaps=[EvidenceGap(gap_id="g1", description="general evidence")],\n        search_queries=[\n            SearchQuery(\n                query_id="q1",\n                gap_id="g1",\n                query="general task evidence",\n                source_types=["paper"],\n            )\n        ],\n    )\n    request = ResearchRequest(question="design a task-matched incremental method")\n\n    with_baseline = _ensure_baseline_role_query(plan, query_budget=10)\n    updated = _ensure_methodology_asset_queries(\n        with_baseline, request, query_budget=10\n    )\n    query_text = "\n".join(query.query.casefold() for query in updated.search_queries)\n\n    assert "established reproducible baseline" in query_text\n    assert "independent parallel method" in query_text\n    assert "dataset benchmark evaluation protocol" in query_text\n''',
              encoding="utf-8",
          )
          PY
