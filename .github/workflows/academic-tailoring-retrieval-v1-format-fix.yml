name: Academic Tailoring Retrieval v1 Format Fix

on:
  push:
    branches:
      - eval/academic-tailoring-retrieval-v1-live-test
    paths:
      - ".github/workflows/academic-tailoring-retrieval-v1-format-fix.yml"

permissions:
  contents: write

jobs:
  format-fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply repository Ruff rules
        run: |
          ruff format \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/score_academic_tailoring_retrieval_v1.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py
          ruff check --fix \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/score_academic_tailoring_retrieval_v1.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py
          ruff check \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/score_academic_tailoring_retrieval_v1.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py
      - name: Commit formatted harness
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/project_academic_tailoring_retrieval_v1.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            scripts/score_academic_tailoring_retrieval_v1.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(eval): apply Ruff to retrieval v1 harness [skip ci]"
          git push origin "HEAD:$GITHUB_REF_NAME"
