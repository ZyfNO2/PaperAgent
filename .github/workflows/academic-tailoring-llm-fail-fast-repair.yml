name: Academic Tailoring LLM Fail Fast Repair

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academic-tailoring-llm-fail-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair-and-validate:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply LLM fail-fast repair
        run: python scripts/apply_llm_fail_fast_v1.py
      - name: Repair generated health-check newline literal
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/check_llm_provider_health.py")
          source = path.read_text(encoding="utf-8")
          source = source.replace(
              'sort_keys=True) + "\n"\n',
              'sort_keys=True) + "\\n"\n',
          )
          path.write_text(source, encoding="utf-8")
          PY
      - name: Format and capture lint diagnostics
        shell: bash
        run: |
          mkdir -p build/llm-fail-fast-diagnostics
          set +e
          ruff format \
            scripts/check_llm_provider_health.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py \
            tests/scripts/test_check_llm_provider_health.py \
            > build/llm-fail-fast-diagnostics/format.log 2>&1
          format_status=$?
          ruff check --fix \
            scripts/check_llm_provider_health.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py \
            tests/scripts/test_check_llm_provider_health.py \
            > build/llm-fail-fast-diagnostics/ruff-fix.log 2>&1
          fix_status=$?
          ruff check \
            scripts/check_llm_provider_health.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py \
            tests/scripts/test_check_llm_provider_health.py \
            > build/llm-fail-fast-diagnostics/ruff-check.log 2>&1
          check_status=$?
          printf '{"format":%s,"fix":%s,"check":%s}\n' \
            "$format_status" "$fix_status" "$check_status" \
            > build/llm-fail-fast-diagnostics/status.json
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-llm-fail-fast-diagnostics
          path: build/llm-fail-fast-diagnostics/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce changed-path lint
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path("build/llm-fail-fast-diagnostics/status.json").read_text())
          print(status)
          if any(status.values()):
              raise SystemExit(status)
          PY
      - name: Run focused fail-fast tests
        run: |
          pytest -q \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py \
            tests/scripts/test_check_llm_provider_health.py \
            tests/providers/test_mistral.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py
      - name: Remove one-shot controls
        run: |
          rm -f \
            scripts/apply_llm_fail_fast_v1.py \
            .github/workflows/academic-tailoring-llm-fail-fast-repair.yml
      - name: Run full final-tree regression
        run: |
          pytest -q
          mypy --config-file pyproject.toml
          ruff check src tests scripts
          ruff format --check src tests scripts
      - name: Commit production repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(runtime): fail fast on fatal LLM provider errors"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
