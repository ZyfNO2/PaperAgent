name: Apply Eval Fatal Policy Patch

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/apply-eval-fatal-policy-patch.yml"
      - "scripts/apply_eval_fatal_policy_patch.py"

permissions:
  contents: write

concurrency:
  group: apply-eval-fatal-policy-patch
  cancel-in-progress: true

jobs:
  patch-test-and-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply shared fatal policy patch
        run: python scripts/apply_eval_fatal_policy_patch.py
      - name: Format, lint, and compile
        run: |
          ruff check --fix --unsafe-fixes --exit-zero \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/evals/test_eval_runtime_reporting.py
          ruff format \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/evals/test_eval_runtime_reporting.py
          ruff check \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/evals/test_eval_runtime_reporting.py
          python -m compileall -q \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/evals/test_eval_runtime_reporting.py
      - name: Run runtime reporting regressions
        run: |
          pytest -q \
            tests/evals/test_eval_runtime_reporting.py \
            tests/evals/test_eval_snapshot_provenance.py \
            tests/evals/test_academic_tailoring_retrieval_v1_boundary.py
      - name: Remove one-shot machinery
        run: |
          rm scripts/apply_eval_fatal_policy_patch.py
          rm .github/workflows/apply-eval-fatal-policy-patch.yml
      - name: Commit validated correction
        env:
          BRANCH: fix/semantic-tailoring-role-bound-scoring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(eval): classify retryable provider errors consistently"
          git push origin "HEAD:$BRANCH"
