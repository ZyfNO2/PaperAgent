name: Memory RAG diagnostics

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install project
        run: python -m pip install -e '.[dev,release]'
      - name: Capture full verification output
        shell: bash
        run: |
          set +e
          python -m pytest -q --cov=paperagent --cov-branch --cov-report=term-missing > memory-rag-pytest.log 2>&1
          status=$?
          echo "$status" > memory-rag-pytest.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: memory-rag-diagnostics
          path: |
            memory-rag-pytest.log
            memory-rag-pytest.status
