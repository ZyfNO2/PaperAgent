name: Memory RAG diagnostics

on:
  pull_request:
    branches: [master]

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: python -m pip install -e '.[dev,release]'
      - name: Capture Ruff and Mypy diagnostics
        shell: bash
        run: |
          set +e
          python -m ruff check . > ruff-check.txt 2>&1
          echo $? > ruff-check.exit
          python -m ruff format --check . > ruff-format.txt 2>&1
          echo $? > ruff-format.exit
          python -m mypy --config-file pyproject.toml > mypy.txt 2>&1
          echo $? > mypy.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: memory-rag-diagnostics
          path: |
            ruff-check.txt
            ruff-check.exit
            ruff-format.txt
            ruff-format.exit
            mypy.txt
            mypy.exit
