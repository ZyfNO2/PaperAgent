name: Finalize evidence-bound module repair

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  PAPERAGENT_FIX_BRANCH: automation/evidence-bound-module-finalize

jobs:
  finalize-module-repair:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/evidence-bound-module-finalize
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply deterministic repair
        run: python scripts/apply_evidence_bound_module_fix_followup.py

      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'

      - name: Format and lint
        run: |
          ruff format src/paperagent tests scripts/score_academic_tailoring_retrieval_v1.py
          ruff check src/paperagent tests scripts/score_academic_tailoring_retrieval_v1.py

      - name: Run targeted offline tests
        run: |
          pytest -q \
            tests/methodology/test_method_design_draft.py \
            tests/evals/test_adapter_module_contract.py \
            tests/evals/test_academic_tailoring_retrieval_v1_scorer.py \
            tests/evals/test_claw_benchmark_adapter.py

      - name: Run offline regression
        id: offline_regression
        continue-on-error: true
        run: pytest -q -m 'not real_provider and not network and not browser and not llm'

      - name: Commit repaired implementation
        run: |
          rm -f scripts/evidence_bound_module_patch.b64
          rm -f scripts/evidence_bound_module_patch.part*
          rm -f scripts/apply_evidence_bound_module_fix_followup.py
          rm -f scripts/evidence_bound_module_prepatch.py
          rm -f scripts/evidence_bound_module_remaining_patch.py
          rm -f scripts/evidence_bound_module_lint_patch.py
          rm -f scripts/evidence_bound_module_test_patch.py
          rm -f scripts/sitecustomize.py
          rm -f .github/evidence-bound-module-trigger.txt
          rm -f .github/evidence-bound-module-patch-failure.log
          rm -f .github/evidence-bound-module-followup-failure.log
          rm -f .github/evidence-bound-module-lint-failure.log
          rm -f .github/evidence-bound-module-test-failure.log
          rm -f .github/workflows/apply-evidence-bound-module-fix.yml
          rm -f .github/workflows/apply-evidence-bound-module-finalize.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(method): bind module contracts to independent evidence'
          git push origin HEAD:automation/evidence-bound-module-finalize
