name: Academic Tailoring Evidence Expansion Repair

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academic-tailoring-evidence-expansion-repair-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair-and-validate:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply evidence graph expansion repair
        run: |
          python scripts/apply_evidence_graph_expansion_v1.py
          python scripts/fix_evidence_graph_expansion_v1_generated.py
      - name: Format and lint changed production paths
        shell: bash
        run: |
          mkdir -p build/evidence-expansion-diagnostics
          ruff format \
            src/paperagent/literature/adapter.py \
            src/paperagent/literature/providers/arxiv.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/literature/test_arxiv_title_query.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            > build/evidence-expansion-diagnostics/format.log 2>&1
          ruff check --fix \
            src/paperagent/literature/adapter.py \
            src/paperagent/literature/providers/arxiv.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/literature/test_arxiv_title_query.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            > build/evidence-expansion-diagnostics/ruff-fix.log 2>&1
          ruff check \
            src/paperagent/literature/adapter.py \
            src/paperagent/literature/providers/arxiv.py \
            src/paperagent/method_design_draft.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/literature/test_arxiv_title_query.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            > build/evidence-expansion-diagnostics/ruff-check.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-evidence-expansion-diagnostics
          path: build/evidence-expansion-diagnostics/
          if-no-files-found: warn
          retention-days: 14
      - name: Run focused production behavior tests
        run: |
          pytest -q \
            tests/literature/test_exact_identity_and_dataset_candidates.py \
            tests/literature/test_arxiv_title_query.py \
            tests/literature/test_linked_repository_candidates.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/nodes/test_planning_nonblocking.py \
            tests/review/test_semantic_gap_binding.py
      - name: Remove one-shot development controls
        run: |
          rm -f \
            scripts/apply_evidence_graph_expansion_v1.py \
            scripts/fix_evidence_graph_expansion_v1_generated.py \
            .github/workflows/academic-tailoring-evidence-expansion-repair.yml
      - name: Run full offline regression
        run: |
          pytest -q
          mypy --config-file pyproject.toml
          ruff check src tests scripts
          ruff format --check src tests scripts
      - name: Commit production implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat(retrieval): expand baseline dataset evidence relations"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
