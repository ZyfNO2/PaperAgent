name: Cloud Runtime Formatter

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  verify-formatted-runtime:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/cloud-format-c0f3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Ruff and compile
        run: |
          ruff format --check src/paperagent/providers/runtime.py src/paperagent/providers/openai_llm.py src/paperagent/providers/mistral.py src/paperagent/eval_runtime_reporting.py src/paperagent/nodes/planning.py src/paperagent/nodes/report.py src/paperagent/method_design_draft.py src/paperagent/strict_method_design.py tests/providers/test_runtime.py tests/providers/test_openai_llm_runtime_limits.py tests/evals/test_eval_runtime_reporting.py tests/nodes/test_planning_identity_priority.py tests/nodes/test_method_design_baseline_anchor.py tests/nodes/test_report_fallback.py tests/methodology/test_strict_method_design.py tests/methodology/test_method_design_draft.py
          ruff check src/paperagent/providers/runtime.py src/paperagent/providers/openai_llm.py src/paperagent/providers/mistral.py src/paperagent/eval_runtime_reporting.py src/paperagent/nodes/planning.py src/paperagent/nodes/report.py src/paperagent/method_design_draft.py src/paperagent/strict_method_design.py tests/providers/test_runtime.py tests/providers/test_openai_llm_runtime_limits.py tests/evals/test_eval_runtime_reporting.py tests/nodes/test_planning_identity_priority.py tests/nodes/test_method_design_baseline_anchor.py tests/nodes/test_report_fallback.py tests/methodology/test_strict_method_design.py tests/methodology/test_method_design_draft.py
          python -m compileall -q src/paperagent
      - name: Capture strict Mypy
        shell: bash
        run: |
          mkdir -p build/cloud-runtime-diagnostics
          set +e
          mypy --strict src/paperagent/providers/runtime.py src/paperagent/providers/openai_llm.py src/paperagent/providers/mistral.py src/paperagent/eval_runtime_reporting.py src/paperagent/nodes/planning.py src/paperagent/nodes/report.py src/paperagent/method_design_draft.py src/paperagent/strict_method_design.py > build/cloud-runtime-diagnostics/mypy.txt 2>&1
          status=$?
          echo "$status" > build/cloud-runtime-diagnostics/mypy-exit-code.txt
          cat build/cloud-runtime-diagnostics/mypy.txt
          exit 0
      - name: Capture focused pytest
        shell: bash
        run: |
          set +e
          pytest -q tests/providers/test_runtime.py tests/providers/test_openai_llm_runtime_limits.py tests/evals/test_eval_runtime_reporting.py tests/nodes/test_planning_identity_priority.py tests/nodes/test_method_design_baseline_anchor.py tests/nodes/test_report_fallback.py tests/methodology/test_strict_method_design.py tests/methodology/test_method_design_draft.py > build/cloud-runtime-diagnostics/pytest.txt 2>&1
          status=$?
          echo "$status" > build/cloud-runtime-diagnostics/pytest-exit-code.txt
          cat build/cloud-runtime-diagnostics/pytest.txt
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cloud-runtime-diagnostics
          path: build/cloud-runtime-diagnostics/
          retention-days: 1
      - name: Enforce diagnostics
        if: always()
        run: |
          test "$(cat build/cloud-runtime-diagnostics/mypy-exit-code.txt)" = "0"
          test "$(cat build/cloud-runtime-diagnostics/pytest-exit-code.txt)" = "0"
