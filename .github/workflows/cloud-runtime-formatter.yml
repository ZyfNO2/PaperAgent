name: Cloud Runtime Type Fix

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/cloud-format-c0f3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply typed repair-attempt normalization
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/paperagent/eval_runtime_reporting.py')
          text = source.read_text(encoding='utf-8')
          if 'def _non_negative_int(value: object) -> int:' not in text:
              text = text.replace(
                  'def extract_incomplete_context(\n',
                  '''def _non_negative_int(value: object) -> int:\n    if isinstance(value, bool):\n        return 0\n    if isinstance(value, int):\n        return max(value, 0)\n    if isinstance(value, str):\n        try:\n            parsed = int(value.strip())\n        except ValueError:\n            return 0\n        return max(parsed, 0)\n    return 0\n\n\ndef extract_incomplete_context(\n''',
                  1,
              )
          old = '''        "repair_attempts": int(\n            _first_non_empty(\n                trace.get("method_repair_count"),\n                trace.get("repair_attempts"),\n                execution.get("repair_attempts"),\n                0,\n            )\n            or 0\n        ),\n'''
          new = '''        "repair_attempts": _non_negative_int(\n            _first_non_empty(\n                trace.get("method_repair_count"),\n                trace.get("repair_attempts"),\n                execution.get("repair_attempts"),\n                0,\n            )\n        ),\n'''
          if old in text:
              text = text.replace(old, new, 1)
          source.write_text(text, encoding='utf-8')

          tests = Path('tests/evals/test_eval_runtime_reporting.py')
          test_text = tests.read_text(encoding='utf-8')
          if 'test_incomplete_context_normalizes_untrusted_repair_attempts' not in test_text:
              marker = '    assert context["message"] == "invalid JSON"\n\n\n'
              addition = '''    assert context["message"] == "invalid JSON"\n\n\n@pytest.mark.parametrize(\n    ("raw_value", "expected"),\n    [\n        ("3", 3),\n        (-2, 0),\n        (True, 0),\n        ("not-a-number", 0),\n        ({"unexpected": "shape"}, 0),\n    ],\n)\ndef test_incomplete_context_normalizes_untrusted_repair_attempts(\n    raw_value: object,\n    expected: int,\n) -> None:\n    context = extract_incomplete_context(\n        state={"execution": {"status": "blocked", "repair_attempts": raw_value}},\n        trace={},\n    )\n\n    assert context["repair_attempts"] == expected\n\n\n'''
              test_text = test_text.replace(marker, addition, 1)
          tests.write_text(test_text, encoding='utf-8')
          PY
          ruff format src/paperagent/eval_runtime_reporting.py tests/evals/test_eval_runtime_reporting.py
      - name: Commit isolated type fix
        run: |
          if git diff --quiet; then
            echo "No type-fix changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/paperagent/eval_runtime_reporting.py tests/evals/test_eval_runtime_reporting.py
          git commit -m "fix(runtime): normalize untrusted repair attempts"
          git push origin HEAD:tmp/cloud-format-c0f3
      - name: Verify format lint and compile
        run: |
          ruff format --check src/paperagent/providers/openai_llm.py src/paperagent/eval_runtime_reporting.py tests/evals/test_eval_runtime_reporting.py
          ruff check src/paperagent/providers/openai_llm.py src/paperagent/eval_runtime_reporting.py tests/evals/test_eval_runtime_reporting.py
          python -m compileall -q src/paperagent
      - name: Strict Mypy
        run: |
          mypy --strict src/paperagent/providers/runtime.py src/paperagent/providers/openai_llm.py src/paperagent/providers/mistral.py src/paperagent/eval_runtime_reporting.py src/paperagent/nodes/planning.py src/paperagent/nodes/report.py src/paperagent/method_design_draft.py src/paperagent/strict_method_design.py
      - name: Focused pytest
        run: |
          pytest -q tests/providers/test_runtime.py tests/providers/test_openai_llm_runtime_limits.py tests/evals/test_eval_runtime_reporting.py tests/nodes/test_planning_identity_priority.py tests/nodes/test_method_design_baseline_anchor.py tests/nodes/test_report_fallback.py tests/methodology/test_strict_method_design.py tests/methodology/test_method_design_draft.py
