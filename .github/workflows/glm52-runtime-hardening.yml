name: GLM-5.2 Runtime Hardening

on:
  push:
    branches:
      - fix/glm52-runtime-hardening
    paths:
      - "src/paperagent/providers/**"
      - "scripts/run_academic_tailoring_retrieval_v1.py"
      - "tests/providers/test_openai_llm_runtime_limits.py"
      - "tests/evals/test_academic_tailoring_runtime_checkpoint.py"
      - ".github/workflows/glm52-runtime-hardening.yml"
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-live-test
    paths:
      - "src/paperagent/providers/**"
      - "scripts/run_academic_tailoring_retrieval_v1.py"
      - "tests/providers/test_openai_llm_runtime_limits.py"
      - "tests/evals/test_academic_tailoring_runtime_checkpoint.py"
      - ".github/workflows/glm52-runtime-hardening.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: glm52-runtime-hardening-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-runtime-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run focused provider and checkpoint tests
        run: |
          pytest -q \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py
      - name: Type-check changed runtime modules
        run: |
          mypy --config-file pyproject.toml \
            src/paperagent/providers \
            scripts/run_academic_tailoring_retrieval_v1.py
      - name: Format and lint changed paths
        run: |
          ruff format --check \
            src/paperagent/providers/config.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/runtime_factory.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py
          ruff check \
            src/paperagent/providers/config.py \
            src/paperagent/providers/openai_llm.py \
            src/paperagent/providers/runtime_factory.py \
            scripts/run_academic_tailoring_retrieval_v1.py \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py

  live-structured-smoke:
    needs: offline-runtime-contract
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      PAPERAGENT_OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      PAPERAGENT_LLM_PROVIDER: openai
      PAPERAGENT_LLM_MODEL: z-ai/glm-5.2
      PAPERAGENT_LLM_BASE_URL: https://integrate.api.nvidia.com/v1
      PAPERAGENT_LLM_CONNECT_TIMEOUT: "15"
      PAPERAGENT_LLM_READ_TIMEOUT: "120"
      PAPERAGENT_LLM_TOTAL_TIMEOUT: "150"
      PAPERAGENT_LLM_MAX_ATTEMPTS: "1"
      PAPERAGENT_LLM_MAX_CALLS: "2"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_CALL: "64"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_TASK: "128"
      PAPERAGENT_LLM_NATIVE_JSON_SCHEMA: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Require NVIDIA credential
        run: test -n "$NVIDIA_API_KEY"
      - name: Execute one structured GLM-5.2 call
        run: |
          python - <<'PY'
          import asyncio
          import json
          from typing import Literal

          from pydantic import BaseModel

          from paperagent.providers.config import load_provider_config
          from paperagent.providers.runtime_factory import build_llm_provider
          from paperagent.schemas import Message


          class SmokeReply(BaseModel):
              status: Literal["ok"]


          async def main() -> None:
              provider = build_llm_provider(load_provider_config())
              result = await provider.generate_structured(
                  task="glm52-structured-smoke",
                  scenario="ci",
                  call_index=1,
                  fixture_version="v1",
                  schema=SmokeReply,
                  messages=[
                      Message(
                          role="user",
                          content='Return exactly one JSON object: {"status":"ok"}',
                      )
                  ],
              )
              print(json.dumps({"status": result.status, "model": provider.model_name}))


          asyncio.run(main())
          PY
