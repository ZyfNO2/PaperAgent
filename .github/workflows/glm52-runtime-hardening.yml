name: GLM-5.2 Runtime Hardening

on:
  push:
    branches:
      - fix/glm52-runtime-hardening
      - fix/glm52-runtime-hardening-v2
    paths:
      - "src/paperagent/providers/**"
      - "scripts/run_academic_tailoring_retrieval_v1.py"
      - "tests/providers/**"
      - "tests/evals/test_academic_tailoring_runtime_checkpoint.py"
      - ".github/workflows/glm52-runtime-hardening.yml"
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-live-test
    paths:
      - "src/paperagent/providers/**"
      - "scripts/run_academic_tailoring_retrieval_v1.py"
      - "tests/providers/**"
      - "tests/evals/test_academic_tailoring_runtime_checkpoint.py"
      - ".github/workflows/glm52-runtime-hardening.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: glm52-runtime-hardening-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-runtime-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Run focused provider and checkpoint tests
        run: |
          pytest -q \
            tests/providers/test_openai_llm_runtime_limits.py \
            tests/providers/test_openai_compatible_structured_output.py \
            tests/providers/test_provider_compat_config.py \
            tests/evals/test_academic_tailoring_runtime_checkpoint.py \
            tests/evals/test_academic_tailoring_runtime_fail_fast.py
      - name: Type-check changed provider modules
        run: mypy --config-file pyproject.toml src/paperagent/providers
      - name: Format and lint changed paths
        shell: bash
        run: |
          format_paths=(
            src/paperagent/providers/config.py
            src/paperagent/providers/openai_llm.py
            src/paperagent/providers/structured_output.py
            src/paperagent/providers/runtime_factory.py
            tests/providers/test_openai_llm_runtime_limits.py
            tests/providers/test_openai_compatible_structured_output.py
            tests/providers/test_provider_compat_config.py
            tests/evals/test_academic_tailoring_runtime_checkpoint.py
          )
          lint_paths=(
            "${format_paths[@]}"
            scripts/run_academic_tailoring_retrieval_v1.py
          )
          ruff format --check "${format_paths[@]}"
          ruff check "${lint_paths[@]}"

  live-structured-smoke:
    needs: offline-runtime-contract
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: paperagent-nvidia-glm52
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      PAPERAGENT_OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      PAPERAGENT_SOURCE_SHA: ${{ github.sha }}
      PAPERAGENT_LLM_PROVIDER: openai
      PAPERAGENT_LLM_MODEL: z-ai/glm-5.2
      PAPERAGENT_LLM_BASE_URL: https://integrate.api.nvidia.com/v1
      PAPERAGENT_LLM_CONNECT_TIMEOUT: "15"
      PAPERAGENT_LLM_READ_TIMEOUT: "180"
      PAPERAGENT_LLM_TOTAL_TIMEOUT: "210"
      PAPERAGENT_LLM_MAX_ATTEMPTS: "4"
      PAPERAGENT_LLM_MAX_CALLS: "12"
      PAPERAGENT_LLM_MAX_REQUESTS_PER_MINUTE: "39"
      PAPERAGENT_LLM_MAX_INPUT_TOKENS_PER_TASK: "32000"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_CALL: "512"
      PAPERAGENT_LLM_MAX_OUTPUT_TOKENS_PER_TASK: "4096"
      PAPERAGENT_LLM_NATIVE_JSON_SCHEMA: "1"
      PAPERAGENT_LLM_ALLOW_SCHEMA_REPAIR: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Require NVIDIA credential
        run: test -n "$NVIDIA_API_KEY"
      - name: Execute one structured GLM-5.2 call
        id: smoke
        shell: bash
        run: |
          mkdir -p build/glm52-structured-smoke
          set +e
          python - <<'PY' > build/glm52-structured-smoke/output.log 2>&1
          import asyncio
          import json
          import traceback
          from pathlib import Path
          from typing import Literal

          from pydantic import BaseModel

          from paperagent.providers.config import load_provider_config
          from paperagent.providers.runtime_factory import build_llm_provider
          from paperagent.schemas import Message


          class SmokeReply(BaseModel):
              status: Literal["ok"]


          async def main() -> None:
              provider = build_llm_provider(load_provider_config())
              try:
                  result = await provider.generate_structured(
                      task="glm52-structured-smoke",
                      scenario="ci",
                      call_index=1,
                      fixture_version="v1",
                      schema=SmokeReply,
                      messages=[
                          Message(
                              role="user",
                              content='Return exactly one JSON object: {"status":"ok"}',
                          )
                      ],
                  )
              except Exception as exc:
                  diagnostic = {
                      "status": "error",
                      "exception_type": type(exc).__name__,
                      "code": getattr(exc, "code", None),
                      "retryable": getattr(exc, "retryable", None),
                      "message": str(exc),
                      "model": getattr(provider, "model_name", None),
                  }
                  Path("build/glm52-structured-smoke/diagnostic.json").write_text(
                      json.dumps(diagnostic, ensure_ascii=False, indent=2) + "\n",
                      encoding="utf-8",
                  )
                  traceback.print_exc()
                  raise
              diagnostic = {
                  "status": result.status,
                  "model": provider.model_name,
                  "latency_ms": getattr(provider, "last_latency_ms", None),
              }
              Path("build/glm52-structured-smoke/diagnostic.json").write_text(
                  json.dumps(diagnostic, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )
              print(json.dumps(diagnostic))


          asyncio.run(main())
          PY
          status=$?
          echo "$status" > build/glm52-structured-smoke/exit-code.txt
          cat build/glm52-structured-smoke/output.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: glm52-structured-smoke-diagnostic
          path: build/glm52-structured-smoke/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce structured smoke
        if: always()
        run: test "$(cat build/glm52-structured-smoke/exit-code.txt)" = "0"
