name: Inspect Case 001 Run Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/inspect-case-001-run-once.yml"

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  inspect:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Read latest Case 001 run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          latest=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs?branch=feat/claw-live-search-runtime&event=push&per_page=100" \
            --jq '[.workflow_runs[] | select(.name == "CLAW Case 001 End-to-End")][0] | {id,status,conclusion,head_sha,created_at,updated_at,html_url}')
          pr_number=$(gh pr list \
            --head feat/claw-live-search-runtime \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [[ -n "$pr_number" ]]; then
            gh pr comment "$pr_number" --body "Latest Case 001 run: \`$latest\`"
          fi
          echo "$latest"
