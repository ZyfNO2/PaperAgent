name: Format Case 001 Probe Once

on:
  push:
    branches:
      - feat/claw-live-search-runtime
    paths:
      - ".github/workflows/format-case-001-probe-once.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/claw-live-search-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install formatter
        run: python -m pip install -q ruff==0.12.3
      - name: Format and commit
        shell: bash
        run: |
          ruff format scripts/probe_claw_case_end_to_end.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/probe_claw_case_end_to_end.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(eval): format Case 001 end-to-end probe"
          git pull --rebase origin feat/claw-live-search-runtime
          git push origin HEAD:feat/claw-live-search-runtime
