name: Academic Tailoring Comparator Identity Binding

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academic-tailoring-comparator-identity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair-and-validate:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Repair comparator patch template
        run: python scripts/fix_comparator_identity_patch_escape_v1.py
      - name: Apply comparator identity binding
        id: apply_patch
        shell: bash
        run: |
          mkdir -p build/comparator-identity-diagnostics
          set +e
          python scripts/apply_comparator_identity_binding_v1.py \
            > build/comparator-identity-diagnostics/apply.log 2>&1
          first_status=$?
          if [ "$first_status" = "0" ]; then
            python scripts/apply_comparator_identity_policy_fixture_v1.py \
              >> build/comparator-identity-diagnostics/apply.log 2>&1
            second_status=$?
          else
            second_status=0
          fi
          status=$((first_status || second_status))
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Format and capture lint diagnostics
        shell: bash
        run: |
          set +e
          ruff format \
            src/paperagent/method_design_draft.py \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_scientific_decision_policy.py \
            > build/comparator-identity-diagnostics/format.log 2>&1
          format_status=$?
          ruff check --fix \
            src/paperagent/method_design_draft.py \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_scientific_decision_policy.py \
            > build/comparator-identity-diagnostics/ruff-fix.log 2>&1
          fix_status=$?
          ruff check \
            src/paperagent/method_design_draft.py \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_scientific_decision_policy.py \
            > build/comparator-identity-diagnostics/ruff-check.log 2>&1
          check_status=$?
          printf '{"apply":%s,"format":%s,"fix":%s,"check":%s}\n' \
            "${{ steps.apply_patch.outputs.status }}" \
            "$format_status" "$fix_status" "$check_status" \
            > build/comparator-identity-diagnostics/changed-path-status.json
          exit 0
      - name: Enforce patch and changed-path lint
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(
              Path("build/comparator-identity-diagnostics/changed-path-status.json").read_text()
          )
          print(status)
          if any(status.values()):
              raise SystemExit(status)
          PY
      - name: Run focused comparator and method tests
        run: |
          pytest -q \
            tests/methodology/test_method_design_draft.py \
            tests/methodology/test_scientific_decision_policy.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py
      - name: Remove one-shot patch scripts
        run: |
          rm -f \
            scripts/apply_comparator_identity_binding_v1.py \
            scripts/apply_comparator_identity_policy_fixture_v1.py \
            scripts/fix_comparator_identity_patch_escape_v1.py
      - name: Capture full final-tree regression
        shell: bash
        run: |
          set +e
          pytest -q > build/comparator-identity-diagnostics/pytest.log 2>&1
          pytest_status=$?
          mypy --config-file pyproject.toml \
            > build/comparator-identity-diagnostics/mypy.log 2>&1
          mypy_status=$?
          ruff check src tests scripts \
            > build/comparator-identity-diagnostics/full-ruff-check.log 2>&1
          ruff_status=$?
          ruff format --check src tests scripts \
            > build/comparator-identity-diagnostics/full-ruff-format.log 2>&1
          format_status=$?
          printf '{"pytest":%s,"mypy":%s,"ruff":%s,"format":%s}\n' \
            "$pytest_status" "$mypy_status" "$ruff_status" "$format_status" \
            > build/comparator-identity-diagnostics/full-status.json
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-comparator-identity-diagnostics
          path: build/comparator-identity-diagnostics/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce full final-tree regression
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(
              Path("build/comparator-identity-diagnostics/full-status.json").read_text()
          )
          print(status)
          if any(status.values()):
              raise SystemExit(status)
          PY
      - name: Commit production repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(method): require independent comparator paper identity"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
