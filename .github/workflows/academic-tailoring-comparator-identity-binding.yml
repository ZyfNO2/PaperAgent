name: Academic Tailoring Comparator Identity Binding

on:
  pull_request:
    branches:
      - eval/academic-tailoring-retrieval-v1-authoring
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academic-tailoring-comparator-identity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair-and-validate:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -q -e '.[dev]'
      - name: Apply comparator identity binding
        id: apply_patch
        shell: bash
        run: |
          mkdir -p build/comparator-identity-diagnostics
          set +e
          python scripts/apply_comparator_identity_binding_v1.py \
            > build/comparator-identity-diagnostics/apply.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: academic-tailoring-comparator-identity-diagnostics
          path: build/comparator-identity-diagnostics/
          if-no-files-found: error
          retention-days: 7
      - name: Enforce patch application
        run: test "${{ steps.apply_patch.outputs.status }}" = "0"
      - name: Format and lint changed paths
        run: |
          ruff format \
            src/paperagent/method_design_draft.py \
            tests/methodology/test_method_design_draft.py
          ruff check --fix \
            src/paperagent/method_design_draft.py \
            tests/methodology/test_method_design_draft.py
          ruff check \
            src/paperagent/method_design_draft.py \
            tests/methodology/test_method_design_draft.py
      - name: Run focused comparator and method tests
        run: |
          pytest -q \
            tests/methodology/test_method_design_draft.py \
            tests/nodes/test_method_design_baseline_anchor.py \
            tests/literature/test_exact_identity_and_dataset_candidates.py
      - name: Remove one-shot patch script
        run: rm -f scripts/apply_comparator_identity_binding_v1.py
      - name: Run full final-tree regression
        run: |
          pytest -q
          mypy --config-file pyproject.toml
          ruff check src tests scripts
          ruff format --check src tests scripts
      - name: Commit production repair
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix(method): require independent comparator paper identity"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
