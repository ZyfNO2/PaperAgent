name: Gate L Formal Freeze

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Full 40-character commit SHA to freeze and later execute
        required: true
        type: string

permissions:
  contents: read

jobs:
  freeze:
    name: Freeze exact Gate L identity
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SOURCE_SHA: ${{ inputs.source_sha }}
      SPEC_PATH: evals/v0_6/gate_l_v3/formal_freeze_spec.json
      OUTPUT_DIR: build/gate-l-v3-formal-freeze

    steps:
      - name: Validate requested identity
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "source_sha must be a full lowercase 40-character SHA" >&2
            exit 2
          fi

      - name: Check out exact source SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 1

      - name: Verify checked-out commit
        shell: bash
        run: |
          set -euo pipefail
          ACTUAL_SHA="$(git rev-parse HEAD)"
          test "$ACTUAL_SHA" = "$SOURCE_SHA"
          test -z "$(git status --porcelain)"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install -e '.[dev]'

      - name: Verify formal tooling
        shell: bash
        run: |
          set -euo pipefail
          ruff check .
          ruff format --check .
          python -m pytest \
            tests/evals/test_gate_l_formal_contract.py \
            tests/evals/test_gate_l_artifact_chain.py \
            tests/evals/test_gate_l_formal_audit.py \
            tests/evals/test_gate_l_review_package_guard.py \
            tests/evals/test_gate_l_formal_execution.py

      - name: Freeze manifest
        shell: bash
        run: |
          set -euo pipefail
          test -f "$SPEC_PATH"
          mkdir -p "$OUTPUT_DIR"
          python scripts/gate_l_formal_contract.py freeze \
            --spec "$SPEC_PATH" \
            --manifest-out "$OUTPUT_DIR/manifest.json" \
            --source-sha "$SOURCE_SHA"
          python scripts/gate_l_formal_contract.py verify \
            --manifest "$OUTPUT_DIR/manifest.json" \
            --runtime-sha "$SOURCE_SHA"

      - name: Create immutable freeze record
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          output = Path(os.environ["OUTPUT_DIR"])
          manifest = output / "manifest.json"
          record = {
              "gate": "L",
              "record_type": "formal_freeze",
              "source_sha": os.environ["SOURCE_SHA"],
              "manifest_sha256": hashlib.sha256(manifest.read_bytes()).hexdigest(),
              "created_at_utc": datetime.now(tz=UTC).isoformat(),
              "github_repository": os.environ["GITHUB_REPOSITORY"],
              "github_run_id": os.environ["GITHUB_RUN_ID"],
              "github_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "github_workflow": os.environ["GITHUB_WORKFLOW"],
          }
          (output / "freeze-record.json").write_text(
              json.dumps(record, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          tar -czf "$OUTPUT_DIR/gate-l-formal-freeze.tgz" \
            -C "$OUTPUT_DIR" manifest.json freeze-record.json
          (
            cd "$OUTPUT_DIR"
            sha256sum manifest.json freeze-record.json gate-l-formal-freeze.tgz > SHA256SUMS
          )
          python scripts/gate_l_artifact_chain.py verify-freeze \
            --bundle-dir "$OUTPUT_DIR" \
            --source-sha "$SOURCE_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --output "$OUTPUT_DIR/verified-freeze.json"
          (
            cd "$OUTPUT_DIR"
            sha256sum verified-freeze.json >> SHA256SUMS
          )

      - name: Publish freeze summary
        shell: bash
        run: |
          {
            echo '## Gate L formal freeze'
            echo
            echo "- Source SHA: \`$SOURCE_SHA\`"
            echo "- Workflow run: \`$GITHUB_RUN_ID\`"
            echo '- Gate L decision: `INCOMPLETE` (execution and human review pending)'
            echo
            echo '```text'
            cat "$OUTPUT_DIR/SHA256SUMS"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload formal freeze bundle
        uses: actions/upload-artifact@v4
        with:
          name: gate-l-formal-freeze-${{ inputs.source_sha }}
          path: build/gate-l-v3-formal-freeze/
          if-no-files-found: error
          retention-days: 90
