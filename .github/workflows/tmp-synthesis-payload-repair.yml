name: Temporary Synthesis Payload Repair

on:
  push:
    branches: [fix/semantic-tailoring-role-bound-scoring]
    paths: [".github/workflows/tmp-synthesis-payload-repair.yml"]
  pull_request:
    branches: [master]
    paths: [".github/workflows/tmp-synthesis-payload-repair.yml"]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/semantic-tailoring-role-bound-scoring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Apply synthesis repair
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/paperagent/nodes/evidence_synthesis.py")
          text = path.read_text(encoding="utf-8")
          old = "from paperagent.schemas import EvidenceSynthesis\n"
          new = "from paperagent.schemas import EvidenceItem, EvidenceSynthesis\n"
          if text.count(old) != 1:
              raise RuntimeError("schema import mismatch")
          text = text.replace(old, new, 1)

          marker = "async def evidence_synthesis_node(state: PaperAgentState, config: RunnableConfig) -> StatePatch:\n"
          helper = '''_SYNTHESIS_SUMMARY_LIMIT = 800\n_SYNTHESIS_METADATA_LIMIT = 500\n_SYNTHESIS_METADATA_KEYS = (\n    "relation",\n    "role_binding",\n    "baseline_candidate",\n    "comparator_candidate",\n    "repository_ref",\n    "query_text",\n)\n\n\ndef _compact_evidence_payload(item: EvidenceItem) -> dict[str, object]:\n    metadata = {\n        key: value[:_SYNTHESIS_METADATA_LIMIT]\n        for key in _SYNTHESIS_METADATA_KEYS\n        if (value := item.metadata.get(key)) is not None and value.strip()\n    }\n    return {\n        "evidence_id": item.evidence_id,\n        "source_type": item.source_type,\n        "title": item.title,\n        "stable_identifier": item.stable_identifier,\n        "supports_gap_ids": list(item.supports_gap_ids),\n        "summary": item.summary[:_SYNTHESIS_SUMMARY_LIMIT],\n        "metadata": metadata,\n    }\n\n\n'''
          if text.count(marker) != 1:
              raise RuntimeError("node marker mismatch")
          text = text.replace(marker, helper + marker, 1)

          old = '''            "accepted_evidence": [\n                item.model_dump(mode="json") for item in evidence.accepted_items()\n            ],\n'''
          new = '''            "accepted_evidence": [\n                _compact_evidence_payload(item) for item in evidence.accepted_items()\n            ],\n'''
          if text.count(old) != 1:
              raise RuntimeError("accepted evidence payload mismatch")
          text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")

          test = Path("tests/nodes/test_evidence_synthesis_payload.py")
          test.write_text('''from __future__ import annotations\n\nfrom datetime import UTC, datetime\nfrom typing import cast\n\nfrom paperagent.nodes.evidence_synthesis import _compact_evidence_payload\nfrom paperagent.schemas import EvidenceItem\n\n\ndef test_compact_payload_bounds_untrusted_text_and_metadata() -> None:\n    item = EvidenceItem(\n        evidence_id="ev-long",\n        source_type="paper",\n        title="Long evidence",\n        locator="https://example.test/long",\n        retrieved_at=datetime(2026, 7, 23, tzinfo=UTC),\n        verification_status="accepted",\n        supports_gap_ids=["g1"],\n        summary="s" * 5000,\n        content_hash="sha256:long",\n        metadata={\n            "query_text": "q" * 900,\n            "relation": "direct_query",\n            "irrelevant_large_field": "z" * 5000,\n        },\n    )\n    payload = _compact_evidence_payload(item)\n    assert len(cast(str, payload["summary"])) == 800\n    metadata = cast(dict[str, str], payload["metadata"])\n    assert len(metadata["query_text"]) == 500\n    assert metadata["relation"] == "direct_query"\n    assert "irrelevant_large_field" not in metadata\n\n\ndef test_compact_payload_preserves_identity_and_gap_bindings() -> None:\n    item = EvidenceItem(\n        evidence_id="ev-identity",\n        source_type="repository",\n        title="authors/project",\n        locator="https://example.test/repo",\n        retrieved_at=datetime(2026, 7, 23, tzinfo=UTC),\n        verification_status="accepted",\n        supports_gap_ids=["g-baseline", "g-module"],\n        summary="verified implementation",\n        content_hash="sha256:identity",\n        metadata={"relation": "author_linked_from_verified_paper"},\n    )\n    payload = _compact_evidence_payload(item)\n    assert payload["evidence_id"] == "ev-identity"\n    assert payload["supports_gap_ids"] == ["g-baseline", "g-module"]\n''', encoding="utf-8")
          PY
      - name: Install and verify
        run: |
          python -m pip install -q -e '.[dev]'
          ruff format src/paperagent/nodes/evidence_synthesis.py tests/nodes/test_evidence_synthesis_payload.py
          ruff check src/paperagent/nodes/evidence_synthesis.py tests/nodes/test_evidence_synthesis_payload.py
          mypy --strict src/paperagent/nodes/evidence_synthesis.py
          pytest -q tests/nodes/test_evidence_synthesis_payload.py tests/nodes/test_synthesis_method_quality_report.py tests/nodes/test_evidence_synthesis_contract.py
      - name: Commit synthesis repair
        if: github.event_name == 'push'
        run: |
          git config user.name "paperagent-repair-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/paperagent/nodes/evidence_synthesis.py tests/nodes/test_evidence_synthesis_payload.py
          git commit -m "fix(runtime): bound evidence synthesis input"
          git push origin HEAD:fix/semantic-tailoring-role-bound-scoring
