name: Gold Case and Interview Readiness

on:
  pull_request:
    branches: [master]
    paths:
      - "pyproject.toml"
      - "src/paperagent/academic_methodology.py"
      - "src/paperagent/academic_tailoring.py"
      - "src/paperagent/academic_tailoring_evaluation.py"
      - "src/paperagent/academic_tailoring_fixtures.py"
      - "src/paperagent/gold_case.py"
      - "src/paperagent/rag_evaluation.py"
      - "src/paperagent/interview_readiness.py"
      - "evals/academic_tailoring/cases.json"
      - "evals/academic_tailoring/npc/**"
      - "scripts/run_gold_case_readiness.py"
      - "scripts/build_interview_readiness.py"
      - "tests/evals/test_gold_case_readiness.py"
      - "tests/evals/test_rag_evaluation.py"
      - "tests/test_interview_readiness.py"
      - "docs/evaluation/RAG_EVALUATION_CONTRACT.md"
      - "docs/interview/GOLD_CASE_RAG_READINESS.md"
      - "docs/interview/HANDOFF.md"
      - ".github/workflows/gold-case-interview-readiness.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  focused:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
      - name: Verify exact source SHA
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Ruff lint
        run: >-
          ruff check
          src/paperagent/gold_case.py
          src/paperagent/rag_evaluation.py
          src/paperagent/interview_readiness.py
          scripts/run_gold_case_readiness.py
          scripts/build_interview_readiness.py
          tests/evals/test_gold_case_readiness.py
          tests/evals/test_rag_evaluation.py
          tests/test_interview_readiness.py
      - name: Ruff format
        run: >-
          ruff format --check
          src/paperagent/gold_case.py
          src/paperagent/rag_evaluation.py
          src/paperagent/interview_readiness.py
          scripts/run_gold_case_readiness.py
          scripts/build_interview_readiness.py
          tests/evals/test_gold_case_readiness.py
          tests/evals/test_rag_evaluation.py
          tests/test_interview_readiness.py
      - name: Strict Mypy
        run: mypy --config-file pyproject.toml
      - name: Focused tests
        run: >-
          pytest -q
          tests/evals/test_gold_case_readiness.py
          tests/evals/test_rag_evaluation.py
          tests/test_interview_readiness.py

  full-regression-and-artifact:
    needs: focused
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
      - name: Verify exact source SHA
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Prepare evidence directory
        shell: bash
        run: |
          mkdir -p build/gold-case
          printf '%s\n' "$SOURCE_SHA" > build/gold-case/source-sha.txt
      - name: Full repository regression
        shell: bash
        run: |
          set -o pipefail
          pytest \
            --cov=paperagent \
            --cov-branch \
            --cov-report=term-missing \
            --junitxml=build/gold-case/pytest.xml \
            -q \
            2>&1 | tee build/gold-case/pytest-output.log
      - name: Build Gold Case report
        run: >-
          python scripts/run_gold_case_readiness.py
          --output build/gold-case/report.json
      - name: Build interview readiness artifact
        run: >-
          python scripts/build_interview_readiness.py
          --input build/gold-case/report.json
          --output build/gold-case/interview-readiness.md
      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: gold-case-interview-readiness-${{ github.run_id }}
          path: build/gold-case
          retention-days: 30
          if-no-files-found: error