name: Gold Case and Interview Readiness

on:
  pull_request:
    branches: [master]
    paths:
      - "src/paperagent/gold_case.py"
      - "src/paperagent/rag_evaluation.py"
      - "src/paperagent/interview_readiness.py"
      - "scripts/run_gold_case_readiness.py"
      - "scripts/build_interview_readiness.py"
      - "tests/evals/test_gold_case_readiness.py"
      - "tests/evals/test_rag_evaluation.py"
      - "tests/test_interview_readiness.py"
      - "docs/evaluation/RAG_EVALUATION_CONTRACT.md"
      - "docs/interview/GOLD_CASE_RAG_READINESS.md"
      - ".github/workflows/gold-case-interview-readiness.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff-autofix-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install 'ruff>=0.12,<0.13'
      - name: Build scoped autofix patch
        shell: bash
        run: |
          mkdir -p build/gold-case
          files=(
            src/paperagent/gold_case.py
            src/paperagent/rag_evaluation.py
            src/paperagent/interview_readiness.py
            scripts/run_gold_case_readiness.py
            scripts/build_interview_readiness.py
            tests/evals/test_gold_case_readiness.py
            tests/evals/test_rag_evaluation.py
            tests/test_interview_readiness.py
          )
          ruff check "${files[@]}" --fix || true
          ruff format "${files[@]}"
          git diff -- "${files[@]}" > build/gold-case/ruff-fix.patch
          ruff check "${files[@]}" > build/gold-case/ruff-after.log 2>&1
      - name: Upload Ruff diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: gold-case-ruff-diagnostic-${{ github.run_id }}
          path: build/gold-case
          retention-days: 7
          if-no-files-found: error

  focused:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Ruff lint
        run: >-
          ruff check
          src/paperagent/gold_case.py
          src/paperagent/rag_evaluation.py
          src/paperagent/interview_readiness.py
          scripts/run_gold_case_readiness.py
          scripts/build_interview_readiness.py
          tests/evals/test_gold_case_readiness.py
          tests/evals/test_rag_evaluation.py
          tests/test_interview_readiness.py
      - name: Ruff format
        run: >-
          ruff format --check
          src/paperagent/gold_case.py
          src/paperagent/rag_evaluation.py
          src/paperagent/interview_readiness.py
          scripts/run_gold_case_readiness.py
          scripts/build_interview_readiness.py
          tests/evals/test_gold_case_readiness.py
          tests/evals/test_rag_evaluation.py
          tests/test_interview_readiness.py
      - name: Strict Mypy
        run: mypy --config-file pyproject.toml
      - name: Focused tests
        run: >-
          pytest -q
          tests/evals/test_gold_case_readiness.py
          tests/evals/test_rag_evaluation.py
          tests/test_interview_readiness.py

  full-regression-and-artifact:
    needs: focused
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Full repository regression
        run: pytest --cov=paperagent --cov-branch --cov-report=term-missing -q
      - name: Build Gold Case report
        run: >-
          python scripts/run_gold_case_readiness.py
          --output build/gold-case/report.json
      - name: Build interview readiness artifact
        run: >-
          python scripts/build_interview_readiness.py
          --input build/gold-case/report.json
          --output build/gold-case/interview-readiness.md
      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: gold-case-interview-readiness-${{ github.run_id }}
          path: build/gold-case
          retention-days: 30
          if-no-files-found: error
