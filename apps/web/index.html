<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperAgent — 题目研究助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;}
body{background:#f0f2f5;color:#1a1a2e;max-width:960px;margin:0 auto;padding:16px;}

/* Top bar */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;}
.top-bar h1{font-size:18px;white-space:nowrap;}
.top-bar .input-group{display:flex;gap:6px;flex:1;}
#topic{flex:1;padding:7px 10px;border:1px solid #d0d0d0;border-radius:6px;font-size:14px;outline:none;}
#topic:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.15);}
#startBtn{padding:7px 18px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;white-space:nowrap;}
#startBtn:disabled{background:#94a3b8;cursor:not-allowed;}
#historySelect{padding:6px 8px;border:1px solid #d0d0d0;border-radius:6px;font-size:12px;max-width:180px;}

/* Status bar */
.status-bar{font-size:13px;color:#64748b;padding:2px 0 6px;}
.progress-bar{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:12px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#7c3aed);transition:width .4s;width:0%;}

/* State machine */
.state-machine{background:#fff;border-radius:8px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:10px;}
.state-machine .sm-title{font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;}
.state-track{display:flex;flex-wrap:wrap;gap:2px;align-items:center;}
.state-node{display:inline-flex;align-items:center;justify-content:center;padding:2px 6px;font-size:10px;border-radius:4px;background:#f1f5f9;color:#94a3b8;border:1px solid #e2e8f0;transition:all .3s;}
.state-node.done{background:#dcfce7;color:#16a34a;border-color:#bbf7d0;}
.state-node.current{background:#2563eb;color:#fff;border-color:#1d4ed8;box-shadow:0 0 0 2px rgba(37,99,235,.2);font-weight:600;}
.state-arrow{color:#cbd5e1;font-size:10px;margin:0 1px;}

/* Panels row */
.panels-row{display:flex;gap:10px;margin-bottom:10px;}
.panel{background:#fff;border-radius:8px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);flex:1;}
.panel-title{font-size:12px;font-weight:600;color:#64748b;margin-bottom:6px;}

/* Connectivity */
.conn-item{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid #f8fafc;}
.conn-item:last-child{border-bottom:none;}
.conn-item .conn-name{display:flex;align-items:center;gap:4px;}
.conn-item .conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.conn-dot.ok{background:#22c55e;}
.conn-dot.fail{background:#ef4444;}
.conn-dot.pending{background:#d0d0d0;}
.conn-item .conn-latency{color:#94a3b8;font-size:11px;}

/* Candidate counts */
.count-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;}
.count-item{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.count-item .count-label{color:#64748b;}
.count-item .count-num{font-weight:600;font-size:13px;}
.count-num.pos{color:#16a34a;}
.count-num.warn{color:#f59e0b;}
.count-num.neg{color:#ef4444;}

/* Paper list */
.papers-panel{background:#fff;border-radius:8px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:10px;}
.paper-card{display:flex;align-items:flex-start;gap:6px;padding:6px 8px;border-radius:6px;margin:3px 0;font-size:13px;border-left:3px solid #e2e8f0;}
.paper-card.accept{border-left-color:#22c55e;background:#f0fdf4;}
.paper-card.weak{border-left-color:#f59e0b;background:#fffbeb;}
.paper-card.reject{border-left-color:#ef4444;background:#fef2f2;}
.paper-card .verdict-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.paper-card .paper-body{flex:1;min-width:0;}
.paper-card .paper-title{font-size:13px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.paper-card .paper-rel{font-size:11px;color:#94a3b8;margin-top:1px;}

/* Collapsed results */
details.results-section{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:8px;}
details.results-section summary{padding:10px 12px;cursor:pointer;font-size:13px;font-weight:600;color:#64748b;list-style:none;display:flex;align-items:center;gap:4px;}
details.results-section summary::before{content:'▶';font-size:10px;transition:transform .2s;}
details.results-section[open] summary::before{transform:rotate(90deg);}
.results-content{padding:0 12px 12px;}
.eg-group{margin-bottom:8px;}
.eg-group-title{font-size:12px;font-weight:600;color:#475569;margin-bottom:2px;}
.eg-item{font-size:11px;padding:1px 0 1px 10px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wp-item{font-size:12px;padding:6px 0;border-bottom:1px solid #f8fafc;}
.wp-item:last-child{border-bottom:none;}
.final-report{font-size:13px;line-height:1.6;}
.final-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin:2px 4px 2px 0;}
.final-badge.green{background:#dcfce7;color:#16a34a;}
.final-badge.orange{background:#fef3c7;color:#d97706;}
.final-badge.red{background:#fee2e2;color:#dc2626;}

.hidden{display:none;}

/* Timeline Debugger (Re3.5) */
.timeline-debugger{background:#fff;border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:10px;}
.tl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tl-title{font-size:13px;font-weight:600;color:#475569;}
.tl-meta{font-size:11px;color:#94a3b8;}
.tl-scrubber{position:relative;margin-bottom:8px;}
.tl-track{display:flex;height:24px;border-radius:4px;overflow:hidden;background:#f1f5f9;}
.tl-segment{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:opacity .2s;}
.tl-segment:hover{opacity:.8;}
.tl-segment.active{outline:2px solid #2563eb;outline-offset:-1px;z-index:2;}
.tl-segment.error{background:#ef4444 !important;}
.tl-cursor{position:absolute;top:0;height:24px;width:2px;background:#2563eb;z-index:3;pointer-events:none;transition:left .15s;}
.tl-slider{position:absolute;top:0;left:0;width:100%;height:24px;opacity:0;cursor:pointer;margin:0;}
.tl-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;max-height:60px;overflow-y:auto;}
.tl-chip{padding:2px 8px;font-size:10px;border-radius:10px;background:#f1f5f9;color:#64748b;cursor:pointer;transition:all .2s;border:1px solid #e2e8f0;}
.tl-chip:hover{background:#e0e7ff;}
.tl-chip.active{background:#2563eb;color:#fff;border-color:#1d4ed8;}
.tl-detail{background:#f8fafc;border-radius:6px;padding:10px;font-size:12px;min-height:60px;}
.tl-detail-node{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:4px;}
.tl-detail-meta{font-size:11px;color:#94a3b8;margin-bottom:6px;}
.tl-detail-io{margin-bottom:6px;}
.io-label{font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;margin-top:4px;}
.io-content{font-size:11px;color:#475569;margin-left:8px;font-family:monospace;white-space:pre-wrap;word-break:break-all;}
.tl-tool-tag{display:inline-block;padding:1px 6px;font-size:10px;border-radius:3px;background:#dbeafe;color:#1e40af;margin:1px 2px;}
.tl-detail-errors{color:#dc2626;font-size:11px;}
.tl-state-key{display:inline-block;padding:1px 6px;font-size:10px;border-radius:3px;background:#f0fdf4;color:#15803d;margin:1px 2px;}
.tl-progressive{display:flex;gap:12px;padding:6px 0 0;border-top:1px solid #f1f5f9;}
.tl-prog-item{font-size:12px;color:#475569;}
.tl-prog-item span{font-weight:600;color:#2563eb;}
</style>
</head>
<body>

<div class="top-bar">
  <h1>PaperAgent</h1>
  <div class="input-group">
    <input type="text" id="topic" placeholder="输入研究题目...">
    <button id="startBtn" onclick="startResearch()">开始研究</button>
  </div>
  <select id="historySelect" onchange="viewCase(this.value)">
    <option value="">— 历史 Case —</option>
  </select>
</div>

<!-- User paper upload (Re3.1) -->
<div class="papers-panel" id="uploadPanel" style="margin-bottom:8px;">
  <div class="panel-title">上传已知论文 (可选)</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;">
    <input type="text" id="uploadTitle" placeholder="论文标题" style="flex:1;min-width:120px;padding:6px 8px;border:1px solid #d0d0d0;border-radius:6px;font-size:13px;">
    <input type="text" id="uploadDoi" placeholder="DOI (可选)" style="width:120px;padding:6px 8px;border:1px solid #d0d0d0;border-radius:6px;font-size:13px;">
    <input type="text" id="uploadArxiv" placeholder="arXiv ID (可选)" style="width:120px;padding:6px 8px;border:1px solid #d0d0d0;border-radius:6px;font-size:13px;">
    <select id="uploadRole" style="padding:6px 8px;border:1px solid #d0d0d0;border-radius:6px;font-size:13px;">
      <option value="baseline">baseline</option>
      <option value="parallel">parallel</option>
    </select>
    <button onclick="uploadPaper()" style="padding:6px 14px;background:#059669;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">添加</button>
  </div>
  <div id="uploadList" style="margin-top:6px;"></div>
</div>
<div id="statusBar" class="status-bar"></div>
<div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
<div id="gateSearchContainer"></div>

<!-- State machine panel -->
<div class="state-machine">
  <div class="sm-title">Graph 拓扑 <span id="smProgress" style="float:right;font-weight:400">—</span></div>
  <div style="max-height:600px;overflow-y:auto;">
    <svg id="graphSvg" width="340" height="1040" style="overflow:visible;"></svg>
  </div>
</div>
<style>
.graph-node{cursor:pointer;transition:all .3s}
.graph-node-rect{fill:#f1f5f9;stroke:#e2e8f0;stroke-width:1.5;rx:6}
.graph-node-rect.done{fill:#dcfce7;stroke:#86efac}
.graph-node-rect.current{fill:#2563eb;stroke:#1d4ed8}
.graph-node-rect.gate{fill:#fef3c7;stroke:#f59e0b}
.graph-node-text{font-size:9px;text-anchor:middle;dominant-baseline:middle;fill:#475569;pointer-events:none}
.graph-node-text.done{fill:#16a34a}
.graph-node-text.current{fill:#fff;font-weight:600}
.graph-edge{stroke:#cbd5e1;stroke-width:1.2;fill:none}
.graph-edge.dashed{stroke-dasharray:4 2}
.graph-edge-label{font-size:7px;fill:#94a3b8}
</style>

<!-- Timeline Debugger (Re3.5) -->
<div class="timeline-debugger" id="timelineDebugger" style="display:none;">
  <div class="tl-header">
    <span class="tl-title">⏱ 时间线调试器</span>
    <span class="tl-meta" id="tlMeta">— / —</span>
  </div>
  <div class="tl-scrubber">
    <div class="tl-track" id="tlTrack"></div>
    <div class="tl-cursor" id="tlCursor" style="left:0%"></div>
    <input type="range" id="tlSlider" min="0" max="100" value="0" class="tl-slider">
  </div>
  <div class="tl-chips" id="tlChips"></div>
  <div class="tl-detail" id="tlDetail">
    <div class="tl-detail-node" id="tlDetailNode"></div>
    <div class="tl-detail-meta" id="tlDetailMeta"></div>
    <div class="tl-detail-io" id="tlDetailIO"></div>
    <div class="tl-detail-tools" id="tlDetailTools"></div>
    <div class="tl-detail-errors" id="tlDetailErrors"></div>
    <div id="tlDetailState"></div>
  </div>
  <div class="tl-progressive">
    <span class="tl-prog-item">📄 <span id="tlProgPapers">0</span></span>
    <span class="tl-prog-item">📦 <span id="tlProgRepos">0</span></span>
    <span class="tl-prog-item">💾 <span id="tlProgDatasets">0</span></span>
    <span class="tl-prog-item">📐 <span id="tlProgBaseline">0</span></span>
  </div>
</div>

<!-- Panels row: connectivity + candidate counts -->
<div class="panels-row">
  <div class="panel" style="flex:1;max-width:340px;">
    <div class="panel-title">连通性</div>
    <div id="connPanel">
      <div class="conn-item"><span class="conn-name"><span class="conn-dot pending"></span> DeepSeek</span><span class="conn-latency">—</span></div>
      <div class="conn-item"><span class="conn-name"><span class="conn-dot pending"></span> OpenAlex</span><span class="conn-latency">—</span></div>
      <div class="conn-item"><span class="conn-name"><span class="conn-dot pending"></span> Crossref</span><span class="conn-latency">—</span></div>
      <div class="conn-item"><span class="conn-name"><span class="conn-dot pending"></span> arXiv</span><span class="conn-latency">—</span></div>
      <div class="conn-item"><span class="conn-name"><span class="conn-dot pending"></span> GitHub</span><span class="conn-latency">—</span></div>
      <div class="conn-item"><span class="conn-name"><span class="conn-dot pending"></span> S2 API</span><span class="conn-latency">—</span></div>
    </div>
  </div>
  <div class="panel" style="flex:1;">
    <div class="panel-title">候选</div>
    <div class="count-grid" id="countGrid">
      <div class="count-item"><span class="count-label">Papers</span><span class="count-num" id="cnt-papers">0</span></div>
      <div class="count-item"><span class="count-label">Repos</span><span class="count-num" id="cnt-repos">0</span></div>
      <div class="count-item"><span class="count-label">Datasets</span><span class="count-num" id="cnt-datasets">0</span></div>
      <div class="count-item"><span class="count-label">Surveys</span><span class="count-num" id="cnt-surveys">0</span></div>
      <div class="count-item"><span class="count-label">Expanded</span><span class="count-num" id="cnt-expanded">0</span></div>
      <div class="count-item"><span class="count-label">Seeds</span><span class="count-num" id="cnt-seeds">0</span></div>
    </div>
  </div>
</div>

<!-- Paper list -->
<div class="papers-panel" id="papersPanel" style="display:none;">
  <div class="panel-title">论文列表</div>
  <div id="paperList"></div>
</div>

<!-- Collapsed results -->
<details class="results-section" id="evidenceSection" style="display:none;">
  <summary>证据图谱</summary>
  <div class="results-content" id="evidenceGraph"></div>
</details>

<details class="results-section" id="wpSection" style="display:none;">
  <summary>工作包</summary>
  <div class="results-content" id="workPackages"></div>
</details>

<details class="results-section" id="narrativeSection" style="display:none;">
  <summary>研究叙事</summary>
  <div class="results-content" id="narrativeContent"></div>
</details>

<details class="results-section" id="innovationSection" style="display:none;">
  <summary>创新点</summary>
  <div class="results-content" id="innovationContent"></div>
</details>

<details class="results-section" id="sotaSection" style="display:none;">
  <summary>SOTA 对比</summary>
  <div class="results-content" id="sotaContent"></div>
</details>

<details class="results-section" id="optimizationSection" style="display:none;">
  <summary>优化方向</summary>
  <div class="results-content" id="optimizationContent"></div>
</details>

<details class="results-section" id="traceSection" style="display:none;">
  <summary>执行轨迹</summary>
  <div class="results-content" id="traceContent" style="max-height:400px;overflow-y:auto;"></div>
</details>

<details class="results-section" id="finalSection" style="display:none;">
  <summary>最终结果</summary>
  <div class="results-content" id="finalReport" class="final-report"></div>
</details>

<script>
var allPapers = [];
var currentFilter = 'all';
var NODE_NAMES = [
  'intake','parser','planner','retrieve','filter','verify','gate',
  'expand','verify2','gate2','dataset','graph','classify','feas',
  'workpkg','innov','sota','narrative','review','optimize',
  'devils','human','final'
];
var TOTAL_NODES = NODE_NAMES.length;
var nodeProgress = 0;
var connData = {};

// Backend node name → frontend chip name mapping (Re3.3)
var NODE_NAME_MAP = {
  'intake': 'intake', 'topic_parser': 'parser', 'search_planner': 'planner',
  'search_agent': 'retrieve', 'paper_retriever': 'retrieve',
  'quality_filter': 'filter', 'verify': 'verify', 'paper_verifier': 'verify',
  'quality_gate': 'gate', 'targeted_repair': 'gate', 'repair': 'gate',
  'citation_expander': 'expand', 'dataset_repo_extractor': 'dataset',
  'evidence_graph_builder': 'graph', 'baseline_classifier': 'classify',
  'feasibility_assessor': 'feas', 'work_package_brainstorm': 'workpkg',
  'work_package': 'workpkg', 'innovation_extractor': 'innov',
  'sota_matcher': 'sota', 'narrative_builder': 'narrative',
  'low_bar_review': 'review', 'optimization_advisor': 'optimize',
  'devils_advocate': 'devils', 'human_gate': 'human',
  'final_recommendation': 'final',
};
function _resolveNodeName(nodeName) {
  return NODE_NAME_MAP[nodeName] || nodeName;
}

function genCaseId() { return 're24-' + Date.now().toString(36); }

function setProgress(n) {
  var pct = Math.min(100, Math.round(n / TOTAL_NODES * 100));
  var pf = document.getElementById('progressFill');
  if (pf) pf.style.width = pct + '%';
  var sm = document.getElementById('smProgress');
  if (sm) sm.textContent = n + '/' + TOTAL_NODES;
}

function initStateMachine() {
  var track = document.getElementById('stateTrack');
  if (!track) return;  // Re3.9.3: stateTrack replaced by graphSvg
  var html = '';
  for (var i = 0; i < NODE_NAMES.length; i++) {
    if (i > 0) html += '<span class="state-arrow">›</span>';
    html += '<span class="state-node" data-idx="' + i + '" data-name="' + NODE_NAMES[i] + '">' + NODE_NAMES[i] + '</span>';
  }
  track.innerHTML = html;
  nodeProgress = 0;
  setProgress(0);
}

function markNodeDone(nodeName) {
  markGraphNodeDone(nodeName);
  var chip = _resolveNodeName(nodeName);
  var nodes = document.querySelectorAll('.state-node');
  if (!nodes.length) return;
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    if (n.dataset.name === chip) {
      n.classList.remove('current');
      n.classList.add('done');
    }
  }
}

function markNodeCurrent(nodeName) {
  markGraphNodeCurrent(nodeName);
  var chip = _resolveNodeName(nodeName);
  var nodes = document.querySelectorAll('.state-node');
  if (!nodes.length) return;
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    if (n.dataset.name === chip) {
      n.classList.add('current');
    } else if (!n.classList.contains('done')) {
      n.classList.remove('current');
    }
  }
}

function advanceProgress(nodeName) {
  markNodeDone(nodeName);
  nodeProgress++;
  setProgress(nodeProgress);
}

function loadHistory() {
  fetch('/api/v1/research/').then(function(r) { return r.json(); }).then(function(d) {
    var html = '<option value="">— 历史 Case —</option>';
    if (d.cases) {
      for (var i = 0; i < d.cases.length; i++) {
        var c = d.cases[i];
        html += '<option value="' + c.case_id + '">' + c.case_id + ' (' + c.status + ')</option>';
      }
    }
    document.getElementById('historySelect').innerHTML = html;
  }).catch(function() {});
}

function loadConnectivity() {
  fetch('/api/v1/research/health/providers').then(function(r) { return r.json(); }).then(function(d) {
    if (!d.providers) return;
    var html = '';
    for (var i = 0; i < d.providers.length; i++) {
      var p = d.providers[i];
      var cls = p.ok ? 'ok' : 'fail';
      var latency = p.latency_s > 0 ? p.latency_s + 's' : (p.ok ? '✓' : '✗');
      var detail = p.detail ? ' <span style="color:#cbd5e1;font-size:10px">' + p.detail + '</span>' : '';
      html += '<div class="conn-item">';
      html += '<span class="conn-name"><span class="conn-dot ' + cls + '"></span> ' + p.label + detail + '</span>';
      html += '<span class="conn-latency">' + latency + '</span>';
      html += '</div>';
      connData[p.key] = p;
    }
    document.getElementById('connPanel').innerHTML = html;
  }).catch(function() {
    // Fallback: just mark as unknown
  });
}

function updateConnFromAdapter(perAdapter, failedAdapters) {
  var items = document.querySelectorAll('#connPanel .conn-item');
  var adapterMap = {
    'openalex': 'OpenAlex', 'crossref': 'Crossref', 'arxiv': 'arXiv',
    'github': 'GitHub', 'semantic_scholar': 'S2 API'
  };
  for (var key in perAdapter) {
    var label = adapterMap[key] || key;
    var n = perAdapter[key];
    items.forEach(function(item) {
      var name = item.querySelector('.conn-name');
      if (name && name.textContent.includes(label)) {
        var dot = item.querySelector('.conn-dot');
        if (dot) {
          dot.classList.remove('pending');
          dot.classList.add(n > 0 ? 'ok' : 'fail');
        }
        var lat = item.querySelector('.conn-latency');
        if (lat) lat.textContent = n + ' hits';
      }
    });
  }
  if (failedAdapters && failedAdapters.length) {
    failedAdapters.forEach(function(key) {
      var label = adapterMap[key] || key;
      items.forEach(function(item) {
        var name = item.querySelector('.conn-name');
        if (name && name.textContent.includes(label)) {
          var dot = item.querySelector('.conn-dot');
          if (dot) {
            dot.classList.remove('pending');
            dot.classList.add('fail');
          }
        }
      });
    });
  }
}

function setCount(id, n, cls) {
  var el = document.getElementById(id);
  el.textContent = n;
  el.className = 'count-num' + (cls ? ' ' + cls : '');
}

function startResearch() {
  var topic = document.getElementById('topic').value.trim();
  if (!topic) { alert('请输入题目'); return; }
  var caseId = currentCaseId || genCaseId();
  currentCaseId = caseId;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('statusBar').textContent = '提交中...';
  document.getElementById('papersPanel').style.display = 'none';
  document.getElementById('evidenceSection').style.display = 'none';
  document.getElementById('wpSection').style.display = 'none';
  document.getElementById('finalSection').style.display = 'none';
  document.getElementById('paperList').innerHTML = '';
  allPapers = [];
  setCount('cnt-papers', 0); setCount('cnt-repos', 0); setCount('cnt-datasets', 0);
  setCount('cnt-surveys', 0); setCount('cnt-expanded', 0); setCount('cnt-seeds', 0);
  initStateMachine();
  loadConnectivity();

  fetch('/api/v1/research/', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({case_id: caseId, topic: topic})
  }).then(function(r) { return r.json(); }).then(function() {
    connectSSE(caseId);
  });
}

function connectSSE(caseId) {
  var es = new EventSource('/api/v1/research/' + caseId + '/stream');

  es.addEventListener('search_started', function() {
    document.getElementById('statusBar').textContent = '搜索中...';
    markNodeCurrent('retrieve');
  });

  es.addEventListener('adapter_result', function(e) {
    var d = JSON.parse(e.data);
    // Already handled by adapter_status
  });

  es.addEventListener('adapter_status', function(e) {
    var d = JSON.parse(e.data);
    if (d.per_adapter) {
      updateConnFromAdapter(d.per_adapter, d.failed_adapters);
    }
  });

  es.addEventListener('search_completed', function(e) {
    advanceProgress('retrieve');
    markNodeCurrent('filter');
  });

  es.addEventListener('filter_result', function(e) {
    advanceProgress('filter');
    markNodeCurrent('verify');
  });

  es.addEventListener('verify_completed', function(e) {
    var d = JSON.parse(e.data);
    advanceProgress('verify');
    if (d.round === 1) {
      markNodeCurrent('gate');
    } else {
      advanceProgress('verify2');
      markNodeCurrent('gate2');
    }
  });

  es.addEventListener('candidate_count', function(e) {
    var d = JSON.parse(e.data);
    if (d.papers !== undefined) {
      setCount('cnt-papers', d.papers);
      if (d.accept !== undefined) setCount('cnt-papers', d.papers, d.accept > 0 ? 'pos' : 'neg');
    }
  });

  es.addEventListener('expansion_started', function(e) {
    var d = JSON.parse(e.data);
    if (d.n_seeds !== undefined) setCount('cnt-seeds', d.n_seeds);
    advanceProgress('gate');
    markNodeCurrent('expand');
  });

  es.addEventListener('expansion_completed', function(e) {
    var d = JSON.parse(e.data);
    if (d.total_expanded !== undefined) setCount('cnt-expanded', d.total_expanded);
    if (d.n_surveys !== undefined) setCount('cnt-surveys', d.n_surveys);
    if (d.n_repos !== undefined) setCount('cnt-repos', d.n_repos);
    advanceProgress('expand');
  });

  es.addEventListener('node_current', function(e) {
    var d = JSON.parse(e.data);
    if (d.node) {
      markNodeCurrent(d.node);
      markGraphNodeCurrent(d.node);
    }
    if (d.node === 'human_gate_search') showHumanGateSearch();
  });

  es.addEventListener('papers_update', function(e) {
    var d = JSON.parse(e.data);
    var html = '';
    var papers = d.papers || [];
    for (var i = 0; i < papers.length; i++) {
      var p = papers[i];
      html += '<div class="paper-card" style="border-left-color:#3b82f6;">';
      html += '<span class="verdict-icon" style="color:#3b82f6;">&#9203;</span>';
      html += '<div class="paper-body">';
      html += '<div class="paper-title">' + escapeHtml(p.title) + '</div>';
      html += '<div class="paper-rel">' + p.source + '</div>';
      html += '</div></div>';
    }
    if (papers.length === 0) {
      html = '<div style="color:#94a3b8;font-size:13px;padding:8px;">搜索中...</div>';
    }
    var listEl = document.getElementById('paperList');
    if (listEl) listEl.innerHTML = html;
    setCount('cnt-papers', d.n_papers);
    setCount('cnt-repos', d.n_repos);
  });

  es.addEventListener('node_complete', function(e) {
    var d = JSON.parse(e.data);
    advanceProgress(d.node);
    markGraphNodeDone(d.node);
    var nextMap = {
      'dataset_repo_extractor': 'graph', 'evidence_graph_builder': 'classify',
      'baseline_classifier': 'feas', 'feasibility_assessor': 'workpkg',
      'work_package': 'innov', 'innovation_extractor': 'sota',
      'sota_matcher': 'narrative', 'narrative_builder': 'review',
      'low_bar_review': 'optimize', 'optimization_advisor': 'devils',
      'devils_advocate': 'human', 'human_gate': 'final'
    };
    if (nextMap[d.node]) markNodeCurrent(nextMap[d.node]);
  });

  es.addEventListener('done', function(e) {
    var d = JSON.parse(e.data);
    document.getElementById('statusBar').textContent = '完成! 耗时 ' + d.total_elapsed_s + 's';
    setProgress(TOTAL_NODES);
    markNodeDone('final');
    es.close();
    document.getElementById('startBtn').disabled = false;
    fetchAndRenderAll(caseId);
  });

  es.addEventListener('error', function(e) {
    try { var d = JSON.parse(e.data); document.getElementById('statusBar').textContent = '错误: ' + d.message; } catch(err) {}
  });

  setTimeout(function() {
    if (es.readyState === 2) {
      var poll = setInterval(function() {
        fetch('/api/v1/research/' + caseId + '/status').then(function(r) { return r.json(); }).then(function(s) {
          if (s.status === 'done') { clearInterval(poll); fetchAndRenderAll(caseId); document.getElementById('startBtn').disabled = false; }
          if (s.status === 'error') { clearInterval(poll); document.getElementById('startBtn').disabled = false; }
        });
      }, 2000);
    }
  }, 3000);
}

function fetchAndRenderAll(caseId) {
  fetch('/api/v1/research/' + caseId + '/state').then(function(r) { return r.json(); }).then(function(st) {
    allPapers = [];
    var vp = st.verified_papers || [];
    var wp = st.weak_papers || [];
    for (var i = 0; i < vp.length; i++) allPapers.push(vp[i]);
    for (var i = 0; i < wp.length; i++) allPapers.push(wp[i]);
    renderPapers();
    renderEvidenceGraph(st);
    renderWorkPackages(st.work_packages || []);
    renderNarrative(st);
    renderInnovation(st);
    renderSota(st);
    renderOptimization(st);
    renderTrace(caseId);
    renderFinal(st.final_recommendation || {}, st);
    // Update counts from final state
    setCount('cnt-papers', (st.verified_papers || []).length + (st.weak_papers || []).length);
    setCount('cnt-repos', (st.repo_candidates || []).length);
    setCount('cnt-datasets', (st.dataset_candidates || []).length);
    setCount('cnt-surveys', (st.surveys_found || []).length);
    setCount('cnt-expanded', (st.expanded_papers || []).length);
    setCount('cnt-seeds', (st.seed_papers || []).length);
  }).catch(function() {});
  loadTimeline(caseId);
}

function renderPapers() {
  document.getElementById('papersPanel').style.display = '';
  var html = '';
  for (var i = 0; i < allPapers.length; i++) {
    var p = allPapers[i];
    var verdict = p.verdict || 'unknown';
    var cls = verdict === 'accept' ? 'accept' : (verdict === 'weak_reject' ? 'weak' : 'reject');
    var icon = verdict === 'accept' ? '✓' : (verdict === 'weak_reject' ? '⚠' : '✗');
    var title = (p.title || '').substring(0, 80);
    var rel = p.relation_to_topic || '';
    var uploadTag = p.source === 'user_upload' ? ' <span style="color:#059669;font-size:10px;">[用户上传]</span>' : '';
    html += '<div class="paper-card ' + cls + '">';
    html += '<span class="verdict-icon">' + icon + '</span>';
    html += '<div class="paper-body">';
    html += '<div class="paper-title">' + title + uploadTag + '</div>';
    if (rel) html += '<div class="paper-rel">' + rel + '</div>';
    html += '</div></div>';
  }
  document.getElementById('paperList').innerHTML = html || '<div style="color:#94a3b8;font-size:13px;padding:8px;">无论文</div>';
}

function renderEvidenceGraph(st) {
  document.getElementById('evidenceSection').style.display = '';
  var groups = [
    {label: 'Baseline', items: st.baseline_candidates || []},
    {label: 'Parallel', items: st.parallel_candidates || []},
    {label: 'Survey', items: (st.surveys || []).concat(st.surveys_found || [])},
    {label: 'Dataset', items: st.dataset_candidates || []},
    {label: 'Repo', items: (st.repo_candidates || []).concat(st.repos_found || [])}
  ];
  var html = '';
  for (var g = 0; g < groups.length; g++) {
    var items = groups[g].items;
    html += '<div class="eg-group"><div class="eg-group-title">' + groups[g].label + ' (' + items.length + ')</div>';
    for (var i = 0; i < Math.min(items.length, 10); i++) {
      var title = items[i].title || items[i].name || items[i].url || '';
      html += '<div class="eg-item">' + (title.substring(0, 80) || '') + '</div>';
    }
    if (items.length > 10) html += '<div class="eg-item">... 还有 ' + (items.length - 10) + ' 条</div>';
    html += '</div>';
  }
  document.getElementById('evidenceGraph').innerHTML = html;
}

function renderWorkPackages(wps) {
  document.getElementById('wpSection').style.display = '';
  var html = '';
  for (var i = 0; i < wps.length; i++) {
    var wp = wps[i];
    var title = wp.title || wp.approach || wp.name || ('工作包 ' + (i + 1));
    var desc = wp.description || wp.summary || '';
    html += '<div class="wp-item"><b>' + (i + 1) + '. ' + title + '</b>';
    if (desc) html += '<br><span style="color:#64748b">' + desc.substring(0, 200) + '</span>';
    html += '</div>';
  }
  document.getElementById('workPackages').innerHTML = html || '<div style="color:#94a3b8;font-size:13px">无工作包</div>';
}

function renderNarrative(st) {
  var n = st.research_narrative || st.research_narratives || {};
  if (!n || Object.keys(n).length === 0) return;
  document.getElementById('narrativeSection').style.display = '';
  var html = '';
  var fields = [
    ['three_problems', '三个核心问题'], ['nick_model_name', '模型命名'],
    ['narrative_summary', '叙事总结'], ['chapter_outline', '章节大纲'],
    ['abstract_draft', '摘要草稿'], ['research_gap', '研究空白'],
    ['proposed_approach', '拟用方案'], ['contribution', '预期贡献'],
    ['methodology', '方法论'], ['risks', '风险'], ['summary', '总结']
  ];
  for (var i = 0; i < fields.length; i++) {
    var v = n[fields[i][0]];
    if (v) {
      var vs = typeof v === 'string' ? v : JSON.stringify(v, null, 2);

function renderInnovation(st) {
  var pts = st.innovation_points || [];
  if (pts.length === 0) return;
  document.getElementById('innovationSection').style.display = '';
  var html = '<ul style="list-style:none;padding:0;">';
  for (var i = 0; i < pts.length; i++) {
    var p = pts[i];
    var desc = p.description || p.title || p.name || ('创新点 ' + (i+1));
    var baseline = p.baseline_used || '';
    var modules = p.stitched_modules || [];
    var plan = p.stitching_plan || '';
    var diff = p.estimated_difficulty || '';
    html += '<li style="margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #f1f5f9;">';
    html += '<b>创新点 ' + (i+1) + '</b>: ' + desc;
    if (baseline) html += '<br><span style="color:#64748b;font-size:11px;">基线: ' + baseline + '</span>';
    if (modules.length > 0) html += '<br><span style="color:#64748b;font-size:11px;">缝合模块: ' + modules.join(' + ') + '</span>';
    if (plan) html += '<br><span style="color:#64748b;font-size:11px;">缝合方案: ' + (typeof plan === 'string' ? plan.substring(0,200) : JSON.stringify(plan).substring(0,200)) + '</span>';
    if (diff) html += '<br><span style="color:#f59e0b;font-size:11px;">难度: ' + diff + '</span>';
    html += '</li>';
  }
  html += '</ul>';
  if (st.stitching_plan) {
    var sp = st.stitching_plan;
    html += '<div style="margin-top:6px;padding:6px;background:#f8fafc;border-radius:4px;"><b>总体缝合方案:</b><br>';
    html += '<span style="font-size:11px;color:#64748b;">基线模型: ' + (sp.baseline_model||'') + '</span><br>';
    html += '<span style="font-size:11px;color:#64748b;">模块B: ' + (sp.module_b||'') + '</span><br>';
    html += '<span style="font-size:11px;color:#64748b;">模块C: ' + (sp.module_c||'') + '</span>';
    if (sp.stitching_steps) {
      html += '<br><b style="font-size:11px;">缝合步骤:</b><ol style="font-size:11px;color:#475569;padding-left:20px;">';
      for (var s = 0; s < sp.stitching_steps.length; s++) {
        html += '<li>' + sp.stitching_steps[s].substring(0, 200) + '</li>';
      }
      html += '</ol>';
    }

function renderSota(st) {
  var s = st.sota_comparison || {};
  if (!s || Object.keys(s).length === 0) return;
  document.getElementById('sotaSection').style.display = '';
  var html = '';
  // Comparison papers table
  var papers = s.comparison_papers || s.comparison || [];
  if (papers.length > 0) {
    html += '<h4 style="font-size:12px;color:#475569;margin-bottom:4px;">对比论文 (' + papers.length + ')</h4>';
    html += '<table style="width:100%;font-size:11px;border-collapse:collapse;">';
    html += '<tr style="border-bottom:1px solid #e2e8f0;"><th style="text-align:left;padding:3px;">标题</th><th style="text-align:left;padding:3px;">年份</th></tr>';
    for (var i = 0; i < Math.min(papers.length, 10); i++) {
      var p = papers[i];
      html += '<tr style="border-bottom:1px solid #f8fafc;"><td style="padding:3px;">' + (p.title||'').substring(0, 60) + '</td><td style="padding:3px;">' + (p.year||'') + '</td></tr>';
    }
    html += '</table>';
  }
  // Metrics
  var metrics = s.metrics_to_compare || [];
  if (metrics.length > 0) {
    html += '<h4 style="font-size:12px;color:#475569;margin:6px 0 4px;">对比指标</h4><div style="font-size:11px;color:#475569;">' + metrics.join(', ') + '</div>';
  }
  // Ablation suggestions
  var ablations = s.ablation_suggestions || [];
  if (ablations.length > 0) {
    html += '<h4 style="font-size:12px;color:#475569;margin:6px 0 4px;">消融实验建议</h4><ul style="font-size:11px;color:#475569;padding-left:20px;">';
    for (var i = 0; i < ablations.length; i++) {
      var a = ablations[i];
      html += '<li>' + (a.name||'') + ': ' + (a.purpose||'') + '</li>';
    }
    html += '</ul>';
  }
  // Experiment checklist
  var checklist = s.experiment_checklist || [];
  if (checklist.length > 0) {
    html += '<h4 style="font-size:12px;color:#475569;margin:6px 0 4px;">实验检查清单</h4><ul style="font-size:11px;color:#475569;padding-left:20px;">';
    for (var i = 0; i < checklist.length; i++) {
      html += '<li>' + checklist[i] + '</li>';
    }
    html += '</ul>';
  }
  // Fallback for other field structures
  if (s.current_sota) html += '<div style="margin-bottom:4px;"><b>当前 SOTA:</b> ' + s.current_sota + '</div>';
  if (s.gap) html += '<div style="margin-bottom:4px;"><b>差距:</b> ' + s.gap + '</div>';
  if (!html) html = '<div style="color:#94a3b8">无 SOTA 数据</div>';
  document.getElementById('sotaContent').innerHTML = html;
}

function renderOptimization(st) {
  var opts = st.optimization_directions || {};
  if (!opts || Object.keys(opts).length === 0) return;
  document.getElementById('optimizationSection').style.display = '';
  var html = '';
  // Optimization paths
  var paths = opts.optimization_paths || opts.directions || [];
  if (paths.length > 0) {
    html += '<h4 style="font-size:12px;color:#475569;margin-bottom:4px;">优化路径 (' + paths.length + ')</h4><ul style="list-style:none;padding:0;">';
    for (var i = 0; i < paths.length; i++) {
      var d = paths[i];
      var dir = d.direction || d.title || ('路径 ' + (i+1));
      var gain = d.expected_gain || '';
      var diff = d.difficulty || '';
      var items = d.action_items || [];
      html += '<li style="margin-bottom:6px;"><b>' + dir + '</b>';
      if (gain) html += '<br><span style="color:#16a34a;font-size:11px;">预期增益: ' + gain + '</span>';
      if (diff) html += ' <span style="color:#f59e0b;font-size:11px;">难度: ' + diff + '</span>';
      if (items.length > 0) {
        html += '<ul style="font-size:11px;color:#64748b;padding-left:20px;">';
        for (var j = 0; j < items.length; j++) html += '<li>' + items[j] + '</li>';
        html += '</ul>';
      }
      html += '</li>';
    }
    html += '</ul>';
  }
  // Degradation paths
  var degr = opts.degradation_paths || [];
  if (degr.length > 0) {
    html += '<h4 style="font-size:12px;color:#475569;margin:6px 0 4px;">降级路径 (' + degr.length + ')</h4><ul style="list-style:none;padding:0;">';
    for (var i = 0; i < degr.length; i++) {
      var d = degr[i];
      html += '<li style="margin-bottom:4px;font-size:11px;"><b>' + (d.path||'') + '</b>';
      if (d.trade_off) html += ' <span style="color:#ef4444;">代价: ' + d.trade_off + '</span>';
      if (d.survival_rate) html += ' <span style="color:#64748b;">存活率: ' + d.survival_rate + '</span>';
      html += '</li>';
    }
    html += '</ul>';
  }
  // Risk mitigation
  var risks = opts.risk_mitigation || [];
  if (risks.length > 0) {
    html += '<h4 style="font-size:12px;color:#475569;margin:6px 0 4px;">风险缓解</h4><ul style="font-size:11px;color:#475569;padding-left:20px;">';
    for (var i = 0; i < risks.length; i++) html += '<li>' + risks[i] + '</li>';
    html += '</ul>';
  }
  if (opts.summary) html += '<div style="margin-top:4px;">' + opts.summary + '</div>';
  if (!html) html = '<div style="color:#94a3b8">无优化建议</div>';
  document.getElementById('optimizationContent').innerHTML = html;
}

function renderTrace(caseId) {
  fetch('/api/v1/research/' + caseId + '/trace').then(function(r) { return r.json(); }).then(function(trace) {
    if (!trace || trace.length === 0) return;
    document.getElementById('traceSection').style.display = '';
    var html = '';
    for (var i = 0; i < trace.length; i++) {
      var ev = trace[i];
      var node = ev.node || ev.step || '';
      var msg = ev.output_summary ? JSON.stringify(ev.output_summary) : (ev.input_summary ? JSON.stringify(ev.input_summary) : '');
      var prov = ev.provider || '';
      var cls = prov === 'heuristic' ? 'color:#f59e0b' : 'color:#475569';
      html += '<div style="padding:3px 0;border-bottom:1px solid #f8fafc;font-size:11px;">';
      html += '<span style="color:#94a3b8;">[' + (i+1) + ']</span> ';
      html += '<b style="' + cls + '">' + node + '</b> ';
      if (prov) html += '<span style="color:#cbd5e1;">(' + prov + ')</span> ';
      if (ev.elapsed_s) html += '<span style="color:#94a3b8;">' + ev.elapsed_s + 's</span> ';
      if (msg) html += '<span style="color:#64748b;">' + msg.substring(0, 120) + '</span>';
      html += '</div>';
    }
    document.getElementById('traceContent').innerHTML = html;
  }).catch(function() {});
}

function renderFinal(final, st) {
  document.getElementById('finalSection').style.display = '';
  var html = '';
  if (final.low_bar_status) {
    var sCls = final.low_bar_status === 'pass' ? 'green' : (final.low_bar_status === 'blocked' ? 'red' : 'orange');
    html += '<span class="final-badge ' + sCls + '">' + final.low_bar_status + '</span>';
  }
  if (st.feasibility_report && st.feasibility_report.verdict) {
    var fCls = st.feasibility_report.verdict === 'feasible' ? 'green' : (st.feasibility_report.verdict === 'risky' ? 'orange' : 'red');
    html += '<span class="final-badge ' + fCls + '">可行性: ' + st.feasibility_report.verdict + ' (' + st.feasibility_report.score + '分)</span>';
  }
  if (st.review_report && st.review_report.overall_verdict) {
    var rCls = st.review_report.overall_verdict === 'ACCEPT' ? 'green' : (st.review_report.overall_verdict === 'MINOR_REVISION' ? 'orange' : 'red');
    html += '<span class="final-badge ' + rCls + '">审查: ' + st.review_report.overall_verdict + '</span>';
  }
  if (final.summary) html += '<div style="margin-top:6px">' + final.summary + '</div>';
  if (!html) html = '<div style="color:#94a3b8">无最终推荐</div>';
  document.getElementById('finalReport').innerHTML = html;
}

function viewCase(caseId) {
  if (!caseId) return;
  initStateMachine();
  setProgress(TOTAL_NODES);
  // Mark all nodes as done (state-node chips if present)
  document.querySelectorAll('.state-node').forEach(function(n) { n.classList.add('done'); });
  // Re3.9.3: mark all graph nodes done
  if (graphTopology) {
    (graphTopology.nodes || []).forEach(function(n) { completedNodes.add(n.id); });
    renderGraph();
  }
  fetchAndRenderAll(caseId);
  document.getElementById('statusBar').textContent = '查看历史: ' + caseId;
}

var uploadedPapers = [];
var currentCaseId = null;

function uploadPaper() {
  var title = document.getElementById('uploadTitle').value.trim();
  var doi = document.getElementById('uploadDoi').value.trim();
  var arxiv = document.getElementById('uploadArxiv').value.trim();
  var role = document.getElementById('uploadRole').value;
  if (!title && !doi && !arxiv) { alert('请至少输入标题、DOI 或 arXiv ID'); return; }
  if (!currentCaseId) { currentCaseId = genCaseId(); }
  document.getElementById('uploadTitle').value = '';
  document.getElementById('uploadDoi').value = '';
  document.getElementById('uploadArxiv').value = '';
  fetch('/api/v1/research/' + currentCaseId + '/papers', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title: title, doi: doi, arxiv_id: arxiv, role: role})
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.paper) {
      uploadedPapers.push(d.paper);
      renderUploadList();
    }
  }).catch(function(e) { alert('上传失败: ' + e); });
}

function renderUploadList() {
  var html = '';
  for (var i = 0; i < uploadedPapers.length; i++) {
    var p = uploadedPapers[i];
    var tag = p.arxiv_id ? 'arXiv:' + p.arxiv_id : (p.doi ? 'DOI:' + p.doi : 'title');
    html += '<div style="font-size:12px;padding:3px 0;color:#059669;">✓ ' + (p.title || tag) + ' <span style="color:#94a3b8">[' + (p.role || 'baseline') + ']</span></div>';
  }
  document.getElementById('uploadList').innerHTML = html || '<div style="font-size:12px;color:#cbd5e1;">暂无上传论文</div>';
}

// --- Timeline Debugger (Re3.5) ---
var tlTraceData = [];
var tlProgressiveData = [];
var tlCurrentIdx = 0;
var TL_COLORS = {
  'intake':'#94a3b8','topic_parser':'#818cf8','search_planner':'#a78bfa',
  'search_agent':'#6366f1','paper_retriever':'#6366f1','quality_filter':'#7c3aed',
  'verify':'#6d28d9','quality_gate':'#5b21b6','citation_expander':'#4c1d95',
  'dataset_repo':'#9333ea','dataset_repo_extractor':'#9333ea',
  'evidence_graph_builder':'#c026d3','evidence_auditor':'#a21caf',
  'baseline_classifier':'#86198f','feasibility_assessor':'#be185d',
  'work_package':'#9d174d','work_package_brainstorm':'#9d174d',
  'innovation_extractor':'#831843','sota_matcher':'#e11d48',
  'narrative_builder':'#be123c','low_bar_review':'#881337',
  'optimization_advisor':'#9f1239','devils_advocate':'#9f1239',
  'human_gate':'#475569','final_recommendation':'#1e293b',
};

async function loadTimeline(caseId) {
  try {
    var resp = await fetch('/api/v1/research/' + caseId + '/timeline');
    if (!resp.ok) return;
    var data = await resp.json();
    tlTraceData = data.trace || [];
    tlProgressiveData = data.progressive || [];
    if (tlTraceData.length > 0) {
      renderTimeline();
      document.getElementById('timelineDebugger').style.display = 'block';
    }
  } catch(e) { console.error('timeline load:', e); }
}

function renderTimeline() {
  if (tlTraceData.length === 0) return;
  var totalElapsed = tlTraceData.reduce(function(s,e){return s+(e.elapsed_s||0.01);},0);
  var trackEl = document.getElementById('tlTrack');
  trackEl.innerHTML = '';
  tlTraceData.forEach(function(ev,i){
    var pct = Math.max(1,((ev.elapsed_s||0.01)/totalElapsed)*100);
    var color = TL_COLORS[ev.node] || '#64748b';
    var hasError = (ev.errors && ev.errors.length > 0);
    var seg = document.createElement('div');
    seg.className = 'tl-segment' + (hasError?' error':'');
    seg.style.width = pct + '%';
    seg.style.background = color;
    seg.title = ev.node + ' (' + (ev.elapsed_s||0) + 's)';
    seg.textContent = ev.node.substring(0,6);
    seg.onclick = function(){ selectTimelineNode(i); };
    trackEl.appendChild(seg);
  });
  var chipsEl = document.getElementById('tlChips');
  chipsEl.innerHTML = '';
  tlTraceData.forEach(function(ev,i){
    var chip = document.createElement('span');
    chip.className = 'tl-chip';
    chip.textContent = (i+1)+'.'+ev.node;
    chip.onclick = function(){ selectTimelineNode(i); };
    chipsEl.appendChild(chip);
  });
  var slider = document.getElementById('tlSlider');
  slider.max = tlTraceData.length - 1;
  slider.value = 0;
  slider.oninput = function(){ selectTimelineNode(parseInt(this.value)); };
  document.getElementById('tlMeta').textContent = '1 / '+tlTraceData.length+' · '+totalElapsed.toFixed(1)+'s';
  selectTimelineNode(0);
}

function selectTimelineNode(idx) {
  if (idx < 0 || idx >= tlTraceData.length) return;
  tlCurrentIdx = idx;
  var ev = tlTraceData[idx];
  var prog = tlProgressiveData[idx] || {cumulative:{}};
  document.getElementById('tlSlider').value = idx;
  var totalElapsed = tlTraceData.reduce(function(s,e){return s+(e.elapsed_s||0.01);},0);
  var elapsedUpTo = 0;
  for (var i=0; i<=idx; i++) { elapsedUpTo += (tlTraceData[i].elapsed_s||0.01); }
  document.getElementById('tlCursor').style.left = Math.min((elapsedUpTo/totalElapsed)*100,100)+'%';
  var segs = document.querySelectorAll('.tl-segment');
  segs.forEach(function(s,i){ s.classList.toggle('active', i===idx); });
  var chips = document.querySelectorAll('.tl-chip');
  chips.forEach(function(c,i){ c.classList.toggle('active', i===idx); });
  var node = ev.node || '?';
  var elapsed = ev.elapsed_s || 0;
  var provider = ev.provider || '—';
  var startedAt = ev.started_at || '—';
  document.getElementById('tlDetailNode').textContent = '步骤 '+(idx+1)+': '+node;
  document.getElementById('tlDetailMeta').innerHTML = '⏱ '+elapsed+'s · 🤖 '+provider+' · 📅 '+startedAt;
  var ioHtml = '';
  if (ev.input_summary && Object.keys(ev.input_summary).length > 0) {
    ioHtml += '<div class="io-label">输入</div><div class="io-content">'+JSON.stringify(ev.input_summary,null,1)+'</div>';
  }
  if (ev.output_summary && Object.keys(ev.output_summary).length > 0) {
    ioHtml += '<div class="io-label">输出</div><div class="io-content">'+JSON.stringify(ev.output_summary,null,1)+'</div>';
  }
  document.getElementById('tlDetailIO').innerHTML = ioHtml;
  var toolsHtml = '';
  if (ev.tool_calls && ev.tool_calls.length > 0) {
    toolsHtml = '<div class="io-label">工具调用</div>';
    ev.tool_calls.forEach(function(tc){
      var n = tc.n !== undefined ? ' ('+tc.n+')' : '';
      toolsHtml += '<span class="tl-tool-tag">'+(tc.tool||'?')+n+'</span>';
    });
  }
  document.getElementById('tlDetailTools').innerHTML = toolsHtml;
  var errHtml = '';
  if (ev.errors && ev.errors.length > 0) {
    errHtml = '<div class="io-label">错误</div>';
    ev.errors.forEach(function(err){ errHtml += '<div style="color:#dc2626;font-size:11px;">⚠ '+err+'</div>'; });
  }
  document.getElementById('tlDetailErrors').innerHTML = errHtml;
  var fallbackHtml = '';
  if (ev.output_summary && ev.output_summary.used_fallback) {
    fallbackHtml = '<div style="color:#f59e0b;font-size:11px;margin-top:4px;">⚠ This node used heuristic fallback (LLM may have failed for some papers)</div>';
  }
  document.getElementById('tlDetailErrors').innerHTML = errHtml + fallbackHtml;
  var stateHtml = '';
  if (ev.state_keys && ev.state_keys.length > 0) {
    stateHtml = '<div class="io-label">状态变更</div>';
    ev.state_keys.forEach(function(k){ stateHtml += '<span class="tl-state-key">'+k+'</span>'; });
  }
  document.getElementById('tlDetailState').innerHTML = stateHtml;
  var cum = prog.cumulative || {};
  document.getElementById('tlProgPapers').textContent = cum.papers || 0;
  document.getElementById('tlProgRepos').textContent = cum.repos || 0;
  document.getElementById('tlProgDatasets').textContent = cum.datasets || 0;
  document.getElementById('tlProgBaseline').textContent = cum.baseline || 0;
  document.getElementById('tlMeta').textContent = (idx+1)+' / '+tlTraceData.length+' · '+elapsed+'s';
}

// Init
initStateMachine();
var graphTopology = null;
var completedNodes = new Set();
var currentNodeId = '';

async function loadGraphTopology() {
  try {
    var resp = await fetch('/api/v1/research/graph-topology');
    if (!resp.ok) return;
    graphTopology = await resp.json();
    renderGraph();
  } catch(e) { console.error('topology:', e); }
}

function _findNode(id) {
  if (!graphTopology) return null;
  var nodes = graphTopology.nodes || [];
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].id === id) return nodes[i];
  }
  return null;
}

function _resolveNodeName(name) {
  var m = {
    'retrieve':'search_agent','paper_retriever':'search_agent',
    'dataset_repo':'dataset_repo_extractor','graph':'evidence_graph_builder',
    'classify':'baseline_classifier','feas':'feasibility_assessor',
    'workpkg':'work_package','innov':'innovation_extractor','sota':'sota_matcher',
    'narrative':'narrative_builder','review':'low_bar_review',
    'optimize':'optimization_advisor','devils':'devils_advocate',
    'human':'human_gate','final':'final_recommendation'
  };
  return m[name] || name;
}

function renderGraph() {
  if (!graphTopology) return;
  var svg = document.getElementById('graphSvg');
  if (!svg) return;
  var html = '';
  var edges = graphTopology.edges || [];
  for (var i = 0; i < edges.length; i++) {
    var e = edges[i];
    var fn = _findNode(e.from), tn = _findNode(e.to);
    if (!fn || !tn) continue;
    var cls = 'graph-edge' + (e.dashed ? ' dashed' : '');
    html += '<line class="'+cls+'" x1="'+fn.x+'" y1="'+(fn.y+14)+'" x2="'+tn.x+'" y2="'+(tn.y-14)+'"/>';
    if (e.label) {
      var mx=(fn.x+tn.x)/2, my=(fn.y+tn.y)/2;
      html += '<text class="graph-edge-label" x="'+(mx+4)+'" y="'+my+'">'+e.label+'</text>';
    }
  }
  var nodes = graphTopology.nodes || [];
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    var isDone = completedNodes.has(n.id);
    var isCurrent = (n.id === currentNodeId);
    var isGate = (n.group === 'gate');
    var rc = 'graph-node-rect';
    if (isCurrent) rc += ' current'; else if (isDone) rc += ' done';
    if (isGate && !isCurrent) rc += ' gate';
    var tc = 'graph-node-text';
    if (isCurrent) tc += ' current'; else if (isDone) tc += ' done';
    var w=90,h=24,x=n.x-w/2,y=n.y-h/2;
    html += '<g class="graph-node" data-node="'+n.id+'">';
    html += '<rect class="'+rc+'" x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'"/>';
    html += '<text class="'+tc+'" x="'+n.x+'" y="'+n.y+'">'+n.label+'</text>';
    html += '</g>';
  }
  svg.innerHTML = html;
  svg.querySelectorAll('.graph-node').forEach(function(el) {
    el.onclick = function() {
      var nid = el.getAttribute('data-node');
      if (tlTraceData) {
        for (var j=0; j<tlTraceData.length; j++) {
          if (tlTraceData[j].node === nid || nid.includes(tlTraceData[j].node)) {
            selectTimelineNode(j); break;
          }
        }
      }
    };
  });
}

function markGraphNodeDone(nodeName) {
  completedNodes.add(_resolveNodeName(nodeName));
  completedNodes.add(nodeName);
  renderGraph();
}

function markGraphNodeCurrent(nodeName) {
  currentNodeId = _resolveNodeName(nodeName);
  completedNodes.add(currentNodeId);
  renderGraph();
  var node = _findNode(currentNodeId);
  if (node) {
    var svg = document.getElementById('graphSvg');
    if (svg && svg.parentElement) svg.parentElement.scrollTop = node.y - 80;
  }
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showHumanGateSearch() {
  var html = '<div style="background:#fef3c7;border-radius:8px;padding:12px;margin:10px 0;text-align:center;">';
  html += '<span style="font-size:13px;color:#92400e;">搜索阶段完成，自动继续分析（调试模式）</span>';
  html += '</div>';
  var c = document.getElementById('gateSearchContainer');
  if (c) { c.innerHTML = html; setTimeout(function() { c.innerHTML = ''; }, 3000); }
}

loadGraphTopology();
loadHistory();
renderUploadList();
