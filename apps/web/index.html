<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TopicPilot-CN · 开题选题助手</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__glow hero__glow--left"></div>
    <div class="hero__glow hero__glow--right"></div>
    <div class="hero__inner">
      <div class="hero__badge">TopicPilot-CN · 开题选题助手</div>
      <h1 class="hero__title">从「航母检测」到「毕业论文工作量」</h1>
      <p class="hero__sub">8 阶段闭环 · 真 arXiv 检索 · 真学术委员会对话 · 全程可 Trace</p>

      <div class="hero__steps" id="hero-steps">
        <button class="step-dot step-dot--active" data-phase="1" type="button">
          <span class="step-dot__num">1</span><span class="step-dot__label">建档</span>
        </button>
        <div class="step-line"></div>
        <button class="step-dot" data-phase="2" type="button" disabled>
          <span class="step-dot__num">2</span><span class="step-dot__label">拆解</span>
        </button>
        <div class="step-line"></div>
        <button class="step-dot" data-phase="3" type="button" disabled>
          <span class="step-dot__num">3</span><span class="step-dot__label">检索</span>
        </button>
        <div class="step-line"></div>
        <button class="step-dot" data-phase="4" type="button" disabled>
          <span class="step-dot__num">4</span><span class="step-dot__label">证据</span>
        </button>
        <div class="step-line"></div>
        <button class="step-dot" data-phase="5" type="button" disabled>
          <span class="step-dot__num">5</span><span class="step-dot__label">风险</span>
        </button>
        <div class="step-line"></div>
        <button class="step-dot" data-phase="6" type="button" disabled>
          <span class="step-dot__num">6</span><span class="step-dot__label">工作包</span>
        </button>
        <div class="step-line"></div>
        <button class="step-dot" data-phase="7" type="button" disabled>
          <span class="step-dot__num">7</span><span class="step-dot__label">报告</span>
        </button>
        <div class="step-line"></div>
        <button class="step-dot" data-phase="8" type="button" disabled>
          <span class="step-dot__num">8</span><span class="step-dot__label">导出</span>
        </button>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="layout-grid">
      <!-- 左: 当前 Phase 操作面板 (一页一动作) -->
      <section class="phase-panel" id="phase-panel">
        <!-- 由 app.js 根据 state.currentPhase 渲染 -->
      </section>

      <!-- 右: 流式 Trace 面板 (sticky) -->
      <aside class="trace-panel" id="trace-panel">
        <div class="trace-panel__head">
          <span class="trace-panel__icon">🧠</span>
          <h3 class="trace-panel__title">Agent 思考流</h3>
          <span class="trace-panel__count" id="trace-count">0</span>
        </div>
        <div class="trace-panel__sub" id="trace-sub">
          完成 Phase 01 后, 这里实时显示 Agent 思考过程
        </div>
        <div class="trace-list" id="trace-list">
          <div class="trace-empty">尚无 trace 事件</div>
        </div>
        <button class="trace-clear" id="btn-trace-clear" type="button">🗑️ 清空 trace</button>
      </aside>
    </div>
  </main>

  <footer class="page-footer">
    <span>API: <code id="api-base">http://127.0.0.1:18181</code></span>
    <span class="dot">·</span>
    <span>TopicPilot-CN MVP · 2026-06-16</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
