[pytest]
testpaths = apps/api/tests apps/web/e2e
pythonpath = .
addopts = --basetemp=G:/PaperAgent/tmp/pytest
asyncio_mode = auto
markers =
    react-web: Playwright e2e for the new React+Vite frontend (apps/web-react on 18183)
    legacy-web: Playwright e2e for the legacy vanilla JS frontend (apps/web on 18182)
    re02: PaperAgent Re02 agent unit/integration tests
    re03: PaperAgent Re03 agent unit/integration tests
    network: Tests that hit the real network (CI opt-in)
