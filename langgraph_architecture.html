<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperAgent LangGraph 架构图</title>
  <style>
    :root {
      color-scheme: light;
      --surface: #F7F7F8;
      --surface-muted: #EFEFF2;
      --text: #171717;
      --text-muted: #52525B;
      --border: rgba(23, 23, 23, 0.12);
      --brand: #4B3FE3;
      --brand-soft: #F2F7FF;
      --brand-soft-strong: #E5EAFF;
      --brand-text: #1A1759;
      --brand-on: #FFFFFF;
      --chart-series-1: #3C2ECA;
      --chart-series-2: #A9AEFF;
      --chart-series-3: #6F6FFF;
      --chart-series-4: #22A5F7;
      --chart-other: #D3D4DA;
      --accent: #27D2BF;
      --accent-2: #F87454;
      --accent-soft: #EAFBF8;
      --accent-text: #0F766E;
      --success: #1DC981;
      --warning: #EFAA17;
      --danger: #E8463A;
      --radius: 8px;
      --radius-card: 12px;
      --radius-full: 999px;
      --spacer-4: 4px;
      --spacer-8: 8px;
      --spacer-12: 12px;
      --spacer-16: 16px;
      --spacer-20: 20px;
      --spacer-24: 24px;
      --font-sans: "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-metric: "Inter", "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --weight-regular: 400;
      --weight-medium: 500;
      --weight-strong: 600;
      --text-caption: 12px/18px;
      --text-body: 14px/20px;
      --text-title: 16px/24px;
      --text-code: 13px/20px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --surface: #171717;
        --surface-muted: #262626;
        --text: #E5E5E5;
        --text-muted: #A1A1AA;
        --border: rgba(229, 229, 229, 0.12);
        --brand: #6054F1;
        --brand-soft: #1A1759;
        --brand-soft-strong: #3C2ECA;
        --brand-text: #CFD8FF;
        --chart-series-1: #4B3FE3;
        --chart-series-2: #A9AEFF;
        --chart-series-3: #6F6FFF;
        --chart-series-4: #22A5F7;
        --accent-soft: #123F3C;
        --accent-text: #CCFBF1;
      }
    }

    body {
      margin: 0;
      padding: 24px;
      background: var(--surface);
      color: var(--text);
      font: var(--weight-regular) var(--text-body) var(--font-sans);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: var(--spacer-20);
    }

    .t { fill: var(--text); font: var(--weight-regular) var(--text-body) var(--font-sans); text-anchor: middle; dominant-baseline: central; }
    .th { fill: var(--text); font: var(--weight-medium) var(--text-body) var(--font-sans); text-anchor: middle; dominant-baseline: central; }
    .ts { fill: var(--text-muted); font: var(--weight-regular) var(--text-caption) var(--font-sans); text-anchor: middle; dominant-baseline: central; }
    .tt { fill: var(--text); font: var(--weight-medium) var(--text-title) var(--font-sans); text-anchor: middle; dominant-baseline: central; }
    .phase-title { fill: var(--text-muted); font: var(--weight-medium) var(--text-caption) var(--font-sans); text-anchor: start; dominant-baseline: hanging; }
    .arr { stroke: var(--text-muted); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .arr-brand { stroke: var(--brand); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .arr-accent { stroke: var(--accent); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .arr-warning { stroke: var(--warning); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-dasharray: 4 2; }
    .arr-danger { stroke: var(--danger); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .leader { stroke: var(--text-muted); stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 4 4; fill: none; }
    .phase-container { fill: none; stroke: var(--border); stroke-width: 1; stroke-dasharray: 6 3; rx: var(--radius-card); }
    .detail-container { fill: var(--surface); stroke: var(--border); stroke-width: 1; rx: var(--radius-card); }

    g.c-neutral > rect { fill: var(--surface); stroke: var(--border); stroke-width: 1; rx: var(--radius); }
    g.c-pill > rect { fill: var(--surface); stroke: var(--border); stroke-width: 1; rx: var(--radius-full); }
    g.c-brand > rect { fill: var(--brand-soft); stroke: var(--brand); stroke-width: 2; rx: var(--radius); }
    g.c-accent > rect { fill: var(--accent-soft); stroke: var(--accent); stroke-width: 1.5; rx: var(--radius); }
    g.c-warning > rect { fill: color-mix(in srgb, var(--warning) 14%, transparent); stroke: var(--warning); stroke-width: 1.5; rx: var(--radius); }
    g.c-success > rect { fill: color-mix(in srgb, var(--success) 14%, transparent); stroke: var(--success); stroke-width: 1.5; rx: var(--radius); }
    g.c-danger > rect { fill: color-mix(in srgb, var(--danger) 14%, transparent); stroke: var(--danger); stroke-width: 1.5; rx: var(--radius); }
    g.c-decision > rect { fill: var(--surface); stroke: var(--brand); stroke-width: 1.5; rx: var(--radius); stroke-dasharray: 3 2; }

    .c-brand > .th, .c-brand > .t { fill: var(--brand-text); }
    .c-accent > .th, .c-accent > .t { fill: var(--accent-text); }
    .c-warning > .th, .c-warning > .t { fill: var(--text); }
    .c-success > .th, .c-success > .t { fill: var(--text); }
    .c-danger > .th, .c-danger > .t { fill: var(--text); }

    .arrow-marker { fill: var(--text-muted); }
    .arrow-marker-brand { fill: var(--brand); }
    .arrow-marker-accent { fill: var(--accent); }
    .arrow-marker-warning { fill: var(--warning); }
    .arrow-marker-danger { fill: var(--danger); }

    .edit-hint {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font: var(--text-caption);
      color: var(--text-muted);
    }
    .edit-hint code {
      font-family: var(--font-mono);
      background: var(--surface-muted);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 720 1220" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse" orient="auto" class="arrow-marker">
          <path d="M1 1 L7 4 L1 7 Z" />
        </marker>
        <marker id="arrow-brand" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" markerUnits="userSpaceOnUse" orient="auto" class="arrow-marker-brand">
          <path d="M1 1 L7 4 L1 7 Z" />
        </marker>
        <marker id="arrow-accent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse" orient="auto" class="arrow-marker-accent">
          <path d="M1 1 L7 4 L1 7 Z" />
        </marker>
        <marker id="arrow-warning" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse" orient="auto" class="arrow-marker-warning">
          <path d="M1 1 L7 4 L1 7 Z" />
        </marker>
        <marker id="arrow-danger" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" markerUnits="userSpaceOnUse" orient="auto" class="arrow-marker-danger">
          <path d="M1 1 L7 4 L1 7 Z" />
        </marker>
      </defs>

      <!-- 标题 -->
      <text x="360" y="35" class="tt">PaperAgent Re3.9 LangGraph 研究流水线架构</text>
      <text x="360" y="55" class="ts">21 个节点 · 3 个循环回路 · ReAct 搜索 + 双重反思机制</text>

      <!-- 外连通道（最底层，不穿节点） -->
      <path d="M 480 288 L 685 288 L 685 890 L 418 890" class="arr-danger" marker-end="url(#arrow-danger)" />
      <path d="M 550 711 L 675 711 L 675 882" class="arr-danger" />
      <text x="690" y="500" class="ts" fill="var(--danger)" transform="rotate(-90, 690, 500)">阻断→终止</text>
      <path d="M 100 475 L 28 475 L 28 816 L 62 816" class="arr-accent" marker-end="url(#arrow-accent)" />
      <text x="18" y="640" class="ts" fill="var(--accent)" transform="rotate(-90, 18, 640)">不推荐→直接优化</text>

      <!-- Phase 1: 输入与规划 -->
      <rect x="40" y="75" width="640" height="85" class="phase-container" />
      <text x="56" y="85" class="phase-title">Phase 1 · 主题输入与规划</text>
      <g class="c-pill">
        <rect x="70" y="102" width="70" height="34" />
        <text x="105" y="119" class="th">开始</text>
      </g>
      <g class="c-neutral">
        <rect x="175" y="100" width="95" height="38" />
        <text x="222" y="119" class="th">需求接收</text>
      </g>
      <g class="c-neutral">
        <rect x="305" y="100" width="100" height="38" />
        <text x="355" y="119" class="th">主题解析</text>
      </g>
      <g class="c-neutral">
        <rect x="440" y="100" width="115" height="38" />
        <text x="497" y="119" class="th">搜索规划</text>
      </g>
      <path d="M 140 119 L 172 119" class="arr" marker-end="url(#arrow)" />
      <path d="M 270 119 L 302 119" class="arr" marker-end="url(#arrow)" />
      <path d="M 405 119 L 437 119" class="arr" marker-end="url(#arrow)" />
      <path d="M 555 119 L 555 140 L 130 140 L 130 197" class="arr" marker-end="url(#arrow)" />

      <!-- Phase 2: 搜索与质量门控 -->
      <rect x="40" y="170" width="640" height="165" class="phase-container" />
      <text x="56" y="180" class="phase-title">Phase 2 · 搜索检索与质量门控</text>
      <g class="c-brand">
        <rect x="60" y="200" width="140" height="42" />
        <text x="130" y="221" class="th">ReAct 搜索代理</text>
      </g>
      <g class="c-neutral">
        <rect x="60" y="265" width="120" height="40" />
        <text x="120" y="285" class="th">质量过滤</text>
      </g>
      <g class="c-neutral">
        <rect x="215" y="265" width="105" height="40" />
        <text x="267" y="285" class="th">论文验证</text>
      </g>
      <g class="c-decision">
        <rect x="355" y="262" width="125" height="46" />
        <text x="417" y="280" class="th">质量门控</text>
        <text x="417" y="295" class="ts">决策分支</text>
      </g>
      <g class="c-warning">
        <rect x="520" y="200" width="135" height="42" />
        <text x="587" y="221" class="th">定向修复</text>
      </g>
      <g class="c-accent">
        <rect x="520" y="275" width="135" height="40" />
        <text x="587" y="295" class="th">引用扩展</text>
      </g>
      <path d="M 130 242 L 120 262" class="arr" marker-end="url(#arrow)" />
      <path d="M 180 285 L 212 285" class="arr" marker-end="url(#arrow)" />
      <path d="M 320 285 L 352 285" class="arr" marker-end="url(#arrow)" />
      <path d="M 520 221 L 210 221" class="arr-warning" marker-end="url(#arrow-warning)" />
      <text x="370" y="211" class="ts" fill="var(--warning)">修复回路</text>
      <path d="M 520 295 L 323 295" class="arr-accent" marker-end="url(#arrow-accent)" />
      <text x="425" y="308" class="ts" fill="var(--accent)">引用回路</text>
      <path d="M 480 272 L 480 242 L 587 242 L 587 272" class="arr" marker-end="url(#arrow)" />
      <path d="M 480 295 L 517 295" class="arr" marker-end="url(#arrow)" />
      <path d="M 417 308 L 417 335 L 127 335 L 127 377" class="arr" marker-end="url(#arrow)" />
      <text x="427" y="325" class="ts">继续</text>

      <!-- Phase 3: 证据提取与分析 -->
      <rect x="40" y="345" width="640" height="165" class="phase-container" />
      <text x="56" y="355" class="phase-title">Phase 3 · 证据提取与可行性分析</text>
      <g class="c-neutral">
        <rect x="55" y="380" width="145" height="40" />
        <text x="127" y="400" class="th">数据集/仓库提取</text>
      </g>
      <g class="c-neutral">
        <rect x="235" y="380" width="135" height="40" />
        <text x="302" y="400" class="th">证据图构建</text>
      </g>
      <g class="c-neutral">
        <rect x="405" y="380" width="130" height="40" />
        <text x="470" y="400" class="th">基线分类</text>
      </g>
      <g class="c-decision">
        <rect x="100" y="450" width="140" height="44" />
        <text x="170" y="467" class="th">可行性评估</text>
        <text x="170" y="482" class="ts">决策分支</text>
      </g>
      <g class="c-neutral">
        <rect x="380" y="452" width="135" height="40" />
        <text x="447" y="472" class="th">人工审核门</text>
      </g>
      <path d="M 200 400 L 232 400" class="arr" marker-end="url(#arrow)" />
      <path d="M 370 400 L 402 400" class="arr" marker-end="url(#arrow)" />
      <path d="M 470 420 L 470 440 L 170 440 L 170 447" class="arr" marker-end="url(#arrow)" />
      <path d="M 240 472 L 377 472" class="arr" marker-end="url(#arrow)" />
      <text x="308" y="462" class="ts">可行</text>

      <!-- Phase 4: 方案生成 -->
      <rect x="40" y="520" width="640" height="180" class="phase-container" />
      <text x="56" y="530" class="phase-title">Phase 4 · 创新方案与叙事生成</text>
      <g class="c-neutral">
        <rect x="265" y="555" width="130" height="40" />
        <text x="330" y="575" class="th">工作包生成</text>
      </g>
      <g class="c-neutral">
        <rect x="85" y="630" width="135" height="40" />
        <text x="152" y="650" class="th">创新点提取</text>
      </g>
      <g class="c-neutral">
        <rect x="420" y="630" width="125" height="40" />
        <text x="482" y="650" class="th">SOTA 对比</text>
      </g>
      <g class="c-brand">
        <rect x="235" y="690" width="145" height="42" />
        <text x="307" y="711" class="th">叙事生成</text>
      </g>
      <g class="c-decision">
        <rect x="420" y="688" width="130" height="46" />
        <text x="485" y="705" class="th">低栏审查</text>
        <text x="485" y="720" class="ts">决策分支</text>
      </g>
      <path d="M 447 492 L 447 510 L 330 510 L 330 552" class="arr" marker-end="url(#arrow)" />
      <path d="M 330 595 L 195 595 L 152 595 L 152 627" class="arr" marker-end="url(#arrow)" />
      <path d="M 330 595 L 425 595 L 482 595 L 482 627" class="arr" marker-end="url(#arrow)" />
      <text x="330" y="615" class="ts">并行分析</text>
      <path d="M 152 670 L 152 685 L 290 685" class="arr" marker-end="url(#arrow)" />
      <path d="M 482 670 L 482 685 L 385 685" class="arr" marker-end="url(#arrow)" />
      <path d="M 380 711 L 417 711" class="arr" marker-end="url(#arrow)" />
      <path d="M 485 734 L 485 755 L 587 755 L 587 265" class="arr-warning" marker-end="url(#arrow-warning)" />
      <text x="535" y="748" class="ts" fill="var(--warning)">需修复</text>
      <path d="M 420 711 L 137 711 L 137 792" class="arr-brand" marker-end="url(#arrow-brand)" />
      <text x="280" y="701" class="ts" fill="var(--brand)">通过</text>

      <!-- Phase 5: 反思与优化 -->
      <rect x="40" y="710" width="640" height="150" class="phase-container" />
      <text x="56" y="720" class="phase-title">Phase 5 · 魔鬼代言人反思循环</text>
      <g class="c-neutral">
        <rect x="65" y="795" width="145" height="42" />
        <text x="137" y="816" class="th">优化建议器</text>
      </g>
      <g class="c-brand">
        <rect x="260" y="793" width="145" height="46" />
        <text x="332" y="810" class="th">魔鬼代言人</text>
        <text x="332" y="825" class="ts">反思批判</text>
      </g>
      <g class="c-success">
        <rect x="495" y="797" width="110" height="40" />
        <text x="550" y="817" class="th">最终人工门</text>
      </g>
      <path d="M 210 816 L 257 816" class="arr" marker-end="url(#arrow)" />
      <path d="M 405 816 L 492 816" class="arr" marker-end="url(#arrow)" />
      <text x="450" y="806" class="ts" fill="var(--success)">接受</text>
      <path d="M 332 793 L 332 768 L 307 768 L 307 732" class="arr-brand" marker-end="url(#arrow-brand)" />
      <text x="350" y="760" class="ts" fill="var(--brand)">小修回路</text>
      <path d="M 260 830 L 200 830 L 137 842 L 137 837" class="arr-warning" marker-end="url(#arrow-warning)" />
      <text x="190" y="850" class="ts" fill="var(--warning)">阻断→重规划</text>

      <!-- Phase 6: 最终输出 -->
      <g class="c-success">
        <rect x="265" y="870" width="150" height="42" />
        <text x="340" y="891" class="th">最终推荐报告</text>
      </g>
      <g class="c-pill">
        <rect x="305" y="932" width="70" height="34" />
        <text x="340" y="949" class="th">结束</text>
      </g>
      <path d="M 550 837 L 550 860 L 340 860 L 340 867" class="arr" marker-end="url(#arrow)" />
      <path d="M 340 912 L 340 929" class="arr" marker-end="url(#arrow)" />

      <!-- 详图区域 -->
      <line x1="40" y1="985" x2="680" y2="985" class="leader" />
      <text x="360" y="1005" class="ts">核心机制详图（独立展示，不与主图连线）</text>

      <!-- ReAct 详图 -->
      <rect x="40" y="1020" width="310" height="140" class="detail-container" />
      <text x="55" y="1035" class="phase-title">ReAct 搜索代理内部循环（最多 8 步）</text>
      <g class="c-neutral">
        <rect x="65" y="1060" width="80" height="36" />
        <text x="105" y="1075" class="th">思考</text>
        <text x="105" y="1090" class="ts">Think</text>
      </g>
      <g class="c-brand">
        <rect x="180" y="1060" width="80" height="36" />
        <text x="220" y="1075" class="th">行动</text>
        <text x="220" y="1090" class="ts">Act</text>
      </g>
      <g class="c-neutral">
        <rect x="65" y="1120" width="80" height="32" />
        <text x="105" y="1136" class="th">观察</text>
        <text x="105" y="1148" class="ts">Observe</text>
      </g>
      <g class="c-success">
        <rect x="260" y="1082" width="75" height="34" rx="var(--radius-full)" />
        <text x="297" y="1099" class="th" style="font-size: 12px;">停止输出</text>
      </g>
      <path d="M 145 1078 L 177 1078" class="arr-brand" marker-end="url(#arrow-brand)" />
      <path d="M 220 1096 L 220 1120 L 105 1120" class="arr" marker-end="url(#arrow)" />
      <path d="M 105 1120 L 65 1120 L 65 1078 L 63 1078" class="arr" marker-end="url(#arrow)" />
      <path d="M 260 1078 L 260 1099" class="arr" marker-end="url(#arrow)" />
      <text x="165" y="1160" class="ts">工具调用: Crossref / ArXiv / GitHub Semantic Scholar</text>

      <!-- Reflection 详图 -->
      <rect x="370" y="1020" width="310" height="140" class="detail-container" />
      <text x="385" y="1035" class="phase-title">魔鬼代言人反思循环（最多 2 轮）</text>
      <g class="c-brand">
        <rect x="390" y="1062" width="90" height="38" />
        <text x="435" y="1081" class="th">生成叙事</text>
      </g>
      <g class="c-brand">
        <rect x="510" y="1062" width="90" height="38" />
        <text x="555" y="1081" class="th">批判审查</text>
      </g>
      <g class="c-success">
        <rect x="585" y="1122" width="75" height="28" rx="var(--radius-full)" />
        <text x="622" y="1136" class="th" style="font-size: 12px;">接受 ✓</text>
      </g>
      <g class="c-warning">
        <rect x="480" y="1122" width="75" height="28" rx="var(--radius-full)" />
        <text x="517" y="1136" class="th" style="font-size: 12px;">小修 ↻</text>
      </g>
      <g class="c-danger">
        <rect x="380" y="1122" width="75" height="28" rx="var(--radius-full)" />
        <text x="417" y="1136" class="th" style="font-size: 12px;">阻断 ↺</text>
      </g>
      <path d="M 480 1081 L 507 1081" class="arr-brand" marker-end="url(#arrow-brand)" />
      <path d="M 540 1100 L 517 1119" class="arr" marker-end="url(#arrow)" />
      <path d="M 490 1122 L 455 1092 L 435 1092 L 435 1100" class="arr-warning" marker-end="url(#arrow-warning)" />
      <path d="M 555 1100 L 417 1119" class="arr" marker-end="url(#arrow)" />
      <path d="M 600 1100 L 622 1119" class="arr" marker-end="url(#arrow)" />
